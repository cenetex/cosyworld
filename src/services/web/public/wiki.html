<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki :: CosyWorld Knowledge Base</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }

    /* Header */
    .header {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header h1 {
      font-size: 1.5rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 span.emoji {
      font-size: 2rem;
    }

    .search-box {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 400px;
    }

    .search-box input {
      flex: 1;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
    }

    .search-box input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    .search-box button {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .search-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #fff;
    }

    /* Main layout */
    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 24px;
      padding: 24px;
    }

    @media (max-width: 900px) {
      .main-container {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
      .sidebar.mobile-open {
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 300px;
        height: 100vh;
        z-index: 200;
        padding: 20px;
      }
    }

    /* Sidebar */
    .sidebar {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .sidebar h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .category-list {
      list-style: none;
      margin-bottom: 24px;
    }

    .category-list li {
      margin-bottom: 8px;
    }

    .category-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .category-list a:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .category-list a.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .category-count {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
    }

    .create-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 16px;
    }

    .create-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
    }

    /* Content area */
    .content {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 24px;
    }

    /* Article list */
    .article-list {
      display: grid;
      gap: 16px;
    }

    .article-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .article-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      border-color: rgba(102, 126, 234, 0.3);
    }

    .article-card h3 {
      font-size: 1.1rem;
      color: #fff;
      margin-bottom: 8px;
    }

    .article-meta {
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 12px;
    }

    .article-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      background: rgba(102, 126, 234, 0.2);
      color: #a5b4fc;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
    }

    /* Article view */
    .article-view {
      display: none;
    }

    .article-view.active {
      display: block;
    }

    .article-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
      margin-bottom: 24px;
    }

    .article-header h1 {
      font-size: 2rem;
      color: #fff;
      margin-bottom: 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #a5b4fc;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .back-btn:hover {
      color: #fff;
    }

    .article-content {
      line-height: 1.7;
      color: #d0d0d0;
    }

    .article-content h1, .article-content h2, .article-content h3 {
      color: #fff;
      margin: 24px 0 12px;
    }

    .article-content p {
      margin-bottom: 16px;
    }

    .article-content code {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Fira Code', monospace;
    }

    .article-content pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 16px 0;
    }

    .article-content pre code {
      background: none;
      padding: 0;
    }

    .article-content ul, .article-content ol {
      margin: 16px 0;
      padding-left: 24px;
    }

    .article-content blockquote {
      border-left: 4px solid #667eea;
      padding-left: 16px;
      margin: 16px 0;
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
    }

    /* Create/Edit form */
    .article-form {
      display: none;
    }

    .article-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
    }

    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
    }

    .form-group textarea {
      min-height: 300px;
      font-family: 'Fira Code', monospace;
      resize: vertical;
    }

    .form-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-primary {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-secondary {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
    }

    /* Checkpoint indicator */
    .checkpoint-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: #fff;
      font-weight: 600;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: rgba(255, 255, 255, 0.5);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Share button */
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .share-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #38ef7d;
      color: #000;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <h1>
        <span class="emoji">📖</span>
        CosyWorld Wiki
      </h1>
      
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search articles..." onkeyup="handleSearchKeyup(event)">
        <button onclick="searchArticles()">Search</button>
      </div>
      
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/api-docs.html">API Docs</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <div class="main-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h3>Categories</h3>
      <ul class="category-list" id="categoryList">
        <li><a href="#" class="active" data-category="">All Articles</a></li>
      </ul>
      
      <h3>Recent</h3>
      <ul class="category-list" id="recentList"></ul>
      
      <button class="create-btn" onclick="showCreateForm()">+ Create Article</button>
    </aside>

    <!-- Content -->
    <main class="content">
      <!-- Loading state -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading wiki...</p>
      </div>

      <!-- Article list view -->
      <div class="article-list-view" id="listView" style="display: none;">
        <h2 style="color: #fff; margin-bottom: 20px;" id="listTitle">All Articles</h2>
        <div class="article-list" id="articleList"></div>
      </div>

      <!-- Article view -->
      <div class="article-view" id="articleView">
        <a class="back-btn" onclick="showList()">
          ← Back to articles
        </a>
        <div class="article-header">
          <h1 id="articleTitle"></h1>
          <div class="article-meta" id="articleMeta"></div>
          <div class="article-tags" id="articleTags"></div>
        </div>
        <div class="article-content" id="articleContent"></div>
        <div style="margin-top: 24px; display: flex; gap: 12px;">
          <button class="share-btn" onclick="shareArticle()">📋 Copy Link</button>
          <button class="btn-secondary" onclick="editCurrentArticle()">✏️ Edit</button>
        </div>
      </div>

      <!-- Create/Edit form -->
      <div class="article-form" id="articleForm">
        <a class="back-btn" onclick="showList()">
          ← Back to articles
        </a>
        <h2 style="color: #fff; margin-bottom: 24px;" id="formTitle">Create New Article</h2>
        
        <div class="form-group">
          <label for="titleInput">Title</label>
          <input type="text" id="titleInput" placeholder="Enter article title">
        </div>
        
        <div class="form-group">
          <label for="categoryInput">Category</label>
          <input type="text" id="categoryInput" placeholder="general" value="general">
        </div>
        
        <div class="form-group">
          <label for="tagsInput">Tags (comma-separated)</label>
          <input type="text" id="tagsInput" placeholder="tag1, tag2, tag3">
        </div>
        
        <div class="form-group">
          <label for="contentInput">Content (Markdown supported)</label>
          <textarea id="contentInput" placeholder="Write your article content here..."></textarea>
        </div>
        
        <div class="form-group">
          <label for="authorInput">Author Name</label>
          <input type="text" id="authorInput" placeholder="Your name or bot identifier">
        </div>
        
        <div class="form-buttons">
          <button class="btn-primary" onclick="saveArticle()">Save Article</button>
          <button class="btn-secondary" onclick="showList()">Cancel</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // State
    let currentArticle = null;
    let currentCategory = '';
    let editingSlug = null;

    // API base
    const API_BASE = '/api/wiki';

    // Get slug from URL path or hash
    function getSlugFromUrl() {
      // Check clean URL path first: /wiki/article-slug
      const pathMatch = window.location.pathname.match(/^\/wiki\/(.+)$/);
      if (pathMatch) {
        return decodeURIComponent(pathMatch[1]);
      }
      // Fall back to hash: /wiki#article-slug
      const hash = window.location.hash.slice(1);
      if (hash) {
        return decodeURIComponent(hash);
      }
      return null;
    }

    // Update URL when viewing an article
    function updateUrl(slug) {
      if (slug) {
        // Use clean URL
        window.history.pushState({slug}, '', `/wiki/${encodeURIComponent(slug)}`);
      } else {
        window.history.pushState({}, '', '/wiki');
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      // Check for slug in URL
      const slug = getSlugFromUrl();
      if (slug) {
        loadArticle(slug);
      } else {
        loadArticles();
      }
      loadCategories();
    });

    // Handle browser back/forward
    window.addEventListener('popstate', (event) => {
      const slug = getSlugFromUrl();
      if (slug) {
        loadArticle(slug, false); // false = don't update URL
      } else {
        loadArticles(currentCategory);
      }
    });

    // Load categories
    async function loadCategories() {
      try {
        const res = await fetch(`${API_BASE}/categories`);
        const data = await res.json();
        
        const list = document.getElementById('categoryList');
        list.innerHTML = `<li><a href="#" class="${!currentCategory ? 'active' : ''}" data-category="" onclick="filterCategory('')">All Articles</a></li>`;
        
        if (data.categories) {
          data.categories.forEach(cat => {
            list.innerHTML += `
              <li>
                <a href="#" class="${currentCategory === cat.name ? 'active' : ''}" 
                   data-category="${cat.name}" 
                   onclick="filterCategory('${cat.name}')">
                  ${cat.name}
                  <span class="category-count">${cat.count}</span>
                </a>
              </li>
            `;
          });
        }
      } catch (err) {
        console.error('Failed to load categories:', err);
      }
    }

    // Load articles
    async function loadArticles(category = '') {
      showLoading();
      currentCategory = category;
      
      try {
        const url = category 
          ? `${API_BASE}/articles?category=${encodeURIComponent(category)}`
          : `${API_BASE}/articles`;
        
        const res = await fetch(url);
        const data = await res.json();
        
        renderArticleList(data.articles || []);
        showListView();
        
        // Update recent list
        updateRecentList(data.articles?.slice(0, 5) || []);
      } catch (err) {
        console.error('Failed to load articles:', err);
        showToast('Failed to load articles');
      }
    }

    // Render article list
    function renderArticleList(articles) {
      const list = document.getElementById('articleList');
      const title = document.getElementById('listTitle');
      
      title.textContent = currentCategory ? `${currentCategory} Articles` : 'All Articles';
      
      if (!articles.length) {
        list.innerHTML = `
          <div style="text-align: center; padding: 40px; color: rgba(255,255,255,0.5);">
            <p>No articles found.</p>
            <button class="create-btn" onclick="showCreateForm()" style="width: auto; margin-top: 16px;">
              Create the first article
            </button>
          </div>
        `;
        return;
      }
      
      list.innerHTML = articles.map(article => `
        <div class="article-card" onclick="loadArticle('${article.slug}')">
          <h3>${escapeHtml(article.title)}</h3>
          <div class="article-meta">
            <span>📁 ${article.category}</span>
            <span>👤 ${escapeHtml(article.authorName || 'Anonymous')}</span>
            <span>📅 ${formatDate(article.updatedAt)}</span>
            <span>👁 ${article.viewCount || 0} views</span>
          </div>
          ${article.tags?.length ? `
            <div class="article-tags">
              ${article.tags.slice(0, 5).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
            </div>
          ` : ''}
          ${article.category === 'checkpoints' ? '<span class="checkpoint-badge">✨ Checkpoint</span>' : ''}
        </div>
      `).join('');
    }

    // Update recent list
    function updateRecentList(articles) {
      const list = document.getElementById('recentList');
      list.innerHTML = articles.map(a => `
        <li>
          <a href="#" onclick="loadArticle('${a.slug}')">${escapeHtml(a.title.substring(0, 25))}${a.title.length > 25 ? '...' : ''}</a>
        </li>
      `).join('');
    }

    // Load single article
    async function loadArticle(slug, shouldUpdateUrl = true) {
      showLoading();
      
      try {
        const res = await fetch(`${API_BASE}/article/${encodeURIComponent(slug)}`);
        if (!res.ok) throw new Error('Article not found');
        
        const data = await res.json();
        currentArticle = data.article;
        
        renderArticle(data.article);
        showArticleView();
        
        // Update URL (clean path)
        if (shouldUpdateUrl) {
          updateUrl(slug);
        }
      } catch (err) {
        console.error('Failed to load article:', err);
        showToast('Article not found');
        showList();
      }
    }

    // Render single article
    function renderArticle(article) {
      document.getElementById('articleTitle').textContent = article.title;
      
      const meta = document.getElementById('articleMeta');
      meta.innerHTML = `
        <span>📁 ${article.category}</span>
        <span>👤 ${escapeHtml(article.authorName || 'Anonymous')}</span>
        <span>📅 ${formatDate(article.updatedAt)}</span>
        <span>v${article.version}</span>
        <span>👁 ${article.viewCount || 0} views</span>
      `;
      
      const tags = document.getElementById('articleTags');
      tags.innerHTML = article.tags?.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('') || '';
      
      // Parse markdown
      document.getElementById('articleContent').innerHTML = marked.parse(article.content);
    }

    // Search articles
    async function searchArticles() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) {
        loadArticles();
        return;
      }
      
      showLoading();
      
      try {
        const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        
        renderArticleList(data.results || []);
        document.getElementById('listTitle').textContent = `Search: "${query}"`;
        showListView();
      } catch (err) {
        console.error('Search failed:', err);
        showToast('Search failed');
      }
    }

    // Handle search keyup
    function handleSearchKeyup(event) {
      if (event.key === 'Enter') {
        searchArticles();
      }
    }

    // Filter by category
    function filterCategory(category) {
      loadArticles(category);
      loadCategories();
    }

    // Show create form
    function showCreateForm() {
      editingSlug = null;
      document.getElementById('formTitle').textContent = 'Create New Article';
      document.getElementById('titleInput').value = '';
      document.getElementById('categoryInput').value = 'general';
      document.getElementById('tagsInput').value = '';
      document.getElementById('contentInput').value = '';
      document.getElementById('authorInput').value = '';
      
      showFormView();
    }

    // Edit current article
    function editCurrentArticle() {
      if (!currentArticle) return;
      
      editingSlug = currentArticle.slug;
      document.getElementById('formTitle').textContent = 'Edit Article';
      document.getElementById('titleInput').value = currentArticle.title;
      document.getElementById('categoryInput').value = currentArticle.category;
      document.getElementById('tagsInput').value = currentArticle.tags?.join(', ') || '';
      document.getElementById('contentInput').value = currentArticle.content;
      document.getElementById('authorInput').value = currentArticle.authorName || '';
      
      showFormView();
    }

    // Save article
    async function saveArticle() {
      const title = document.getElementById('titleInput').value.trim();
      const category = document.getElementById('categoryInput').value.trim() || 'general';
      const tags = document.getElementById('tagsInput').value.split(',').map(t => t.trim()).filter(Boolean);
      const content = document.getElementById('contentInput').value;
      const authorName = document.getElementById('authorInput').value.trim() || 'Anonymous';
      
      if (!title || !content) {
        showToast('Title and content are required');
        return;
      }
      
      try {
        let res;
        if (editingSlug) {
          // Update
          res = await fetch(`${API_BASE}/article/${encodeURIComponent(editingSlug)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, category, tags, content, editorId: authorName })
          });
        } else {
          // Create
          res = await fetch(`${API_BASE}/article`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, category, tags, content, authorName })
          });
        }
        
        if (!res.ok) throw new Error('Save failed');
        
        const data = await res.json();
        showToast(editingSlug ? 'Article updated!' : 'Article created!');
        
        // Load the new/updated article
        loadArticle(data.article.slug);
        loadCategories();
      } catch (err) {
        console.error('Save failed:', err);
        showToast('Failed to save article');
      }
    }

    // Share article
    function shareArticle() {
      if (!currentArticle) return;
      
      const url = `${window.location.origin}/wiki/${encodeURIComponent(currentArticle.slug)}`;
      navigator.clipboard.writeText(url).then(() => {
        showToast('Link copied to clipboard!');
      }).catch(() => {
        showToast('Failed to copy link');
      });
    }

    // View helpers
    function showLoading() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('listView').style.display = 'none';
      document.getElementById('articleView').classList.remove('active');
      document.getElementById('articleForm').classList.remove('active');
    }

    function showListView() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('listView').style.display = 'block';
      document.getElementById('articleView').classList.remove('active');
      document.getElementById('articleForm').classList.remove('active');
      updateUrl(null); // Reset to /wiki
    }

    function showArticleView() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('listView').style.display = 'none';
      document.getElementById('articleView').classList.add('active');
      document.getElementById('articleForm').classList.remove('active');
    }

    function showFormView() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('listView').style.display = 'none';
      document.getElementById('articleView').classList.remove('active');
      document.getElementById('articleForm').classList.add('active');
    }

    function showList() {
      loadArticles(currentCategory);
    }

    // Utilities
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'Unknown';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Handle legacy hash URLs - redirect to clean URLs
    if (window.location.hash && !window.location.pathname.includes('/wiki/')) {
      const hash = window.location.hash.slice(1);
      if (hash) {
        window.location.replace(`/wiki/${encodeURIComponent(hash)}`);
      }
    }
  </script>
</body>
</html>
