<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login :: Moonstone Sanctum</title>
  <link href="/css/admin-v2.css" rel="stylesheet" />
  <style>
    /* Login page - centered card layout (no sidebar) */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-4);
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-xl);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }

    .login-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--color-accent-primary) 0%, var(--color-accent-secondary) 100%);
      border-radius: var(--radius-full);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: var(--space-4);
    }

    .login-icon svg {
      width: 36px;
      height: 36px;
      color: white;
    }

    .login-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--color-text-primary);
      margin: 0 0 var(--space-2);
    }

    .login-subtitle {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    .login-wallet-section {
      margin-bottom: var(--space-5);
    }

    .login-status-box {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
    }

    .login-status-box .status-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      color: var(--color-text-muted);
    }

    .login-status-box .status-icon.processing {
      color: var(--color-info);
      animation: pulse 2s infinite;
    }

    .login-status-box .status-icon.success {
      color: var(--color-success);
    }

    .login-status-box .status-icon.error {
      color: var(--color-error);
    }

    #login-status {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    #login-status.status-waiting { color: var(--color-text-muted); }
    #login-status.status-processing { color: var(--color-info); }
    #login-status.status-success { color: var(--color-success); }
    #login-status.status-error { color: var(--color-error); }

    .login-info-notice {
      background: var(--color-info-bg);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      margin-bottom: var(--space-5);
      display: flex;
      gap: var(--space-3);
    }

    .login-info-notice .info-icon {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      color: var(--color-info);
    }

    .login-info-notice p {
      font-size: var(--text-xs);
      color: var(--color-info);
      line-height: 1.5;
    }

    .login-back-link {
      display: block;
      text-align: center;
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .login-back-link:hover {
      color: var(--color-text-primary);
    }

    .login-brand {
      text-align: center;
      margin-bottom: var(--space-6);
    }

    .login-brand img {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      margin-bottom: var(--space-2);
    }

    .login-brand-name {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-accent-primary);
    }

    .login-brand-tagline {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body class="admin-v2">
  <div class="login-container">
    <!-- Brand -->
    <div class="login-brand">
      <img src="/images/image.png" alt="RATi" onerror="this.style.display='none'" />
      <div class="login-brand-name">RATi Admin</div>
      <div class="login-brand-tagline">Moonstone Sanctum</div>
    </div>

    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="login-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
        </div>
        <h1 class="login-title">Admin Login</h1>
        <p class="login-subtitle">Connect your Phantom wallet to access the admin panel</p>
      </div>

      <!-- Wallet Connection -->
      <div class="login-wallet-section">
        <div class="wallet-container"></div>
      </div>

      <!-- Status Messages -->
      <div class="login-status-box">
        <svg id="status-icon" class="status-icon" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
        </svg>
        <p id="login-status" class="status-waiting">Waiting for wallet connection…</p>
      </div>

      <!-- Info Notice -->
      <div class="login-info-notice">
        <svg class="info-icon" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
        </svg>
        <p>Only authorized admin wallets can access this area. If you believe you should have access, please contact the system administrator.</p>
      </div>

      <!-- Back Link -->
      <a href="/" class="login-back-link">← Back to site</a>
    </div>
  </div>

  <script type="module" src="/js/admin/admin-bootstrap.js"></script>
  <script type="module" src="/js/admin-login.js"></script>
</body>
</html>
