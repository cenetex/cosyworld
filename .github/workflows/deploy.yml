name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::022118847419:role/lonely-forest-github-actions-deployer
  AWS_TERRAFORM_DIR: infra/aws-lonely-forest
  AWS_ECR_REPOSITORY: lonely-forest-app

jobs:
  fly:
    name: Deploy to Fly
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  aws:
    name: Deploy tagged version to AWS
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: fly
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Check for existing versioned AWS image
        id: aws_image
        run: |
          if aws ecr describe-images \
            --repository-name "$AWS_ECR_REPOSITORY" \
            --image-ids "imageTag=$GITHUB_REF_NAME" \
            >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Docker Buildx
        if: steps.aws_image.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push AWS image
        if: steps.aws_image.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:${{ github.ref_name }}
            ${{ steps.ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ steps.ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform init
        working-directory: ${{ env.AWS_TERRAFORM_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.AWS_TERRAFORM_DIR }}
        run: terraform apply -input=false -auto-approve -var="image_tag=${GITHUB_REF_NAME}"
        env:
          TF_IN_AUTOMATION: true
          TF_INPUT: false

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [fly, aws]
    permissions:
      contents: write
    steps:
      - name: Create release notes
        run: gh release view "$GITHUB_REF_NAME" || gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
