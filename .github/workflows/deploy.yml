name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FLY_PRIMARY_APP: cosyworld

jobs:
  fly:
    name: Deploy to Fly
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy primary Fly app
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Resolve deployed image digest
        id: image
        run: |
          image_ref="$(flyctl image show --app "$FLY_PRIMARY_APP" --json | jq -r '.[0] | "\(.Registry)/\(.Repository)@\(.Digest)"')"
          test -n "$image_ref"
          test "$image_ref" != "null/null@null"
          echo "ref=$image_ref" >> "$GITHUB_OUTPUT"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy the same image to Lonely Forest
        run: flyctl deploy --config fly.lonelyforest.toml --image "${{ steps.image.outputs.ref }}" --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [fly]
    permissions:
      contents: write
    steps:
      - name: Create release notes
        run: gh release view "$GITHUB_REF_NAME" || gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
