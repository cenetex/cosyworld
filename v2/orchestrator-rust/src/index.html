        aspect: shape === "location" ? "wide" : (shape === "avatar" ? "tall" : "square"),
      };
      const image = cardImage(card) || fallbackCardImage(fallback);
      const imageEmoji = cardImage(card) ? "" : emojiHtml(cardEmoji(fallback, shape));
      const dataAttr = interactive && card ? cardDataAttr(card) : "";
      const className = ["thumb", extraClass, shape].filter(Boolean).join(" ");
      return `<span class="${escapeAttr(className)}"${dataAttr} aria-hidden="true" style="background-image:url('${escapeAttr(image)}')">${imageEmoji}</span>`;
    }

    function actionImage(action) {
      const card = actionChoiceCard(action);
      if (!card) return fallbackCardImage({ display_name: action?.label || "Action", role: "card", aspect: "wide" });
      return cardImage(card) || fallbackCardImage(card);
    }

    function selectedActionChoice(action) {
      const choices = Array.isArray(action?.choices) ? action.choices : [];
      return choices.find((choice) => String(choice.value || "") === String(action?.selectedChoice || ""))
        || choices[0]
        || null;
    }

    function actionChoiceCard(action, choice = selectedActionChoice(action)) {
      return choice?.card || action?.card || cardForActor(actorId) || cardForLocation(state?.location?.id) || null;
    }

    function syncActionChoicePreview(action, choice = selectedActionChoice(action)) {
      const card = actionChoiceCard(action, choice);
      const art = $("action-modal").querySelector(".action-art");
      art?.classList.remove("avatar", "item", "location");
      art?.classList.add(shapeForCard(card));
      $("action-modal-image").src = actionImage(action);
      $("action-modal-image").alt = choice?.label || card?.display_name || action?.detail || actionTitle(action);
    }

    function bankLedgerPlan(action) {
      const text = `${action?.detail || ""} ${action?.effect || ""}`;
      const detailMatch = text.match(/([1-9]\d*)\s+(?:memory\s+)?marks?.*?\+([1-9]\d*)\s+(?:growth\s+)?points?/i);
      const effectMatch = text.match(/banks\s+([1-9]\d*)\s+Visit Ledger marks?\s+into\s+([1-9]\d*)\s+advancement points?/i);
      const growthMatch = text.match(/turns\s+([1-9]\d*)\s+memory marks?\s+into\s+([1-9]\d*)\s+growth points?/i);
      const count = Number(action?.memoryCount || detailMatch?.[1] || growthMatch?.[1] || effectMatch?.[1] || 0);
      const points = Number(action?.growthCount || detailMatch?.[2] || growthMatch?.[2] || effectMatch?.[2] || count || 0);
      if (!count && !points) return null;
      const memoryCount = count || points;
      const growthCount = points || count;
      return {
        count: memoryCount,
        points: growthCount,
        summary: "Keep what mattered.",
        rows: [
          ["What stays", "the little things you noticed this visit"],
          ["What opens", "new ways to strengthen a friendship or open bracelet space"],
        ],
      };
    }

    function smallNumberWord(value) {
      const number = Math.max(0, Number(value) || 0);
      return ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten"][number]
        || String(number);
    }

    function projectProgressDetail(value) {
      const amount = Math.max(1, Number(value) || 1);
      if (amount >= 3) return "make great headway";
      if (amount === 2) return "make good headway";
      return "make a little headway";
    }

    function projectProgressResult(value) {
      const amount = Math.max(1, Number(value) || 1);
      if (amount >= 3) return "makes great headway";
      if (amount === 2) return "makes good headway";
      return "makes a little headway";
    }

    function actionTitle(action) {
      if (action?.modalTitle) return String(action.modalTitle);
      if (["notice", "inspect", "scout", "travel"].includes(String(action?.intention || ""))) {
        return String(action?.accessibleLabel || action?.label || "action").toLowerCase();
      }
      const label = String(action?.label || action?.command || "action").toLowerCase();
      if (label === "grow" || label === "bank") return "grow";
      if (label === "evolve") return action?.choices?.length ? "choose how to evolve" : "evolve";
      if (label === "nudge" || label === "ping") {
        const currentName = String(state?.turn?.current_actor_name || action?.detail || "them")
          .replace(/\s+is (?:choosing|thinking)$/i, "");
        return `gently nudge ${currentName}`;
      }
      if (label === "i'm here" || label === "pong") return "say you're here";
      if (label === "listen") return "listen to the room";
      if (label === "listen again") return "listen once more";
      if (label === "travel" && action?.detail) return `go to ${action.detail}`;
      if (label === "search" && action?.detail) return `search ${action.detail}`;
      if (label === "chat" && action?.choices?.length) return "choose someone to chat with";
      if (label === "chat" && action?.detail) {
        const targetName = action?.targetName || String(action.detail).split(/[·,]/)[0].trim();
        return `chat with ${targetName}`;
      }
      if (label === "take" && action?.choices?.length) return "choose what to take";
      if (label === "swap" && action?.choices?.length) return "choose what to swap";
      if (label === "give" && action?.choices?.length) return "choose who receives it";
      if (label === "give" && action?.detail) return `give ${action.detail}`;
      if (label === "trade" && action?.targetName) return `trade with ${action.targetName}`;
      if (label === "take" && action?.detail) return `pick up ${String(action.detail).split(",")[0]}`;
      if (label === "swap" && action?.detail) return `swap ${action.detail}`;
      if (label === "rest") return "catch your breath";
      if (label === "help") return "lend a hand";
      return label;
    }

    function compactActionLabel(action) {
      const label = String(action?.label || "").trim().toLowerCase();
      if (action?.busy && action?.busyLabel) return String(action.busyLabel).trim().toLowerCase();
      if (["notice", "inspect", "scout", "travel", "contribute"].includes(String(action?.intention || ""))) {
        return label || String(action?.project?.verb || action?.intention || "act").toLowerCase();
      }
      if (String(action?.command || "").trim().toLowerCase() === "create avatar") return "begin";
      if (label === "grow" || label === "bank") return "grow";
      if (label === "evolve") return "evolve";
      if (label === "travel") return "go";
      if (label === "listen again") return "listen again";
      if (label === "nudge" || label === "ping") return "nudge";
      if (label === "i'm here" || label === "pong") return "I'm here";
      return label || "act";
    }

    function friendlyActionText(value) {
      return compactActionDetail(value)
        .replace(/\bfirst help deepens Bond with\s+([^;,.]+)/gi, "first help brings you closer to $1")
        .replace(/\bdeepens Bond with\b/gi, "brings you closer to")
        .replace(/marks?\s+the\s+Visit Ledger/gi, "leaves you with a memory")
        .replace(/marks?\s+Visit Ledger/gi, "leaves you with a memory")
        .replace(/Visit Ledger marks?/gi, "memories")
        .replace(/Visit Ledger/gi, "memory")
        .replace(/advancement points?/gi, "growth")
        .replace(/growth points?/gi, "growth")
        .replace(/uses complete project evidence/gi, "brings together every clue you found")
        .replace(/uses partial project evidence/gi, "uses the clues you found here")
        .replace(/unprepared effort can leave you tired/gi, "you may get tired")
        .replace(/repeated help can leave you tired/gi, "helping again may tire you")
        .replace(/repeat listening on the frontier can leave you tired/gi, "listening again may tire you")
        .replace(/resting on the frontier advances the danger clock/gi, "the trouble may draw nearer while you rest")
        .replace(/can damage or knock out the target/gi, "someone may be hurt or fall quiet")
        .replace(/forgoes an attack this turn/gi, "you guard instead of striking")
        .replace(/fleeing exits danger but gives up the current room position/gi, "you leave the danger behind")
        .replace(/training settles for another skill step/gi, "another ability will be ready to practice")
        .replace(/spends hearth tonic warmth; danger does not advance/gi, "uses the tonic's warmth; trouble stays back")
        .replace(/may advance danger in frontier rooms/gi, "the trouble may draw nearer out here")
        .replace(/\bbanks?\b/gi, "claims")
        .replace(/\badvances? danger(?: clock)?(?: by)? \+?([1-9]\d*)\b/gi, "trouble draws near")
        .replace(/\bdanger \+([1-9]\d*)\b/gi, "trouble draws near")
        .replace(/\buses 1 growth\b/gi, "uses what you learned")
        .replace(/\b([A-Z][A-Za-z0-9' -]*?)\s+bond \+1\b/g, "friendship with $1 grows")
        .replace(/\bbond \+1\b/gi, "friendship grows")
        .replace(/\bsetup \+[1-9]\d*(?: progress)?\b/gi, "make the next try count")
        .replace(/\+([1-9]\d*) progress\b/gi, (_, amount) => projectProgressResult(amount))
        .replace(/\bone-shot\b/gi, "once")
        .replace(/\bclears tired\b/gi, "helps you feel fresh")
        .replace(/\btired\b/gi, "worn out")
        .trim();
    }

    function actionModalRows(action) {
      if (String(action?.command || "").trim().toLowerCase() === "create avatar") {
        const creationProfile = action?.creationProfile || (state?.character_creation || [])[0] || null;
        if (creationProfile) {
          const entryName = creationProfile.entry_location_name
            || cardForLocation(creationProfile.entry_location_id)?.display_name
            || "the campaign threshold";
          if (action?.creationStage === "species") {
            return [
              ["Choose", "a Species card"],
              ["Next", "choose an Origin card"],
              ["Begin at", entryName],
            ];
          }
          if (action?.creationStage === "origin") {
            const species = (creationProfile.species || [])
              .find((choice) => choice.id === action.selectedSpeciesId)?.label || "your chosen species";
            return [
              ["Species", species],
              ["Choose", "an Origin card"],
              ["Then", "begin classless at level 0"],
              ["Begin at", entryName],
            ];
          }
          return [
            ["Campaign", creationProfile.name],
            ["Begin at", entryName],
          ];
        }
        return [
          ["Choose", "the trouble that always draws you in"],
          ["Then", "your new avatar arrives in The Cosy Cottage"],
        ];
      }
      if (String(action?.kind || "") === "choose-class") {
        return [
          ["Right now", "classless · level 0"],
          ["Choose", "the Class revealed by your first action"],
          ["Then", "become level 1 and gain its starting knack"],
        ];
      }
      if (String(action?.intention || "").toLowerCase() === "notice"
          && String(action?.label || "").toLowerCase().endsWith("again")) {
        const orbCost = Math.max(0, Number(action?.orbCost || 0));
        return [
          ["Costs", orbCost ? (orbCost === 1 ? "one Orb" : `${orbCost} Orbs`) : ""],
          ["What may happen", friendlyActionText(action?.effect)],
          ["Watch for", friendlyActionText(action?.risk)],
        ].filter((row) => String(row[1] || "").trim());
      }
      if (String(action?.label || "").toLowerCase() === "chat") {
        if (action?.choices?.length) {
          return [
            ["Choose", "who you want to begin a friendship with"],
            ["Spend", "one advancement point"],
            ["Then", "their response arrives on the room heartbeat"],
          ];
        }
        return [
          ["With", action?.targetName || String(action?.detail || "").split(/[·,]/)[0].trim()],
          ["Spend", "one advancement point"],
          ["Then", "a friendship begins and their response arrives on the room heartbeat"],
        ];
      }
      if (["take", "swap"].includes(String(action?.label || "").toLowerCase()) && action?.choices?.length) {
        const swapping = String(action.label || "").toLowerCase() === "swap";
        return [
          ["Choose", "what you want to keep"],
          swapping
            ? ["In its place", `${action.heldItemName || "what you carry"} stays in ${state?.location?.name || "the room"}`]
            : ["Then", "it comes with you"],
        ];
      }
      if (String(action?.label || "").toLowerCase() === "use" && action?.choices?.length) {
        if (action.useChoiceKind === "mixed") {
          return [
            ["Choose", "how you want to use the keepsake"],
            ["Then", "the use you chose changes the scene"],
          ];
        }
        return [
          ["Choose", "who should receive the care"],
          ["Then", "they may feel steadier"],
        ];
      }
      if (String(action?.label || "").toLowerCase() === "trade" && action?.choices?.length) {
        return [
          ["Choose", "the resident and keepsake swap"],
          ["Then", "both keepsakes change hands"],
        ];
      }
      if (String(action?.label || "").toLowerCase() === "attack" && action?.choices?.length) {
        return [
          ["Choose", "who you want to confront"],
          ["What may happen", friendlyActionText(action?.effect)],
          ["Watch for", friendlyActionText(action?.risk)],
        ].filter((row) => String(row[1] || "").trim());
      }
      if (["grow closer", "bond"].includes(String(action?.label || "").toLowerCase()) && action?.choices?.length) {
        return [
          ["Choose", "who you want to grow closer to"],
          ["Then", "a new friendship begins"],
        ];
      }
      if (String(action?.label || "").toLowerCase() === "remember" && action?.choices?.length) {
        return [
          ["Choose", "whose shared story you want to keep"],
          ["Then", "what mattered stays with you"],
        ];
      }
      if (String(action?.label || "").toLowerCase() === "expand bracelet") {
        return [
          ["Spend", "one advancement point"],
          ["Then", "another bracelet charm slot opens"],
          ["Still needed", "find, earn, trade, or steal the charm itself"],
        ];
      }
      if (String(action?.label || "").toLowerCase() === "evolve") {
        if (action?.choices?.length) {
          const canKeepLesson = Array.isArray(action?.evolveModes)
            && action.evolveModes.includes("grow");
          return canKeepLesson
            ? [
                ["Choose", "one of two lessons"],
                ["Keep it", "save this visit as growth you can use later"],
                ["Expand bracelet", "open space for another found skill charm"],
                ["Still needed", "the charm itself is not granted"],
              ]
            : [
                ["Spend", "one advancement point"],
                ["Then", "another bracelet charm slot opens"],
                ["Still needed", "find the charm itself in the world"],
              ];
        }
        if (Array.isArray(action?.evolveModes) && action.evolveModes.includes("grow")) {
          return bankLedgerPlan(action)?.rows || [];
        }
        return [
          ["What changes", friendlyActionText(action?.effect) || "another bracelet charm slot opens"],
        ];
      }
      if (String(action?.label || "").toLowerCase() === "rest") {
        const warmed = String(action?.effect || "").includes("hearth tonic warmth")
          || String(action?.detail || "").includes("use the warmth");
        return [
          ["What changes", "you feel fresh again"],
          warmed
            ? ["What helps", "the tonic\'s warmth keeps trouble back"]
            : ["Watch for", friendlyActionText(action?.risk)],
        ].filter((row) => String(row[1] || "").trim());
      }
      if (["travel", "flee"].includes(String(action?.label || "").toLowerCase()) && action?.choices?.length) {
        const fleeing = String(action.label || "").toLowerCase() === "flee";
        return [
          ["Choose", fleeing ? "the way out that feels safest" : "the path you want to follow"],
          ["Then", fleeing ? "you leave the danger behind" : "you arrive in the next room"],
        ];
      }
      if (["nudge", "ping"].includes(String(action?.label || "").toLowerCase())) {
        const currentName = String(state?.turn?.current_actor_name || "the current player");
        return [
          ["Right now", `${currentName} has the room`],
          ["What happens", "give them a moment, then pass the choice if they're away"],
        ];
      }
      if (["i'm here", "pong"].includes(String(action?.label || "").toLowerCase())) {
        return [
          ["The room", "is gathering its next choice"],
          ["Your reply", "lets everyone know you're still here"],
        ];
      }
      if (["grow", "bank"].includes(String(action?.label || "").toLowerCase())) {
        return bankLedgerPlan(action)?.rows || [];
      }
      return [
        ["Focus", action?.detail],
        ["What changes", friendlyActionText(action?.effect)],
        ["Watch for", friendlyActionText(action?.risk)],
      ].filter((row) => String(row[1] || "").trim());
    }

    function actionSummary(action) {
      if (action?.modalSummary) return String(action.modalSummary);
      if (["nudge", "ping"].includes(String(action?.label || "").toLowerCase())) {
        return "Give them a moment. If they're away, the room passes the next choice to someone who's here.";
      }
      if (["i'm here", "pong"].includes(String(action?.label || "").toLowerCase())) {
        return "Let the room know you're here and ready for the next choice.";
      }
      if (["grow", "bank"].includes(String(action?.label || "").toLowerCase())) {
        const plan = bankLedgerPlan(action);
        if (plan) return plan.summary;
      }
      const detail = String(action?.detail || "").trim();
      const effect = friendlyActionText(action?.effect);
      const risk = friendlyActionText(action?.risk);
      if (effect && risk) return `${actionSentence(effect)} ${actionSentence(risk)}`;
      if (effect) return actionSentence(effect);
      if (risk) return actionSentence(risk);
      if (detail) return actionSentence(detail);
      return "See what happens, then let the room answer.";
    }

    function actionSentence(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const sentence = `${text.charAt(0).toUpperCase()}${text.slice(1)}`;
      return /[.!?]$/.test(sentence) ? sentence : `${sentence}.`;
    }

    function actionConfirmLabel(action) {
      const label = String(action?.label || "").toLowerCase();
      if (action?.creationStage === "species") return "next";
      if (action?.creationStage === "origin") return "begin";
      if (String(action?.kind || "") === "choose-class") return "choose class";
      if (String(action?.intention || "") === "contribute") {
        return String(action?.project?.verb || "contribute").toLowerCase();
      }
      if (["notice", "inspect", "scout", "travel"].includes(String(action?.intention || ""))) {
        return label || String(action.intention);
      }
      if (label === "begin again") return "begin again";
      if (String(action?.command || "").trim().toLowerCase() === "create avatar") return "begin";
      if (label === "grow" || label === "bank") return "grow";
      if (label === "evolve") return "evolve";
      if (label === "travel") return "go";
      if (label === "listen") return "listen";
      if (label === "listen again") return "listen again";
      if (label === "chat") return "chat";
      if (label === "give") return "give";
      if (label === "take") return "take";
      if (label === "swap") return "swap";
      if (label === "grow closer" || label === "bond") return "grow closer";
      if (label === "remember") return "remember";
      if (label === "practice" || label === "train") return "practice";
      if (label === "rest") return "rest";
      if (label === "shuffle") return "shuffle";
      if (label === "nudge" || label === "ping") return "gentle nudge";
      if (label === "i'm here" || label === "pong") return "I'm here";
      if (label.includes("generate")) return "begin";
      const fallback = compactActionLabel(action);
      return fallback === "act" ? "take this turn" : fallback;
    }

    function openActionModal(action) {
      if (!action || actionBusy) return;
      actionConfirmAction = action;
      const label = action.modalTitle || actionTitle(action);
      const selectedChoice = Array.isArray(action?.choices)
        ? (action.choices.find((choice) => String(choice.value || "") === String(action.selectedChoice || "")) || action.choices[0])
        : null;
      syncActionChoicePreview(action, selectedChoice);
      $("action-modal-title").textContent = label;
      $("action-modal-summary").textContent = actionSummary(action);
      const modalRows = actionModalRows(action);
      const providerReason = handProviderReason(action);
      if (providerReason) modalRows.unshift(["Why this action", providerReason]);
      $("action-modal-meta").innerHTML = modalRows.map(([key, value]) => {
        const rowClass = key === "Watch for" ? " risk" : "";
        return `<div class="action-row${rowClass}"><span class="action-row-key">${escapeHtml(key)}</span><span class="action-row-value">${escapeHtml(value)}</span></div>`;
      }).join("");
      renderActionChoices(action);
      $("action-modal-confirm").textContent = actionConfirmLabel(action);
      $("action-modal-cancel").textContent = action?.creationStage === "origin" ? "back" : "cancel";
      openModal("action-modal", $("action-modal-confirm"));
    }

    function setCreationModalStage(action, stage) {
      const profile = action?.creationProfile;
      if (!profile || !["species", "origin"].includes(stage)) return;
      action.creationStage = stage;
      if (stage === "species") {
        action.choices = (profile.species || []).map((choice) => ({
          label: choice.label,
          detail: choice.detail,
          value: choice.id,
        }));
        action.selectedChoice = action.selectedSpeciesId
          || profile.default_species_id
          || action.choices[0]?.value;
        action.modalTitle = profile.prompt || "what kind of traveler arrives?";
        action.modalSummary = profile.description
          || "Choose what your traveler is. Their class will emerge from play.";
        return;
      }
      action.choices = (profile.origins || []).map((choice) => ({
        label: choice.label,
        detail: choice.detail,
        value: choice.id,
      }));
      action.selectedChoice = action.selectedOriginId
        || profile.default_origin_id
        || action.choices[0]?.value;
      action.modalTitle = "where did your traveler come from?";
      action.modalSummary = "Choose the place that shaped them. You will enter classless at level 0; your first meaningful choice in the world will reveal the Class cards.";
    }

    function renderActionChoices(action) {
      const list = $("action-modal-choices");
      const choices = Array.isArray(action?.choices) ? action.choices : [];
      if (!choices.length) {
        list.hidden = true;
        list.innerHTML = "";
        return;
      }
      const selected = action.selectedChoice || choices[0]?.value || "";
      action.selectedChoice = selected;
      list.hidden = false;
      list.innerHTML = choices.map((choice, index) => {
        const value = String(choice.value || "");
        const active = value === selected;
        const choiceAria = [choice.label || value, choice.detail || value].filter(Boolean).join(". ");
        return `<label class="action-choice${active ? " active" : ""}" data-action-choice-index="${index}"><input type="radio" name="action-choice" value="${escapeAttr(value)}" aria-label="${escapeAttr(choiceAria)}"${active ? " checked" : ""} /><span class="action-choice-text"><span class="action-choice-label">${escapeHtml(choice.label || value)}</span><span class="action-choice-detail">${escapeHtml(choice.detail || value)}</span></span></label>`;
      }).join("");
    }

    function chooseActionModalChoice(index) {
      const action = actionConfirmAction;
      const choices = Array.isArray(action?.choices) ? action.choices : [];
      const choice = choices[index];
      if (!choice) return;
      action.selectedChoice = choice.value;
      renderActionChoices(action);
      syncActionChoicePreview(action, choice);
    }

    function closeActionModal() {
      closeModal("action-modal");
      $("action-modal-image").removeAttribute("src");
      $("action-modal").querySelector(".action-art")?.classList.remove("avatar", "item", "location");
      $("action-modal-meta").innerHTML = "";
      $("action-modal-choices").hidden = true;
      $("action-modal-choices").innerHTML = "";
      $("action-modal-cancel").textContent = "cancel";
      actionConfirmAction = null;
    }

    async function confirmActionModal() {
      const action = actionConfirmAction;
      if (action?.creationStage === "species") {
        action.selectedSpeciesId = action.selectedChoice;
        setCreationModalStage(action, "origin");
        openActionModal(action);
        return;
      }
      if (action?.creationStage === "origin") {
        action.selectedOriginId = action.selectedChoice;
      }
      closeActionModal();
      if (action) await runAction(action);
    }

    function fallbackCardImage(card) {
      const role = card?.role || "card";
      const color = role === "location" ? "#1a3d2a" : role === "item" ? "#3b2f1a" : "#203047";
      const motif = role === "location"
        ? "<path d='M38 132 C80 82 109 82 148 132 Z' fill='#65e68a' opacity='.38'/><path d='M110 132 C162 58 204 58 282 132 Z' fill='#d8f7dc' opacity='.24'/><path d='M20 132 H300' stroke='#efc96b' stroke-width='7' stroke-linecap='round' opacity='.78'/>"
        : role === "item"
          ? "<circle cx='160' cy='88' r='44' fill='#efc96b' opacity='.28'/><path d='M121 99 C134 65 186 65 199 99 C183 116 137 116 121 99 Z' fill='#d8f7dc' opacity='.72'/><circle cx='160' cy='91' r='18' fill='#efc96b' opacity='.82'/>"
          : "<circle cx='160' cy='74' r='36' fill='#d8f7dc' opacity='.72'/><path d='M88 150 C102 108 128 95 160 95 C192 95 218 108 232 150 Z' fill='#65e68a' opacity='.38'/><path d='M112 78 C130 45 190 45 208 78' fill='none' stroke='#efc96b' stroke-width='8' stroke-linecap='round' opacity='.82'/>";
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180" role="img" aria-label="CosyWorld keepsake art"><defs><radialGradient id="glow" cx="50%" cy="35%" r="65%"><stop offset="0" stop-color="#efc96b" stop-opacity=".24"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></radialGradient></defs><rect width="320" height="180" fill="${color}"/><rect width="320" height="180" fill="url(#glow)"/><rect x="10" y="10" width="300" height="160" fill="none" stroke="#efc96b" stroke-width="4" opacity=".82"/>${motif}</svg>`;
      return `data:image/svg+xml,${encodeURIComponent(svg).replaceAll("'", "%27")}`;
    }

    function backgroundImageStyle(image) {
      if (!image) return "";
      const cssUrl = String(image)
        .replaceAll("\\", "\\\\")
        .replaceAll('"', '\\"')
        .replaceAll("\n", "")
        .replaceAll("\r", "");
      return ` style="background-image:url(&quot;${escapeAttr(cssUrl)}&quot;)"`;
    }

    function initials(value) {
      const words = String(value || "?").trim().split(/\s+/).filter(Boolean);
      if (!words.length) return "?";
      return words.slice(0, 2).map((word) => word[0]).join("").toUpperCase();
    }

    function compactAssetId(value) {
      const text = String(value || "");
      if (text.length <= 18) return text;
      return `${text.slice(0, 8)}...${text.slice(-6)}`;
    }

    function actorLabel(actor) {
      return actor?.name || "Someone";
    }

    function actorForId(id) {
      const numeric = Number(id);
      return (state?.actors || []).find((actor) => Number(actor.id) === numeric) || null;
    }

    function actorNameForEvent(event) {
      return actorForId(event?.actor_id)?.name || event?.actor_name || "someone";
    }

    function actorTitleForEvent(event) {
      return String(actorForId(event?.actor_id)?.title || "").trim();
    }

    function defaultBondStatement(targetName) {
      return `I bring small kindnesses to ${targetName || "someone"}.`;
    }

    function compactActionDetail(value) {
      return String(value || "")
        .replace(/^advances progress clock\s+.+?\s+by\s+([1-9]\d*)/i, (_, amount) => projectProgressResult(amount))
        .replace(/^finishes progress clock\s+.+?\s+by\s+([1-9]\d*)/i, "finishes the work")
        .replace(/^sets up \+([1-9]\d*) progress/i, "makes the next try count")
        .replace(/;\s*advances progress clock\s+.+?\s+by\s+([1-9]\d*)/gi, (_, amount) => `; ${projectProgressResult(amount)}`)
        .replace(/;\s*finishes progress clock\s+.+?\s+by\s+([1-9]\d*)/gi, "; finishes the work")
        .replace(/;\s*sets up \+([1-9]\d*) progress/gi, "; makes the next try count")
        .replace(/\sand advances progress clock\s+.+?\s+by\s+([1-9]\d*)/gi, (_, amount) => ` and ${projectProgressResult(amount)}`)
        .replace(/\sand finishes progress clock\s+.+?\s+by\s+([1-9]\d*)/gi, " and finishes the work")
        .replace(/\sand sets up \+([1-9]\d*) progress/gi, " and makes the next try count")
        .replace(/^marks you\s+/i, "")
        .replace(/^helps a resident and\s+/i, "")
        .trim();
    }

    function actorNeedsHealing(actor) {
      const hp = Number(actor?.hp ?? 0);
      const maxHp = Number(actor?.stats?.hp_base ?? 0);
      return actor?.status === "knocked_out" || (actor?.status === "active" && maxHp > 0 && hp < maxHp);
    }

    function actorIsTired(view = state) {
      return Boolean(actorId && (view?.tags || []).some((tag) => (
        tag.label === "tired"
        && (!tag.scope_id || Number(tag.scope_id) === Number(actorId))
      )));
    }

    function focusedAction() {
      if (!actions.length) return null;
      if (focusIndex < 0 || focusIndex >= actions.length) focusIndex = 0;
      return actions[focusIndex] || actions[0] || null;
    }

    function actionMatchesFocusKey(action, key) {
      if (!key) return false;
      if (action?.focusKey === key) return true;
      return Array.isArray(action?.focusKeys) && action.focusKeys.includes(key);
    }

    function actionHandKey(action) {
      return String(action?.focusKey || action?.command || `${action?.label || ""}:${action?.detail || ""}`).trim();
    }

    function equippedCollectionCards() {
      const byId = new Map(ownedCollectionCards().map((card) => [card.card_id, card]));
      return equippedCardIds.map((cardId) => byId.get(cardId)).filter(Boolean);
    }

    function subjectFocusKeysForCard(card) {
      const keys = [];
      for (const [prefix, group] of [
        ["actor", state?.cards?.actors],
        ["item", state?.cards?.items],
        ["location", state?.cards?.locations],
      ]) {
        if (!group) continue;
        for (const [subjectId, subjectCard] of Object.entries(group)) {
          if (subjectCard?.card_id !== card?.card_id) continue;
          keys.push(`${prefix}:${subjectId}`);
          if (prefix === "actor") keys.push(`talk:${subjectId}`);
          if (prefix === "location") keys.push(`exit:${subjectId}`);
        }
      }
      return keys;
    }

    function actionFocusKeys(action) {
      return [action?.focusKey, ...(Array.isArray(action?.focusKeys) ? action.focusKeys : [])]
        .map((key) => String(key || ""))
        .filter(Boolean);
    }

    function keepsakeMatchScore(card, action) {
      if (!card || !action) return 0;
      if (action?.card?.card_id === card.card_id) return 3;
      const actionKeys = actionFocusKeys(action);
      if (subjectFocusKeysForCard(card).some((subjectKey) => (
        actionKeys.some((actionKey) => actionKey === subjectKey || actionKey.startsWith(`${subjectKey}:`))
      ))) return 3;

      const shape = shapeForCard(card);
      const type = actionCardType(action);
      if (shape === "avatar" && ["chat", "bond", "trade"].includes(type)) return 1;
      if (shape === "item" && ["item", "craft", "trade", "project"].includes(type)) return 1;
      if (shape === "location" && ["travel", "notice", "inspect", "scout", "listen", "project"].includes(type)) return 1;
      return 0;
    }

    function keepsakeGuideForAction(action) {
      return equippedCollectionCards()
        .map((card) => ({ card, score: keepsakeMatchScore(card, action) }))
        .filter((entry) => entry.score > 0)
        .sort((left, right) => right.score - left.score)[0]?.card || null;
    }

    function firstThreadModel(view = state, availableActions = actions) {
      if (!actorId || !view || view?.primary_action?.kind === "create_avatar") return null;
      const ledger = view.ledger || {};
      const findAction = (predicate) => availableActions.find(predicate) || null;
      const banked = Number(ledger.banked_count || 0);
      const spent = Number(ledger.spent_count || 0);
      const growth = Number(ledger.advancement_points || 0);
      const unbankedMarks = Array.isArray(ledger.unbanked_marks) ? ledger.unbanked_marks : [];
      const unbankedListenMemory = unbankedMarks.some((mark) => mark?.category === "learned_truth");
      const hasListenMemory = Number(ledger.learned_truth_count || 0) > 0 || unbankedListenMemory;
      const listenAttempted = view?.economy?.listen_attempted_here === true;

      if (!hasListenMemory) {
        const listen = findAction((action) => action.intention === "notice" || action.focusKey === "check");
        const search = findAction((action) => action.intention === "inspect");
        const meet = findAction((action) => ["chat", "bond", "remember", "help"].includes(action.label));
        const next = listenAttempted ? (search || meet || listen) : listen;
        return {
          stage: 1,
          total: 3,
          actionKey: next ? actionHandKey(next) : "",
          text: listenAttempted
            ? "no clue yet — inspect what catches your eye."
            : "notice one little clue.",
        };
      }

      if (unbankedListenMemory) {
        const grow = findAction((action) => (
          action.focusKey === "bank-ledger"
            || action.label === "grow"
            || (action.label === "evolve" && action.evolveModes?.includes("grow"))
        ));
        return {
          stage: 2,
          total: 3,
          actionKey: grow ? actionHandKey(grow) : "",
          text: "keep the clue — let it change you.",
        };
      }

      if (banked > 0) {
        if (spent > 0 || growth <= 0) return null;
        const bond = findAction((action) => ["chat", "grow closer", "bond"].includes(action.label));
        const bracelet = findAction((action) => (
          ["practice", "train"].includes(action.label)
            || (action.label === "evolve" && action.evolveModes?.includes("practice"))
        ));
        const next = bond || bracelet;
        const identityActionKeys = [bond, bracelet]
          .filter(Boolean)
          .map((action) => actionHandKey(action))
          .filter(Boolean);
        return {
          stage: 3,
          total: 3,
          actionKey: next ? actionHandKey(next) : "",
          actionKeys: identityActionKeys,
          text: bond && bracelet
            ? "choose friendship or bracelet space."
            : bond
            ? "choose a friendship to grow."
            : bracelet
              ? "open room for another found skill charm."
              : "strengthen a friendship or open bracelet space.",
        };
      }

      const search = findAction((action) => action.label === "search");
      const meet = findAction((action) => ["chat", "bond", "remember", "help"].includes(action.label));
      return {
        stage: 1,
        total: 3,
        actionKey: search ? actionHandKey(search) : (meet ? actionHandKey(meet) : ""),
        text: "follow the clue — search or meet someone.",
      };
    }

    function dealtStoryGuide(view = state, availableActions = actions) {
      const firstThread = firstThreadModel(view, availableActions);
      if (firstThread) {
        return {
          kind: "first-tale",
          label: "next tale beat",
          actionKeys: [...new Set([
            firstThread.actionKey,
            ...(Array.isArray(firstThread.actionKeys) ? firstThread.actionKeys : []),
          ].filter(Boolean))],
        };
      }
      if (firstTaleCelebration || !firstTaleIsComplete(view)) return null;
      const roomThread = nextStoryThreadModel(view, availableActions);
      if (!roomThread?.actionKey) return null;
      return {
        kind: "room-thread",
        label: "room thread",
        actionKeys: [roomThread.actionKey],
      };
    }

    function authoritativeHandSignature(view = state) {
      return JSON.stringify((view?.action_hand?.entries || []).map((entry) => [
        String(entry?.offer_id || ""),
        String(entry?.kind || ""),
        String(entry?.provider?.kind || ""),
        String(entry?.provider?.id || ""),
      ]));
    }

    function actionMatchesProjectedHandEntry(action, entry) {
      const kinds = Array.isArray(action?.offerKinds) ? action.offerKinds : [];
      return kinds.includes(String(entry?.kind || ""));
    }

    function actionIndexForHandKey(key) {
      if (!key) return -1;
      let index = actions.findIndex((action) => actionHandKey(action) === key);
      if (index >= 0) return index;
      index = actionIndexForKey(key);
      return index;
    }

    function actionOfferKindCandidates(action) {
      const focus = String(action?.focusKey || "").split(":")[0];
      const label = String(action?.label || "").toLowerCase();
      const byFocus = {
        "bank-ledger": ["bank_ledger"],
        "unlock-charm-slot": ["unlock_charm_slot"],
        check: ["check"],
        study: ["study"],
        influence: ["influence"],
        spell: ["cast_spell"],
        defend: ["defend"],
        prepare: ["prepare"],
        work: ["work"],
        help: ["help"],
        rest: ["rest"],
        theft: ["theft"],
      };
      if (byFocus[focus]) return byFocus[focus];
      const byLabel = {
        chat: ["create_bond"],
        influence: ["influence"],
        travel: ["move"],
        flee: ["flee"],
        give: ["give_item"],
        "give item": ["give_item"],
        trade: ["trade_item"],
        steal: ["theft"],
        use: ["use_item", "use_feature"],
        rest: ["rest"],
        attack: ["attack"],
        defend: ["defend"],
        take: ["pick_up"],
        search: ["search"],
        listen: ["check"],
        "listen again": ["check"],
        study: ["study"],
        cast: ["cast_spell"],
        prepare: ["prepare"],
        work: ["work"],
        finish: ["work"],
        help: ["help"],
        grow: ["bank_ledger"],
        "expand bracelet": ["unlock_charm_slot"],
        "grow closer": ["create_bond"],
        remember: ["resolve_bond"],
      };
      return byLabel[label] || [];
    }

    function orderedActionIndexesForHand() {
      const indexes = actions.map((_, index) => index);
      if (state?.branch) return indexes;
      const ordered = [];
      const chosen = new Set();
      for (const entry of state?.action_hand?.entries || []) {
        const index = indexes.find((candidate) => (
          !chosen.has(candidate) && actionMatchesProjectedHandEntry(actions[candidate], entry)
        ));
        if (index < 0 || index === undefined) continue;
        ordered.push(index);
        chosen.add(index);
      }
      const remaining = indexes
        .filter((index) => !chosen.has(index))
        .sort((left, right) => (
          Number(actions[left]?.handProvider?.priority ?? 255)
            - Number(actions[right]?.handProvider?.priority ?? 255)
          || actionRank(actions[left]) - actionRank(actions[right])
          || actionHandKey(actions[left]).localeCompare(actionHandKey(actions[right]))
        ));
      return [...ordered, ...remaining];
    }

    function handCapacity() {
      if (state?.branch) return 3;
      return window.matchMedia("(max-width: 520px)").matches ? 2 : 3;
    }

    function validActionHandKeySet() {
      const keys = new Set();
      for (const action of actions) {
        const key = actionHandKey(action);
        if (key) keys.add(key);
      }
      return keys;
    }

    function pruneDiscardedHandKeys(validKeys = validActionHandKeySet()) {
      const seen = new Set();
      discardedHandKeys = discardedHandKeys.filter((key) => {
        if (!validKeys.has(key) || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function pushDiscardedHandKey(key) {
      if (!key || actionIndexForHandKey(key) < 0) return;
      if (!discardedHandKeys.includes(key)) discardedHandKeys.push(key);
    }

    function dealHandKeys(kept, seen, capacity) {
      const discarded = new Set(discardedHandKeys);
      for (const index of orderedActionIndexesForHand()) {
        if (kept.length >= capacity) break;
        const key = actionHandKey(actions[index]);
        if (!key || seen.has(key) || discarded.has(key)) continue;
        kept.push(key);
        seen.add(key);
      }
    }

    function reconcileHand() {
      if (state?.branch) {
        handKeys = actions.slice(0, 3).map(actionHandKey).filter(Boolean);
        discardedHandKeys = [];
        playerPromotedHandKey = "";
        return;
      }
      const nextAuthoritativeIdentity = (state?.action_hand?.entries || [])
        .map((offer) => offer.offer_id || `${offer.kind}:${offer.state_revision}`)
        .join("|");
      if (nextAuthoritativeIdentity !== authoritativeHandIdentity) {
        authoritativeHandIdentity = nextAuthoritativeIdentity;
        handKeys = playerPromotedHandKey ? [playerPromotedHandKey] : [];
        discardedHandKeys = [];
      }
      const capacity = handCapacity();
      const validKeys = validActionHandKeySet();
      if (playerPromotedHandKey && !validKeys.has(playerPromotedHandKey)) {
        const reboundIndex = actionIndexForKey(focusedKey);
        const reboundKey = reboundIndex >= 0 ? actionHandKey(actions[reboundIndex]) : "";
        playerPromotedHandKey = validKeys.has(reboundKey) ? reboundKey : "";
        if (playerPromotedHandKey) {
          handKeys = [
            playerPromotedHandKey,
            ...handKeys.filter((key) => key !== playerPromotedHandKey),
          ];
        }
      }
      pruneDiscardedHandKeys(validKeys);
      const kept = [];
      const seen = new Set();
      const pushHandKey = (key) => {
        if (!key || seen.has(key)) return;
        if (!validKeys.has(key) || discardedHandKeys.includes(key)) return;
        kept.push(key);
        seen.add(key);
      };
      const focusedActionIndex = focusedKey ? actionIndexForKey(focusedKey) : -1;
      const focusedActionHandKey = focusedActionIndex >= 0
        ? actionHandKey(actions[focusedActionIndex])
        : "";
      const playerPromotedFocus = focusedActionHandKey && handKeys[0] === focusedActionHandKey;
      if (playerPromotedFocus) pushHandKey(focusedActionHandKey);
      for (const key of handKeys) {
        if (kept.length >= capacity) break;
        pushHandKey(key);
      }
      dealHandKeys(kept, seen, capacity);
      if (!kept.length && validKeys.size && discardedHandKeys.length) {
        discardedHandKeys = [];
        dealHandKeys(kept, seen, capacity);
      }
      handKeys = kept.slice(0, capacity);
    }

    function promoteActionToHand(index, key = "") {
      if (state?.branch || index < 0 || index >= actions.length) return;
      const handKey = actionHandKey(actions[index]) || key;
      if (!handKey) return;
      discardedHandKeys = discardedHandKeys.filter((entry) => entry !== handKey);
      handKeys = [handKey, ...handKeys.filter((entry) => entry !== handKey)].slice(0, handCapacity());
      reconcileHand();
    }

    function promotePendingRecoveryAction() {
      const index = actionIndexForKey("rest");
      if (index < 0 || actionRank(actions[index]) > 25) return false;
      const key = actionHandKey(actions[index]);
      if (!key) return false;
      discardedHandKeys = discardedHandKeys.filter((entry) => entry !== key);
      handKeys = [key, ...handKeys.filter((entry) => entry !== key)].slice(0, handCapacity());
      focusIndex = index;
      focusedKey = key;
      return true;
    }

    function discardHandKey(key, shouldReconcile = true) {
      if (!key) return;
      pushDiscardedHandKey(key);
      handKeys = handKeys.filter((entry) => entry !== key);
      if (focusedKey === key) {
        focusedKey = "";
        focusIndex = 0;
      }
      if (playerPromotedHandKey === key) playerPromotedHandKey = "";
      if (shouldReconcile) reconcileHand();
    }

    function discardVisibleHand(shouldReconcile = true) {
      const visibleKeys = handKeys.slice(0, handCapacity());
      for (const key of visibleKeys) discardHandKey(key, false);
      if (shouldReconcile) reconcileHand();
    }

    function actionIndexForKey(key) {
      if (!key) return -1;
      return actions.findIndex((action) => actionMatchesFocusKey(action, key));
    }

    function restoreFocusedActionChoice(action, key) {
      if (!String(key || "").startsWith("exit:")) return;
      const destinationId = String(key).slice("exit:".length);
      const choice = (action?.choices || []).find((candidate) => (
        String(candidate?.value || "") === destinationId
      ));
      if (choice) action.selectedChoice = choice.value;
    }

    function restoreFocusedAction() {
      if (!actions.length) {
        focusIndex = 0;
        focusedKey = "";
        return;
      }
      if (focusedKey) {
        const index = actionIndexForKey(focusedKey);
        if (index >= 0) {
          focusIndex = index;
          restoreFocusedActionChoice(actions[index], focusedKey);
          return;
        }
      }
      const firstHandIndex = handKeys.length ? actionIndexForHandKey(handKeys[0]) : -1;
      if (focusIndex >= actions.length || focusIndex < 0) focusIndex = firstHandIndex >= 0 ? firstHandIndex : 0;
      focusedKey = actions[focusIndex]?.focusKey || "";
    }

    function focusAction(index, key = "") {
      if (!actions.length) return;
      accountPanelPinned = false;
      libraryPanelPinned = false;
      focusIndex = ((index % actions.length) + actions.length) % actions.length;
      focusedKey = key || actions[focusIndex]?.focusKey || "";
      playerPromotedHandKey = actionHandKey(actions[focusIndex]) || "";
      promoteActionToHand(focusIndex, focusedKey);
      render();
    }

    function focusActionByKey(key) {
      const index = actionIndexForKey(key);
      if (index < 0) return false;
      focusAction(index, key);
      return true;
    }

    function renderButton(id, action) {
      const button = $(id);
      if (!action) {
        button.disabled = true;
        button.removeAttribute("aria-busy");
        button.removeAttribute("data-command");
        button.removeAttribute("data-action-index");
        button.removeAttribute("data-hand-key");
        button.removeAttribute("data-card-type");
        button.removeAttribute("data-card-rarity");
        button.removeAttribute("data-keepsake-guide");
        button.removeAttribute("data-story-guide");
        button.classList.remove(...actionCardAccentClasses);
        button.classList.remove("dealt");
        button.classList.remove("keepsake-guided");
        button.classList.remove("story-guided");
        button.setAttribute("aria-label", "wait");
        button.classList.remove("has-copy");
        button.innerHTML = `<span class="thumb placeholder" aria-hidden="true"></span>`;
        return;
      }
      button.disabled = Boolean(action.busy);
      if (action.busy) button.setAttribute("aria-busy", "true");
      else button.removeAttribute("aria-busy");
      if (action.command) button.dataset.command = action.command;
      else button.removeAttribute("data-command");
      button.classList.remove(...actionCardAccentClasses);
      const { cardType, rarity, className } = actionCardAccentClass(action);
      const keepsakeGuide = action.keepsakeGuide || keepsakeGuideForAction(action);
      const keepsakeName = keepsakeGuide?.display_name || keepsakeGuide?.card_id || "";
      const storyGuide = action.storyGuide === true;
      const storyGuideLabel = storyGuide
        ? String(action.storyGuideLabel || "next tale beat")
        : "";
      button.dataset.cardType = cardType;
      if (rarity) button.dataset.cardRarity = rarity;
      else button.removeAttribute("data-card-rarity");
      button.classList.add(className);
      button.classList.toggle("keepsake-guided", Boolean(keepsakeGuide));
      button.classList.toggle("story-guided", storyGuide);
      if (keepsakeName) button.dataset.keepsakeGuide = keepsakeName;
      else button.removeAttribute("data-keepsake-guide");
      if (storyGuide) button.dataset.storyGuide = storyGuideLabel;
      else button.removeAttribute("data-story-guide");
      if (Number.isInteger(action.actionIndex)) button.dataset.actionIndex = String(action.actionIndex);
      else button.removeAttribute("data-action-index");
      const handKey = action.handKey || actionHandKey(action);
      if (handKey) {
        const previousHandKey = button.dataset.handKey || "";
        button.dataset.handKey = handKey;
        if (previousHandKey && previousHandKey !== handKey) {
          button.classList.remove("dealt");
          void button.offsetWidth;
          button.classList.add("dealt");
        }
      } else {
        button.removeAttribute("data-hand-key");
        button.classList.remove("dealt");
      }
      const title = [
        action.command,
        handProviderReason(action),
        friendlyActionText(action.effect),
        friendlyActionText(action.risk),
        keepsakeName ? `${keepsakeName} appears as matching art` : "",
      ].filter(Boolean).join("; ");
      if (title) button.title = title;
      else button.removeAttribute("title");
      const actionIndex = Number.isInteger(action.actionIndex) ? action.actionIndex : actions.indexOf(action);
      const count = !state?.branch && actionIndex >= 0 && actions.length > 1
        ? `${actionIndex + 1} of ${actions.length}`
        : "";
      const pendingDetail = action.busy
        ? (typeof action.busyDetail === "function" ? action.busyDetail() : action.busyDetail)
        : "";
      const detail = friendlyActionText(pendingDetail || action.detail);
      button.setAttribute(
        "aria-label",
        [
          action.accessibleLabel || action.label,
          detail,
          handProviderReason(action),
          storyGuideLabel,
          keepsakeName ? `matching kept-close art: ${keepsakeName}` : "",
          count ? `action ${count}` : "",
          action.busy ? "in progress" : "",
        ].filter(Boolean).join(", ")
      );
      if (cardType === "shuffle") {
        button.classList.add("has-copy");
        button.innerHTML = `<span class="shuffle-glyph" aria-hidden="true">•••</span><span class="cmd-label">${emojiHtml(actionEmoji(action))}more</span>`;
        return;
      }
      const thumb = thumbnailHtml(action, false, "action-mini-card");
      button.classList.add("has-copy");
      const labelText = compactActionLabel(action) || String(action.command || "action").toLowerCase();
      const detailHtml = detail ? `<span class="detail">${escapeHtml(detail)}</span>` : "";
      const keepsakeHtml = keepsakeName
        ? `<span class="keepsake-call">✦ ${escapeHtml(keepsakeName)} kept close</span>`
        : "";
      const storyHtml = storyGuide
        ? `<span class="story-call">✦ ${escapeHtml(storyGuideLabel)}</span>`
        : "";
      const providerReason = handProviderReason(action);
      const providerHtml = providerReason
        ? `<span class="provider-call">↳ ${escapeHtml(providerReason)}</span>`
        : "";
      const busyHtml = action.busy
        ? `<span class="action-progress" role="progressbar" aria-label="Action in progress" aria-valuetext="in progress"></span>`
        : "";
      button.innerHTML = `${thumb}<span class="cmd-copy"><span class="cmd-label">${emojiHtml(actionEmoji(action))}${escapeHtml(labelText)}</span>${detailHtml}${providerHtml}${storyHtml || keepsakeHtml}</span>${busyHtml}`;
    }

    function actionBarActions() {
      if (state?.branch) {
        return actions.slice(0, 3).map((action, actionIndex) => ({ ...action, actionIndex }));
      }
      if (!actions.length) return [];
      reconcileHand();
      const storyGuide = dealtStoryGuide();
      const storyActionKeys = new Set(storyGuide?.actionKeys || []);
      const guidedHandKeys = storyGuide?.kind === "room-thread"
        ? []
        : [...storyActionKeys]
          .map((key) => actionIndexForKey(key))
          .filter((index) => index >= 0)
          .map((index) => actionHandKey(actions[index]))
          .filter(Boolean);
      if (guidedHandKeys.length) {
        const guidedSet = new Set(guidedHandKeys);
        discardedHandKeys = discardedHandKeys.filter((key) => !guidedSet.has(key));
        const playerPromotedFocus = Boolean(
          playerPromotedHandKey
            && handKeys[0] === playerPromotedHandKey
            && !guidedSet.has(playerPromotedHandKey)
        );
        const pinned = playerPromotedFocus ? [playerPromotedHandKey] : [];
        for (const key of guidedHandKeys) {
          if (!pinned.includes(key)) pinned.push(key);
        }
        for (const key of handKeys) {
          if (!pinned.includes(key)) pinned.push(key);
        }
        handKeys = pinned.slice(0, handCapacity());
      }
      const entries = [];
      for (const key of handKeys) {
        const index = actionIndexForHandKey(key);
        if (index < 0) continue;
        entries.push({
          ...actions[index],
          actionIndex: index,
          handKey: key,
          keepsakeGuide: keepsakeGuideForAction(actions[index]),
          storyGuide: storyActionKeys.has(actionHandKey(actions[index])),
          storyGuideLabel: storyActionKeys.has(actionHandKey(actions[index]))
            ? storyGuide?.label || "next tale beat"
            : "",
        });
      }
      return entries;
    }

    function shuffleAction() {
      const otherCardCount = Math.max(0, validActionHandKeySet().size - new Set(handKeys).size);
      return {
        label: "more",
        detail: actorId
          ? `${otherCardCount} other ${otherCardCount === 1 ? "action" : "actions"}`
          : "after avatar",
        focusKey: "shuffle-hand",
        cardType: "shuffle",
        card: cardForLocation(state?.location?.id),
        shape: "location",
        run: () => shuffleHand(),
      };
    }

    function canShowShuffleAction() {
      if (state?.turn?.enabled && !state.turn.is_current_actor) return false;
      if (!actorId || !actorSession || state?.primary_action?.kind === "create_avatar" || state?.branch) {
        return false;
      }
      const visibleKeys = new Set(handKeys.filter((key) => actionIndexForHandKey(key) >= 0));
      return validActionHandKeySet().size > visibleKeys.size;
    }

    function advanceHandPage() {
      playerPromotedHandKey = "";
      discardVisibleHand(false);
      const validKeys = validActionHandKeySet();
      const hasUndrawnCard = [...validKeys].some((key) => (
        !discardedHandKeys.includes(key)
      ));
      if (!hasUndrawnCard) {
        discardedHandKeys = [];
      }
      reconcileHand();
    }

    async function shuffleHand() {
      if (!actorId || !actorSession || state?.primary_action?.kind === "create_avatar") {
        return null;
      }
      advanceHandPage();
      renderCommands();
      return null;
    }

    function renderCommands() {
      const prompt = document.querySelector(".prompt");
      const buttonIds = ["primary", "secondary", "tertiary"];
      renderTurnPingPill();
      if (actionBusy) {
        prompt.classList.remove("choice-mode");
        const busyDetail = typeof pendingAction?.busyDetail === "function"
          ? pendingAction.busyDetail()
          : pendingAction?.busyDetail;
        const detail = actionSlow
          ? "saving safely — this is taking longer than usual"
          : (busyDetail || pendingAction?.detail || pendingAction?.label || "working");
        renderButton("primary", {
          ...(pendingAction || {}),
          label: actionSlow ? "still working" : (pendingAction?.busyLabel || "working"),
          detail,
          busy: true,
        });
        for (const id of buttonIds.slice(1)) {
          renderButton(id, null);
          $(id).style.display = "none";
        }
        if (canShowShuffleAction()) {
          renderButton("shuffle", {
            label: "more",
            detail: "new actions",
            cardType: "shuffle",
            busy: true,
          });
          $("shuffle").style.display = "flex";
        } else {
          renderButton("shuffle", null);
          $("shuffle").style.display = "none";
        }
        return;
      }
      const choiceMode = Boolean(state?.branch && actions.length > 1);
      prompt.classList.toggle("choice-mode", choiceMode);
      const visibleActions = actionBarActions().slice(0, handCapacity());
      const showShuffle = canShowShuffleAction();
      for (let index = 0; index < buttonIds.length; index += 1) {
        const id = buttonIds[index];
        const visibleAction = visibleActions[index] || null;
        renderButton(id, visibleAction);
        $(id).style.display = visibleAction ? "flex" : "none";
      }
      if (showShuffle) {
        renderButton("shuffle", shuffleAction());
        $("shuffle").style.display = "flex";
      } else {
        renderButton("shuffle", null);
        $("shuffle").style.display = "none";
      }
    }

    function actionForButton(id) {
      const button = $(id);
      const actionIndex = Number(button?.dataset?.actionIndex);
      if (!Number.isInteger(actionIndex) || actionIndex < 0 || actionIndex >= actions.length) {
        return null;
      }
      return actions[actionIndex] || null;
    }

    function openCommandPalette(seed = "", force = false) {
      if (actionBusy && !force) return;
      const palette = $("command-palette");
      const input = $("command-input");
      palette.hidden = false;
      input.value = seed;
      commandHistoryIndex = commandHistory.length;
      commandDraft = seed;
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }

    function closeCommandPalette() {
      const input = $("command-input");
      $("command-palette").hidden = true;
      input.value = "";
      input.blur();
      commandHistoryIndex = commandHistory.length;
      commandDraft = "";
    }

    function rememberCommand(value) {
      const command = String(value || "").trim();
      if (!command) return;
      if (commandHistory[commandHistory.length - 1] !== command) commandHistory.push(command);
      commandHistory = commandHistory.slice(-24);
      commandHistoryIndex = commandHistory.length;
      commandDraft = "";
    }

    function stepCommandHistory(delta) {
      const input = $("command-input");
      if (!commandHistory.length || !input) return;
      if (commandHistoryIndex === commandHistory.length) commandDraft = input.value;
      commandHistoryIndex = Math.max(0, Math.min(commandHistory.length, commandHistoryIndex + delta));
      input.value = commandHistoryIndex === commandHistory.length ? commandDraft : commandHistory[commandHistoryIndex];
      input.setSelectionRange(input.value.length, input.value.length);
    }

    async function runAction(action) {
      if (actionBusy) return;
      actionBusy = true;
      actionSlow = false;
      pendingAction = action;
      clearTimeout(actionSlowTimer);
      actionSlowTimer = setTimeout(() => {
        if (!actionBusy || pendingAction !== action) return;
        actionSlow = true;
        renderCommands();
      }, 3000);
      const pendingChatId = beginPendingChat(action);
      renderCommands();
      renderLog();
      try {
        const result = await action.run();
        if (result?.ok === false) cancelPendingChat(pendingChatId);
        const handKey = action.handKey || actionHandKey(action);
        if (!state?.branch && handKey && result?.ok !== false) {
          discardHandKey(handKey);
        }
      } catch (error) {
        cancelPendingChat(pendingChatId);
        setError(String(error.message || error));
      } finally {
        clearTimeout(actionSlowTimer);
        actionSlowTimer = null;
        actionBusy = false;
        actionSlow = false;
        pendingAction = null;
        render();
      }
    }

    function renderRoomCopy(id) {
      const node = $("location-copy");
      roomCopyExpanded = false;
      document.querySelector(".room")?.classList.toggle("collapsed", !roomCopyExpanded);
      node.classList.toggle("expanded", roomCopyExpanded);
      node.hidden = true;
      node.innerHTML = "";
