<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080b09" />
  <title>CosyWorld</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b09;
      --terminal: #0d140f;
      --terminal-2: #101912;
      --line: rgba(129, 255, 167, 0.18);
      --line-strong: rgba(239, 201, 107, 0.34);
      --text: #d8f7dc;
      --dim: #85a58a;
      --green: #65e68a;
      --amber: #efc96b;
      --blue: #8bb7ff;
      --red: #ff8d8d;
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.48 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 4px);
      opacity: 0.11;
      z-index: 10;
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    .shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr) auto;
      background:
        radial-gradient(circle at 18% 12%, rgba(101, 230, 138, 0.09), transparent 25%),
        radial-gradient(circle at 78% 8%, rgba(239, 201, 107, 0.08), transparent 26%),
        var(--bg);
      overflow: hidden;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 8, 6, 0.96);
    }
    .brand {
      min-width: 0;
      color: var(--green);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand::before { content: "cosyworld://"; color: var(--dim); }
    .economy {
      flex: 0 0 auto;
      color: var(--dim);
      font-size: 13px;
      white-space: nowrap;
      max-width: 150px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .economy strong {
      color: var(--amber);
      font-weight: 850;
    }
    .economy.focused,
    .economy:focus-visible {
      color: var(--green);
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }
    .location-pill {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
      min-width: 0;
      color: var(--amber);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: right;
      cursor: pointer;
    }
    .location-pill:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }
    .location-pill img {
      width: 58px;
      height: 32px;
      border-radius: 5px;
      object-fit: cover;
      border: 1px solid var(--line-strong);
      flex: 0 0 auto;
    }
    .location-pill span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .terminal {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      margin: 12px;
      border: 1px solid var(--line);
      background: rgba(13, 20, 15, 0.94);
      box-shadow: 0 18px 50px rgba(0,0,0,0.48), inset 0 0 0 1px rgba(255,255,255,0.018);
      overflow: hidden;
    }
    .room {
      min-width: 0;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(16, 25, 18, 0.98), rgba(11, 17, 12, 0.96));
    }
    .room-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
      color: var(--amber);
      font-weight: 850;
      font-size: 16px;
    }
    .room-title span { min-width: 0; }
    .room-title-main {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }
    #location-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    #avatar {
      flex: 0 1 auto;
      max-width: 46%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: right;
      color: var(--blue);
    }
    .room-copy {
      margin-top: 8px;
      color: var(--text);
      max-width: 980px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      white-space: nowrap;
    }
    .room.collapsed #avatar {
      display: none;
    }
    .room.collapsed .room-copy {
      margin-top: 6px;
    }
    .room-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .room-tag {
      flex: 0 0 auto;
      border: 1px solid rgba(129, 255, 167, 0.16);
      background: rgba(101, 230, 138, 0.06);
      color: var(--dim);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 12px;
    }
    .room-more {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(16, 25, 18, 0.72);
      color: var(--amber);
      border-radius: 4px;
      padding: 2px 7px;
      line-height: 1.2;
    }
    .room-more:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }
    .room-copy.expanded {
      align-items: flex-start;
      white-space: normal;
    }
    .room-full {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .route-map {
      margin-top: 10px;
      display: grid;
      grid-template-columns: minmax(154px, 216px) auto minmax(0, 1fr);
      align-items: stretch;
      gap: 8px;
      width: 100%;
      max-width: 100%;
      min-width: 0;
    }
    .route-current,
    .route-destinations {
      min-width: 0;
    }
    .route-destinations {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: 8px;
    }
    .route-node {
      flex: 0 0 auto;
      min-width: 154px;
      max-width: 226px;
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: rgba(16, 25, 18, 0.72);
      color: var(--text);
      padding: 6px;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      text-align: left;
      white-space: normal;
    }
    .route-current .route-node {
      width: 100%;
      max-width: none;
    }
    .route-destinations .route-node {
      flex: 1 1 154px;
    }
    button.route-node {
      font: inherit;
    }
    .route-node.current {
      border-color: var(--line-strong);
      color: var(--amber);
    }
    .route-node.destination {
      color: var(--green);
    }
    .route-node.locked {
      color: var(--dim);
      opacity: 0.68;
    }
    .route-node.focused {
      border-color: rgba(101, 230, 138, 0.82);
      box-shadow: inset 0 0 0 1px rgba(101, 230, 138, 0.24);
    }
    .route-node:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }
    .route-thumb {
      width: 48px;
      height: 34px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      background-color: rgba(101, 230, 138, 0.08);
      background-size: cover;
      background-position: center;
      display: grid;
      place-items: center;
      color: var(--dim);
      font-weight: 900;
      font-size: 12px;
      cursor: zoom-in;
    }
    .route-copy {
      min-width: 0;
      display: grid;
      gap: 1px;
    }
    .route-kicker {
      color: var(--dim);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .route-name {
      min-width: 0;
      color: inherit;
      font-weight: 900;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }
    .route-edge {
      flex: 0 0 auto;
      align-self: center;
      color: var(--dim);
      font-weight: 900;
      opacity: 0.82;
    }
    .presence {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--dim);
    }
    .chip {
      min-width: 0;
      max-width: 220px;
      border: 1px solid var(--line);
      background: var(--terminal-2);
      color: var(--text);
      padding: 5px 8px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .chip.focusable { cursor: pointer; }
    .chip.focused {
      border-color: rgba(101, 230, 138, 0.72);
      box-shadow: inset 0 0 0 1px rgba(101, 230, 138, 0.22);
    }
    .chip.you { color: var(--blue); border-color: rgba(139, 183, 255, 0.34); }
    .chip.evolved { color: var(--amber); border-color: rgba(239, 201, 107, 0.52); }
    .chip.item { color: var(--amber); border-color: rgba(239, 201, 107, 0.28); }
    .chip.path { color: var(--green); }
    .chip.locked {
      color: var(--dim);
      opacity: 0.62;
    }
    .chip.compact {
      width: 36px;
      max-width: 36px;
      height: 34px;
      justify-content: center;
      padding: 5px;
      gap: 0;
    }
    .chip.compact.path {
      width: 46px;
      max-width: 46px;
    }
    .chip.compact > span:not(.chip-thumb) {
      display: none;
    }
    .chip-thumb {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      background-size: cover;
      background-position: center;
      background-color: rgba(101, 230, 138, 0.08);
      cursor: zoom-in;
      color: var(--dim);
      font-size: 11px;
      font-weight: 900;
    }
    .chip-thumb.avatar {
      border-radius: 999px;
      background-size: 137%;
      background-position: center top;
    }
    .chip-thumb.item {
      border-radius: 4px;
      background-size: 137%;
      background-position: center top;
    }
    .chip-thumb.location {
      width: 34px;
      border-radius: 4px;
    }
    .log {
      min-height: 0;
      overflow: auto;
      padding: 12px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scroll-behavior: smooth;
    }
    .line {
      display: grid;
      grid-template-columns: minmax(12ch, 20ch) minmax(0, 1fr);
      gap: 12px;
      align-items: baseline;
    }
    .speaker {
      display: block;
      color: var(--dim);
      text-align: right;
      white-space: nowrap;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .speaker::before { content: "["; color: var(--line-strong); }
    .speaker::after { content: "]"; color: var(--line-strong); }
    .line.you .speaker { color: var(--blue); }
    .line.npc .speaker { color: var(--amber); }
    .line.world .speaker { color: var(--green); }
    .text {
      display: block;
      min-width: 0;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .account-panel {
      border: 1px solid var(--line);
      background: rgba(16, 25, 18, 0.72);
      margin-bottom: 8px;
      padding: 10px 12px;
    }
    .account-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      color: var(--amber);
      font-weight: 900;
      margin-bottom: 6px;
    }
    .account-wallet {
      color: var(--dim);
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .account-row {
      display: grid;
      grid-template-columns: minmax(9ch, 14ch) minmax(0, 1fr);
      gap: 10px;
      align-items: baseline;
      padding: 2px 0;
    }
    .account-key {
      color: var(--dim);
      text-align: right;
      white-space: nowrap;
    }
    .account-value {
      min-width: 0;
      overflow-wrap: anywhere;
      color: var(--text);
    }
    .account-empty { color: var(--dim); }
    .account-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 10px;
    }
    .account-button {
      min-height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      background: rgba(101, 230, 138, 0.1);
      color: var(--green);
      padding: 6px 9px;
      font: inherit;
      font-weight: 900;
    }
    .account-button.secondary {
      color: var(--amber);
      background: var(--terminal-2);
    }
    .account-assets {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
      gap: 8px;
      margin: 8px 0;
    }
    .account-asset {
      min-width: 0;
      border: 1px solid var(--line);
      background: rgba(16, 25, 18, 0.72);
      border-radius: 4px;
      padding: 7px;
      display: grid;
      gap: 6px;
    }
    .account-asset img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border: 1px solid var(--line-strong);
      background: rgba(101, 230, 138, 0.06);
      border-radius: 4px;
    }
    .account-asset-title {
      min-width: 0;
      color: var(--amber);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .account-asset-subtitle {
      color: var(--dim);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prompt {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 9px;
      align-items: stretch;
      padding: 10px 12px calc(10px + var(--safe-bot));
      border-top: 1px solid var(--line);
      background: rgba(5, 8, 6, 0.98);
    }
    .prompt.choice-mode {
      grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr);
    }
    .caret {
      display: grid;
      place-items: center;
      width: 28px;
      color: var(--green);
      font-weight: 900;
      font-size: 18px;
    }
    .cmd {
      min-width: 0;
      min-height: 50px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      background: var(--terminal-2);
      color: var(--text);
      padding: 8px 10px;
      text-align: left;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cmd.primary {
      background: rgba(101, 230, 138, 0.12);
      color: var(--green);
    }
    .cmd.secondary {
      color: var(--amber);
    }
    .thumb {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      background: rgba(101, 230, 138, 0.08);
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      cursor: zoom-in;
    }
    .thumb.avatar,
    .thumb.item {
      background-size: 137%;
      background-position: center top;
    }
    .thumb.avatar {
      border-radius: 999px;
    }
    .thumb.item { border-radius: 6px; }
    .thumb.location {
      width: 54px;
      border-radius: 5px;
    }
    .cmd-copy {
      min-width: 0;
      display: block;
      overflow: hidden;
    }
    .cmd-label {
      display: block;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .cmd:disabled {
      opacity: 0.42;
      cursor: default;
    }
    .detail {
      display: block;
      margin-top: 2px;
      color: var(--dim);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }
    .status {
      position: fixed;
      left: 18px;
      bottom: calc(72px + var(--safe-bot));
      z-index: 5;
      color: var(--red);
      min-height: 18px;
      font-size: 13px;
    }
    .status.ok { color: var(--green); }
    .command-palette {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(76px + var(--safe-bot));
      z-index: 20;
      border: 1px solid var(--line-strong);
      background: rgba(8, 11, 9, 0.98);
      box-shadow: 0 12px 40px rgba(0,0,0,0.44);
    }
    .command-palette[hidden] { display: none; }
    .command-form {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
    }
    .command-caret {
      color: var(--green);
      font-weight: 900;
      text-align: center;
    }
    .command-input {
      min-width: 0;
      min-height: 36px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-weight: 800;
    }
    .card-modal,
    .wallet-modal,
    .ai-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(3, 5, 4, 0.76);
    }
    .card-modal[hidden],
    .wallet-modal[hidden],
    .ai-modal[hidden] { display: none; }
    .card-dialog,
    .wallet-dialog,
    .ai-dialog {
      width: min(420px, calc(100vw - 28px));
      max-height: calc(100vh - 36px);
      overflow: auto;
      border: 1px solid var(--line-strong);
      background: #0a100c;
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.72);
      padding: 12px;
    }
    .card-close,
    .wallet-close,
    .ai-close {
      float: right;
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      background: var(--terminal-2);
      color: var(--amber);
      border-radius: 4px;
      font-weight: 900;
    }
    .wallet-title {
      clear: both;
      color: var(--amber);
      font-weight: 900;
      font-size: 17px;
      margin: 4px 0 4px;
    }
    .wallet-copy {
      color: var(--dim);
      margin-bottom: 12px;
    }
    .wallet-qr {
      width: min(300px, 100%);
      aspect-ratio: 1;
      margin: 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: #f5f8ef;
      padding: 10px;
    }
    .wallet-qr img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .wallet-link {
      margin-top: 10px;
      color: var(--blue);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .wallet-status {
      min-height: 22px;
      margin-top: 10px;
      color: var(--green);
    }
    .wallet-status.error { color: var(--red); }
    .ai-field {
      display: grid;
      gap: 7px;
      margin: 12px 0;
      color: var(--dim);
      font-size: 12px;
      font-weight: 700;
    }
    .ai-input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line-strong);
      border-radius: 5px;
      background: var(--terminal);
      color: var(--green);
      padding: 10px 12px;
      font: 700 15px/1.2 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    .ai-input:focus {
      outline: 2px solid rgba(139, 183, 255, 0.42);
      outline-offset: 2px;
    }
    .ai-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .ai-action {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: var(--terminal-2);
      color: var(--green);
      font: inherit;
      font-weight: 900;
    }
    .ai-action.cancel { color: var(--dim); }
    .card-art {
      clear: both;
      width: 100%;
      min-height: 220px;
      max-height: 62vh;
      border: 1px solid var(--line);
      background: rgba(101, 230, 138, 0.06);
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .card-art img {
      width: 100%;
      max-height: 62vh;
      object-fit: contain;
      display: block;
    }
    .card-name {
      margin-top: 10px;
      color: var(--amber);
      font-weight: 900;
      font-size: 17px;
    }
    .card-title {
      margin-top: 2px;
      color: var(--blue);
      font-size: 13px;
    }
    .card-blurb {
      margin-top: 8px;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .card-meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .card-meta span {
      border: 1px solid var(--line);
      background: var(--terminal-2);
      color: var(--dim);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 12px;
    }
    [data-card-key] { cursor: zoom-in; }
    @media (max-width: 900px) {
      html, body { font-size: 13px; }
      .shell { grid-template-rows: 38px minmax(0, 1fr) auto; }
      .topbar {
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        padding: 0 8px;
      }
      .brand::before { content: ""; }
      .brand { display: none; }
      .economy { font-size: 12px; max-width: none; }
      .location-pill img {
        width: 48px;
        height: 28px;
      }
      .terminal { margin: 8px; }
      .room { padding: 11px 12px; }
      .room-tag { font-size: 11px; padding: 2px 6px; }
      .room-title {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2px;
      }
      .room-title-main { min-width: 0; }
      #avatar {
        max-width: 100%;
        text-align: left;
      }
      .line {
        grid-template-columns: 1fr;
        gap: 1px;
      }
      .account-panel { padding: 9px 10px; }
      .account-title {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2px;
      }
      .account-row {
        grid-template-columns: 1fr;
        gap: 1px;
      }
      .account-key { text-align: left; }
      .speaker {
        text-align: left;
        max-width: 100%;
      }
      .text { padding-left: 1ch; }
      .prompt {
        grid-template-columns: auto minmax(0, 1fr);
        gap: 7px;
        padding: 8px;
      }
      .prompt.choice-mode {
        grid-template-columns: auto minmax(0, 1fr) minmax(0, 1fr);
      }
      .cmd { min-height: 48px; padding: 7px 8px; }
      .thumb { width: 30px; height: 30px; }
      .thumb.location { width: 44px; }
      .route-map {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .route-current {
        display: none;
      }
      .route-edge { display: none; }
      .route-destinations {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }
      .route-node {
        min-width: 0;
        min-height: 52px;
        width: 100%;
        max-width: none;
        grid-template-columns: 40px minmax(0, 1fr);
        gap: 7px;
        padding: 6px;
      }
      .route-thumb {
        width: 40px;
        height: 28px;
      }
      .route-kicker {
        font-size: 10px;
      }
      .route-name {
        font-size: 12px;
        line-height: 1.16;
      }
      .detail { display: none; }
    }
    @media (max-width: 360px) {
      .route-destinations {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand" id="brand">cosyworld</div>
      <div class="economy" id="economy" role="button" tabindex="0" aria-label="Focus account inventory"></div>
      <div class="location-pill" role="button" tabindex="0" aria-label="Focus current location">
        <img id="location-image" alt="" />
        <span id="subtitle">booting</span>
      </div>
    </header>
    <main class="terminal">
      <section class="room">
        <div class="room-title">
          <span class="room-title-main"><span id="location-name">The Cosy Cottage</span></span>
          <span id="avatar">...</span>
        </div>
        <div class="room-copy" id="location-copy"></div>
        <div class="route-map" id="route-map" aria-label="Room map"></div>
        <div class="presence" id="presence"></div>
      </section>
      <section class="log" id="log" role="log" aria-live="polite" aria-relevant="additions text" aria-label="Shared room timeline"></section>
    </main>
    <div class="status" id="error"></div>
    <footer class="prompt">
      <div class="caret">&gt;</div>
      <button class="cmd primary" id="primary"></button>
      <button class="cmd secondary" id="secondary"></button>
    </footer>
  </div>
  <div class="command-palette" id="command-palette" hidden>
    <form class="command-form" id="command-form">
      <span class="command-caret">&gt;</span>
      <input class="command-input" id="command-input" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="MUD command" />
    </form>
  </div>
  <div class="card-modal" id="card-modal" hidden>
    <section class="card-dialog" role="dialog" aria-modal="true" aria-labelledby="card-modal-name">
      <button class="card-close" type="button" data-card-close aria-label="Close card">x</button>
      <div class="card-art"><img id="card-modal-image" alt="" /></div>
      <div class="card-name" id="card-modal-name"></div>
      <div class="card-title" id="card-modal-title"></div>
      <div class="card-blurb" id="card-modal-blurb"></div>
      <div class="card-meta" id="card-modal-meta"></div>
    </section>
  </div>
  <div class="wallet-modal" id="wallet-modal" hidden>
    <section class="wallet-dialog" role="dialog" aria-modal="true" aria-labelledby="wallet-modal-title">
      <button class="wallet-close" type="button" data-wallet-close aria-label="Close wallet sign-in">x</button>
      <div class="wallet-title" id="wallet-modal-title">wallet sign-in</div>
      <div class="wallet-copy">Scan this with your phone. Sign one message. No transaction, no fee.</div>
      <div class="wallet-qr"><img id="wallet-qr-image" alt="Wallet sign-in QR code" /></div>
      <div class="wallet-link" id="wallet-mobile-url"></div>
      <div class="wallet-status" id="wallet-status"></div>
    </section>
  </div>
  <div class="ai-modal" id="ai-key-modal" hidden>
    <section class="ai-dialog" role="dialog" aria-modal="true" aria-labelledby="ai-key-title">
      <button class="ai-close" type="button" data-ai-key-cancel aria-label="Close AI key">x</button>
      <div class="wallet-title" id="ai-key-title">connect ai</div>
      <div class="wallet-copy">Use your OpenRouter key for unlimited avatar chat from this browser.</div>
      <label class="ai-field" for="ai-key-input">
        OpenRouter API key
        <input class="ai-input" id="ai-key-input" data-ai-key-input type="password" autocomplete="off" spellcheck="false" />
      </label>
      <div class="ai-actions">
        <button class="ai-action cancel" type="button" data-ai-key-cancel>cancel</button>
        <button class="ai-action" type="button" data-ai-key-submit>connect</button>
      </div>
    </section>
  </div>
  <script>
    const avatarGateVersion = "2";
    const walletRequestTimeoutMs = 20000;
    const fullPresenceCardLimit = 3;
    const bootParams = new URLSearchParams(window.location.search);
    const wantsReset = ["1", "true", "yes"].includes(String(bootParams.get("reset") || "").toLowerCase());
    if (wantsReset) clearLocalSession();
    const hasExplicitAvatar = localStorage.getItem("cosyworld.avatarGateVersion") === avatarGateVersion;
    let actorId = hasExplicitAvatar ? Number(localStorage.getItem("cosyworld.actorId") || 0) : 0;
    let actorSession = hasExplicitAvatar ? (localStorage.getItem("cosyworld.actorSession") || "") : "";
    if (!hasExplicitAvatar) {
      localStorage.removeItem("cosyworld.actorId");
      localStorage.removeItem("cosyworld.actorSession");
    }
    let state = null;
    let actions = [];
    let focusIndex = 0;
    let focusedKey = "";
    let logEvents = [];
    const seenSeq = new Set();
    let stream = null;
    let refreshInFlight = null;
    let refreshQueued = false;
    let actionBusy = false;
    let pendingAction = null;
    let accountPanelPinned = false;
    let openingBoxId = "";
    let roomCopyExpanded = false;
    let lastRoomCopyLocationId = null;
    let walletQrPollTimer = null;
    let walletQrResolve = null;
    let aiKeyResolve = null;
    const $ = (id) => document.getElementById(id);
    let walletAddress = bootParams.get("wallet") || bootParams.get("wallet_address") || localStorage.getItem("cosyworld.wallet") || "";
    let walletSession = bootParams.get("wallet_session") || localStorage.getItem("cosyworld.walletSession") || "";
    let ownedCardIds = parseCardIds(bootParams.get("cards") || bootParams.get("owned_card_ids") || localStorage.getItem("cosyworld.cards") || "");
    if (walletAddress) localStorage.setItem("cosyworld.wallet", walletAddress);
    if (walletSession) localStorage.setItem("cosyworld.walletSession", walletSession);
    if (ownedCardIds.length) localStorage.setItem("cosyworld.cards", ownedCardIds.join(","));
    let openrouterApiKey = localStorage.getItem("cosyworld.openrouterApiKey") || "";
    let openrouterLabel = localStorage.getItem("cosyworld.openrouterLabel") || "";

    function clearLocalSession() {
      localStorage.removeItem("cosyworld.actorId");
      localStorage.removeItem("cosyworld.actorSession");
      localStorage.removeItem("cosyworld.avatarGateVersion");
    }

    async function api(path, options = {}) {
      const response = await fetch(path, options);
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      return response.json();
    }

    async function post(path, payload) {
      return api(path, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload),
      });
    }

    async function createAvatar() {
      const avatar = await post("/avatar", withAccess({}));
      actorId = avatar.actor.id;
      actorSession = avatar.actor_session || "";
      localStorage.setItem("cosyworld.actorId", String(actorId));
      if (actorSession) localStorage.setItem("cosyworld.actorSession", actorSession);
      localStorage.setItem("cosyworld.avatarGateVersion", avatarGateVersion);
      pushEvents(avatar.events || []);
      focusIndex = 0;
      focusedKey = "";
      await refresh();
      connectStream();
    }

    async function requestDevResetIfNeeded() {
      if (!wantsReset) return;
      try {
        await post("/dev/reset", {});
      } catch {
        // The reset endpoint is dev-gated; clearing the local avatar is still useful.
      }
      bootParams.delete("reset");
      const qs = bootParams.toString();
      window.history.replaceState(null, "", `${window.location.pathname}${qs ? `?${qs}` : ""}`);
    }

    async function refresh() {
      const previousLocationId = state?.location?.id || null;
      const requestedActorId = actorId;
      const nextState = await api(statePath());
      if (requestedActorId !== actorId) return;
      state = nextState;
      if (actorId && state.primary_action?.kind === "create_avatar") {
        actorId = 0;
        clearLocalSession();
      }
      const locationChanged = previousLocationId && previousLocationId !== state.location?.id;
      if (logEvents.length === 0 || locationChanged) {
        rebuildLog([...(state.recent_events || [])].reverse());
      }
      actions = buildActions(state);
      restoreFocusedAction();
      render();
    }

    function queueRefresh() {
      if (refreshInFlight) {
        refreshQueued = true;
        return refreshInFlight;
      }
      refreshInFlight = refresh()
        .catch((error) => setError(String(error.message || error)))
        .finally(() => {
          refreshInFlight = null;
          if (refreshQueued) {
            refreshQueued = false;
            queueRefresh();
          }
        });
      return refreshInFlight;
    }

    function requestParams() {
      const params = new URLSearchParams();
      if (actorId) params.set("actor_id", String(actorId));
      if (actorSession) params.set("actor_session", actorSession);
      if (walletSession) params.set("wallet_session", walletSession);
      if (walletAddress) params.set("wallet_address", walletAddress);
      if (ownedCardIds.length) params.set("owned_card_ids", ownedCardIds.join(","));
      if (hasOpenRouterKey()) params.set("openrouter_connected", "1");
      return params;
    }

    function statePath() {
      const params = requestParams();
      const qs = params.toString();
      return `/state${qs ? `?${qs}` : ""}`;
    }

    function streamPath() {
      const params = requestParams();
      const qs = params.toString();
      return `/stream${qs ? `?${qs}` : ""}`;
    }

    function withAccess(payload) {
      return {
        ...payload,
        ...(actorSession ? { actor_session: actorSession } : {}),
        ...(walletSession ? { wallet_session: walletSession } : {}),
        ...(walletAddress ? { wallet_address: walletAddress } : {}),
        ...(ownedCardIds.length ? { owned_card_ids: ownedCardIds.join(",") } : {}),
      };
    }

    function leavePresence() {
      if (!actorId || !actorSession) return;
      const payload = JSON.stringify({ actor_id: actorId, actor_session: actorSession });
      if (navigator.sendBeacon) {
        const body = new Blob([payload], { type: "application/json" });
        navigator.sendBeacon("/presence/leave", body);
        return;
      }
      fetch("/presence/leave", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: payload,
        keepalive: true,
      }).catch(() => {});
    }

    function parseCardIds(value) {
      return String(value || "")
        .split(/[\s,;]+/)
        .map((part) => part.trim())
        .filter(Boolean);
    }

    function hasOpenRouterKey() {
      return openrouterApiKey.trim().length > 0;
    }

    function solanaProvider() {
      return window.solana || window.phantom?.solana || window.solflare?.solana || window.solflare || null;
    }

    function withTimeout(promise, ms, message) {
      return new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error(message)), ms);
        Promise.resolve(promise)
          .then((value) => {
            window.clearTimeout(timer);
            resolve(value);
          })
          .catch((error) => {
            window.clearTimeout(timer);
            reject(error);
          });
      });
    }

    function walletRequestError(error, fallback) {
      const message = String(error?.message || error || "").trim();
      if (/reject|denied|cancel/i.test(message)) return "Wallet request cancelled.";
      if (/timed out/i.test(message)) return message;
      if (/prompt\(\)|prompt|not supported/i.test(message)) {
        return "Wallet signing prompt is not available in this browser. Open the QR page inside Phantom or Solflare and try again.";
      }
      return message ? `${fallback}: ${message}` : fallback;
    }

    function buildActions(view) {
      if (view.primary_action?.kind === "create_avatar") {
        return [{
          label: "generate avatar",
          detail: "",
          command: "create avatar",
          focusKey: "create-avatar",
          card: cardForLocation(view.location?.id),
          shape: "location",
          run: () => createAvatar(),
        }];
      }

      const options = new Set((view.primary_action?.options || []).map((option) => option.kind));
      const built = [];
      const economy = view.economy || {};
      const canChat = hasOpenRouterKey() || economy.can_chat_with_orbs !== false;
      const heldEvolutionItems = (view.items || []).filter((item) => item.holder_actor_id === actorId && item.kind === "evolution");
      const heldUsableItems = (view.items || []).filter((item) => item.holder_actor_id === actorId && item.kind === "potion" && item.charges > 0);
      const usableTargets = (view.actors || []).filter((actor) => actorNeedsHealing(actor));
      const residentTargets = (view.actors || []).filter((actor) => actor.id !== actorId && actor.kind === "npc" && actor.status === "active");
      const giveTargetIds = new Set();
      const attackTargetIds = new Set((view.actors || [])
        .filter((actor) => actor.id !== actorId && actor.kind === "npc" && actor.status === "active")
        .map((actor) => actor.id));
      if (options.has("give_item")) {
        for (const target of residentTargets) {
          const targetItems = heldEvolutionItems.filter((item) => evolutionItemMatchesResident(item.id, target.id));
          for (const item of targetItems) {
            giveTargetIds.add(target.id);
            built.push({
              label: "give item",
              detail: `${item.name} to ${actorLabel(target)}`,
              command: `give ${item.name} to ${actorLabel(target)}`,
              focusKey: `actor:${target.id}`,
              card: cardForItem(item.id),
              shape: "item",
              run: () => action("/actions/give-item", { actor_id: actorId, item_id: item.id, target_actor_id: target.id }),
            });
          }
        }
        for (const item of heldEvolutionItems) {
          const defaultTarget = residentTargets.find((target) => evolutionItemMatchesResident(item.id, target.id));
          if (!defaultTarget) continue;
          built.push({
            label: "give item",
            detail: `${item.name} to ${actorLabel(defaultTarget)}`,
            command: `give ${item.name} to ${actorLabel(defaultTarget)}`,
            focusKey: `item:${item.id}`,
            card: cardForItem(item.id),
            shape: "item",
            run: () => action("/actions/give-item", { actor_id: actorId, item_id: item.id, target_actor_id: defaultTarget.id }),
          });
        }
      }
      for (const actor of view.actors || []) {
        if (actor.id === actorId || actor.kind !== "npc") continue;
        if (actor.status !== "active") continue;
        if (!canChat) continue;
        const actorCard = cardForActor(actor.id);
        built.push({
          label: "chat",
          detail: actorCard?.title ? `${actorLabel(actor)} / ${actorCard.title}` : actorLabel(actor),
          command: `chat ${actorLabel(actor)}`,
          focusKey: giveTargetIds.has(actor.id) || options.has("attack") ? `talk:${actor.id}` : `actor:${actor.id}`,
          card: actorCard,
          shape: "avatar",
          run: () => chatWith(actor.id),
        });
      }
      if (options.has("pick_up")) {
        for (const item of view.items || []) {
          if (!item.location_id) continue;
          built.push({
            label: "take",
            detail: item.name,
            command: `take ${item.name}`,
            focusKey: `item:${item.id}`,
            card: cardForItem(item.id),
            shape: "item",
            run: () => action("/actions/pick-up", { actor_id: actorId, item_id: item.id }),
          });
        }
      }
      for (const exit of view.exits || []) {
        if (exit.locked) continue;
        if (exit.accessible === false) {
          if (!view.access?.owner_wallet_address) {
            built.push({
              label: "connect wallet",
              detail: exit.destination_location_name,
              command: "connect wallet",
              focusKey: `wallet:${exit.destination_location_id}`,
              card: cardForLocation(exit.destination_location_id),
              shape: "location",
              run: () => connectWallet(),
            });
          }
          continue;
        }
        const escaping = options.has("flee");
        if (escaping || options.has("move")) {
          built.push({
            label: escaping ? "flee" : "travel",
            detail: exit.destination_location_name,
            command: `${escaping ? "flee" : "go"} ${exit.destination_location_name}`,
            focusKey: `exit:${exit.destination_location_id}`,
            card: cardForLocation(exit.destination_location_id),
            shape: "location",
            run: () => action(escaping ? "/actions/flee" : "/actions/move", { actor_id: actorId, destination_location_id: exit.destination_location_id }),
          });
        }
      }
      if (options.has("use_item")) {
        for (const item of heldUsableItems) {
          usableTargets.forEach((target, index) => {
            built.push({
              label: "use",
              detail: `${item.name} on ${actorLabel(target)}`,
              command: `use ${item.name} on ${actorLabel(target)}`,
              focusKey: index === 0 ? `item:${item.id}` : `use:${item.id}:${target.id}`,
              card: cardForItem(item.id),
              shape: "item",
              run: () => action("/actions/use-item", { actor_id: actorId, item_id: item.id, target_actor_id: target.id }),
            });
          });
        }
      }
      if (options.has("attack")) {
        for (const actor of view.actors || []) {
          if (!attackTargetIds.has(actor.id)) continue;
          built.push({
            label: "attack",
            detail: actorLabel(actor),
            command: `attack ${actorLabel(actor)}`,
            focusKey: `actor:${actor.id}`,
            card: cardForActor(actor.id),
            shape: "avatar",
            run: () => action("/actions/attack", { actor_id: actorId, target_actor_id: actor.id }),
          });
        }
      }
      if (options.has("defend")) {
        built.push({ label: "defend", detail: "Brace.", command: "defend", focusKey: "defend", card: cardForActor(actorId), shape: "avatar", run: () => action("/actions/defend", { actor_id: actorId }) });
      }
      const listenCanHelp = canChat || economy.listen_reward_claimable !== false;
      if (options.has("check") && listenCanHelp) {
        built.push({ label: "listen", detail: "for clues", command: "listen", focusKey: "check", card: cardForLocation(view.location?.id), shape: "location", run: () => action("/actions/check", { actor_id: actorId, ability: "wisdom", dc: 12 }) });
      }
      if (!canChat && options.has("chat") && !built.length) {
        built.push({
          label: "connect ai",
          detail: "OpenRouter or earn Orbs",
          command: "connect ai",
          focusKey: "connect-ai",
          card: cardForActor(actorId) || cardForLocation(view.location?.id),
          shape: "avatar",
          run: () => connectOpenRouter(),
        });
      }
      if (!built.length) built.push({ label: "wait", detail: "", command: "wait", focusKey: "wait", run: async () => {} });
      return built;
    }

    function setWalletQrStatus(message, kind = "ok") {
      const node = $("wallet-status");
      node.textContent = message;
      node.classList.toggle("error", kind === "error");
    }

    function stopWalletQrPolling() {
      if (walletQrPollTimer) window.clearInterval(walletQrPollTimer);
      walletQrPollTimer = null;
    }

    function closeWalletQrModal(result = false) {
      stopWalletQrPolling();
      $("wallet-modal").hidden = true;
      $("wallet-qr-image").removeAttribute("src");
      if (walletQrResolve) {
        const resolve = walletQrResolve;
        walletQrResolve = null;
        resolve(result);
      }
    }

    async function openQrWalletLogin() {
      setStatus("Scan the wallet sign-in QR.", "ok");
      const started = await post("/wallet/qr/start", {});
      if (!started.ok || !started.login_id || !started.poll_token) {
        setError(started.error || "Wallet QR sign-in could not start.");
        return false;
      }
      const mobileUrl = new URL(started.mobile_path || `/wallet/qr/${started.login_id}`, window.location.href).toString();
      const qrSvgUrl = new URL(started.qr_svg_path || `/wallet/qr/${started.login_id}/code.svg`, window.location.href).toString();
      $("wallet-qr-image").src = qrSvgUrl;
      $("wallet-mobile-url").textContent = mobileUrl;
      setWalletQrStatus("Waiting for a phone signature.");
      $("wallet-modal").hidden = false;
      $("wallet-modal").querySelector(".wallet-close")?.focus();

      return new Promise((resolve) => {
        walletQrResolve = resolve;
        const poll = async () => {
          try {
            const status = await api(`/wallet/qr/status?login_id=${encodeURIComponent(started.login_id)}&poll_token=${encodeURIComponent(started.poll_token)}`);
            if (status.ok && status.state === "complete" && status.wallet_session) {
              walletAddress = status.wallet_address || walletAddress;
              walletSession = status.wallet_session;
              if (walletAddress) localStorage.setItem("cosyworld.wallet", walletAddress);
              localStorage.setItem("cosyworld.walletSession", walletSession);
              setStatus("Wallet connected.", "ok");
              focusIndex = 0;
              focusedKey = "";
              await refresh();
              connectStream();
              closeWalletQrModal(true);
            } else if (!status.ok && status.state === "expired") {
              setWalletQrStatus("QR sign-in expired. Try connect wallet again.", "error");
              closeWalletQrModal(false);
            }
          } catch (error) {
            setWalletQrStatus(String(error.message || error), "error");
          }
        };
        walletQrPollTimer = window.setInterval(poll, 1400);
        poll();
      });
    }

    async function connectWallet() {
      const provider = solanaProvider();
      if (!provider?.connect || !provider?.signMessage) {
        return openQrWalletLogin();
      }
      try {
        setStatus("Confirm wallet access in your Solana wallet.", "ok");
        const connected = await withTimeout(
          provider.connect(),
          walletRequestTimeoutMs,
          "Wallet connection timed out."
        );
        const publicKey = connected?.publicKey || provider.publicKey;
        const nextWallet = publicKey?.toString?.() || "";
        if (!nextWallet) {
          setError("Wallet connection failed.");
          return false;
        }
        const challenge = await api(`/wallet/challenge?wallet_address=${encodeURIComponent(nextWallet)}`);
        if (!challenge.ok) {
          setError("Wallet challenge failed.");
          return false;
        }
        setStatus("Sign the CosyWorld wallet challenge.", "ok");
        const encoded = new TextEncoder().encode(challenge.message);
        const signed = await withTimeout(
          provider.signMessage(encoded, "utf8"),
          walletRequestTimeoutMs,
          "Wallet signature timed out."
        );
        const signature = Array.from(signed?.signature || signed || []);
        const session = await post("/wallet/session", {
          wallet_address: nextWallet,
          nonce: challenge.nonce,
          signature,
        });
        if (!session.ok || !session.wallet_session) {
          setError(session.error || "Wallet signature rejected.");
          return false;
        }
        walletAddress = session.wallet_address || nextWallet;
        walletSession = session.wallet_session;
        localStorage.setItem("cosyworld.wallet", walletAddress);
        localStorage.setItem("cosyworld.walletSession", walletSession);
        setStatus("Wallet connected.", "ok");
        focusIndex = 0;
        focusedKey = "";
        await refresh();
        connectStream();
        return true;
      } catch (error) {
        setError(walletRequestError(error, "Wallet connection failed"));
        return false;
      }
    }

    function closeAiKeyModal(result = "") {
      $("ai-key-modal").hidden = true;
      $("ai-key-input").value = "";
      if (aiKeyResolve) {
        const resolve = aiKeyResolve;
        aiKeyResolve = null;
        resolve(result);
      }
    }

    function openAiKeyModal() {
      $("ai-key-input").value = "";
      $("ai-key-modal").hidden = false;
      setTimeout(() => $("ai-key-input").focus(), 0);
      return new Promise((resolve) => {
        aiKeyResolve = resolve;
      });
    }

    async function connectOpenRouter() {
      const key = await openAiKeyModal();
      if (!key || !key.trim()) return;
      setError("");
      const verified = await post("/ai/openrouter/verify", { api_key: key.trim() });
      if (!verified.ok) {
        setError(verified.error || "OpenRouter key could not be verified.");
        return;
      }
      openrouterApiKey = key.trim();
      openrouterLabel = verified.label || "OpenRouter";
      localStorage.setItem("cosyworld.openrouterApiKey", openrouterApiKey);
      localStorage.setItem("cosyworld.openrouterLabel", openrouterLabel);
      await refresh();
    }

    async function openBox(boxAssetAddress) {
      if (!walletSession) {
        const connected = await connectWallet();
        if (!connected) return;
      }
      setError("");
      openingBoxId = boxAssetAddress;
      accountPanelPinned = true;
      render();
      try {
        const prepared = await post("/nft/boxes/burn-prepare", {
          wallet_session: walletSession,
          box_asset_address: boxAssetAddress,
        });
        if (!prepared.ok) {
          throw new Error(prepared.error || "Box cannot be opened.");
        }
        let packId = prepared.pack_id || "";
        if (!String(prepared.burn_message || "").startsWith("Box already")) {
          const burnSignature = await signWalletMessage(prepared.burn_message || `Burn Wooden Box ${boxAssetAddress}`);
          const confirmed = await post("/nft/boxes/burn-confirm", {
            wallet_session: walletSession,
            box_asset_address: boxAssetAddress,
            burn_signature: burnSignature,
          });
          if (!confirmed.ok) {
            throw new Error(confirmed.error || "Box burn could not be recorded.");
          }
          packId = confirmed.receipt?.pack_id || packId;
        }
        if (!packId) throw new Error("Box did not create a pack.");
        await openPack(packId);
      } finally {
        openingBoxId = "";
        render();
      }
    }

    async function openPack(packId) {
      if (!walletSession) {
        const connected = await connectWallet();
        if (!connected) return;
      }
      setError("");
      const opened = await post("/nft/packs/open", {
        wallet_session: walletSession,
        pack_id: packId,
      });
      if (!opened.ok) {
        throw new Error(opened.error || "Pack could not be opened.");
      }
      const cards = opened.opening?.card_ids || [];
      setStatus(cards.length ? `Opened pack: ${cards.join(", ")}` : "Opened pack.", "ok");
      focusIndex = 0;
      focusedKey = "";
      accountPanelPinned = true;
      await refresh();
    }

    async function signWalletMessage(message) {
      const provider = solanaProvider();
      if (!provider?.signMessage) {
        throw new Error("Solana wallet signature is needed to open a Box.");
      }
      const encoded = new TextEncoder().encode(message);
      const signed = await withTimeout(
        provider.signMessage(encoded, "utf8"),
        walletRequestTimeoutMs,
        "Wallet signature timed out."
      );
      const bytes = Array.from(signed?.signature || signed || []);
      if (!bytes.length) throw new Error("Wallet did not return a signature.");
      return bytesToHex(bytes);
    }

    function bytesToHex(bytes) {
      return bytes
        .map((byte) => Number(byte).toString(16).padStart(2, "0"))
        .join("");
    }

    async function chatWith(targetActorId) {
      await action("/actions/chat", {
        actor_id: actorId,
        target_actor_id: targetActorId,
        ...(hasOpenRouterKey() ? { openrouter_api_key: openrouterApiKey } : {}),
      });
    }

    async function action(path, payload) {
      setError("");
      const result = await post(path, withAccess(payload));
      pushEvents(result.events || []);
      if (!result.ok) {
        if (result.status === 402) setError("Chat needs Orbs or a connected OpenRouter key.");
        else if (result.status === 502) setError("OpenRouter could not answer that turn.");
        else setError("That does not work here.");
      }
      focusIndex = 0;
      focusedKey = "";
      await refresh();
    }

    async function runCommandText(commandText) {
      const command = String(commandText || "").trim();
      if (!command) return;
      if (!actorId || !actorSession) {
        setError("Generate an avatar first.");
        return;
      }
      setError("");
      const result = await post("/commands", withAccess({
        actor_id: actorId,
        command,
        ...(hasOpenRouterKey() ? { openrouter_api_key: openrouterApiKey } : {}),
      }));
      if (result.output) pushCommandOutput(result.command || command, result.output, result.ok);
      pushEvents(result.events || []);
      if (!result.ok) setError(result.output || "That command does not work here.");
      focusIndex = 0;
      focusedKey = "";
      await refresh();
    }

    function pushCommandOutput(command, output, ok) {
      logEvents.push({
        seq: `command-${Date.now()}-${Math.random()}`,
        type: "command.output",
        actor_name: ok ? ">" : "command",
        content: output,
        command,
      });
      logEvents = logEvents.slice(-60);
      renderLog();
    }

    function pushEvents(events) {
      let changed = false;
      for (const event of events) {
        if (!event || seenSeq.has(event.seq)) continue;
        seenSeq.add(event.seq);
        if (event.type === "world.bootstrapped") continue;
        logEvents.push(event);
        changed = true;
      }
      logEvents = logEvents.slice(-60);
      return changed;
    }

    function rebuildLog(events) {
      logEvents = [];
      for (const event of events) {
        if (!event || event.type === "world.bootstrapped") continue;
        seenSeq.add(event.seq);
        logEvents.push(event);
      }
      logEvents = logEvents.slice(-60);
    }

    function eventMatchesCurrentLocation(event) {
      const locationId = state?.location?.id;
      if (!locationId || !event) return true;
      return event.location_id === locationId || event.destination_location_id === locationId;
    }

    function eventShouldRefreshState(event) {
      if (!event) return false;
      return event.type === "world.reset"
        || event.type === "actor.created"
        || event.type === "actor.entered_location"
        || event.type === "actor.moved"
        || event.type === "move.blocked"
        || event.type === "item.picked_up"
        || event.type === "item.used"
        || event.type === "item.given"
        || event.type === "avatar.evolved"
        || event.type === "rule.rejected"
        || event.type === "combat.defend"
        || event.type === "combat.attack.attempt"
        || event.type === "combat.attack.hit"
        || event.type === "combat.attack.miss"
        || event.type === "combat.knockout"
        || event.type === "combat.flee.success";
    }

    function connectStream() {
      if (stream) stream.close();
      stream = new EventSource(streamPath());
      stream.addEventListener("world", (message) => {
        let event = null;
        try {
          event = JSON.parse(message.data);
        } catch {
          return;
        }
        if (event.type === "world.reset") {
          seenSeq.clear();
          rebuildLog([event]);
          renderLog();
          queueRefresh();
          return;
        }
        if (eventMatchesCurrentLocation(event)) {
          const changed = pushEvents([event]);
          if (changed) renderLog();
        }
        if (eventShouldRefreshState(event)) queueRefresh();
      });
      stream.onerror = () => setError("Live connection is retrying.");
    }

    function render() {
      const location = state.location || {};
      const me = (state.actors || []).find((actor) => actor.id === actorId);
      const locationCard = cardForLocation(location.id);
      const locationImage = $("location-image");
      locationImage.src = cardImage(locationCard) || fallbackCardImage(locationCard || { display_name: location.name || "Location", aspect: "wide", role: "location" });
      locationImage.alt = locationCard?.display_name || location.name || "";
      setCardTarget(locationImage, locationCard);
      $("subtitle").textContent = location.name || "Unknown";
      $("brand").textContent = channelName(location.name || "cosyworld");
      renderEconomy();
      $("avatar").textContent = me ? `${actorLabel(me)} / ${me.title || "traveler"}` : "";
      $("location-name").textContent = location.name || "Unknown";
      document.querySelector(".room")?.classList.toggle("collapsed", !roomCopyExpanded);
      if (lastRoomCopyLocationId !== location.id) {
        roomCopyExpanded = false;
        lastRoomCopyLocationId = location.id || null;
        document.querySelector(".room")?.classList.add("collapsed");
      }
      renderRoomCopy(location.id);
      $("route-map").innerHTML = routeMapHtml(state);
      $("presence").innerHTML = presenceHtml(state, me);
      renderLog();
      renderCommands();
    }

    function renderEconomy() {
      const economy = state?.economy || {};
      const orbs = Number.isFinite(Number(economy.orbs)) ? Number(economy.orbs) : 0;
      const boxes = state?.access?.owned_box_ids?.length || 0;
      const packs = state?.access?.unopened_pack_ids?.length || 0;
      const signed = state?.access?.mode === "signed_ruby_high_wallet" && Boolean(walletSession);
      const parts = [`<strong>${orbs}</strong> orbs`];
      const compact = window.matchMedia("(max-width: 900px)").matches;
      if (!compact) {
        if (boxes) parts.push(`${boxes} ${boxes === 1 ? "box" : "boxes"}`);
        if (packs) parts.push(`${packs} ${packs === 1 ? "pack" : "packs"}`);
        parts.push(signed ? "wallet" : "connect wallet");
      }
      const economyNode = $("economy");
      economyNode.innerHTML = parts.join(" · ");
      economyNode.setAttribute("aria-label", `Focus account inventory with ${orbs} Orbs, ${boxes} Boxes, ${packs} unopened packs, and ${signed ? "a connected wallet" : "no connected wallet"}`);
      economyNode.classList.toggle("focused", Boolean(accountPanelPinned));
    }

    function routeMapHtml(view) {
      const location = view?.location || {};
      const exits = (view?.exits || []).filter((exit) => !exit.locked);
      if (!location.id && !exits.length) return "";
      const current = routeNodeHtml({
        label: location.name || "Unknown",
        kicker: "current room",
        card: cardForLocation(location.id),
        classes: " current",
      });
      if (!exits.length) return `<div class="route-current">${current}</div>`;
      const destinations = exits.map((exit) => {
        const key = exit.accessible === false
          ? (!view.access?.owner_wallet_address ? `wallet:${exit.destination_location_id}` : "")
          : `exit:${exit.destination_location_id}`;
        const index = key ? actions.findIndex((action) => action.focusKey === key) : -1;
        const locked = exit.accessible === false;
        const kicker = locked
          ? (exit.required_card_id ? "card locked" : "wallet needed")
          : "path";
        return routeNodeHtml({
          label: exit.destination_location_name,
          kicker,
          card: cardForLocation(exit.destination_location_id),
          classes: ` destination${locked ? " locked" : ""}`,
          focusIndex: index,
        });
      });
      return `<div class="route-current">${current}</div><div class="route-edge" aria-hidden="true">-&gt;</div><div class="route-destinations">${destinations.join("")}</div>`;
    }

    function routeNodeHtml({ label, kicker, card = null, classes = "", focusIndex: routeFocusIndex = -1 }) {
      const selectable = routeFocusIndex >= 0;
      const focused = selectable && routeFocusIndex === focusIndex && !state?.branch;
      const tag = selectable ? "button" : "div";
      const buttonType = selectable ? ` type="button" data-focus-index="${routeFocusIndex}"` : "";
      const attrs = `${buttonType} title="${escapeAttr(label)}" aria-label="${escapeAttr(`${kicker}: ${label}`)}"`;
      const image = cardImage(card) || (card ? fallbackCardImage(card) : "");
      const fallback = escapeHtml(label.trim().slice(0, 2).toUpperCase() || "?");
      const thumb = image
        ? `<span class="route-thumb"${cardDataAttr(card)} style="background-image:url('${escapeAttr(image)}')"></span>`
        : `<span class="route-thumb"${cardDataAttr(card)}>${fallback}</span>`;
      return `<${tag} class="route-node${classes}${focused ? " focused" : ""}"${attrs}>${thumb}<span class="route-copy"><span class="route-kicker">${escapeHtml(kicker)}</span><span class="route-name">${escapeHtml(label)}</span></span></${tag}>`;
    }

    function presenceHtml(view, me) {
      const parts = [];
      let fullCardCount = 0;
      const pushChip = (chip) => {
        const compact = fullCardCount >= fullPresenceCardLimit;
        fullCardCount += 1;
        parts.push(chipHtml({ ...chip, compact }));
      };
      for (const actor of view.actors || []) {
        const you = actor.id === actorId;
        const label = you ? `${actorLabel(actor)} (you)` : actorLabel(actor);
        const evolved = actor.stats?.level > 1;
        const key = you ? "" : `actor:${actor.id}`;
        pushChip({
          label,
          classes: `${you ? " you" : ""}${evolved ? " evolved" : ""}`,
          key,
          card: cardForActor(actor.id),
          shape: "avatar",
        });
      }
      for (const item of view.items || []) {
        if (item.location_id || item.holder_actor_id === actorId) {
          const held = item.holder_actor_id === actorId;
          pushChip({
            label: held ? `${item.name} (held)` : item.name,
            classes: " item",
            key: `item:${item.id}`,
            card: cardForItem(item.id),
            shape: "item",
          });
        }
      }
      if (!parts.length && me) pushChip({ label: me.name, classes: " you", card: cardForActor(me.id), shape: "avatar" });
      return parts.join("");
    }

    function chipHtml({ label, classes = "", key = "", card = null, shape = "item", compact = false }) {
      const index = key ? actions.findIndex((action) => action.focusKey === key) : -1;
      const selectable = index >= 0;
      const focused = selectable && index === focusIndex && !state?.branch;
      const title = escapeAttr(label);
      const attrs = `${selectable ? ` data-focus-index="${index}" role="button" tabindex="0"` : ""} title="${title}" aria-label="${title}"`;
      const image = cardImage(card) || (card ? fallbackCardImage(card) : "");
      const fallback = compact ? escapeHtml(label.trim().slice(0, 1) || "?") : "";
      const thumb = image
        ? `<span class="chip-thumb ${escapeAttr(shape)}"${cardDataAttr(card)} style="background-image:url('${escapeAttr(image)}')"></span>`
        : `<span class="chip-thumb ${escapeAttr(shape)}">${fallback}</span>`;
      return `<span class="chip${classes}${compact ? " compact" : ""}${selectable ? " focusable" : ""}${focused ? " focused" : ""}"${attrs}>${thumb}<span>${escapeHtml(label)}</span></span>`;
    }

    function renderLog() {
      const log = $("log");
      const accountPanel = accountPanelHtml();
      if (!logEvents.length) {
        log.innerHTML = `${accountPanel}<div class="line world"><span class="speaker">world</span><span class="text">${escapeHtml(openingBeat(state))}</span></div>`;
        if (accountPanel) log.scrollTop = 0;
        return;
      }
      log.innerHTML = `${accountPanel}${logEvents.map(messageHtml).join("")}`;
      log.scrollTop = accountPanel ? 0 : log.scrollHeight;
    }

    function accountPanelHtml() {
      if (!accountPanelPinned) return "";
      const account = state?.account || {};
      const wallet = account.wallet_address || state?.access?.owner_wallet_address || "";
      const boxes = Array.isArray(account.active_box_ids) ? account.active_box_ids : [];
      const packs = Array.isArray(account.unopened_pack_ids) ? account.unopened_pack_ids : [];
      const receipts = Array.isArray(account.recent_box_receipts) ? account.recent_box_receipts : [];
      const openings = Array.isArray(account.recent_pack_openings) ? account.recent_pack_openings : [];
      const signed = state?.access?.mode === "signed_ruby_high_wallet" && Boolean(walletSession);
      const assets = [];
      for (const boxId of boxes.slice(0, 6)) {
        assets.push(accountBoxCard(boxId, openingBoxId === boxId ? "opening" : "closed"));
      }
      for (const packId of packs.slice(0, 6)) {
        assets.push(accountPackCard(packId));
      }
      const rows = [
        accountRow("boxes", boxes.length ? boxes.map(compactAssetId).join(", ") : "none"),
        accountRow("packs", packs.length ? packs.map(compactAssetId).join(", ") : "none"),
      ];
      for (const receipt of receipts.slice(0, 3)) {
        rows.push(accountRow("burn", `${compactAssetId(receipt.box_asset_address)} -> ${compactAssetId(receipt.pack_id)} / ${receipt.verification_status || "receipt"}`));
      }
      for (const opening of openings.slice(0, 3)) {
        const cards = (opening.card_ids || []).map(cardDisplayName).join(", ");
        rows.push(accountRow("reveal", `${compactAssetId(opening.pack_id)} -> ${cards || "cards"}`));
      }
      const actions = signed
        ? `<button class="account-button secondary" type="button" data-account-open-pack="first"${packs.length ? "" : " disabled"}>open pack</button>`
        : `<button class="account-button" type="button" data-account-connect>connect wallet</button>`;
      const inventory = assets.length
        ? `<div class="account-assets">${assets.join("")}</div>`
        : `<div class="account-empty">no Boxes or unopened packs</div>`;
      return `<div class="account-panel" aria-label="Account inventory and provenance"><div class="account-title"><span>account inventory</span><span class="account-wallet">${escapeHtml(compactAssetId(wallet) || "walletless")}</span></div><div class="account-actions">${actions}</div>${inventory}${rows.join("")}</div>`;
    }

    function accountBoxCard(boxId, stateName) {
      const title = "Intricately Carved Wooden Box";
      const subtitle = stateName === "opening" ? "opening" : "burn for cards";
      return `<div class="account-asset"><img src="${escapeAttr(boxImageUrl(boxId, stateName))}" alt="${escapeAttr(`${title} ${stateName}`)}" data-card-key="box:${escapeAttr(boxId)}" /><div class="account-asset-title">${escapeHtml(title)}</div><div class="account-asset-subtitle">${escapeHtml(compactAssetId(boxId))}</div><button class="account-button secondary" type="button" data-account-open-box="${escapeAttr(boxId)}"${stateName === "opening" ? " disabled" : ""}>${escapeHtml(subtitle)}</button></div>`;
    }

    function accountPackCard(packId) {
      const image = fallbackCardImage(accountCard("Avatar Pack"));
      return `<div class="account-asset"><img src="${escapeAttr(image)}" alt="Avatar Pack" data-card-key="pack:${escapeAttr(packId)}" /><div class="account-asset-title">Avatar Pack</div><div class="account-asset-subtitle">${escapeHtml(compactAssetId(packId))}</div><button class="account-button secondary" type="button" data-account-open-pack="${escapeAttr(packId)}">open pack</button></div>`;
    }

    function boxImageUrl(boxId, stateName = "closed") {
      return `/assets/generated/boxes/${encodeURIComponent(stateName)}/${encodeURIComponent(boxId)}.svg`;
    }

    function accountRow(key, value) {
      const empty = value === "none" || value === "nothing waiting";
      return `<div class="account-row"><span class="account-key">${escapeHtml(key)}</span><span class="account-value${empty ? " account-empty" : ""}">${escapeHtml(value)}</span></div>`;
    }

    function cardDisplayName(cardId) {
      for (const group of [state?.cards?.actors, state?.cards?.items, state?.cards?.locations]) {
        if (!group) continue;
        for (const card of Object.values(group)) {
          if (card?.card_id === cardId) return card.display_name || cardId;
        }
      }
      return cardId;
    }

    function hasAccountPanelContent() {
      const account = state?.account || {};
      return Boolean(
        account.wallet_address
          || (account.active_box_ids || []).length
          || (account.unopened_pack_ids || []).length
          || (account.recent_box_receipts || []).length
          || (account.recent_pack_openings || []).length
      );
    }

    function openingBeat(view) {
      const locationId = view?.location?.id;
      if (locationId === 1) {
        const names = new Set((view.actors || []).map((actor) => actor.name));
        const pieces = ["Firelight warms The Cosy Cottage; rain taps the windows and the low doorway waits."];
        if (names.has("Rati")) pieces.push("Rati knits a blue scarf near the hearth.");
        else pieces.push("Rati's blue scarf basket marks the chair where she often sits.");
        if (names.has("Whiskerwind")) pieces.push("Whiskerwind gathers weather into bright little symbols.");
        if (names.has("Skull")) pieces.push("Skull keeps silent watch by the door.");
        return pieces.join(" ");
      }
      if (locationId === 2) return "Rain beads on the garden leaves. A small pearled button catches the light.";
      if (locationId === 3) return "Moonlight silvers the trail. The air here is sharper, and choices carry farther.";
      if (locationId === 10) return "Science Class hums with shared observations, bright benches, and questions waiting to be tested.";
      if (locationId === 11) return "Homeroom waits with front-door morning light and the sense that every question gets a seat.";
      if (locationId === 12) return "Library quiet gathers around the shelves; if it matters, someone wrote it down.";
      if (locationId === 13) return "Cafeteria tables hold the soft thunder of commons diplomacy.";
      if (locationId === 14) return "Greenhouse glass glows with patient leaves and experiments that grow slowly.";
      if (locationId === 15) return "Courtyard paths cross under open sky; every hallway seems to lead back here.";
      return copyForLocation(locationId);
    }

    function messageHtml(event) {
      const speaker = event.actor_name || "CosyWorld";
      const body = eventText(event);
      const kind = event.actor_id === actorId ? "you" : event.actor_id ? "npc" : "world";
      const label = eventAriaLabel(event, speaker, body);
      const attrs = label ? ` aria-label="${escapeAttr(label)}"` : "";
      return `<div class="line ${kind}"${attrs}><span class="speaker">${escapeHtml(speaker)}</span><span class="text">${escapeHtml(body)}</span></div>`;
    }

    function eventAriaLabel(event, speaker, body) {
      if (event.type === "message.created" && event.actor_id === 1002) {
        return `${speaker} speaks in emoji-only weather symbols: ${emojiWords(body)}`;
      }
      return "";
    }

    function emojiWords(value) {
      const names = {
        "🌧️": "rain cloud",
        "🌧": "rain cloud",
        "🫖": "teapot",
        "✨": "sparkles",
        "🧶": "yarn",
        "☁️": "cloud",
        "☁": "cloud",
        "🫧": "bubbles",
        "🌙": "moon",
        "🪡": "needle",
        "🧵": "thread",
        "❄️": "snowflake",
        "❄": "snowflake",
        "🌿": "leaf",
      };
      const parts = [];
      for (const [emoji, label] of Object.entries(names)) {
        if (value.includes(emoji)) parts.push(label);
      }
      return parts.length ? parts.join(", ") : "symbols";
    }

    function eventText(event) {
      if (event.type === "command.output") return event.content || "";
      if (event.type === "message.created") return event.content || "";
      if (event.type === "world.reset") return "the world returns to its first page.";
      if (event.type === "actor.created") return `enters ${event.location_name}.`;
      if (event.type === "actor.entered_location") return `arrives in ${event.location_name}.`;
      if (event.type === "actor.moved") return `moves from ${event.location_name} to ${event.destination_location_name}.`;
      if (event.type === "move.blocked") return `cannot reach ${event.destination_location_name}.`;
      if (event.type === "item.picked_up") return `takes ${event.item_name}.`;
      if (event.type === "item.used") {
        const target = event.target_actor_name ? ` on ${event.target_actor_name}` : "";
        const healed = event.damage < 0 ? ` restores ${Math.abs(event.damage)} hp.` : ".";
        return `uses ${event.item_name}${target}.${healed}`;
      }
      if (event.type === "item.given") return `gives ${event.item_name} to ${event.target_actor_name}.`;
      if (event.type === "avatar.evolved") return `${event.target_actor_name} evolves to level ${event.total || 2}.`;
      if (event.type === "branch.opened") return `opens a choice with ${event.target_actor_name}.`;
      if (event.type === "branch.resolved") return `settles a choice with ${event.target_actor_name}.`;
      if (event.type === "branch.expired") return `lets a choice with ${event.target_actor_name} fade.`;
      if (event.type === "ability_check.rolled") return listenEventText(event);
      if (event.type === "combat.defend") return `raises a careful guard.`;
      if (event.type === "combat.attack.attempt") return `tests ${event.target_actor_name}'s guard: roll ${event.total} vs ac ${event.dc}.`;
      if (event.type === "combat.attack.hit") {
        const hp = Number.isFinite(Number(event.current_hp)) ? `${event.current_hp} hp remains.` : "";
        return `breaks through ${event.target_actor_name}'s guard for ${event.damage} damage. ${hp}`.trim();
      }
      if (event.type === "combat.attack.miss") return `${event.target_actor_name} turns the strike aside.`;
      if (event.type === "combat.knockout") return `${event.target_actor_name}'s light falls quiet at 0 hp.`;
      if (event.type === "combat.flee.success") return `flees to ${event.destination_location_name}, carrying the trail's silver hush.`;
      if (event.type === "rule.rejected") return `hesitates.`;
      return event.type;
    }

    function listenEventText(event) {
      const hint = listenHintForLocation(event.location_id, event.success);
      const roll = Number.isFinite(Number(event.total)) && Number.isFinite(Number(event.dc))
        ? ` (${event.total}/${event.dc})`
        : "";
      return `listens: ${hint}${roll}`;
    }

    function listenHintForLocation(id, success) {
      if (!success) {
        if (id === 3) return "the trail goes quiet, but something out there heard you first.";
        return "the room keeps its secret for now.";
      }
      if (id === 1) return "the hearth points toward Story Button, Hearth Tonic, and a missing thread for Rati.";
      if (id === 2) return "rain gathers around Dewbright Button; a small bell answers from the leaves.";
      if (id === 3) return "moonlight catches Wolfprint Charm and Hearthstone Tag before the Echo circles back.";
      if (id === 10) return "Science Class smells of Moonwool Thread, chalk dust, and questions that want testing.";
      if (id === 11) return "Homeroom murmurs that every new day hides a useful routine.";
      if (id === 12) return "Library shelves whisper that names, needs, and old paths are written somewhere.";
      if (id === 13) return "Cafeteria trays clatter with commons gossip and trade routes.";
      if (id === 14) return "Greenhouse glass ticks softly around experiments that grow when revisited.";
      if (id === 15) return "Courtyard paths cross; footsteps remember where they came from.";
      if (freeLocationCopy(id)) return `${freeLocationCopy(id)} A route back to the cottage stays warm.`;
      return "the shard hums back with a useful direction.";
    }

    function cardForActor(id) {
      return state?.cards?.actors?.[String(id)] || null;
    }

    function cardForItem(id) {
      return state?.cards?.items?.[String(id)] || null;
    }

    function cardForLocation(id) {
      return state?.cards?.locations?.[String(id)] || null;
    }

    function accountCard(displayName) {
      return {
        display_name: displayName,
        role: "item",
        aspect: "square",
        image_url: "",
      };
    }

    function cardImage(card) {
      return card?.image_url || "";
    }

    function cardKey(card) {
      const id = card?.card_id || card?.display_name || card?.title || "";
      if (!id) return "";
      return `${card?.role || "card"}:${id}`;
    }

    function cardDataAttr(card) {
      const key = cardKey(card);
      return key ? ` data-card-key="${escapeAttr(key)}"` : "";
    }

    function setCardTarget(node, card) {
      const key = cardKey(card);
      if (!key) {
        node.removeAttribute("data-card-key");
        return;
      }
      node.setAttribute("data-card-key", key);
    }

    function cardByKey(key) {
      if (key.startsWith("box:")) {
        const boxId = key.slice(4);
        return {
          card_id: boxId,
          display_name: "Intricately Carved Wooden Box",
          title: "sealed world seed",
          blurb: "A burnable NFT Box. Opening it creates an avatar card pack, then the revealed cards can be minted through the Ruby High-style pack flow.",
          rarity: "mystery",
          role: "item",
          aspect: "square",
          source: "cosyworld_box",
          owned: true,
          image_url: boxImageUrl(boxId, openingBoxId === boxId ? "opening" : "closed"),
        };
      }
      if (key.startsWith("pack:")) {
        const packId = key.slice(5);
        return {
          card_id: packId,
          display_name: "Avatar Pack",
          title: "unopened card pack",
          blurb: "A Box-born pack waiting to reveal avatar cards from the shared world.",
          rarity: "pack",
          role: "item",
          aspect: "square",
          source: "cosyworld_pack",
          owned: true,
          image_url: fallbackCardImage(accountCard("Avatar Pack")),
        };
      }
      for (const group of [state?.cards?.actors, state?.cards?.items, state?.cards?.locations]) {
        if (!group) continue;
        for (const card of Object.values(group)) {
          if (cardKey(card) === key) return card;
        }
      }
      return null;
    }

    function openCardModal(card) {
      if (!card) return;
      const image = cardImage(card) || fallbackCardImage(card);
      $("card-modal-image").src = image;
      $("card-modal-image").alt = card.display_name || "CosyWorld card";
      $("card-modal-name").textContent = card.display_name || "CosyWorld Card";
      $("card-modal-title").textContent = card.title || card.role || "";
      $("card-modal-blurb").textContent = card.blurb || "";
      const meta = [
        card.rarity,
        card.role,
        card.level ? `lv ${card.level}` : "",
        card.source,
        card.owned ? "owned" : "",
        card.accessible === false ? "locked" : "",
      ].filter(Boolean);
      $("card-modal-meta").innerHTML = meta.map((value) => `<span>${escapeHtml(value)}</span>`).join("");
      $("card-modal").hidden = false;
      $("card-modal").querySelector(".card-close")?.focus();
    }

    function closeCardModal() {
      $("card-modal").hidden = true;
      $("card-modal-image").removeAttribute("src");
    }

    function shapeForCard(card, fallback = "item") {
      if (card?.aspect === "wide" || card?.role === "location") return "location";
      if (card?.aspect === "tall" || card?.role === "avatar" || card?.role === "resident" || card?.role === "teacher") return "avatar";
      if (card?.aspect === "square" || card?.role === "item") return "item";
      return fallback;
    }

    function thumbnailHtml(action) {
      const card = action.card || null;
      const shape = action.shape || shapeForCard(card);
      const image = cardImage(card);
