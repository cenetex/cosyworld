    function settingsPanelHtml() {
      const economy = state?.economy || {};
      return `<div class="account-title"><h2 id="account-panel-title">orbs & settings</h2><span class="account-wallet">${escapeHtml(String(economy.orbs || 0))} Orbs</span></div>${accountRow("Orbs", "fund community images only")}${accountRow("Chat", "appears when advancement can begin a friendship")}${accountRow("room voices", "one contextual reply per armed card heartbeat")}${accountRow("AI", economy.openrouter_connected ? "connected" : "world default")}${accountRow("carried deck", `${deckWeightLabel(economy.carried_weight_tenths)} / ${deckWeightLabel(economy.carrying_capacity_tenths)}`)}`;
    }

    function libraryPanelHtml() {
      if (!libraryPanelPinned) return "";
      const packs = Array.isArray(contentPacks?.packs) ? contentPacks.packs.filter((pack) => pack.visible !== false) : [];
      if (!packs.length) {
        return `<section class="account-panel library-panel" aria-labelledby="world-library-title">${menuNavHtml("world")}<div class="library-heading"><h2 id="world-library-title">world library</h2></div><div class="library-intro">The worlds are still gathering. Try again in a moment.</div></section>`;
      }
      const bundle = compactAssetId(contentPacks?.bundle_hash || "");
      const cards = packs.map(libraryPackHtml).join("");
      const bundleDetails = bundle
        ? `<details class="library-technical"><summary>bundle details</summary><code>${escapeHtml(bundle)}</code></details>`
        : "";
      return `<section class="account-panel library-panel" aria-labelledby="world-library-title">${menuNavHtml("world")}<div class="library-heading"><h2 id="world-library-title">world library</h2><small>${escapeHtml(`${packs.length} world packs mounted`)}</small></div><div class="library-intro">See where your story can travel. Open worlds are ready now; locked places name the pass or access they need.</div>${worldChronicleHtml()}<div class="library-grid">${cards}</div>${bundleDetails}</section>`;
    }

    function worldChronicleHtml() {
      const simulation = worldView?.simulation;
      if (!simulation) {
        return `<section class="world-chronicle" aria-label="World chronicle"><div class="world-chronicle-head"><strong>the world beyond</strong><small>listening for distant news…</small></div></section>`;
      }
      const history = Array.isArray(simulation.recent_history) ? simulation.recent_history.slice(0, 8) : [];
      const entries = history.length
        ? history.map((event) => {
            const route = event.destination_location_name
              ? `${event.location_name || "somewhere"} → ${event.destination_location_name}`
              : (event.location_name || "somewhere beyond this room");
            return `<div class="world-chronicle-entry"><span class="world-chronicle-place">${escapeHtml(route)}</span><span class="world-chronicle-copy">${escapeHtml(cleanStatusText(event.content || eventText(event)))}</span></div>`;
          }).join("")
        : `<div class="world-chronicle-entry"><span class="world-chronicle-copy">The wider world is settled. Six committed turns will carry the first distant change.</span></div>`;
      const movingFactions = (simulation.factions || [])
        .filter((faction) => Number(faction.momentum || 0) !== 0)
        .sort((left, right) => Math.abs(Number(right.momentum || 0)) - Math.abs(Number(left.momentum || 0)))
        .slice(0, 4)
        .map((faction) => `${faction.faction_name || faction.faction_id} ${Number(faction.momentum) > 0 ? "+" : ""}${Number(faction.momentum || 0)}`)
        .join(" · ");
      const pulseLabel = Number(simulation.pulse_index || 0)
        ? `history pulse ${simulation.pulse_index} · played tick ${simulation.last_advanced_tick}`
        : `moves every ${simulation.pulse_interval_ticks || 6} committed turns`;
      const factionLine = movingFactions
        ? `<div class="world-faction-current">faction momentum · ${escapeHtml(movingFactions)}</div>`
        : "";
      return `<section class="world-chronicle" aria-label="World chronicle"><div class="world-chronicle-head"><strong>the world beyond</strong><small>${escapeHtml(pulseLabel)}</small></div><div class="world-chronicle-list">${entries}</div>${factionLine}</section>`;
    }

    function libraryPackHtml(pack) {
      const stateName = String(pack.access_state || "included");
      const locations = Array.isArray(pack.locations) ? pack.locations : [];
      const shownLocations = locations.slice(0, 6).map((location) => {
        const open = location.accessible !== false;
        const stateLabel = open ? "open" : (location.required_card_id ? "pass required" : "access required");
        const conceptAttr = open
          ? 'data-player-concept="world-pack"'
          : 'data-player-concept="pass"';
        return `<div class="library-location${open ? " accessible" : ""}" ${conceptAttr}><span>${escapeHtml(location.name || `Location ${location.id}`)}</span><span class="library-location-state">${escapeHtml(stateLabel)}</span></div>`;
      }).join("");
      const remaining = Math.max(0, locations.length - 6);
      const locationList = shownLocations
        ? `<div class="library-locations">${shownLocations}${remaining ? `<div class="library-location"><span>and ${remaining} more</span></div>` : ""}</div>`
        : "";
      const dependencies = Array.isArray(pack.dependencies) && pack.dependencies.length
        ? ` · depends on ${pack.dependencies.map(shortPackName).join(", ")}`
        : "";
      const authority = libraryPackAuthoritySummary(pack);
      const badgeLabel = stateName === "partial" ? "some open" : (stateName === "included" ? "included" : stateName);
      const technical = [
        `${pack.kind || "world pack"} · v${pack.version || "?"} · ${pack.license || "unlicensed"}${dependencies}`,
        authority,
      ].filter(Boolean).join(" · ");
      const technicalDetails = technical
        ? `<details class="library-technical"><summary>technical details</summary><div>${escapeHtml(technical)}</div></details>`
        : "";
      return `<article class="library-pack" data-player-concept="world-pack"><div class="library-pack-top"><div><div class="library-pack-name">${escapeHtml(pack.name || pack.id)}</div><div class="library-pack-meta">${escapeHtml(pack.kind || "world pack")}</div></div><span class="library-access-badge ${escapeAttr(stateName)}">${escapeHtml(badgeLabel)}</span></div><div class="library-pack-copy">${escapeHtml(pack.description || "No description yet.")}</div><div class="library-pack-counts">${escapeHtml(libraryPackCountSummary(pack.resource_counts || {}))}</div><div class="library-pack-access">${escapeHtml(pack.access_summary || "Included with this world.")}</div>${locationList}${technicalDetails}</article>`;
    }

    function libraryPackAuthoritySummary(pack) {
      const authorities = Array.isArray(pack.entitlement_authorities) ? pack.entitlement_authorities : [];
      const labels = authorities.map((authority) => {
        if (authority.type === "solana_collection") return `Solana collection ${compactAssetId(authority.collection_address || "")}`;
        if (authority.type === "signed_set") return `private set signed by ${compactAssetId(authority.public_key || "")}`;
        if (authority.type === "asset_feed") return `${authority.issuer || "trusted"} verified asset feed`;
        return authority.type || "entitlement authority";
      });
      const permanence = pack.distribution?.permanent_uri
        ? `permanent ${compactAssetId(pack.distribution.permanent_uri)}`
        : pack.distribution?.permanence === "content-addressed"
          ? "content-addressed release"
          : "";
      return [...labels, permanence].filter(Boolean).join(" · ");
    }

    function shortPackName(value) {
      return String(value || "")
        .replace(/^cosyworld\./, "")
        .replace(/^campaign\./, "");
    }

    function libraryPackCountSummary(counts) {
      const entries = [
        ["locations", "places"],
        ["actors", "residents"],
        ["items", "items"],
        ["cards", "keepsakes"],
        ["external_cards", "catalog keepsakes"],
        ["character_creation", "character paths"],
        ["rules", "rules references"],
        ["assets", "asset collections"],
      ];
      const visible = entries
        .map(([key, label]) => [Number(counts[key] || 0), label])
        .filter(([count]) => count > 0)
        .map(([count, label]) => `${count} ${label}`);
      return visible.length ? visible.join(" · ") : "metadata-only world pack";
    }

    function pendingConversationHtml() {
      if (!actionBusy || pendingAction?.kind !== "orb-chat") return "";
      const targetId = Number(
        typeof pendingAction.pendingTargetActorId === "function"
          ? pendingAction.pendingTargetActorId()
          : pendingAction.targetActorId
      );
      const target = actorForId(targetId);
      const speaker = target ? actorLabel(target) : (pendingAction.targetName || "A neighbour");
      const aria = `${speaker} is finding the thread. Your conversation is unfolding.`;
      return `<div class="line chat npc pending" role="status" aria-label="${escapeAttr(aria)}">${chatPfpHtml({ actor_id: targetId }, speaker)}<span class="speaker">${escapeHtml(speaker)}</span><span class="text" aria-hidden="true"><span class="chat-thinking-dots"><i></i><i></i><i></i></span>finding the thread…</span></div>`;
    }

    function pendingChatsHtml() {
      if (actionBusy && pendingAction?.kind === "orb-chat") return "";
      return pendingChats.map((chat) => {
        const speaker = chat.targetName || "Someone nearby";
        const aria = `${speaker} is finding the thread. Your next actions are ready while the conversation unfolds.`;
        return `<div class="line chat npc pending" role="status" aria-label="${escapeAttr(aria)}">${chatPfpHtml({ actor_id: chat.targetActorId }, speaker)}<span class="speaker">${escapeHtml(speaker)}</span><span class="text" aria-hidden="true"><span class="chat-thinking-dots"><i></i><i></i><i></i></span>finding the thread…</span></div>`;
      }).join("");
    }

    function pendingAvatarArrivalHtml() {
      if (!actionBusy || pendingAction?.kind !== "avatar-arrival") return "";
      const creationProfile = pendingAction.creationProfile || null;
      const species = (creationProfile?.species || [])
        .find((choice) => choice.id === pendingAction.selectedSpeciesId)?.label;
      const origin = (creationProfile?.origins || [])
        .find((choice) => choice.id === pendingAction.selectedOriginId)?.label;
      const kicker = "the cottage is making room";
      const text = "A name, a face, and an unfinished path are finding their way to the door.";
      const cue = species && origin
        ? `${species}, from ${origin}. What they become will begin with their first choice.`
        : "Someone classless is arriving. What they become will begin with their first choice.";
      const aria = `${kicker}. ${text} ${cue}`;
      return `<div class="room-scene arrival-scene" role="status" aria-label="${escapeAttr(aria)}"><span class="room-scene-kicker">${escapeHtml(kicker)}</span><span class="room-scene-text">${escapeHtml(text)}</span><span class="room-scene-cue">${escapeHtml(cue)}</span></div>`;
    }

    function defeatTransitionHtml() {
      if (!defeatTransition) return "";
      const actor = defeatTransition.actorName || "Your avatar";
      const opponent = defeatTransition.opponentName || "the danger";
      const kicker = "this tale has ended";
      const text = `${actor} was defeated by ${opponent}.`;
      const cue = "This avatar is gone. Any linked account and keepsakes are still here. Choose begin again below when you are ready.";
      const aria = `${kicker}. ${text} ${cue}`;
      return `<div class="room-scene defeat-scene" role="alert" aria-label="${escapeAttr(aria)}"><span class="room-scene-kicker">${escapeHtml(kicker)}</span><span class="room-scene-text">${escapeHtml(text)}</span><span class="room-scene-cue">${escapeHtml(cue)}</span></div>`;
    }

    function quietRoomSceneHtml() {
      const beat = openingBeat(state);
      const hasAvatar = Boolean(actorId && state?.primary_action?.kind !== "create_avatar");
      const kicker = hasAvatar ? "the room is listening" : "a new tale is waiting";
      const cue = hasAvatar
        ? "Choose an action below. Someone here will answer."
        : "Begin with the trouble you can't resist.";
      const aria = `${kicker}. ${beat} ${cue}`;
      return `<div class="room-scene" role="note" aria-label="${escapeAttr(aria)}"><span class="room-scene-kicker">${escapeHtml(kicker)}</span><span class="room-scene-text">${escapeHtml(beat)}</span><span class="room-scene-cue">${escapeHtml(cue)}</span></div>`;
    }

    function eventIsChatTranscriptEvent(event) {
      return event?.type === "message.created"
        || event?.type === "chat.failed"
        || (worldTranscriptEventTypes.has(event?.type) && eventMatchesCurrentLocation(event));
    }

    function transcriptEventHtml(event) {
      return event?.type === "message.created" ? messageHtml(event) : sceneCardEventHtml(event);
    }

    function accountPanelHtml() {
      if (!accountPanelPinned) return "";
      if (menuSection === "deck") {
        return `<section class="account-panel" aria-labelledby="account-panel-title">${menuNavHtml()}${deckPanelHtml()}</section>`;
      }
      if (menuSection === "journal") {
        return `<section class="account-panel" aria-labelledby="account-panel-title">${menuNavHtml()}${journalPanelHtml()}</section>`;
      }
      if (menuSection === "settings") {
        return `<section class="account-panel" aria-labelledby="account-panel-title">${menuNavHtml()}${settingsPanelHtml()}</section>`;
      }
      if (menuSection === "identity") {
        return `<section class="account-panel" aria-labelledby="account-panel-title">${menuNavHtml()}<div class="account-title"><h2 id="account-panel-title">sign in & identity</h2><span class="account-wallet">portable account, optional NFT access</span></div>${identitySectionHtml()}</section>`;
      }
      const account = state?.account || {};
      const wallet = account.wallet_address || state?.access?.owner_wallet_address || "";
      const ownedCards = Array.isArray(account.owned_cards) ? account.owned_cards : [];
      const boxes = Array.isArray(account.active_box_ids) ? account.active_box_ids : [];
      const packs = Array.isArray(account.unopened_pack_ids) ? account.unopened_pack_ids : [];
      const receipts = Array.isArray(account.recent_box_receipts) ? account.recent_box_receipts : [];
      const openings = Array.isArray(account.recent_pack_openings) ? account.recent_pack_openings : [];
      const signed = state?.access?.mode === "signed_wallet_entitlements" && Boolean(walletSession);
      const assets = [];
      const displayedCards = ownedCards
        .slice()
        .sort((left, right) => (
          Number(equippedCardIds.includes(right.card_id)) - Number(equippedCardIds.includes(left.card_id))
          || String(left.display_name || left.card_id).localeCompare(String(right.display_name || right.card_id))
        ));
      for (const card of displayedCards.slice(0, 24)) {
        assets.push(accountOwnedCard(card));
      }
      for (const boxId of boxes.slice(0, 6)) {
        assets.push(accountBoxCard(boxId, openingBoxId === boxId ? "opening" : "closed"));
      }
      for (const packId of packs.slice(0, 6)) {
        assets.push(accountPackCard(packId));
      }
      const inventoryRows = [
        accountRow("favorites", equippedCardIds.length
          ? `${equippedCardIds.map(cardDisplayName).join(", ")} · ${equippedCardIds.length >= keepsakeCapacity
            ? "all three collection favorites pinned"
            : `room for ${smallNumberWord(keepsakeCapacity - equippedCardIds.length)} more`}`
          : "choose a few collection cards to pin"),
        accountRow("cards", ownedCards.length ? `${smallNumberWord(ownedCards.length)} in your collection` : "waiting to be found"),
        accountRow("boxes", boxes.length ? `${smallNumberWord(boxes.length)} waiting to open` : "a wooden box may turn up"),
        accountRow("bundles", packs.length ? `${smallNumberWord(packs.length)} waiting to open` : "an avatar bundle may turn up"),
      ];
      for (const receipt of receipts.slice(0, 3)) {
        inventoryRows.push(accountRow("opened box", "a wooden box became an avatar bundle"));
      }
      for (const opening of openings.slice(0, 3)) {
        const cards = (opening.card_ids || []).map(cardDisplayName).join(", ");
        inventoryRows.push(accountRow("opened bundle", cards || "a few new keepsakes"));
      }
      const actions = [];
      if (signed) {
        if (boxes.length) {
          actions.push(`<button class="account-button secondary" type="button" data-account-open-box="first">open box</button>`);
        }
        if (packs.length) {
          actions.push(`<button class="account-button secondary" type="button" data-account-open-pack="first" data-player-concept="bundle" data-analytics-event="bundle.open">open bundle</button>`);
        }
      }
      const inventory = assets.length
        ? `<div class="account-assets">${assets.join("")}</div>`
        : `<div class="account-empty">your collection is waiting for its first keepsake</div>`;
      const accountActions = actions.length ? `<div class="account-actions">${actions.join("")}</div>` : "";
      const keepsakeNote = ownedCards.length
        ? `<div class="keepsake-note">Keep a few keepsakes close—up to three. This is a menu preference, not your physical carried deck or bracelet.</div>`
        : "";
      const accountName = identity?.authenticated
        ? "CosyWorld account"
        : (signed ? (compactAssetId(wallet) || "linked account") : "local tale");
      return `<section class="account-panel" aria-labelledby="account-panel-title">${menuNavHtml()}<div class="account-title"><h2 id="account-panel-title">collection & account</h2><span class="account-wallet">${escapeHtml(accountName)}</span></div>${characterSheetHtml()}${accountActions}<div class="account-section"><div class="account-section-title">owned collection</div><div class="keepsake-note">Collection ownership is separate from world, carried, equipped, spell-deck, exhausted, and transfer zones. Materializing an eligible item creates one durable shard instance; it does not grant a slot or advancement.</div>${keepsakeNote}${inventory}${inventoryRows.join("")}</div></section>`;
    }

    function identitySectionHtml() {
      if (!identity?.authenticated) {
        return `<section class="account-section" aria-label="CosyWorld sign in"><div class="account-actions"><button class="account-button" type="button" data-passkey-continue>continue with passkey</button></div></section>`;
      }
      const passkeys = Array.isArray(identity.passkeys) ? identity.passkeys : [];
      const wallets = Array.isArray(identity.wallets) ? identity.wallets : [];
      const walletRows = wallets.length
        ? wallets.map((entry) => {
            const wallet = String(entry.wallet_address || "");
            const active = wallet === identity.active_wallet;
            return `<div class="account-wallet-entry${active ? " active" : ""}"><code>${escapeHtml(compactAssetId(wallet))}</code><div class="account-wallet-controls">${active ? `<span class="account-auth-copy">NFT access active</span>` : `<button class="account-button secondary" type="button" data-wallet-select="${escapeAttr(wallet)}">use</button>`}<button class="account-button secondary" type="button" data-wallet-unlink="${escapeAttr(wallet)}">release</button></div></div>`;
          }).join("")
        : `<div class="account-empty">No NFT wallet claimed. Public play still works.</div>`;
      const passkeyCopy = passkeys.length === 1
        ? "1 passkey — add a second for recovery"
        : `${passkeys.length} passkeys`;
      return `<section class="account-section" aria-label="CosyWorld account"><div class="account-section-title">CosyWorld account</div>${accountRow("passkeys", passkeyCopy)}<div class="account-actions"><button class="account-button secondary" type="button" data-passkey-add>add passkey</button><button class="account-button secondary" type="button" data-wallet-link>claim NFT wallet</button><button class="account-button secondary" type="button" data-account-logout>sign out</button></div><div class="account-wallet-list">${walletRows}</div></section>`;
    }

    function characterSheetHtml() {
      const ledger = state?.ledger || {};
      const avatar = actorForId(actorId);
      const avatarCard = cardForActor(actorId);
      const avatarName = String(avatar?.name || avatarCard?.display_name || "your avatar").trim();
      const avatarTitle = String(avatar?.title || avatarCard?.title || "").trim();
      const avatarBlurb = String(avatarCard?.blurb || avatar?.description || "").trim();
      const avatarImage = cardImage(avatarCard);
      const portrait = avatarImage
        ? `<button class="account-portrait" type="button"${cardDataAttr(avatarCard)} aria-label="Open ${escapeAttr(avatarName)} keepsake" data-player-concept="keepsake" data-analytics-event="keepsake.open"><img src="${escapeAttr(avatarImage)}" alt="" /></button>`
        : "";
      const identity = `<div class="account-identity${portrait ? "" : " no-portrait"}">${portrait}<div class="account-identity-copy"><span class="account-identity-name">${escapeHtml(avatarName)}</span>${avatarTitle ? `<span class="account-identity-title">${escapeHtml(avatarTitle)}</span>` : ""}${avatarBlurb ? `<span class="account-identity-blurb">${escapeHtml(avatarBlurb)}</span>` : ""}</div></div>`;
      const purpose = String(state?.calling?.statement || "").trim() || "still choosing what trouble to get into";
      const memoriesReady = Number(ledger.unbanked_count || 0);
      const growthReady = Number(ledger.advancement_points || 0);
      const growthSummary = [
        memoriesReady ? "something you noticed is ready to keep" : "",
        growthReady ? "you can strengthen a friendship or open bracelet space" : "",
      ].filter(Boolean).join(" · ") || "your first little moment is waiting";
      const composedIdentity = state?.character_identity || null;
      const identityCards = composedIdentity
        ? [
            composedIdentity.species_label,
            composedIdentity.origin_label,
            composedIdentity.class_label
              || (composedIdentity.class_selection_ready ? "Class ready to choose" : "Class veiled"),
          ].filter(Boolean).join(" · ")
        : "";
      const level = Number(composedIdentity?.level ?? avatar?.stats?.level ?? 1);
      const rows = [
        accountRow("level", composedIdentity && !composedIdentity.class_id
          ? `${level} · classless`
          : String(level)),
        ...(identityCards ? [accountRow("identity cards", identityCards)] : []),
        accountRow("purpose", purpose),
        accountRow("journal", growthSummary),
      ];
      const equippedCharms = Array.isArray(state?.deck?.equipped_charms) ? state.deck.equipped_charms : [];
      rows.push(accountRow("worn skill charms", equippedCharms.length ? equippedCharms.map((charm) => {
        const skill = abilityLabel(charm.skill_id, charm.skill_id || "skill");
        const bonus = Math.max(0, Number(charm.skill_bonus || 0));
        return `${charm.name} — ${skill}${bonus ? ` +${bonus}` : ""}`;
      }).join(", ") : "find a skill charm, then wear it from Deck"));
      const bonds = Array.isArray(state?.bonds) ? state.bonds : [];
      rows.push(accountRow("friends", bonds.length ? bonds.map((bond) => {
        const name = String(bond.target_actor_name || "someone").trim();
        const statement = String(bond.statement || "").trim();
        const closeness = Number(bond.strength || 0) >= 3 ? "close friend" : (Number(bond.strength || 0) >= 2 ? "getting closer" : "new friend");
        return `${name} — ${statement || closeness}${statement ? ` (${closeness})` : ""}`;
      }).join(" · ") : "someone new is waiting to meet you"));
      const marks = Array.isArray(ledger.unbanked_marks) ? ledger.unbanked_marks : [];
      const markList = marks.length
        ? `<div class="account-list">${marks.slice(0, 4).map((mark) => `<div class="account-list-item">${escapeHtml(mark.label || mark.category || "A remembered moment")}</div>`).join("")}</div>`
        : "";
      return `${identity}<div class="account-section">${rows.join("")}${markList}</div>`;
    }

    function accountBoxCard(boxId, stateName) {
      const title = "Intricately Carved Wooden Box";
      const subtitle = stateName === "opening" ? "opening" : "open box";
      return `<div class="account-asset"><img src="${escapeAttr(boxImageUrl(boxId, stateName))}" alt="${escapeAttr(`${title} ${stateName}`)}" data-card-key="box:${escapeAttr(boxId)}" /><div class="account-asset-title">${emojiHtml("🧰")}${escapeHtml(title)}</div><div class="account-asset-subtitle">${escapeHtml(compactAssetId(boxId))}</div><button class="account-button secondary" type="button" data-account-open-box="${escapeAttr(boxId)}"${stateName === "opening" ? " disabled" : ""}>${escapeHtml(subtitle)}</button></div>`;
    }

    function accountPackCard(packId) {
      const image = fallbackCardImage(accountCard("Avatar Bundle"));
      return `<div class="account-asset" data-player-concept="bundle"><img src="${escapeAttr(image)}" alt="Avatar Bundle" data-card-key="pack:${escapeAttr(packId)}" /><div class="account-asset-title">${emojiHtml("🎴")}Avatar Bundle</div><div class="account-asset-subtitle">${escapeHtml(compactAssetId(packId))}</div><button class="account-button secondary" type="button" data-account-open-pack="${escapeAttr(packId)}" data-analytics-event="bundle.open">open bundle</button></div>`;
    }

    function accountOwnedCard(card) {
      const image = cardImage(card) || fallbackCardImage(card);
      const shape = shapeForCard(card);
      const equipped = equippedCardIds.includes(card.card_id);
      const full = equippedCardIds.length >= keepsakeCapacity;
      const rarity = friendlyCardRarity(card.rarity);
      const buttonLabel = equipped ? "put away" : "keep close";
      const cardName = card.display_name || card.card_id || "Owned keepsake";
      const cardNameHtml = `${emojiHtml(cardEmoji(card, shape))}${escapeHtml(cardName)}`;
      const itemCard = ["item", "weapon", "spell", "container", "skill charm", "skill_charm", "tool", "consumable", "relic"]
        .some((role) => String(card.role || "").toLowerCase().includes(role));
      const receipt = (state?.account?.materialization_receipts || []).find((entry) => entry.card_id === card.card_id);
      const materialized = receipt?.status === "materialized";
      const materializeButton = itemCard && actorId
        ? materialized
          ? `<button class="account-button secondary" type="button" data-unmaterialize-receipt="${escapeAttr(receipt.id)}">return from carried deck</button>`
          : `<button class="account-button secondary" type="button" data-materialize-card="${escapeAttr(card.card_id || "")}">materialize to carried deck</button>`
        : "";
      const zoneCopy = itemCard ? `<div class="account-asset-effect"><span>authoritative zone</span>${materialized ? "carried in this shard" : "collection"}</div>` : "";
      return `<div class="account-asset owned-card ${escapeAttr(shape)}${equipped ? " kept-close" : ""}" data-player-concept="keepsake"><button class="account-card-open" type="button"${cardDataAttr(card)} aria-label="Open ${escapeAttr(cardName)} keepsake details" data-analytics-event="keepsake.open"><img src="${escapeAttr(image)}" alt="" /></button><div class="account-asset-title">${cardNameHtml}</div><div class="account-asset-subtitle">${escapeHtml(rarity)} · ${escapeHtml(card.title || card.role || "keepsake")}</div>${zoneCopy}<div class="account-asset-effect"><span>when kept close</span>${escapeHtml(keepsakePromise(card))}</div><button class="account-button secondary" type="button" data-account-toggle-keepsake="${escapeAttr(card.card_id || "")}" data-analytics-event="keepsake.toggle"${!equipped && full ? " disabled" : ""}>${buttonLabel}</button>${materializeButton}</div>`;
    }

    function materializationReceiptId(cardId) {
      const left = handHash(cardId, Number(actorId || 0)).toString(16).padStart(8, "0");
      const right = handHash([...String(cardId)].reverse().join(""), Number(actorId || 0) ^ 0x9e3779b9).toString(16).padStart(8, "0");
      return `web:${actorId}:${left}${right}`;
    }

    function boxImageUrl(boxId, stateName = "closed") {
      return `/assets/generated/boxes/${encodeURIComponent(stateName)}/${encodeURIComponent(boxId)}.svg`;
    }

    function accountRow(key, value) {
      const empty = [
        "waiting to be found",
        "a wooden box may turn up",
        "an avatar bundle may turn up",
        "your first little moment is waiting",
        "found skill charms will appear here",
        "someone new is waiting to meet you",
      ].includes(value);
      return `<div class="account-row"><span class="account-key">${escapeHtml(key)}</span><span class="account-value${empty ? " account-empty" : ""}">${escapeHtml(value)}</span></div>`;
    }

    function cardDisplayName(cardId) {
      for (const group of [state?.cards?.actors, state?.cards?.items, state?.cards?.locations, state?.account?.owned_cards]) {
        if (!group) continue;
        for (const card of Array.isArray(group) ? group : Object.values(group)) {
          if (card?.card_id === cardId) return card.display_name || cardId;
        }
      }
      return cardId;
    }

    function hasAccountPanelContent() {
      const account = state?.account || {};
      const ledger = state?.ledger || {};
      return Boolean(
        account.wallet_address
          || (account.owned_cards || []).length
          || (account.active_box_ids || []).length
          || (account.unopened_pack_ids || []).length
          || (account.recent_box_receipts || []).length
          || (account.recent_pack_openings || []).length
          || state?.calling
          || (state?.skills || []).length
          || (state?.bonds || []).length
          || Number(ledger.unbanked_count || 0) > 0
          || Number(ledger.banked_count || 0) > 0
      );
    }

    const DEWBRIGHT_BUTTON_ITEM_ID = 2002;
    const RAIN_SOFT_GARDEN_LOCATION_ID = 2;

    function looseItemAtLocation(view, itemId, locationId) {
      return (view?.items || []).some((item) => (
        Number(item?.id || 0) === Number(itemId || 0)
        && Number(item?.location_id || 0) === Number(locationId || 0)
        && Number(item?.holder_actor_id || 0) === 0
      ));
    }

    function gardenHasDewbright(view = state) {
      return looseItemAtLocation(view, DEWBRIGHT_BUTTON_ITEM_ID, RAIN_SOFT_GARDEN_LOCATION_ID);
    }

    function gardenOpeningBeat(view = state) {
      if (gardenHasDewbright(view)) {
        return "Rain beads on the garden leaves. A small pearled button catches the light.";
      }
      return "Rain beads on the garden leaves. The grass shows where something pearled was lifted away.";
    }

    function gardenCopy(view = state) {
      if (gardenHasDewbright(view)) {
        return "Rain beads on broad leaves. Something small and pearled waits in the grass.";
      }
      return "Rain beads on broad leaves. A round patch in the grass shows where the pearled button was found.";
    }

    function localWorldConditionBeat(view) {
      const simulation = view?.location?.simulation;
      if (!simulation || Number(simulation.last_pulse_tick || 0) <= 0) return "";
      const pieces = [];
      const weather = String(simulation.weather || "").trim();
      if (weather && weather !== "settled") {
        pieces.push(`Beyond the nearest shelter, ${weather} holds.`);
      }
      const conflict = Number(simulation.conflict_pressure || 0);
      const tradePressure = Number(simulation.trade_pressure || 0);
      if (conflict >= 3) pieces.push("Old arguments here are close to becoming open trouble.");
      else if (conflict > 0) pieces.push("A little unease travels between the usual voices.");
      if (tradePressure >= 4) pieces.push("Shelves and supply baskets are running thin.");
      else if (tradePressure >= 2) pieces.push("The routes that supply this place feel strained.");
      else {
        const imports = Object.entries(simulation.imports || {})
          .filter(([, amount]) => Number(amount || 0) > 0)
          .sort((left, right) => Number(right[1] || 0) - Number(left[1] || 0));
        if (imports.length) pieces.push(`${imports[0][0]} from elsewhere has begun to appear here.`);
      }
      const faction = (simulation.faction_influence || [])
        .filter((entry) => Number(entry.influence || 0) > 0)
        .sort((left, right) => Number(right.influence || 0) - Number(left.influence || 0))[0];
      if (faction) pieces.push(`Signs of ${faction.faction_name || faction.faction_id} have appeared nearby.`);
      return pieces.slice(0, 2).join(" ");
    }

    function openingBeat(view) {
      const locationId = view?.location?.id;
      let beat = "";
      if (locationId === 1) {
        const names = new Set((view.actors || []).map((actor) => actor.name));
        const pieces = ["Firelight warms The Cosy Cottage; rain taps the windows and the low doorway waits."];
        if (names.has("Rati")) pieces.push("Rati knits a blue scarf near the hearth.");
        else pieces.push("Rati's blue scarf basket marks the chair where she often sits.");
        if (names.has("Gust")) pieces.push("Gust heckles the weather in bright little symbols.");
        if (names.has("Skull")) pieces.push("Skull watches the door like it owes him money.");
        beat = pieces.join(" ");
      } else if (locationId === 2) beat = gardenOpeningBeat(view);
      else if (locationId === 3) beat = "Moonlight silvers the trail. The air here is sharper, and choices carry farther.";
      else if (locationId === 10) beat = "Science Class hums with shared observations, bright benches, and questions waiting to be tested.";
      else if (locationId === 11) beat = "Homeroom waits with front-door morning light and the sense that every question gets a seat.";
      else if (locationId === 12) beat = "Library quiet gathers around the shelves; if it matters, someone wrote it down.";
      else if (locationId === 13) beat = "Cafeteria tables hold the soft thunder of commons diplomacy.";
      else if (locationId === 14) beat = "Greenhouse glass glows with patient leaves and experiments that grow slowly.";
      else if (locationId === 15) beat = "Courtyard paths cross under open sky; every hallway seems to lead back here.";
      else beat = copyForLocation(locationId, view);
      return [beat, localWorldConditionBeat(view)].filter(Boolean).join(" ");
    }

    function timelineEventHtml(event) {
      if (event.type === "message.created") return messageHtml(event);
      if (isRollEvent(event)) return rollHtml(event);
      return sceneCardEventHtml(event);
    }

    function sceneCardEventHtml(event) {
      const meta = statusUpdateMeta(event);
      const text = sceneCardEventText(event);
      if (!text) return "";
      const exposureId = worldBeatExposureId(event);
      const exposureAttrs = exposureId
        ? ` data-world-beat-exposure="${escapeAttr(exposureId)}" data-world-beat-seq="${Number(event.seq)}"`
        : "";
      return `<div class="line event scene-card ${escapeAttr(meta.kind)}" data-event-row${exposureAttrs} aria-label="${escapeAttr(`Story beat. ${text}`)}"><span class="event-label" aria-hidden="true">✦</span><span class="text">${escapeHtml(text)}</span></div>`;
    }

    function sceneCardEventText(event) {
      const actor = String(event?.actor_name || "Someone").trim() || "Someone";
      const type = String(event?.type || "");
      if (type === "actor.created") {
        const title = actorTitleForEvent(event);
        return `${event.location_name || "The room"} makes room for ${actor}${title ? `, ${title}` : ""}.`;
      }
      if (type === "actor.moved") {
        return `The way opens, and ${actor} steps into ${event.destination_location_name || "somewhere new"}.`;
      }
      if (type === "chat.failed") {
        return "The conversation slipped away before it could begin. Your Orb came back.";
      }
      if (type === "world.weather.shifted") {
        return finishSentence(cleanStatusText(event.content || "The weather changes its mind"));
      }
      if (type === "world.weather.held") {
        return finishSentence(cleanStatusText(event.content || "The weather settles in and stays"));
      }
      if (type === "world.trade.flowed") {
        return finishSentence(cleanStatusText(event.content || "Something useful finds its way along the road"));
      }
      if (type === "world.trade.disrupted") {
        return finishSentence(cleanStatusText(event.content || "Something useful cannot find its way along the road"));
      }
      if (type === "world.faction.influence_shifted") {
        return finishSentence(cleanStatusText(event.content || "A familiar presence carries farther today"));
      }
      if (type === "world.conflict.pressure_grew") {
        return finishSentence(cleanStatusText(event.content || "An unanswered strain draws the air taut"));
      }
      if (type === "world.conflict.pressure_eased") {
        return finishSentence(cleanStatusText(event.content || "Whatever pressed here loosens, for now"));
      }
      if (type === "world.conflict.escalated") {
        return finishSentence(cleanStatusText(event.content || "Old strains meet, and the air hardens"));
      }
      if (type.startsWith("journey.") || type === "pathway.discovered" || type === "pathway.familiarized") {
        return finishSentence(cleanStatusText(event.content || "The path changes beneath careful feet"));
      }
      if (type === "feature.searched" || type === "location.searched") {
        return searchStoryBeat(event, event.narrative_outcome);
      }
      if (type === "exit.discovered") {
        return `A path to ${event.destination_location_name || "somewhere new"} reveals itself beneath ${possessive(actor)} careful look.`;
      }
      if (type === "avatar.discovered") {
        return `${event.target_actor_name || "Someone new"} steps into view, just as ${actor} looks up.`;
      }
      if (type === "item.found") {
        return `${event.item_name || "Something small"} turns up where ${event.location_name || "the room"} had been keeping it.`;
      }
      if (type === "item.picked_up") {
        return `${actor} tucks ${event.item_name || "the little find"} safely away.`;
      }
      if (type === "item.dropped") {
        return `${actor} leaves ${event.item_name || "the keepsake"} where the room can find it again.`;
      }
      if (type === "item.used") {
        const target = event.target_actor_name || "";
        const steadier = Number(event.damage || 0) < 0 && target ? ` ${target} looks steadier for it.` : "";
        return `${event.item_name || "The keepsake"} finds its moment in ${possessive(actor)} hands.${steadier}`;
      }
      if (type === "item.given") {
        const returned = event.target_item_name
          ? ` ${event.target_actor_name || "Their friend"} sends ${event.target_item_name} back in return.`
          : "";
        return `${event.item_name || "A keepsake"} passes from ${actor} to ${event.target_actor_name || "a friend"}.${returned}`;
      }
      if (type === "item.traded") {
        return `${actor} and ${event.target_actor_name || "a friend"} swap ${event.item_name || "one keepsake"} for ${event.target_item_name || "another"}; both leave with something meant for them.`;
      }
      if (type === "skill.stepped") {
        const skill = abilityLabel(String(event.content || "").split(":")[0], "an ability");
        return `${actor} practices ${skill}. Its checks now come a little more easily.`;
      }
      if (type === "clock.updated") {
        return `The shared work shifts beneath ${possessive(actor)} hands; ${withoutFinalPeriod(eventText(event))}.`;
      }
      if (type === "job.updated") {
        return `Under ${possessive(actor)} hands, ${withoutFinalPeriod(jobEventLabel(event))}.`;
      }
      if (type === "ledger.banked") {
        return `${actor} carries this visit forward; the next choice feels a little different.`;
      }
      if (type === "calling.revised") {
        return `${actor} finds a truer answer to what draws them in: ${withoutFinalPeriod(callingEventLabel(event))}.`;
      }
      if (type === "bond.created") {
        return `Somewhere between ${actor} and ${event.target_actor_name || "someone new"}, a friendship begins.`;
      }
      if (type === "bond.revised") {
        return `What ${event.target_actor_name || "their friend"} means to ${actor} shifts, quietly but for good.`;
      }
      if (type === "bond.resolved") {
        return `What mattered between ${actor} and ${event.target_actor_name || "their friend"} stays with them.`;
      }
      if (type === "combat.defend") {
        return `${actor} plants their feet and waits for the opening.`;
      }
      if (type === "combat.knockout") {
        return `The clash goes quiet around ${event.target_actor_name || "their opponent"}; their light can rest for now.`;
      }
      if (type === "combat.flee.success") {
        return `${actor} finds the path to ${event.destination_location_name || "safety"} and takes it, carrying the trail's silver hush.`;
      }
      if (type === "tag.applied" && event.tag_label === "prepared") {
        return `${actor} takes one quiet moment to get ready.`;
      }
      if (type === "tag.cleared" && event.tag_label === "tired") {
        return `A little rest returns the light to ${possessive(actor)} step.`;
      }
      const text = cleanStatusText(eventText(event));
      if (!text) return "";
      if (text.toLowerCase().startsWith(actor.toLowerCase())) return finishSentence(text);
      return finishSentence(`${actor} ${text}`);
    }

    function searchStoryBeat(event, outcome) {
      const actor = String(event?.actor_name || "Someone").trim() || "Someone";
      let opening = "";
      if (event.type === "location.searched") {
        opening = `${actor} lets their attention wander through ${event.location_name || "the room"}.`;
      } else {
        const parts = String(event.content || "").split(":");
        const feature = String(parts.shift() || "one quiet corner").trim();
        if (parts.length > 1) parts.pop();
        const observation = cleanStatusText(parts.join(":").trim());
        opening = `${actor} lingers over ${feature}.${observation ? ` ${finishSentence(observation)}` : ""}`;
      }
      const discovery = discoveryStoryBeat(outcome);
      return `${opening}${discovery ? ` ${discovery}` : ""}`.trim();
    }

    function discoveryStoryBeat(event) {
      if (!event) return "";
      if (event.type === "item.found") {
        return `There it is: ${event.item_name || "something small"}, tucked where the room had kept it.`;
      }
      if (event.type === "exit.discovered") {
        return `A path to ${event.destination_location_name || "somewhere new"} reveals itself.`;
      }
      if (event.type === "avatar.discovered") {
        return `${event.target_actor_name || "Someone new"} steps into view.`;
      }
      return "";
    }

    function messageHtml(event) {
      const speaker = event.actor_name || "CosyWorld";
      const body = eventText(event);
      const kind = event.actor_id === actorId ? "you" : event.actor_id ? "npc" : "world";
      const repeat = Math.max(1, Number(event.repeat_count || 1));
      const baseAriaLabel = eventAriaLabel(event, speaker, body);
      const label = repeat > 1
        ? `${baseAriaLabel || `${speaker}: ${body}`} Repeated ${repeat} times.`
        : baseAriaLabel;
      const attrs = label ? ` aria-label="${escapeAttr(label)}"` : "";
      const repeatHtml = repeat > 1
        ? `<span class="chat-repeat" aria-label="Repeated ${repeat} times">×${repeat}</span>`
        : "";
      return `<div class="line chat ${kind}"${attrs}>${chatPfpHtml(event, speaker)}<span class="speaker">${escapeHtml(speaker)}</span><span class="text">${escapeHtml(body)}${repeatHtml}</span></div>`;
    }

    function chatPfpHtml(event, speaker) {
      const card = event.actor_id ? cardForActor(event.actor_id) : null;
      const fallback = card || {
        display_name: speaker || "CosyWorld avatar",
        role: "avatar",
        aspect: "tall",
      };
      const image = event.actor_id ? (cardImage(card) || fallbackCardImage(fallback)) : "";
      const label = initials(speaker || card?.display_name || "CosyWorld");
      const dataAttr = card ? cardDataAttr(card) : "";
      const style = backgroundImageStyle(image);
      return `<span class="chat-pfp"${dataAttr}${style} aria-hidden="true">${image ? "" : escapeHtml(label)}</span>`;
    }

    function statusEventHtml(event) {
      const meta = statusUpdateMeta(event);
      if (!meta.text) return "";
      const label = String(meta.label || "event").trim() || "event";
      const text = cleanStatusText(meta.text);
      const aria = `${label}: ${text}`;
      return `<div class="line event ${escapeAttr(meta.kind)}" data-event-row aria-label="${escapeAttr(aria)}"><span class="event-label">${escapeHtml(label)}</span><span class="text">${escapeHtml(text)}</span></div>`;
    }

    function isRollEvent(event) {
      return event.type === "ability_check.rolled" || event.type === "combat.attack.attempt";
    }

    function rollHtml(event) {
      const meta = rollMeta(event);
      const outcome = event.success ? "success" : "failure";
      const detail = meta.detail ? `<span class="roll-detail">${escapeHtml(meta.detail)}</span>` : "";
      const aria = `${meta.title}. ${meta.detail} ${meta.result}.`;
      return `<div class="roll-line" aria-label="${escapeAttr(aria)}"><span class="roll-label" aria-hidden="true">✦</span><div class="roll-card ${outcome}"><span class="roll-symbol" aria-hidden="true">${escapeHtml(meta.symbol)}</span><span class="roll-copy"><span class="roll-title">${escapeHtml(meta.title)}</span>${detail}</span><span class="roll-result">${escapeHtml(meta.result)}</span></div></div>`;
    }

    function rollMeta(event) {
      const success = event.success === true;
      if (event.type === "combat.attack.attempt") {
        const actor = event.actor_name || "Someone";
        const target = event.target_actor_name || "their opponent";
        return success
          ? {
              label: "clash",
              symbol: "✦",
              title: `${actor} finds an opening`,
              detail: `${target} is caught off guard.`,
              result: "it lands",
              story: `${actor} finds an opening against ${target}.`,
            }
          : {
              label: "clash",
              symbol: "·",
              title: `${target} slips clear`,
              detail: `${actor}'s swing meets empty air.`,
              result: "not this time",
              story: `${target} slips clear of ${actor}.`,
            };
      }
      const hint = listenHintForLocation(event.location_id, success);
      const actor = event.actor_name || "Someone";
      return success
        ? {
            label: "listen",
            symbol: "✦",
            title: `${actor} listens; the room answers`,
            detail: hint,
            result: "a clue appears",
            story: `The room answers a careful listen: ${hint}`,
          }
        : {
            label: "listen",
            symbol: "~",
            title: `${actor} listens; the room stays shy`,
            detail: hint,
            result: "try another way",
            story: `A careful listen leaves the room's secret tucked away.`,
          };
    }

    function eventAriaLabel(event, speaker, body) {
      if (event.type === "message.created" && event.actor_id === 1002) {
        return `${speaker} speaks in emoji-only weather symbols: ${emojiWords(body)}`;
      }
      return "";
    }

    function emojiWords(value) {
      const names = {
        "🌧️": "rain cloud",
        "🌧": "rain cloud",
        "🫖": "teapot",
        "✨": "sparkles",
        "🧶": "yarn",
        "☁️": "cloud",
        "☁": "cloud",
        "🫧": "bubbles",
        "🌙": "moon",
        "🪡": "needle",
        "🧵": "thread",
        "🚪": "door",
        "👋": "wave",
        "👂": "listening ear",
        "🔎": "magnifying glass",
        "👉": "pointing",
        "🎁": "gift",
        "🏡": "home",
        "🌱": "sprout",
        "💛": "yellow heart",
        "🔁": "try again",
        "💪": "strong arm",
        "🤝": "handshake",
        "🧰": "toolbox",
        "🌤️": "sun behind cloud",
        "🌤": "sun behind cloud",
        "😴": "sleeping face",
        "🛡️": "shield",
        "🛡": "shield",
        "⚡": "lightning",
        "👀": "watching eyes",
        "👍": "thumbs up",
        "💥": "burst",
        "❄️": "snowflake",
        "❄": "snowflake",
        "🌿": "leaf",
      };
      const parts = [];
      const seen = new Set();
      for (const [emoji, label] of Object.entries(names)) {
        if (value.includes(emoji) && !seen.has(label)) {
          seen.add(label);
          parts.push(label);
        }
      }
      return parts.length ? parts.join(", ") : "symbols";
    }

    function eventText(event) {
      if (event.type === "command.output") return event.content || "";
      if (event.type === "message.created") return event.content || "";
      if (event.type === "feature.searched" || event.type === "location.searched") return searchEventText(event);
      if (event.type === "exit.discovered") {
        return event.content || `discovers a way to ${event.destination_location_name || "somewhere new"}.`;
      }
      if (event.type === "world.reset") return "the world returns to its first page.";
      if (event.type === "actor.created") return `${event.actor_name || "Someone"} enters ${event.location_name}.`;
      if (event.type === "actor.entered_location") return `arrives in ${event.location_name}.`;
      if (event.type === "actor.moved") {
        const reason = String(event.content || "").trim();
        const base = `moves from ${event.location_name} to ${event.destination_location_name}.`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "move.blocked") return `cannot reach ${event.destination_location_name}.`;
      if (event.type === "item.picked_up") {
        const reason = String(event.content || "").trim();
        const base = `takes ${event.item_name}.`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "item.found") {
        return `${event.actor_name || "Someone"} finds ${event.item_name || "something small"}.`;
      }
      if (event.type === "item.dropped") {
        const reason = String(event.content || "").trim();
        const base = `drops ${event.item_name}.`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "item.used") {
        const target = event.target_actor_name ? ` on ${event.target_actor_name}` : "";
        const recovery = event.damage < 0
          ? ` ${event.target_actor_name || "Someone"} looks steadier.`
          : "";
        const reason = String(event.content || "").trim();
        const base = `uses ${event.item_name}${target}.${recovery}`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "item.given") {
        const returned = event.target_item_name
          ? ` ${event.target_actor_name} hands ${event.target_item_name} back to make room.`
          : "";
        return `gives ${event.item_name} to ${event.target_actor_name}.${returned}`;
      }
      if (event.type === "item.traded") {
        const reason = String(event.content || "").trim();
        const base = `trades ${event.item_name} with ${event.target_actor_name} for ${event.target_item_name}.`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "avatar.evolved") return `${event.target_actor_name || "Someone"} finds a new shape.`;
      if (event.type === "branch.opened") return `opens a choice with ${event.target_actor_name}.`;
      if (event.type === "branch.resolved") return `finishes a choice with ${event.target_actor_name}.`;
      if (event.type === "branch.expired") return `lets a choice with ${event.target_actor_name} fade.`;
      if (event.type === "hand.shuffled") return "draws a new hand.";
      if (event.type === "ability_check.rolled") return listenEventText(event);
      if (event.type === "clock.updated") {
        const label = event.clock_label || "something in the room";
        const filled = Number.isFinite(Number(event.clock_filled)) ? Number(event.clock_filled) : 0;
        const segments = Number.isFinite(Number(event.clock_segments)) ? Number(event.clock_segments) : 0;
        const delta = Number(event.clock_delta || 0);
        if (segments > 0 && filled >= segments) return `${label} comes due.`;
        if (delta < 0) return `${label} eases back.`;
        return `${label} draws closer.`;
      }
      if (event.type === "tag.applied") return `is now ${event.tag_label || "changed"}.`;
      if (event.type === "tag.cleared") return `shakes off ${event.tag_label || "what was lingering"}.`;
      if (event.type === "calling.set") return `chooses what draws them in: ${withoutFinalPeriod(callingEventLabel(event))}.`;
      if (event.type === "calling.revised") return `finds a new purpose: ${withoutFinalPeriod(callingEventLabel(event))}.`;
      if (event.type === "ledger.marked") return `keeps a memory: ${ledgerEventLabel(event)}.`;
      if (event.type === "ledger.banked") return `${ledgerBankedEventLabel(event)}.`;
      if (event.type === "advancement.spent") {
        return String(event.content || "").startsWith("charm_slot:")
          ? "uses what they learned to open bracelet space."
          : "puts what they learned into practice.";
      }
      if (event.type === "charm_slot.unlocked") return "opens room for another found skill charm.";
      if (event.type === "skill_charm.equipped") return `wears ${event.item_name || "a skill charm"}.`;
      if (event.type === "skill_charm.unequipped") return `removes ${event.item_name || "a skill charm"}.`;
      if (event.type === "skill.stepped") return `${skillEventLabel(event)}.`;
      if (event.type === "bond.deepened") return `grows closer to ${event.target_actor_name || "someone"}.`;
      if (event.type === "bond.created") return `became friends with ${event.target_actor_name || "someone"}.`;
      if (event.type === "bond.revised") return `sees ${event.target_actor_name || "someone"} a little differently.`;
      if (event.type === "bond.resolved") return `keeps what mattered with ${event.target_actor_name || "someone"}.`;
      if (event.type === "job.updated") return `${jobEventLabel(event)}.`;
      if (event.type === "combat.defend") return `raises a careful guard.`;
      if (event.type === "combat.attack.attempt") return rollMeta(event).story;
      if (event.type === "combat.attack.hit") return `breaks through ${event.target_actor_name}'s guard.`;
      if (event.type === "combat.attack.miss") return `${event.target_actor_name} turns the strike aside.`;
      if (event.type === "combat.knockout") return `${event.target_actor_name}'s light falls quiet for now.`;
      if (event.type === "combat.flee.success") return `flees to ${event.destination_location_name}, carrying the trail's silver hush.`;
      if (event.type === "encounter.reset") return `${event.target_actor_name || "The frontier"} stirs again in ${event.location_name || "the frontier"}.`;
      if (event.type === "rule.rejected") return `hesitates.`;
      return event.type;
    }

    function searchEventText(event) {
      if (event.type === "location.searched") {
        const actor = event.actor_name || "Someone";
        return `${actor} looks closely around ${event.location_name || "the room"}.`;
      }
      const parts = String(event.content || "").split(":");
      const feature = parts.shift() || "a room feature";
      const reason = parts.length > 1 ? parts.pop() : "";
      const observation = parts.join(":").trim();
      const actor = event.actor_name || "Someone";
      if (observation) return `${actor} searches ${feature}: ${observation}`;
      return `${actor} searches ${feature}${reason ? `: ${reason}` : ""}`;
    }

    function callingEventLabel(event) {
      const content = String(event.content || "").trim();
      const reasonIndex = content.lastIndexOf(":");
      return reasonIndex > 0 ? content.slice(0, reasonIndex) : content || "a small truth";
    }

    function ledgerEventLabel(event) {
      const parts = String(event.content || "").split(":");
      return parts[1] || parts[0] || "a moment from this visit";
    }

    function ledgerBankedEventLabel(event) {
      return "lets what happened shape what comes next";
    }

    function advancementEventLabel(event) {
      return "what you learned finds a place";
    }

    function skillEventLabel(event) {
      const parts = String(event.content || "").split(":");
      const skill = parts[0] || "a skill";
      const rank = Math.max(0, Number(parts[1]) || 0);
      if (rank >= 3) return `${skill} feels second nature`;
      if (rank === 2) return `${skill} grows stronger`;
      return `${skill} grows a little stronger`;
    }

    function jobEventLabel(event) {
      const parts = String(event.content || "").split(":");
      const status = parts[1] || "changed";
      if (status === "complete" || status === "completed") return "the work is done";
      if (status === "active") return "the work begins";
      if (status === "failed") return "the work falls quiet for now";
      return "the work changes";
    }

    function listenEventText(event) {
      const hint = listenHintForLocation(event.location_id, event.success);
      return `listens: ${hint}`;
    }

    function listenHintForLocation(id, success) {
      if (!success) {
        if (id === 3) return "the trail goes quiet, but something out there heard you first.";
        return "the room keeps its secret for now.";
      }
      if (id === 1) {
        return "A round hollow beneath Rati's blue scarf is waiting for its wooden button.";
      }
      if (id === 2) {
        if (gardenHasDewbright(state)) {
          return "A pearled button gleams beneath one rain-heavy leaf.";
        }
        if (looseItemAtLocation(state, 2007, 2)) {
          return "A mute little bell rests where two broad leaves touch.";
        }
        return "Two broad leaves tap a path back toward the cottage.";
      }
      if (id === 3) {
        if (looseItemAtLocation(state, 2003, 3)) {
          return "A small iron pawprint glints at the edge of the practice circle.";
        }
        if (looseItemAtLocation(state, 2006, 3)) {
          return "A warm stone tag rests beside the silver milepost.";
        }
        return "Fresh pawprints leave the practice circle toward the garden.";
      }
      if (id === 10) {
        if (looseItemAtLocation(state, 2004, 10)) {
          return "A strand of Moonwool Thread is snagged beneath the lab bench.";
        }
        return "A folded note beneath the lab bench asks for one careful second look.";
      }
      if (id === 11) return "One empty desk has a folded note tucked beneath its corner.";
      if (id === 12) return "One returned book has left a sentence on the checkout desk.";
      if (id === 13) return "One untouched tray has a tiny trade note tucked beneath it.";
      if (id === 14) return "One curled leaf is waiting to be turned over.";
      if (id === 15) return "One chalk arrow points toward the quietest path.";
      if (freeLocationCopy(id)) return `${freeLocationCopy(id)} A route back to the cottage stays warm.`;
      return "One soft hum points toward the nearest open path.";
    }

    function cardForActor(id) {
      return state?.cards?.actors?.[String(id)] || null;
    }

    function cardForItem(id) {
      return state?.cards?.items?.[String(id)] || null;
    }

    function cardForLocation(id) {
      return state?.cards?.locations?.[String(id)] || null;
    }

    function itemForId(id) {
      return (state?.items || []).find((item) => Number(item.id || 0) === Number(id || 0)) || null;
    }

    function itemNameForId(id) {
      const knownKeepsakes = {
        2001: "Hearth Tonic",
        2002: "Dewbright Button",
        2003: "Wolfprint Charm",
        2004: "Moonwool Thread",
        2005: "Story Button",
        2006: "Hearthstone Tag",
        2007: "Watch Bell",
        2008: "Threadbare Map Scrap",
        2009: "Abbey Bookmark",
        2010: "Mossglass Bead",
      };
      return itemForId(id)?.name || knownKeepsakes[Number(id)] || "an unknown keepsake";
    }

    function actorForId(id) {
      return (state?.actors || []).find((actor) => Number(actor.id || 0) === Number(id || 0)) || null;
    }

    function actorNameForId(id) {
      const actor = actorForId(id);
      return actor ? actorLabel(actor) : `Resident ${id}`;
    }

    function accountCard(displayName) {
      return {
        display_name: displayName,
        role: "item",
        aspect: "square",
        image_url: "",
      };
    }

    function cardImage(card) {
      return card?.image_url || "";
    }

    function cardKey(card) {
      const id = card?.card_id || card?.display_name || card?.title || "";
      if (!id) return "";
      return `${card?.role || "card"}:${id}`;
    }

    function cardDataAttr(card) {
      const key = cardKey(card);
      return key ? ` data-card-key="${escapeAttr(key)}"` : "";
    }

    function setCardTarget(node, card) {
      const key = cardKey(card);
      if (!key) {
        node.removeAttribute("data-card-key");
        return;
      }
      node.setAttribute("data-card-key", key);
    }

    function cardByKey(key) {
      if (key.startsWith("box:")) {
        const boxId = key.slice(4);
        return {
          card_id: boxId,
          display_name: "Intricately Carved Wooden Box",
          title: "sealed world seed",
          blurb: "A little wooden box with a fresh bundle of avatar keepsakes tucked inside.",
          rarity: "mystery",
          role: "item",
          aspect: "square",
          source: "cosyworld_box",
          owned: true,
          image_url: boxImageUrl(boxId, openingBoxId === boxId ? "opening" : "closed"),
        };
      }
      if (key.startsWith("pack:")) {
        const packId = key.slice(5);
        return {
          card_id: packId,
          display_name: "Avatar Bundle",
          title: "unopened keepsake bundle",
          blurb: "A fresh bundle of avatar keepsakes waiting to be opened.",
          rarity: "pack",
          role: "item",
          aspect: "square",
          source: "cosyworld_pack",
          owned: true,
          image_url: fallbackCardImage(accountCard("Avatar Bundle")),
        };
      }
      for (const group of [state?.cards?.actors, state?.cards?.items, state?.cards?.locations, state?.account?.owned_cards]) {
        if (!group) continue;
        for (const card of Array.isArray(group) ? group : Object.values(group)) {
          if (cardKey(card) === key) return card;
        }
      }
      return null;
    }

    function actorForCard(card) {
      const key = cardKey(card);
      if (!key) return null;
      const actorCards = state?.cards?.actors || {};
      for (const [id, actorCard] of Object.entries(actorCards)) {
        if (cardKey(actorCard) !== key) continue;
        return (state?.actors || []).find((actor) => Number(actor.id || 0) === Number(id || 0)) || null;
      }
      return null;
    }

    function communityArtSubject(card) {
      for (const [kind, group] of [
        ["actor", state?.cards?.actors],
        ["item", state?.cards?.items],
        ["location", state?.cards?.locations],
      ]) {
        if (!group) continue;
        for (const [id, candidate] of Object.entries(group)) {
          if (candidate === card || cardKey(candidate) === cardKey(card)) {
            return { kind, id: Number(id) };
          }
        }
      }
      return null;
    }

    function communityArtPanelHtml(card) {
      const art = card?.community_art;
      const subject = communityArtSubject(card);
      if (!art || !subject) return "";
      const level = Math.max(1, Number(art.level || card.level || 1));
      const required = Math.max(1, Number(art.required_orbs || level));
      const funded = Math.max(0, Number(art.funded_orbs || 0));
      const remaining = Math.max(0, Number(art.remaining_orbs ?? (required - funded)));
      const status = String(art.status || "available");
      if (status === "ready") {
        return `<div class="economy-row"><span>community image</span><strong>level ${level} complete</strong></div><div class="economy-row"><span>next image</span><strong>unlocks at the next level</strong></div>`;
      }
      const balance = Math.max(0, Number(state?.economy?.orbs || 0));
      const needsOrb = remaining > 0;
      const buttonLabel = needsOrb
        ? `add one Orb · ${funded}/${required}`
        : (status === "failed" ? "try the image again" : "nudge the image workshop");
      const disabled = needsOrb && balance < 1;
      const detail = needsOrb
        ? `${remaining} ${remaining === 1 ? "Orb" : "Orbs"} still needed from the community`
        : "fully funded; no more Orbs will be taken";
      return `<div class="economy-row"><span>level ${level} image</span><strong>${escapeHtml(detail)}</strong></div><button class="account-button" type="button" data-fund-community-image="${escapeAttr(subject.kind)}:${subject.id}"${disabled ? " disabled" : ""}>${escapeHtml(buttonLabel)}</button>`;
    }

    function residentEconomyTitle(actor) {
      const economy = actor?.resident_economy || null;
      if (!economy) return actorLabel(actor);
      const parts = [];
      const motive = String(economy.motive || "").trim();
      if (motive) parts.push(motive);
      const sought = Array.isArray(economy.sought_items) ? economy.sought_items : [];
      if (sought.length) {
        const labels = sought.slice(0, 3).map((soughtItem) => itemNameForId(soughtItem.item_id));
        if (sought.length > labels.length) labels.push(`+${sought.length - labels.length} more`);
        parts.push(`Seeking: ${labels.join("; ")}`);
      }
      const held = Array.isArray(economy.held_items) ? economy.held_items : [];
      if (held.length) {
        const labels = held.slice(0, 3).map((heldItem) => {
          const itemName = itemNameForId(heldItem.item_id);
          const disposition = String(heldItem.disposition || "held").trim();
          const dispositionLabel = {
            attached: "treasured",
            medicine: "medicine",
            useful: "useful here",
            tradeable: "open to trade",
          }[disposition] || "kept close";
          return `${itemName}: ${dispositionLabel}`;
        });
        if (held.length > labels.length) labels.push(`+${held.length - labels.length} more`);
        parts.push(`Carries: ${labels.join("; ")}`);
      }
      return parts.join(" ");
    }

    function economyRowHtml(key, value) {
      return `<div class="card-economy-row"><span class="card-economy-key">${escapeHtml(key)}</span><span class="card-economy-value">${value}</span></div>`;
    }

    function cleanEconomyText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function withoutFinalPeriod(value) {
      return cleanEconomyText(value).replace(/[.!?]+$/g, "");
    }

    function sentenceCase(value) {
      const text = cleanEconomyText(value);
      return text ? `${text.charAt(0).toUpperCase()}${text.slice(1)}` : "";
    }

    function finishSentence(value) {
      const text = sentenceCase(value);
      return text && !/[.!?]$/.test(text) ? `${text}.` : text;
    }

    function economyReasonSummary(actor, itemId, reason) {
      const text = withoutFinalPeriod(reason);
      if (!text || !itemId) return sentenceCase(text);
      const actorName = cleanEconomyText(actor?.name || actorLabel(actor));
      const itemName = itemNameForId(itemId);
      const colonPrefixes = [
        `${actorName} wants ${itemName}:`,
        `${actorName} wants ${itemName} back:`,
        `${actorName} needs ${itemName}:`,
        `${actorName} could use ${itemName}:`,
        `${actorName} values ${itemName}:`,
      ];
      for (const prefix of colonPrefixes) {
        if (text.startsWith(prefix)) return sentenceCase(text.slice(prefix.length));
      }
      const forPrefix = `${actorName} wants ${itemName} for `;
      if (text.startsWith(forPrefix)) return sentenceCase(`for ${text.slice(forPrefix.length)}`);
      const exactPrefixes = [
        `${actorName} wants ${itemName}`,
        `${actorName} needs ${itemName}`,
        `${actorName} could use ${itemName}`,
        `${actorName} values ${itemName}`,
      ];
      return exactPrefixes.includes(text) ? "" : sentenceCase(text);
    }

    function economyMotiveSummary(actor, economy) {
      const request = economy?.request || null;
      if (request?.item_id) {
        const requestReason = economyReasonSummary(actor, request.item_id, request.reason);
        if (requestReason) return finishSentence(requestReason);
      }
      const motive = cleanEconomyText(economy?.motive);
      const sought = Array.isArray(economy?.sought_items) ? economy.sought_items : [];
      for (const soughtItem of sought) {
        const summary = economyReasonSummary(actor, soughtItem.item_id, motive);
        if (summary && summary !== motive) return finishSentence(summary);
      }
      return finishSentence(motive);
    }

    function economyMotiveRepeatsRows(actor, economy, motive) {
      const text = withoutFinalPeriod(motive).toLowerCase();
      const actorName = cleanEconomyText(actor?.name || actorLabel(actor)).toLowerCase();
      const sought = Array.isArray(economy?.sought_items) ? economy.sought_items : [];
      const held = Array.isArray(economy?.held_items) ? economy.held_items : [];
      if (sought.length && text.startsWith(`${actorName} seeks `)) return true;
      if (held.length && text.startsWith(`${actorName} is attached to `)) return true;
      if (held.length && text.startsWith(`${actorName} carries `) && text.includes("may trade")) return true;
      return false;
    }

    function economyTagHtml(value) {
      const text = cleanEconomyText(value);
      return text ? `<span class="economy-tag">${escapeHtml(text)}</span>` : "";
    }

    function economyTagsHtml(tags) {
      const html = tags.map(economyTagHtml).filter(Boolean).join("");
      return html ? `<span class="economy-tags">${html}</span>` : "";
    }

    function soughtItemTags(soughtItem) {
      const tags = [];
      const worldStatus = cleanEconomyText(soughtItem?.world_status);
      const worldLocationName = cleanEconomyText(soughtItem?.world_location_name);
      const worldHolderName = cleanEconomyText(soughtItem?.world_holder_actor_name);
      if (worldStatus === "held" && worldHolderName) {
        tags.push(Number(soughtItem?.world_holder_actor_id || 0) === Number(actorId || 0)
          ? "you have it"
          : `currently with ${worldHolderName}`);
      } else if (worldStatus === "available" && worldLocationName) {
        tags.push(`waiting in ${worldLocationName}`);
      } else if (worldStatus === "hidden" && worldLocationName) {
        tags.push(`not yet found near ${worldLocationName}`);
      } else if (worldStatus === "spent") {
        tags.push("already spent");
      }
      const memoryLocation = cleanEconomyText(soughtItem?.memory_location_name);
      const holderName = cleanEconomyText(soughtItem?.holder_actor_name);
      if (tags.length === 0 && memoryLocation) {
        tags.push(holderName ? `with ${holderName} near ${memoryLocation}` : `near ${memoryLocation}`);
      }
      return tags;
    }

    function economyItemSummaryHtml(itemName, tags = []) {
      return `<span class="card-economy-main">${escapeHtml(itemName)}</span>${economyTagsHtml(tags)}`;
    }

    function residentEconomyPanelHtml(actor) {
      const economy = actor?.resident_economy || null;
      if (!economy) return "";
      const rows = [];
      const motive = economyMotiveSummary(actor, economy);
      if (motive && !economyMotiveRepeatsRows(actor, economy, motive)) {
        rows.push(economyRowHtml("today", escapeHtml(motive)));
      }
      const inventoryCount = Number(economy.inventory_count);
      const carriedWeight = Number(economy.carried_weight_tenths || 0);
      const carryingCapacity = Number(economy.carrying_capacity_tenths || 0);
      if (Number.isFinite(inventoryCount) && Number.isFinite(carryingCapacity) && carryingCapacity > 0) {
        rows.push(economyRowHtml("carried deck", escapeHtml(`${inventoryCount} card${inventoryCount === 1 ? "" : "s"} · ${deckWeightLabel(carriedWeight)} / ${deckWeightLabel(carryingCapacity)}`)));
      }
      const sought = Array.isArray(economy.sought_items) ? economy.sought_items : [];
      const listedSoughtIds = new Set();
      const request = economy.request || null;
      if (request?.item_id) {
        const matchingSought = sought.find((soughtItem) => Number(soughtItem.item_id) === Number(request.item_id));
        const tags = soughtItemTags(matchingSought || {});
        rows.push(economyRowHtml("wants", economyItemSummaryHtml(itemNameForId(request.item_id), tags)));
        listedSoughtIds.add(Number(request.item_id));
      }
      const trade = economy.trade_stance || economy.trade_offer || null;
      if (trade?.offered_item_id && trade?.requested_item_id) {
        const tradeText = `${itemNameForId(trade.offered_item_id)} for ${itemNameForId(trade.requested_item_id)}; ${trade.willingness || "willing"}`;
        rows.push(economyRowHtml("trade", escapeHtml(trade.reason ? `${tradeText}. ${trade.reason}` : tradeText)));
      }
      for (const soughtItem of sought) {
        if (listedSoughtIds.has(Number(soughtItem.item_id))) continue;
        const itemName = itemNameForId(soughtItem.item_id);
        rows.push(economyRowHtml("seeks", economyItemSummaryHtml(itemName, soughtItemTags(soughtItem))));
      }
      for (const heldItem of Array.isArray(economy.held_items) ? economy.held_items : []) {
        const itemName = itemNameForId(heldItem.item_id);
        const disposition = String(heldItem.disposition || "held").trim();
        const dispositionLabel = {
          attached: "treasured",
          medicine: "medicine",
          useful: "useful here",
          tradeable: "open to trade",
        }[disposition] || "kept close";
        rows.push(economyRowHtml("carries", economyItemSummaryHtml(itemName, [dispositionLabel])));
      }
      return rows.join("");
    }

    function openCardModal(card) {
      if (!card) return;
      const image = cardImage(card) || fallbackCardImage(card);
      const actor = actorForCard(card);
      const dialog = $("card-modal").querySelector(".card-dialog");
      dialog?.classList.toggle("portrait-card", shapeForCard(card) === "avatar");
      $("card-modal-image").src = image;
      $("card-modal-image").alt = card.display_name || "CosyWorld keepsake";
      $("card-modal-name").innerHTML = `${emojiHtml(cardEmoji(card))}${escapeHtml(card.display_name || "CosyWorld Keepsake")}`;
      $("card-modal-title").textContent = card.title || card.role || "";
      $("card-modal-blurb").textContent = card.blurb || "";
      const meta = [
        friendlyCardRarity(card.rarity),
        card.role,
        card.biome ? `biome: ${card.biome}` : "",
        Array.isArray(card.terrain) && card.terrain.length ? `terrain: ${card.terrain.join(" · ")}` : "",
        card.owned ? "owned" : "",
        equippedCardIds.includes(card.card_id) ? "kept close" : "",
        card.accessible === false ? "locked" : "",
      ].filter(Boolean);
      $("card-modal-meta").innerHTML = meta.map((value) => `<span>${escapeHtml(value)}</span>`).join("");
      const promise = keepsakePromise(card);
      $("card-modal-keepsake").innerHTML = promise
        ? `<span>when kept close</span>${escapeHtml(promise)}`
        : "";
      $("card-modal-economy").innerHTML = `${residentEconomyPanelHtml(actor)}${communityArtPanelHtml(card)}`;
      openModal("card-modal", $("card-modal").querySelector(".card-close"));
      if (dialog) dialog.scrollTop = 0;
      const copy = dialog?.querySelector(".card-copy");
      if (copy) copy.scrollTop = 0;
    }

    function closeCardModal() {
      closeModal("card-modal");
      $("card-modal-image").removeAttribute("src");
      $("card-modal-keepsake").innerHTML = "";
      $("card-modal-economy").innerHTML = "";
    }

    function shapeForCard(card, fallback = "item") {
      if (card?.aspect === "wide" || card?.role === "location") return "location";
      if (card?.aspect === "tall" || card?.role === "avatar" || card?.role === "resident" || card?.role === "teacher") return "avatar";
      if (card?.aspect === "square" || card?.role === "item") return "item";
      return fallback;
    }

    function cardEmoji(card, fallbackShape = "item") {
      const explicit = String(card?.emoji || card?.icon || "").trim();
      if (explicit) return Array.from(explicit)[0] || explicit;
      const shape = shapeForCard(card, fallbackShape);
      const text = `${card?.display_name || ""} ${card?.title || ""} ${card?.role || ""}`.toLowerCase();
      const matches = [
        [/garden|flower|grove|meadow/, "🌿"], [/cottage|home|house|hearth/, "🏡"],
        [/forest|wood/, "🌲"], [/river|pond|lake|rain|water/, "💧"], [/mountain|hill|cliff/, "⛰️"],
        [/book|story|journal/, "📖"], [/key/, "🗝️"], [/button/, "🔘"], [/tea|cup|mug/, "☕"],
        [/lantern|lamp|light/, "🏮"], [/sword|blade/, "🗡️"], [/shield/, "🛡️"], [/coin|orb|gem/, "💎"],
        [/cat/, "🐈"], [/dog|hound/, "🐕"], [/fox/, "🦊"], [/bird|owl|raven/, "🦉"], [/rabbit|hare/, "🐇"],
        [/witch|mage|wizard/, "🧙"], [/farmer|gardener/, "🧑‍🌾"], [/teacher|scholar/, "🧑‍🏫"],
      ];
      const match = matches.find(([pattern]) => pattern.test(text));
      if (match) return match[1];
      return shape === "location" ? "🗺️" : (shape === "avatar" ? "🧑" : "🎒");
    }

    function actionEmoji(action) {
      const byType = {
        travel: "🥾", notice: "👁️", inspect: "🔎", scout: "🧭", chat: "💬", bond: "💞", listen: "👂", train: "🎯", trade: "🤝",
        evolve: "🌱", bank: "✨", craft: "🛠️", project: "🧩", item: "🎒", combat: "⚔️", danger: "⚠️",
        shuffle: "🔄", utility: "🪄",
      };
      return byType[actionCardType(action)] || cardEmoji(action?.card, action?.shape);
    }

    function emojiHtml(emoji) {
      return `<span class="card-emoji" aria-hidden="true">${escapeHtml(emoji)}</span>`;
    }

    function keepsakePromise(card) {
      if (["cosyworld_box", "cosyworld_pack"].includes(card?.source)) return "";
      const name = String(card?.display_name || card?.card_id || "This keepsake").trim();
      return `${name} can appear beside matching choices. It does not change available actions or odds.`;
    }

    function handProviderReason(action) {
      return String(action?.handProvider?.reason || "").trim();
    }

    function thumbnailHtml(action, interactive = true, extraClass = "") {
      const card = action.card || null;
      const shape = action.shape || shapeForCard(card);
      const fallback = card || {
        display_name: action.detail || action.label || "Action",
        role: shape === "location" ? "location" : (shape === "avatar" ? "avatar" : "item"),
