<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080b09" />
  <title>CosyWorld</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b09;
      --terminal: #0d140f;
      --terminal-2: #101912;
      --line: rgba(129, 255, 167, 0.18);
      --line-strong: rgba(239, 201, 107, 0.34);
      --text: #d8f7dc;
      --dim: #85a58a;
      --green: #65e68a;
      --amber: #efc96b;
      --blue: #8bb7ff;
      --red: #ff8d8d;
      --type-travel: #65e68a;
      --type-travel-rgb: 101, 230, 138;
      --type-chat: #f2df9b;
      --type-chat-rgb: 242, 223, 155;
      --type-bond: #ffd36a;
      --type-bond-rgb: 255, 211, 106;
      --type-listen: #79c7ff;
      --type-listen-rgb: 121, 199, 255;
      --type-train: #b89cff;
      --type-train-rgb: 184, 156, 255;
      --type-trade: #f2a65a;
      --type-trade-rgb: 242, 166, 90;
      --type-bank: #82e6c2;
      --type-bank-rgb: 130, 230, 194;
      --type-craft: #59dbc8;
      --type-craft-rgb: 89, 219, 200;
      --type-project: #a6e37b;
      --type-project-rgb: 166, 227, 123;
      --type-item: #efc96b;
      --type-item-rgb: 239, 201, 107;
      --type-combat: #ff6b6b;
      --type-combat-rgb: 255, 107, 107;
      --type-danger: #ff8a5b;
      --type-danger-rgb: 255, 138, 91;
      --type-shuffle: #9db3c7;
      --type-shuffle-rgb: 157, 179, 199;
      --type-utility: #aab7a4;
      --type-utility-rgb: 170, 183, 164;
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.48 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 4px);
      opacity: 0.11;
      z-index: 10;
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    .shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr) auto auto;
      background:
        radial-gradient(circle at 18% 12%, rgba(101, 230, 138, 0.09), transparent 25%),
        radial-gradient(circle at 78% 8%, rgba(239, 201, 107, 0.08), transparent 26%),
        var(--bg);
      overflow: hidden;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 8, 6, 0.96);
    }
    .brand {
      min-width: 0;
      color: var(--green);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand::before { content: "cosyworld://"; color: var(--dim); }
    .economy {
      flex: 0 0 auto;
      color: var(--dim);
      font-size: 13px;
      white-space: nowrap;
      max-width: min(260px, 34vw);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .economy strong {
      color: var(--amber);
      font-weight: 850;
    }
    .economy-flash {
      color: var(--green);
      font-weight: 850;
    }
    .economy-flash.spend {
      color: var(--amber);
    }
    .economy.focused,
    .economy:focus-visible {
      color: var(--green);
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }
    .location-pill {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
      min-width: 0;
      color: var(--amber);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: right;
      cursor: pointer;
    }
    .location-pill:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }
    .location-pill img {
      width: 58px;
      height: 32px;
      border-radius: 5px;
      object-fit: cover;
      border: 1px solid var(--line-strong);
      flex: 0 0 auto;
    }
    .location-pill span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .terminal {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      margin: 12px;
      border: 1px solid var(--line);
      background: rgba(13, 20, 15, 0.94);
      box-shadow: 0 18px 50px rgba(0,0,0,0.48), inset 0 0 0 1px rgba(255,255,255,0.018);
      overflow: hidden;
    }
    .room {
      grid-row: 1;
      min-width: 0;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(16, 25, 18, 0.98), rgba(11, 17, 12, 0.96));
    }
    .room-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
      color: var(--amber);
      font-weight: 850;
      font-size: 16px;
    }
    .room-title span { min-width: 0; }
    .room-title-main {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }
    #location-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    #avatar {
      flex: 0 1 auto;
      max-width: 46%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: right;
      color: var(--blue);
    }
    .room-log-toggle {
      flex: 1 1 280px;
      min-width: 140px;
      max-width: min(620px, 54vw);
      border: 1px solid rgba(129, 255, 167, 0.24);
      border-radius: 4px;
      background: rgba(8, 20, 12, 0.62);
      color: var(--text);
      padding: 5px 8px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
      text-align: left;
      font-size: 12px;
      line-height: 1.18;
    }
    .room-log-toggle[hidden] {
      display: none;
    }
    .room-log-toggle::after {
      content: "+";
      color: var(--green);
      font-weight: 900;
    }
    .room-log-toggle[aria-expanded="true"] {
      border-color: rgba(101, 230, 138, 0.58);
      background: rgba(16, 35, 20, 0.78);
    }
    .room-log-toggle[aria-expanded="true"]::after {
      content: "-";
    }
    .room-log-kicker {
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .room-log-latest {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--dim);
    }
    .room-memory {
      margin-top: 8px;
      border-top: 1px solid rgba(129, 255, 167, 0.2);
      padding-top: 8px;
      display: grid;
      gap: 8px;
    }
    .room-memory[hidden] {
      display: none;
    }
    .memory-summary {
      min-width: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.34;
      overflow-wrap: anywhere;
    }
    .memory-summary::before {
      content: "summary ";
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .memory-recent {
      display: grid;
      gap: 5px;
      min-width: 0;
    }
    .memory-entry {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(5ch, 8ch) minmax(0, 1fr);
      gap: 7px;
      align-items: start;
      color: var(--dim);
      font-size: 12px;
      line-height: 1.25;
    }
    .memory-entry-label {
      min-width: 0;
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-align: right;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .memory-entry-text {
      min-width: 0;
      overflow-wrap: anywhere;
      color: var(--dim);
    }
    .memory-entry.chat .memory-entry-text {
      color: var(--text);
    }
    .room-copy {
      margin-top: 8px;
      color: var(--text);
      max-width: 980px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      white-space: nowrap;
    }
    .room.collapsed #avatar {
      display: none;
    }
    .room.collapsed .room-copy {
      margin-top: 6px;
    }
    .room-hero {
      position: relative;
      min-width: 0;
      height: clamp(118px, 24vh, 210px);
      margin: -14px -16px 12px;
      border-bottom: 1px solid rgba(239, 201, 107, 0.22);
      background: rgba(5, 8, 6, 0.68);
      overflow: hidden;
    }
    .room-hero img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      filter: saturate(0.94) contrast(1.02);
    }
    .room-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(5, 8, 6, 0.08), rgba(5, 8, 6, 0.18) 43%, rgba(5, 8, 6, 0.78)),
        radial-gradient(circle at 18% 84%, rgba(101, 230, 138, 0.2), transparent 32%);
    }
    .room-avatar-rail {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 10px;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      pointer-events: none;
    }
    .room-avatar-rail:empty {
      display: none;
    }
    .room-avatar-pfp,
    .room-avatar-more {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 999px;
      border: 2px solid rgba(216, 247, 220, 0.64);
      background-color: rgba(16, 25, 18, 0.86);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.44);
    }
    .room-avatar-pfp {
      background-size: 138%;
      background-position: center top;
      cursor: zoom-in;
      pointer-events: auto;
    }
    .room-avatar-pfp.you {
      border-color: rgba(139, 183, 255, 0.9);
    }
    .room-avatar-pfp.evolved {
      border-color: rgba(239, 201, 107, 0.95);
    }
    .room-avatar-more {
      display: grid;
      place-items: center;
      color: var(--amber);
      font-size: 12px;
      font-weight: 900;
      pointer-events: none;
    }
    .room-summary {
      margin-top: 8px;
      display: grid;
      gap: 6px;
    }
    .room-summary:empty {
      display: none;
    }
    .summary-strip {
      min-width: 0;
      border-top: 1px solid rgba(129, 255, 167, 0.2);
      padding-top: 7px;
    }
    .summary-head {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--dim);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .summary-body {
      min-width: 0;
      color: var(--text);
      font-size: 12px;
      font-weight: 760;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .summary-meta {
      color: var(--dim);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      margin-top: 5px;
      overflow-wrap: anywhere;
    }
    .summary-clocks {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .summary-clock {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .summary-clock-label {
      min-width: 0;
      color: var(--text);
      font-size: 12px;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .summary-clock-count {
      color: var(--dim);
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .clock-track {
      grid-column: 1 / -1;
      height: 8px;
      border: 1px solid rgba(129, 255, 167, 0.2);
      background: rgba(16, 25, 18, 0.88);
      border-radius: 999px;
      overflow: hidden;
    }
    .clock-fill {
      display: block;
      height: 100%;
      width: var(--fill, 0%);
      background: var(--green);
    }
    .summary-clock.danger .clock-fill {
      background: var(--red);
    }
    .room-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .room-tag {
      flex: 0 0 auto;
      border: 1px solid rgba(129, 255, 167, 0.16);
      background: rgba(101, 230, 138, 0.06);
      color: var(--dim);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 12px;
    }
    .room-copy.expanded {
      align-items: flex-start;
      white-space: normal;
    }
    .room-full {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .updates {
      grid-row: 2;
      min-height: 0;
      border-bottom: 1px solid rgba(129, 255, 167, 0.14);
      padding: 6px 16px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      background: rgba(5, 8, 6, 0.54);
    }
    .updates[hidden] {
      display: none;
    }
    .updates.expanded {
      align-items: start;
      max-height: min(28vh, 220px);
      overflow: auto;
    }
    .updates-toggle {
      min-width: 86px;
      border: 1px solid rgba(239, 201, 107, 0.24);
      border-radius: 4px;
      background: rgba(239, 201, 107, 0.055);
      color: var(--amber);
      padding: 4px 7px;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .updates-toggle::after {
      content: "+";
      color: var(--green);
      font-size: 12px;
    }
    .updates.expanded .updates-toggle::after {
      content: "-";
    }
    .updates-list {
      min-width: 0;
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow: hidden;
    }
    .updates.expanded .updates-list {
      flex-wrap: wrap;
      overflow: visible;
    }
    .update-pill {
      min-width: 0;
      max-width: 100%;
      border: 1px solid rgba(239, 201, 107, 0.2);
      border-radius: 4px;
      background: rgba(239, 201, 107, 0.045);
      padding: 4px 7px;
      display: inline-grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 6px;
      align-items: baseline;
      line-height: 1.22;
      font-size: 12px;
      white-space: nowrap;
    }
    .update-label {
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .update-text {
      min-width: 0;
      color: var(--dim);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .update-pill.growth .update-text,
    .update-pill.skill .update-text,
    .update-pill.trade .update-text {
      color: var(--text);
    }
    .log {
      grid-row: 3;
      min-height: 0;
      max-height: min(28vh, 220px);
      overflow: auto;
      padding: 12px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scroll-behavior: smooth;
      border-top: 1px solid rgba(129, 255, 167, 0.18);
      background: rgba(5, 12, 7, 0.52);
    }
    .log:not(.account-mode):not(.chat-mode) {
      display: none;
    }
    .log.chat-mode {
      display: flex;
      max-height: none;
    }
    .log.chat-mode::before {
      content: "";
      margin-top: auto;
    }
    .line {
      display: grid;
      grid-template-columns: minmax(12ch, 20ch) minmax(0, 1fr);
      gap: 12px;
      align-items: baseline;
    }
    .line.chat {
      grid-template-columns: 36px minmax(8ch, 15ch) minmax(0, 1fr);
      border-left: 2px solid rgba(139, 183, 255, 0.34);
      padding: 5px 0 5px 9px;
      align-items: start;
      background: linear-gradient(90deg, rgba(139, 183, 255, 0.05), transparent 58%);
    }
    .line.chat.npc {
      border-left-color: rgba(239, 201, 107, 0.4);
      background: linear-gradient(90deg, rgba(239, 201, 107, 0.05), transparent 58%);
    }
    .chat-pfp {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(139, 183, 255, 0.55);
      background:
        linear-gradient(135deg, rgba(216, 247, 220, 0.14), rgba(139, 183, 255, 0.12)),
        rgba(13, 20, 15, 0.92);
      background-size: cover;
      background-position: center;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 0 0 1px rgba(5, 8, 6, 0.86), 0 4px 14px rgba(0,0,0,0.32);
      overflow: hidden;
    }
    .line.npc .chat-pfp {
      border-color: rgba(239, 201, 107, 0.64);
    }
    .line.world .chat-pfp {
      border-color: rgba(129, 255, 167, 0.48);
    }
    .line.event {
      grid-template-columns: minmax(6ch, 10ch) minmax(0, 1fr);
      gap: 8px;
      border-left: 2px solid rgba(129, 255, 167, 0.18);
      padding: 2px 0 2px 9px;
      align-items: start;
      color: var(--dim);
      cursor: pointer;
      line-height: 1.28;
    }
    .line.event .event-label {
      min-width: 0;
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-align: right;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.28;
    }
    .line.event .text {
      color: var(--dim);
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.28;
    }
    .line.event.growth .text,
    .line.event.skill .text,
    .line.event.trade .text {
      color: var(--text);
    }
    .line.event.expanded .text,
    .line.event:focus-within .text,
    .line.event:hover .text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      display: block;
      -webkit-line-clamp: unset;
    }
    .line.system {
      display: block;
      color: var(--dim);
      font-style: italic;
      padding: 4px 0;
    }
    .speaker {
      display: block;
      color: var(--dim);
      text-align: right;
      white-space: nowrap;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .speaker::before { content: "["; color: var(--line-strong); }
    .speaker::after { content: "]"; color: var(--line-strong); }
    .line.you .speaker { color: var(--blue); }
    .line.npc .speaker { color: var(--amber); }
    .line.world .speaker { color: var(--green); }
    .text {
      display: block;
      min-width: 0;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }
    .roll-line {
      display: grid;
      grid-template-columns: minmax(6ch, 10ch) minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      border-left: 2px solid rgba(139, 183, 255, 0.22);
      padding: 2px 0 2px 9px;
      margin: 3px 0;
    }
    .roll-label {
      min-width: 0;
      color: var(--dim);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 11px;
      font-weight: 900;
      line-height: 1.3;
      text-transform: uppercase;
    }
    .roll-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: rgba(16, 25, 18, 0.72);
      padding: 7px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 7px 8px;
      align-items: center;
    }
    .roll-card.success {
      border-color: rgba(101, 230, 138, 0.38);
      background: rgba(101, 230, 138, 0.07);
    }
    .roll-card.failure {
      border-color: rgba(242, 156, 156, 0.36);
      background: rgba(242, 156, 156, 0.06);
    }
    .roll-die {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      background: var(--terminal-2);
      color: var(--amber);
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 900;
    }
    .roll-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .roll-title {
      color: var(--amber);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .roll-detail {
      color: var(--dim);

<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand" id="brand">cosyworld</div>
      <div class="economy" id="economy" role="button" tabindex="0" aria-label="Focus account inventory"></div>
      <div class="location-pill" role="button" tabindex="0" aria-label="Focus current location">
        <img id="location-image" alt="" />
        <span id="subtitle">booting</span>
      </div>
    </header>
    <main class="terminal">
      <section class="room">
        <div class="room-hero" id="room-hero" aria-label="Current location artwork">
          <img id="room-hero-image" alt="" />
          <div class="room-avatar-rail" id="room-avatar-rail" aria-label="Avatars in this location"></div>
        </div>
        <div class="room-title">
          <span class="room-title-main"><span id="location-name">The Cosy Cottage</span></span>
          <button class="room-log-toggle" id="room-log-toggle" type="button" aria-expanded="false" aria-controls="room-memory" hidden><span class="room-log-kicker">log</span><span class="room-log-latest" id="room-log-latest"></span></button>
          <span id="avatar"></span>
        </div>
        <div class="room-memory" id="room-memory" hidden></div>
        <div class="room-copy" id="location-copy"></div>
        <div class="room-summary" id="room-summary"></div>

      <section class="updates" id="updates" aria-live="polite" aria-label="Status updates" hidden></section>

    </main>
    <div class="status" id="error"></div>
    <footer class="prompt">
      <div class="turn-ping-pill" id="turn-ping-pill" aria-live="assertive" hidden></div>
      <div class="caret">&gt;</div>
      <button class="cmd primary" id="primary"></button>
      <button class="cmd secondary" id="secondary"></button>
      <button class="cmd secondary" id="tertiary"></button>
      <button class="cmd shuffle" id="shuffle" type="button"></button>
    </footer>
  </div>
  <div class="command-palette" id="command-palette" hidden>
    <form class="command-form" id="command-form">
      <span class="command-caret">&gt;</span>
      <input class="command-input" id="command-input" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="MUD command" placeholder="try: look, listen, go garden, take button" />
    </form>
  </div>
  <div class="card-modal" id="card-modal" hidden>
    <section class="card-dialog" role="dialog" aria-modal="true" aria-labelledby="card-modal-name">
      <button class="card-close" type="button" data-card-close aria-label="Close card">x</button>
      <div class="card-art"><img id="card-modal-image" alt="" /></div>
      <div class="card-name" id="card-modal-name"></div>
      <div class="card-title" id="card-modal-title"></div>
      <div class="card-blurb" id="card-modal-blurb"></div>
      <div class="card-meta" id="card-modal-meta"></div>
      <div class="card-economy" id="card-modal-economy"></div>
    </section>
  </div>
  <div class="action-modal" id="action-modal" hidden>
    <section class="action-dialog" role="dialog" aria-modal="true" aria-labelledby="action-modal-title">
      <button class="action-close" type="button" data-action-close aria-label="Close action">x</button>
      <div class="action-art"><img id="action-modal-image" alt="" /></div>
      <div class="action-title" id="action-modal-title"></div>
      <div class="action-summary" id="action-modal-summary"></div>
      <div class="action-meta" id="action-modal-meta"></div>
      <button class="action-confirm" id="action-modal-confirm" type="button">confirm</button>
    </section>
  </div>
  <div class="wallet-modal" id="wallet-modal" hidden>
    <section class="wallet-dialog" role="dialog" aria-modal="true" aria-labelledby="wallet-modal-title">
      <button class="wallet-close" type="button" data-wallet-close aria-label="Close wallet sign-in">x</button>
      <div class="wallet-title" id="wallet-modal-title">wallet sign-in</div>
      <div class="wallet-copy">Scan this with your phone. Sign one message. No transaction, no fee.</div>
      <div class="wallet-qr"><img id="wallet-qr-image" alt="Wallet sign-in QR code" /></div>
      <div class="wallet-link" id="wallet-mobile-url"></div>
      <div class="wallet-status" id="wallet-status"></div>
    </section>
  </div>
  <script>
    const avatarGateVersion = "2";
    const walletRequestTimeoutMs = 20000;
    const presenceHeartbeatMs = 60000;
    const actionCardTypes = [
      "travel",
      "chat",
      "bond",
      "listen",
      "train",
      "trade",
      "bank",
      "craft",
      "project",
      "item",
      "combat",
      "danger",
      "shuffle",
      "utility",
    ];
    const actionCardTypeClasses = actionCardTypes.map((type) => `type-${type}`);
    const bootParams = new URLSearchParams(window.location.search);
    const wantsReset = ["1", "true", "yes"].includes(String(bootParams.get("reset") || "").toLowerCase());
    if (wantsReset) clearLocalSession();
    const hasExplicitAvatar = localStorage.getItem("cosyworld.avatarGateVersion") === avatarGateVersion;
    let actorId = hasExplicitAvatar ? Number(localStorage.getItem("cosyworld.actorId") || 0) : 0;
    let actorSession = hasExplicitAvatar ? (localStorage.getItem("cosyworld.actorSession") || "") : "";
    if (!hasExplicitAvatar) {
      localStorage.removeItem("cosyworld.actorId");
      localStorage.removeItem("cosyworld.actorSession");
    }
    let state = null;
    let actions = [];
    let focusIndex = 0;
    let focusedKey = "";
    let handKeys = [];
    let discardedHandKeys = [];
    let handDealNonce = 1;
    let logEvents = [];
    const seenSeq = new Set();
    let stream = null;
    let refreshInFlight = null;
    let refreshQueued = false;
    let actionBusy = false;
    let pendingAction = null;
    let actionConfirmAction = null;
    let accountPanelPinned = false;
    let openingBoxId = "";
    let roomCopyExpanded = false;
    let roomMemoryExpanded = false;
    let lastRoomCopyLocationId = null;
    let economyFlash = null;
    let economyFlashTimer = null;
    let commandHistory = [];
    let commandHistoryIndex = 0;
    let commandDraft = "";
    let presenceHeartbeatTimer = null;
    let turnCountdownTimer = null;
    let walletQrPollTimer = null;
    let walletQrResolve = null;
    const $ = (id) => document.getElementById(id);
    let walletAddress = bootParams.get("wallet") || bootParams.get("wallet_address") || localStorage.getItem("cosyworld.wallet") || "";
    let walletSession = bootParams.get("wallet_session") || localStorage.getItem("cosyworld.walletSession") || "";
    let ownedCardIds = parseCardIds(bootParams.get("cards") || bootParams.get("owned_card_ids") || localStorage.getItem("cosyworld.cards") || "");
    if (walletAddress) localStorage.setItem("cosyworld.wallet", walletAddress);
    if (walletSession) localStorage.setItem("cosyworld.walletSession", walletSession);
    if (ownedCardIds.length) localStorage.setItem("cosyworld.cards", ownedCardIds.join(","));
    localStorage.removeItem("cosyworld.openrouterApiKey");
    localStorage.removeItem("cosyworld.openrouterLabel");
    sessionStorage.removeItem("cosyworld.openrouterApiKey");
    sessionStorage.removeItem("cosyworld.openrouterLabel");
    sessionStorage.removeItem("cosyworld.openrouterOauthVerifier");
    sessionStorage.removeItem("cosyworld.openrouterOauthReturn");

    function clearLocalSession() {
      localStorage.removeItem("cosyworld.actorId");
      localStorage.removeItem("cosyworld.actorSession");
      localStorage.removeItem("cosyworld.avatarGateVersion");
    }

    async function api(path, options = {}) {
      const response = await fetch(path, options);
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      return response.json();
    }

    async function post(path, payload) {
      return api(path, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload),
      });
    }

    async function createAvatar() {
      const avatar = await post("/avatar", withAccess({}));
      if (!avatar.ok || !avatar.actor?.id || !avatar.actor_session) {
        throw new Error(avatarFailureMessage(avatar));
      }
      actorId = avatar.actor.id;
      actorSession = avatar.actor_session || "";
      localStorage.setItem("cosyworld.actorId", String(actorId));
      if (actorSession) localStorage.setItem("cosyworld.actorSession", actorSession);
      localStorage.setItem("cosyworld.avatarGateVersion", avatarGateVersion);
      pushEvents(avatar.events || []);
      await pingPresence();
      handKeys = [];
      discardedHandKeys = [];
      handDealNonce = 1;
      focusIndex = 0;
      focusedKey = "";
      await refresh();
      connectStream();
    }

    async function requestDevResetIfNeeded() {
      if (!wantsReset) return;
      try {
        await post("/dev/reset", {});
      } catch {
        // The reset endpoint is dev-gated; clearing the local avatar is still useful.
      }
      bootParams.delete("reset");
      const qs = bootParams.toString();
      window.history.replaceState(null, "", `${window.location.pathname}${qs ? `?${qs}` : ""}`);
    }

    async function refresh() {
      const previousLocationId = state?.location?.id || null;
      const requestedActorId = actorId;
      const nextState = await api(statePath());
      if (requestedActorId !== actorId) return;
      state = nextState;
      if (actorId && state.primary_action?.kind === "create_avatar") {
        actorId = 0;
        clearLocalSession();
        stopPresenceHeartbeat();
      }
      const locationChanged = previousLocationId && previousLocationId !== state.location?.id;
      if (logEvents.length === 0 || locationChanged) {
        rebuildLog([...(state.recent_events || [])].reverse());
      }
      if (locationChanged) {
        handKeys = [];
        discardedHandKeys = [];
        handDealNonce += 1;
        focusIndex = 0;
        focusedKey = "";
      }
      actions = buildActions(state);
      reconcileHand();
      restoreFocusedAction();
      render();
    }

    function queueRefresh() {
      if (refreshInFlight) {
        refreshQueued = true;
        return refreshInFlight;
      }
      refreshInFlight = refresh()
        .catch((error) => setError(String(error.message || error)))
        .finally(() => {
          refreshInFlight = null;
          if (refreshQueued) {
            refreshQueued = false;
            queueRefresh();
          }
        });
      return refreshInFlight;
    }

    function requestParams() {
      const params = new URLSearchParams();
      if (actorId) params.set("actor_id", String(actorId));
      if (actorSession) params.set("actor_session", actorSession);
      if (walletSession) params.set("wallet_session", walletSession);
      if (walletAddress) params.set("wallet_address", walletAddress);
      if (ownedCardIds.length) params.set("owned_card_ids", ownedCardIds.join(","));
      return params;
    }

    function statePath() {
      const params = requestParams();
      const qs = params.toString();
      return `/state${qs ? `?${qs}` : ""}`;
    }

    function latestSeenSeq() {
      let latest = 0;
      for (const seq of seenSeq) {
        latest = Math.max(latest, Number(seq) || 0);
      }
      return latest;
    }

    function streamPath() {
      const params = requestParams();
      const after = latestSeenSeq();
      if (after) params.set("after", String(after));
      const qs = params.toString();
      return `/stream${qs ? `?${qs}` : ""}`;
    }

    function withAccess(payload) {
      return {
        ...payload,
        ...(actorSession ? { actor_session: actorSession } : {}),
        ...(walletSession ? { wallet_session: walletSession } : {}),
        ...(walletAddress ? { wallet_address: walletAddress } : {}),
        ...(ownedCardIds.length ? { owned_card_ids: ownedCardIds.join(",") } : {}),
      };
    }

    function leavePresence() {
      if (!actorId || !actorSession) return;
      stopPresenceHeartbeat();
      const payload = JSON.stringify({ actor_id: actorId, actor_session: actorSession });
      if (navigator.sendBeacon) {
        const body = new Blob([payload], { type: "application/json" });
        navigator.sendBeacon("/presence/leave", body);
        return;
      }
      fetch("/presence/leave", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: payload,
        keepalive: true,
      }).catch(() => {});
    }

    function stopPresenceHeartbeat() {
      if (presenceHeartbeatTimer) window.clearInterval(presenceHeartbeatTimer);
      presenceHeartbeatTimer = null;
    }

    async function pingPresence() {
      if (!actorId || !actorSession) return;
      try {
        const result = await post("/presence/ping", { actor_id: actorId, actor_session: actorSession });
        pushEvents(result.events || []);
        if (!result.ok && result.status === 403) stopPresenceHeartbeat();
      } catch {
        // EventSource retries cover live updates; presence heartbeat can wait for the next tick.
      }
    }

    function startPresenceHeartbeat() {
      stopPresenceHeartbeat();
      if (!actorId || !actorSession) return;
      pingPresence();
      presenceHeartbeatTimer = window.setInterval(pingPresence, presenceHeartbeatMs);
    }

    function turnPingRemainingMs(turn = state?.turn) {
      const expiresAt = Number(turn?.ping_expires_at_ms || 0);
      if (!Number.isFinite(expiresAt) || expiresAt <= 0) return 0;
      return Math.max(0, expiresAt - Date.now());
    }

    function turnPingRemainingLabel(turn = state?.turn) {
      const remainingMs = turnPingRemainingMs(turn);
      if (remainingMs <= 0) return "resolving";
      return `${Math.ceil(remainingMs / 1000)}s`;
    }

    function syncTurnCountdownTimer() {
      if (turnCountdownTimer) {
        window.clearInterval(turnCountdownTimer);
        turnCountdownTimer = null;
      }
      if (!state?.turn?.ping_active || turnPingRemainingMs() <= 0) return;
      turnCountdownTimer = window.setInterval(() => {
        actions = buildActions(state);
        reconcileHand();
        renderCommands();
        if (!state?.turn?.ping_active || turnPingRemainingMs() <= 0) {
          window.clearInterval(turnCountdownTimer);
          turnCountdownTimer = null;
        }
      }, 500);
    }

    function parseCardIds(value) {
      return String(value || "")
        .split(/[\s,;]+/)
        .map((part) => part.trim())
        .filter(Boolean);
    }

    function solanaProvider() {
      return window.solana || window.phantom?.solana || window.solflare?.solana || window.solflare || null;
    }

    function withTimeout(promise, ms, message) {
      return new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error(message)), ms);
        Promise.resolve(promise)
          .then((value) => {
            window.clearTimeout(timer);
            resolve(value);
          })
          .catch((error) => {
            window.clearTimeout(timer);
            reject(error);
          });
      });
    }

    function walletRequestError(error, fallback) {
      const message = String(error?.message || error || "").trim();
      if (/reject|denied|cancel/i.test(message)) return "Wallet request cancelled.";
      if (/timed out/i.test(message)) return message;
      if (/prompt\(\)|prompt|not supported/i.test(message)) {
        return "Wallet signing prompt is not available in this browser. Open the QR page inside Phantom or Solflare and try again.";
      }
      return message ? `${fallback}: ${message}` : fallback;
    }

    function buildActions(view) {
      if (view.primary_action?.kind === "create_avatar") {
        return [{
          label: "generate avatar",
          detail: "",
          command: "create avatar",
          focusKey: "create-avatar",
          card: cardForLocation(view.location?.id),
          shape: "location",
          run: () => createAvatar(),
        }];
      }

      const turn = view.turn || {};
      if (turn.enabled && !turn.is_current_actor) {
        const currentName = turn.current_actor_name || "another avatar";
        const pingActive = turn.ping_active === true;
        const alreadyPonged = (turn.ping_responder_ids || []).map(Number).includes(Number(actorId));
        const countdown = pingActive ? turnPingRemainingLabel(turn) : "";
        return [{
          label: pingActive ? "pong" : "ping",
          detail: pingActive
            ? (alreadyPonged ? `${countdown} left, ponged` : `${countdown} left`)
            : `${currentName} is choosing`,
          command: pingActive ? "pong" : "ping",
          focusKey: "turn-ping",
          card: cardForActor(turn.current_actor_id) || cardForLocation(view.location?.id),
          shape: "avatar",
          priority: 5,
          effect: pingActive
            ? "answers the ping; pong gives a temporary Dex priority boost"
            : `starts a countdown for ${currentName}`,
          run: () => action("/actions/timeout", { actor_id: actorId }),
        }];
      }

      const options = new Set((view.primary_action?.options || []).map((option) => option.kind));
      const built = [];
      const economy = view.economy || {};
      const ledger = view.ledger || {};
      const skills = Array.isArray(view.skills) ? view.skills : [];
      const canChat = economy.can_chat_with_orbs !== false;
      const heldUsableItems = (view.items || []).filter((item) => item.holder_actor_id === actorId && item.kind === "potion" && item.charges > 0);
      const heldItems = (view.items || []).filter((item) => item.holder_actor_id === actorId);
      const actingActor = (view.actors || []).find((actor) => actor.id === actorId);
      const inventoryCapacity = 3 + Math.max(0, Number(actingActor?.stats?.level || 1));
      const inventoryFull = heldItems.length >= inventoryCapacity;
      const roomFeatures = Array.isArray(view.room_features) ? view.room_features : [];
      const bonds = Array.isArray(view.bonds) ? view.bonds : [];
      const activeBondTargetIds = new Set(bonds.map((bond) => Number(bond.target_actor_id || 0)));
      const chatBondClaimedTargetIds = new Set(
        (Array.isArray(view.chat_bond_claimed_target_ids) ? view.chat_bond_claimed_target_ids : [])
          .map((targetId) => Number(targetId || 0))
      );
      const attackTargetIds = new Set(options.has("attack") ? (view.actors || [])
        .filter((actor) => actor.id !== actorId && actor.kind === "npc" && actor.status === "active")
        .map((actor) => actor.id) : []);
      const usableTargets = (view.actors || []).filter((actor) => (
        actorNeedsHealing(actor)
        && !(actor.kind === "npc" && attackTargetIds.has(actor.id))
      ));
      const residentTargets = (view.actors || []).filter((actor) => actor.id !== actorId && actor.kind === "npc" && actor.status === "active");
      const offerFor = (kind) => (view.action_offers || []).find((offer) => offer.kind === kind) || null;
      const progressAmountFromOffer = (offer, fallback) => {
        const text = `${offer?.effect || ""} ${offer?.risk || ""}`;
        const match = text.match(/(?:advances \+|sets up \+|setup \+|by )([1-9]\d*)/i);
        return match ? Number(match[1]) : fallback;
      };
      const activeProject = (view.jobs || []).find((job) => job.status === "active") || null;
      const activeRoomProject = Boolean(activeProject);
      const currentLocationId = Number(view.location?.id || 0);
      const roomZone = String(view.room_sheet?.zone || "").toLowerCase();
      const roomSafety = String(view.room_sheet?.safety || "").toLowerCase();
      const frontierRoom = roomZone === "frontier" || roomSafety === "dangerous" || roomSafety === "risky";
      const preparedForRoom = currentLocationId > 0 && (view.tags || []).some((tag) => (
        tag.scope === "actor"
        && tag.label === "prepared"
        && String(tag.id || "") === `actor:${actorId}:prepared:${currentLocationId}`
      ));
      const activeProgressClock = activeProject
        ? (view.clocks || []).find((clock) => clock.id === activeProject.progress_clock_id)
        : null;
      const activeProgressRemaining = activeProgressClock
        ? Math.max(0, Number(activeProgressClock.segments || 0) - Number(activeProgressClock.filled || 0))
        : 0;
      const preparationSpentForProject = Boolean(activeProgressClock?.id) && (view.tags || []).some((tag) => (
        tag.scope === "actor"
        && tag.label === "spent preparation"
        && String(tag.id || "") === `actor:${actorId}:prepared_spent:${currentLocationId}:${activeProgressClock.id}`
      ));
      const searchedRoomFeatureCount = roomFeatures.filter((feature) => feature.searched).length;
      const preparedProgressPreview = progressAmountFromOffer(offerFor("prepare"), searchedRoomFeatureCount > 0 ? 3 : 2);

    function turnPingPillHtml(turn = state?.turn) {
      if (!turn?.ping_active) return "";
      const countdown = turnPingRemainingLabel(turn);
      const currentName = turn.current_actor_name || "the current player";
      const responders = (turn.ping_responder_ids || []).length;
      const alreadyPonged = (turn.ping_responder_ids || []).map(Number).includes(Number(actorId));
      const copy = turn.is_current_actor
        ? "you've been pinged - act or pass before skip"
        : alreadyPonged
          ? `${currentName} was pinged - you ponged`
          : `${currentName} was pinged - pong to stay in the skip order`;
      const suffix = !turn.is_current_actor && responders > 0 ? ` · ${responders} ponged` : "";
      return `<span class="turn-ping-copy">${escapeHtml(copy + suffix)}</span><span class="turn-ping-time">${escapeHtml(countdown)}</span>`;
    }

    function renderTurnPingPill() {
      const pill = $("turn-ping-pill");
      if (!pill) return;
      const html = turnPingPillHtml();
      pill.hidden = !html;
      pill.classList.toggle("urgent", Boolean(state?.turn?.ping_active && state?.turn?.is_current_actor));
      pill.innerHTML = html;
    }

    function compareActions(left, right) {
      const rank = actionRank(left) - actionRank(right);
      if (rank) return rank;
      return String(left.detail || left.label || "").localeCompare(String(right.detail || right.label || ""));
    }

    function actionRank(action) {
      if (Number.isFinite(Number(action.priority))) return Number(action.priority);
      const label = String(action.label || "").toLowerCase();
      const ranks = {
        "give": 10,
        "give item": 10,
        "use": 20,
        "rest": 25,
        "take": 30,
        "prepare": 32,
        "attack": 40,
        "defend": 45,
        "work": 48,
        "help": 49,
        "flee": 50,
        "search": 55,
        "listen": 60,
        "listen again": 60,
        "chat": 70,
        "trade": 74,
        "bank": 75,
        "train": 76,
        "bond": 77,
        "settle": 79,
        "travel": 80,
      };
      return ranks[label] || 100;
    }

    function normalizeActionCardType(type) {
      const normalized = String(type || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      return actionCardTypes.includes(normalized) ? normalized : "";
    }

    function actionCardType(action) {
      const explicit = normalizeActionCardType(action?.cardType || action?.type);
      if (explicit) return explicit;
      const label = String(action?.label || "").toLowerCase();
      const command = String(action?.command || "").toLowerCase();
      const focusKey = String(action?.focusKey || "").toLowerCase();
      const detail = String(action?.detail || "").toLowerCase();
      const risk = String(action?.risk || "").toLowerCase();

      if (label.includes("shuffle") || command === "shuffle" || focusKey === "shuffle-hand") return "shuffle";
      if (label === "attack" || label === "defend" || command.startsWith("attack ") || command === "defend") return "combat";
      if (label === "flee" || command.startsWith("flee") || risk.includes("danger")) return "danger";
      if (label === "travel" || command.startsWith("go ")) return "travel";
      if (label === "chat" || command.startsWith("chat ")) return "chat";
      if (label === "bond" || label === "settle" || focusKey.includes("bond")) return "bond";
      if (label === "listen" || label === "listen again" || label === "search" || label === "look" || command.startsWith("search ")) return "listen";
      if (label === "train" || command.startsWith("skill ")) return "train";
      if (label === "grow" || label === "bank") return "bank";
      if (label === "trade" || label === "give") return "trade";
      if (label === "take") return "item";
      if (label === "use") return focusKey.startsWith("use-feature:") || detail.includes("progress") ? "craft" : "item";
      if (label === "prepare" || label === "work" || label === "help" || label === "finish") return "project";
      if (label === "rest") return "utility";
      return "utility";
    }

    function setWalletQrStatus(message, kind = "ok") {
      const node = $("wallet-status");
      node.textContent = message;
      node.classList.toggle("error", kind === "error");
    }

    function stopWalletQrPolling() {
      if (walletQrPollTimer) window.clearInterval(walletQrPollTimer);
      walletQrPollTimer = null;
    }

    function closeWalletQrModal(result = false) {
      stopWalletQrPolling();
      $("wallet-modal").hidden = true;
      $("wallet-qr-image").removeAttribute("src");
      if (walletQrResolve) {
        const resolve = walletQrResolve;
        walletQrResolve = null;
        resolve(result);
      }
    }

    async function openQrWalletLogin() {
      setStatus("Scan the wallet sign-in QR.", "ok");
      const started = await post("/wallet/qr/start", {});
      if (!started.ok || !started.login_id || !started.poll_token) {
        setError(started.error || "Wallet QR sign-in could not start.");
        return false;
      }
      const mobileUrl = new URL(started.mobile_path || `/wallet/qr/${started.login_id}`, window.location.href).toString();
      const qrSvgUrl = new URL(started.qr_svg_path || `/wallet/qr/${started.login_id}/code.svg`, window.location.href).toString();
      $("wallet-qr-image").src = qrSvgUrl;
      $("wallet-mobile-url").textContent = mobileUrl;
      setWalletQrStatus("Waiting for a phone signature.");
      $("wallet-modal").hidden = false;
      $("wallet-modal").querySelector(".wallet-close")?.focus();

      return new Promise((resolve) => {
        walletQrResolve = resolve;
        const poll = async () => {
          try {
            const status = await api(`/wallet/qr/status?login_id=${encodeURIComponent(started.login_id)}&poll_token=${encodeURIComponent(started.poll_token)}`);
            if (status.ok && status.state === "complete" && status.wallet_session) {
              walletAddress = status.wallet_address || walletAddress;
              walletSession = status.wallet_session;
              if (walletAddress) localStorage.setItem("cosyworld.wallet", walletAddress);
              localStorage.setItem("cosyworld.walletSession", walletSession);
              setStatus("Wallet connected.", "ok");
              focusIndex = 0;
              focusedKey = "";
              await refresh();
              connectStream();
              closeWalletQrModal(true);
            } else if (!status.ok && status.state === "expired") {
              setWalletQrStatus("QR sign-in expired. Try link account again.", "error");
              closeWalletQrModal(false);
            }
          } catch (error) {
            setWalletQrStatus(String(error.message || error), "error");
          }
        };
        walletQrPollTimer = window.setInterval(poll, 1400);
        poll();
      });
    }

    async function connectWallet() {
      const provider = solanaProvider();
      if (!provider?.connect || !provider?.signMessage) {
        return openQrWalletLogin();
      }
      try {
        setStatus("Confirm wallet access in your Solana wallet.", "ok");
        const connected = await withTimeout(
          provider.connect(),
          walletRequestTimeoutMs,
          "Wallet connection timed out."
        );
        const publicKey = connected?.publicKey || provider.publicKey;
        const nextWallet = publicKey?.toString?.() || "";
        if (!nextWallet) {
          setError("Wallet connection failed.");
          return false;
        }
        const challenge = await api(`/wallet/challenge?wallet_address=${encodeURIComponent(nextWallet)}`);
        if (!challenge.ok) {
          setError("Wallet challenge failed.");
          return false;
        }
        setStatus("Sign the CosyWorld wallet challenge.", "ok");
        const encoded = new TextEncoder().encode(challenge.message);
        const signed = await withTimeout(
          provider.signMessage(encoded, "utf8"),
          walletRequestTimeoutMs,
          "Wallet signature timed out."
        );
        const signature = Array.from(signed?.signature || signed || []);
        const session = await post("/wallet/session", {
          wallet_address: nextWallet,
          nonce: challenge.nonce,
          signature,
        });
        if (!session.ok || !session.wallet_session) {
          setError(session.error || "Wallet signature rejected.");
          return false;
        }
        walletAddress = session.wallet_address || nextWallet;
        walletSession = session.wallet_session;
        localStorage.setItem("cosyworld.wallet", walletAddress);
        localStorage.setItem("cosyworld.walletSession", walletSession);
        setStatus("Wallet connected.", "ok");
        focusIndex = 0;
        focusedKey = "";
        await refresh();
        connectStream();
        return true;
      } catch (error) {
        setError(walletRequestError(error, "Wallet connection failed"));
        return false;
      }
    }

    async function openBox(boxAssetAddress) {
      if (!walletSession) {
        const connected = await connectWallet();
        if (!connected) {
          setError("Connect a wallet to open this Box.");
          return;
        }
      }
      setError("");
      setStatus("Opening Box...", "ok");
      openingBoxId = boxAssetAddress;
      accountPanelPinned = true;
      render();
      try {
        const prepared = await post("/nft/boxes/burn-prepare", {
          wallet_session: walletSession,
          box_asset_address: boxAssetAddress,
        });
        if (!prepared.ok) {
          throw new Error(prepared.error || "Box cannot be opened.");
        }
        let packId = prepared.pack_id || "";
        if (!String(prepared.burn_message || "").startsWith("Box already")) {
          const burnSignature = await signWalletMessage(prepared.burn_message || `Burn Wooden Box ${boxAssetAddress}`);
          const confirmed = await post("/nft/boxes/burn-confirm", {
            wallet_session: walletSession,
            box_asset_address: boxAssetAddress,
            burn_signature: burnSignature,
          });
          if (!confirmed.ok) {
            throw new Error(confirmed.error || "Box burn could not be recorded.");
          }
          packId = confirmed.receipt?.pack_id || packId;
        }
        if (!packId) throw new Error("Box did not create a pack.");
        await openPack(packId);
      } finally {
        openingBoxId = "";
        render();
      }
    }

    async function openPack(packId) {
      if (!walletSession) {
        const connected = await connectWallet();
        if (!connected) {
          setError("Connect a wallet to open this pack.");
          return;
        }
      }
      setError("");
      setStatus("Opening pack...", "ok");
      const opened = await post("/nft/packs/open", {
        wallet_session: walletSession,
        pack_id: packId,
      });
      if (!opened.ok) {
        throw new Error(opened.error || "Pack could not be opened.");
      }
      const cards = opened.opening?.card_ids || [];
      setStatus(cards.length ? `Opened pack: ${cards.join(", ")}` : "Opened pack.", "ok");
      focusIndex = 0;
      focusedKey = "";
      accountPanelPinned = true;
      await refresh();
    }

    function avatarFailureMessage(result = {}) {
      const status = Number(result.status || 0);
      if (status === 429) return "Avatar creation is moving too quickly. Try again in a moment.";
      if (status === 403) return "That avatar cannot be used right now.";
      if (status === 502) return "AI could not shape that avatar.";
      return "Avatar could not be generated.";
    }

    async function signWalletMessage(message) {
      const provider = solanaProvider();
      if (!provider?.signMessage) {
        throw new Error("Solana wallet signature is needed to open a Box.");
      }
      const encoded = new TextEncoder().encode(message);
      const signed = await withTimeout(
        provider.signMessage(encoded, "utf8"),
        walletRequestTimeoutMs,
        "Wallet signature timed out."
      );
      const bytes = Array.from(signed?.signature || signed || []);
      if (!bytes.length) throw new Error("Wallet did not return a signature.");
      return bytesToHex(bytes);
    }

    function bytesToHex(bytes) {
      return bytes
        .map((byte) => Number(byte).toString(16).padStart(2, "0"))
        .join("");
    }

    async function chatWith(targetActorId) {
      await action("/actions/chat", {
        actor_id: actorId,
        target_actor_id: targetActorId,
      });
    }

    async function action(path, payload) {
      setError("");
      const beforeOrbs = economyOrbCount();
      const result = await post(path, withAccess(payload));
      pushEvents(result.events || []);
      if (!result.ok) {
        setError(actionFailureMessage(path, result));
      }
      focusIndex = 0;
      focusedKey = "";
      await refresh();
      announceOrbChange(beforeOrbs, result.ok);
      return result;
    }

    function actionFailureMessage(path, result = {}) {
      const status = Number(result.status || 0);
      if (status === 402) return path.includes("/chat") ? "Chat needs Orbs." : "That needs more Orbs.";
      if (status === 403) return "Avatar session expired. Generate or reconnect your avatar.";
      if (status === 409) return "That option changed. I refreshed the action bar.";
      if (status === 423) return "Someone else is choosing a card. I refreshed the hand.";
      if (status === 429) return "Actions are moving too quickly. Try again in a moment.";
      if (status === 502) return "AI could not answer that turn.";
      return "Action could not finish. I refreshed the action bar.";
    }

    function commandFailureMessage(result = {}) {
      const output = String(result.output || "").trim();
      if (output) return output;
      const status = Number(result.status || 0);
      if (status === 403) return "Avatar session expired. Generate or reconnect your avatar.";
      if (status === 409) return "That option changed. I refreshed the action bar.";
      if (status === 423) return "Someone else is choosing a card. Send ping to start a short countdown.";
      if (status === 429) return "Commands are moving too quickly. Try again in a moment.";
      return "Command could not finish. I refreshed the action bar.";
    }

    async function runCommandText(commandText) {
      const command = String(commandText || "").trim();
      if (!command) return;
      if (!actorId || !actorSession) {
        setError("Generate an avatar first.");
        return;
      }
      setError("");
      if (/^(shuffle|deal|redraw)$/i.test(command)) {
        await shuffleHand();
        pushCommandOutput(command, "New cards drawn. Nothing in the room changes.", true, []);
        return { ok: true, status: 0, command, events: [] };
      }
      const beforeOrbs = economyOrbCount();
      const result = await post("/commands", withAccess({
        actor_id: actorId,
        command,
      }));
      const resultEvents = result.events || [];
      pushEvents(resultEvents);
      if (result.output) pushCommandOutput(result.command || command, result.output, result.ok, resultEvents);
      if (!result.ok) {
        const message = commandFailureMessage(result);
        if (!result.output) pushCommandOutput(result.command || command, message, false, resultEvents);
        setError(message);
      }
      focusIndex = 0;
      focusedKey = "";
      await refresh();
      announceOrbChange(beforeOrbs, result.ok);
      return result;
    }

    function economyOrbCount(view = state) {
      const value = Number(view?.economy?.orbs);
      return Number.isFinite(value) ? value : null;
    }

    function announceOrbChange(beforeOrbs, ok) {
      if (!ok || beforeOrbs === null) return;
      const afterOrbs = economyOrbCount();
      if (afterOrbs === null || afterOrbs === beforeOrbs) return;
      const delta = afterOrbs - beforeOrbs;
      if (delta > 0) {
        flashEconomy(`+${delta}`, "gain");
      } else {
        const spent = Math.abs(delta);
        flashEconomy(`-${spent}`, "spend");
      }
    }

    function flashEconomy(text, kind) {
      economyFlash = { text, kind };
      if (economyFlashTimer) window.clearTimeout(economyFlashTimer);
      renderEconomy();
      economyFlashTimer = window.setTimeout(() => {
        economyFlash = null;
        economyFlashTimer = null;
        if (state) renderEconomy();
      }, 2200);
    }

    function pushCommandOutput(command, output, ok, events = []) {
      if (ok && commandOutputLooksMechanical(output) && events.some(eventIsStatusUpdate)) {
        renderTimelines();
        return;
      }
      if (ok && commandOutputDuplicatesChat(output, events)) {
        renderTimelines();
        return;
      }
      const event = {
        seq: `command-${Date.now()}-${Math.random()}`,
        type: "command.output",
        actor_name: ok ? ">" : "command",
        content: output,
        command,
      };
      logEvents.push(event);
      logEvents = logEvents.slice(-90);
      renderTimelines();
    }

    const collapsibleTurnStatusTypes = new Set([
      "turn.ping_started",
      "turn.pong",
      "turn.ping_skipped",
      "turn.timeout_requested",
      "turn.timeout_passed",
    ]);

    function logEventCollapseKey(event) {
      if (!event || !collapsibleTurnStatusTypes.has(event.type)) return "";
      const location = event.location_id ?? "";
      const target = event.target_actor_id ?? "";
      if (event.type === "turn.pong") {
        return `${event.type}:${location}:${event.actor_id ?? ""}:${target}`;
      }
      return `${event.type}:${location}:${target}`;
    }

    function appendLogEvent(event) {
      const key = logEventCollapseKey(event);
      if (key) {
        for (let index = logEvents.length - 1; index >= 0; index -= 1) {
          const prior = logEvents[index];
          if (logEventCollapseKey(prior) === key) {
            logEvents[index] = {
              ...event,
              first_seq: prior.first_seq ?? prior.seq,
              repeat_count: Math.max(1, Number(prior.repeat_count || 1)) + 1,
            };
            return;
          }
          if (!collapsibleTurnStatusTypes.has(prior?.type)) break;
        }
      }
      logEvents.push(event);
    }

    function pushEvents(events) {
      let changed = false;
      for (const event of events) {
        if (!event || seenSeq.has(event.seq)) continue;
        seenSeq.add(event.seq);
        if (eventIsHiddenContext(event)) continue;
        if (!eventIsLowSignalStatus(event)) appendLogEvent(event);
        changed = true;
      }
      logEvents = logEvents.slice(-90);
      return changed;
    }

    function rebuildLog(events) {
      logEvents = [];
      for (const event of events) {
        if (!event || eventIsHiddenContext(event)) continue;
        seenSeq.add(event.seq);
        if (!eventIsLowSignalStatus(event)) appendLogEvent(event);
      }
      logEvents = logEvents.slice(-90);
    }

    const chatEventTypes = new Set(["message.created"]);

    const mechanicalCommandOutputPrefixes = [
      "Visit Ledger marked:",
      "Visit Ledger banked:",
      "Memory mark added:",
      "Growth claimed:",
      "Growth spent:",
      "Advancement spent:",
      "Skill stepped up:",
      "Calling set:",
      "Calling revised:",
      "Bond deepened",
      "Bond written",
      "Bond revised",
      "Bond settled",
    ];

    function eventIsStatusUpdate(event) {
      if (!event) return false;
      return !chatEventTypes.has(event.type);
    }

    function commandOutputLooksMechanical(output) {
      const lines = String(output || "")
        .split(/\n+/)
        .map((line) => line.trim())
        .filter(Boolean);
      if (!lines.length) return false;
      return lines.every((line) => mechanicalCommandOutputPrefixes.some((prefix) => line.startsWith(prefix)));
    }

    function commandOutputDuplicatesChat(output, events = []) {
      const text = cleanStatusText(output);
      if (!text) return false;
      return events.some((event) => event?.type === "message.created" && cleanStatusText(event.content) === text);
    }

    function eventIsHiddenContext(event) {
      return event.type === "world.bootstrapped" || event.type === "actor.presence";
    }

    function eventMatchesCurrentLocation(event) {
      const locationId = state?.location?.id;
      if (!locationId || !event) return true;
      return event.location_id === locationId || event.destination_location_id === locationId;
    }

    function eventShouldRefreshState(event) {
      if (!event) return false;
      return event.type === "world.reset"
        || event.type === "actor.presence"
        || event.type === "actor.created"
        || event.type === "actor.entered_location"
        || event.type === "actor.moved"
        || event.type === "hand.shuffled"
        || event.type === "turn.ping_started"
        || event.type === "turn.pong"
        || event.type === "turn.ping_skipped"
        || event.type === "turn.timeout_requested"
        || event.type === "turn.timeout_passed"
        || event.type === "message.created"
        || event.type === "move.blocked"
        || event.type === "feature.searched"
        || event.type === "item.picked_up"
        || event.type === "item.dropped"
        || event.type === "item.used"
        || event.type === "item.given"
        || event.type === "item.traded"
        || event.type === "avatar.evolved"
        || event.type === "rule.rejected"
        || event.type === "clock.updated"
        || event.type === "tag.applied"
        || event.type === "tag.cleared"
        || event.type === "calling.set"
        || event.type === "calling.revised"
        || event.type === "ledger.marked"
        || event.type === "ledger.banked"
        || event.type === "advancement.spent"
        || event.type === "skill.stepped"
        || event.type === "bond.deepened"
        || event.type === "bond.created"
        || event.type === "bond.revised"
        || event.type === "bond.resolved"
        || event.type === "job.updated"
        || event.type === "combat.defend"
        || event.type === "combat.attack.attempt"
        || event.type === "combat.attack.hit"
        || event.type === "combat.attack.miss"
        || event.type === "combat.knockout"
        || event.type === "combat.flee.success"
        || event.type === "encounter.reset";
    }

    function connectStream() {
      if (stream) stream.close();
      stream = new EventSource(streamPath());
      stream.addEventListener("world", (message) => {
        let event = null;
        try {
          event = JSON.parse(message.data);
        } catch {
          return;
        }
        if (event.type === "world.reset") {
          seenSeq.clear();
          rebuildLog([event]);
          renderTimelines();
          queueRefresh();
          return;
        }
        if (eventMatchesCurrentLocation(event)) {
          const changed = pushEvents([event]);
          if (changed) renderTimelines();
        }
        if (eventShouldRefreshState(event)) queueRefresh();
      });
      stream.onerror = () => setError("Live connection is retrying.");
      startPresenceHeartbeat();
    }

    function render() {
      const location = state.location || {};
      const me = (state.actors || []).find((actor) => actor.id === actorId);
      const locationCard = cardForLocation(location.id);
      const locationArt = cardImage(locationCard) || fallbackCardImage(locationCard || { display_name: location.name || "Location", aspect: "wide", role: "location" });
      const locationImage = $("location-image");

      locationImage.alt = locationCard?.display_name || location.name || "";
      setCardTarget(locationImage, locationCard);

      const roomHeroImage = $("room-hero-image");

      roomHeroImage.alt = locationCard?.display_name || location.name || "";
      setCardTarget(roomHero, locationCard);
      $("room-avatar-rail").innerHTML = roomAvatarRailHtml(state);

      $("location-name").textContent = location.name || "Unknown";

      }
      renderRoomCopy(location.id);
      $("room-summary").innerHTML = roomSummaryHtml(state);
      renderTimelines();
      renderCommands();
