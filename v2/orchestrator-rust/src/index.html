<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080b09" />
  <title>CosyWorld</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b09;
      --terminal: #0d140f;
      --terminal-2: #101912;
      --line: rgba(129, 255, 167, 0.18);
      --line-strong: rgba(239, 201, 107, 0.34);
      --text: #d8f7dc;
      --dim: #85a58a;
      --green: #65e68a;
      --amber: #efc96b;
      --blue: #8bb7ff;
      --red: #ff8d8d;
      --type-travel: #65e68a;
      --type-travel-rgb: 101, 230, 138;
      --type-chat: #f2df9b;
      --type-chat-rgb: 242, 223, 155;
      --type-bond: #ffd36a;
      --type-bond-rgb: 255, 211, 106;
      --type-listen: #79c7ff;
      --type-listen-rgb: 121, 199, 255;
      --type-notice: #79c7ff;
      --type-notice-rgb: 121, 199, 255;
      --type-inspect: #d7a7ff;
      --type-inspect-rgb: 215, 167, 255;
      --type-scout: #58d7d0;
      --type-scout-rgb: 88, 215, 208;
      --type-train: #b89cff;
      --type-train-rgb: 184, 156, 255;
      --type-evolve: #a8bdf0;
      --type-evolve-rgb: 168, 189, 240;
      --type-trade: #f2a65a;
      --type-trade-rgb: 242, 166, 90;
      --type-bank: #82e6c2;
      --type-bank-rgb: 130, 230, 194;
      --type-craft: #59dbc8;
      --type-craft-rgb: 89, 219, 200;
      --type-project: #a6e37b;
      --type-project-rgb: 166, 227, 123;
      --type-item: #efc96b;
      --type-item-rgb: 239, 201, 107;
      --type-combat: #ff6b6b;
      --type-combat-rgb: 255, 107, 107;
      --type-danger: #ff8a5b;
      --type-danger-rgb: 255, 138, 91;
      --type-shuffle: #9db3c7;
      --type-shuffle-rgb: 157, 179, 199;
      --type-utility: #aab7a4;
      --type-utility-rgb: 170, 183, 164;
      --rarity-free: #9db3c7;
      --rarity-free-rgb: 157, 179, 199;
      --rarity-seed: #65e68a;
      --rarity-seed-rgb: 101, 230, 138;
      --rarity-common: #f2df9b;
      --rarity-common-rgb: 242, 223, 155;
      --rarity-uncommon: #79c7ff;
      --rarity-uncommon-rgb: 121, 199, 255;
      --rarity-generated: #82e6c2;
      --rarity-generated-rgb: 130, 230, 194;
      --rarity-rare: #b89cff;
      --rarity-rare-rgb: 184, 156, 255;
      --rarity-super-rare: #f2a65a;
      --rarity-super-rare-rgb: 242, 166, 90;
      --rarity-ultra-rare: #c65cff;
      --rarity-ultra-rare-rgb: 198, 92, 255;
      --rarity-mythic: #ffd36a;
      --rarity-mythic-rgb: 255, 211, 106;
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.48 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,0.035) 0 1px, transparent 1px 4px);
      opacity: 0.11;
      z-index: 10;
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    .shell {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: 48px minmax(0, 1fr) auto auto;
      background:
        radial-gradient(circle at 18% 12%, rgba(101, 230, 138, 0.09), transparent 25%),
        radial-gradient(circle at 78% 8%, rgba(239, 201, 107, 0.08), transparent 26%),
        var(--bg);
      overflow: hidden;
    }
    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 8, 6, 0.96);
    }
    .brand {
      min-height: 44px;
      border: 0;
      padding: 0;
      background: transparent;
      min-width: 0;
      color: var(--green);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .brand::before { content: "cosyworld://"; color: var(--dim); }
    .economy {
      min-height: 44px;
      border: 0;
      padding: 0;
      background: transparent;
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      color: var(--dim);
      font-size: 13px;
      white-space: nowrap;
      max-width: min(260px, 34vw);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
    }
    .economy strong {
      color: var(--amber);
      font-weight: 850;
    }
    .economy-flash {
      color: var(--green);
      font-weight: 850;
    }
    .economy-flash.spend {
      color: var(--amber);
    }
    .economy.focused,
    .economy:focus-visible {
      color: var(--green);
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }
    .location-pill {
      min-height: 44px;
      border: 0;
      padding: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
      min-width: 0;
      color: var(--amber);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: right;
      cursor: pointer;
    }
    .location-pill:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }
    .location-pill img {
      width: 58px;
      height: 32px;
      border-radius: 5px;
      object-fit: cover;
      border: 1px solid var(--line-strong);
      flex: 0 0 auto;
    }
    .location-pill span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .terminal {
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      margin: 12px;
      border: 1px solid var(--line);
      background: rgba(13, 20, 15, 0.94);
      box-shadow: 0 18px 50px rgba(0,0,0,0.48), inset 0 0 0 1px rgba(255,255,255,0.018);
      overflow: hidden;
    }
    .room {
      grid-row: 1;
      min-width: 0;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(16, 25, 18, 0.98), rgba(11, 17, 12, 0.96));
    }
    .room-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-width: 0;
      color: var(--amber);
      font-weight: 850;
      font-size: 16px;
    }
    .room-title span { min-width: 0; }
    .room-title-main {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }
    #location-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    #avatar {
      flex: 0 1 auto;
      max-width: 46%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: right;
      color: var(--blue);
    }
    .room-log-toggle {
      flex: 1 1 280px;
      min-width: 140px;
      max-width: min(620px, 54vw);
      border: 1px solid rgba(129, 255, 167, 0.24);
      border-radius: 4px;
      background: rgba(8, 20, 12, 0.62);
      color: var(--text);
      padding: 5px 8px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 7px;
      align-items: center;
      text-align: left;
      font-size: 12px;
      line-height: 1.18;
    }
    .room-log-toggle[hidden] {
      display: none;
    }
    .room-log-toggle::after {
      content: "+";
      color: var(--green);
      font-weight: 900;
    }
    .room-log-toggle[aria-expanded="true"] {
      border-color: rgba(101, 230, 138, 0.58);
      background: rgba(16, 35, 20, 0.78);
    }
    .room-log-toggle[aria-expanded="true"]::after {
      content: "-";
    }
    .room-log-kicker {
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .room-log-latest {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--dim);
    }
    .room-memory {
      margin-top: 8px;
      border-top: 1px solid rgba(129, 255, 167, 0.2);
      padding-top: 8px;
      display: grid;
      gap: 8px;
    }
    .room-memory[hidden] {
      display: none;
    }
    .memory-summary {
      min-width: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.34;
      overflow-wrap: anywhere;
    }
    .memory-summary::before {
      content: "summary ";
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .memory-recent {
      display: grid;
      gap: 5px;
      min-width: 0;
    }
    .memory-entry {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(5ch, 8ch) minmax(0, 1fr);
      gap: 7px;
      align-items: start;
      color: var(--dim);
      font-size: 12px;
      line-height: 1.25;
    }
    .memory-entry-label {
      min-width: 0;
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-align: right;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .memory-entry-text {
      min-width: 0;
      overflow-wrap: anywhere;
      color: var(--dim);
    }
    .memory-entry.chat .memory-entry-text {
      color: var(--text);
    }
    .room-copy {
      margin-top: 8px;
      color: var(--text);
      max-width: 980px;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      white-space: nowrap;
    }
    .room.collapsed #avatar {
      display: none;
    }
    .room.collapsed .room-copy {
      margin-top: 6px;
    }
    .room-hero {
      position: relative;
      min-width: 0;
      height: clamp(118px, 24vh, 210px);
      margin: -14px -16px 12px;
      border-bottom: 1px solid rgba(239, 201, 107, 0.22);
      background: rgba(5, 8, 6, 0.68);
      overflow: hidden;
    }
    .room-hero img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      filter: saturate(0.94) contrast(1.02);
    }
    .room-hero-card {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      padding: 0;
      background: transparent;
      cursor: zoom-in;
    }
    .room-hero-card:focus-visible {
      outline: 3px solid var(--blue);
      outline-offset: -4px;
    }
    .room-hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(5, 8, 6, 0.08), rgba(5, 8, 6, 0.18) 43%, rgba(5, 8, 6, 0.78)),
        radial-gradient(circle at 18% 84%, rgba(101, 230, 138, 0.2), transparent 32%);
    }
    .room-avatar-rail {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 10px;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      pointer-events: none;
    }
    .room-avatar-rail:empty {
      display: none;
    }
    .room-avatar-pfp,
    .room-avatar-more {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 999px;
      border: 2px solid rgba(216, 247, 220, 0.64);
      background-color: rgba(16, 25, 18, 0.86);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.44);
    }
    .room-avatar-pfp {
      padding: 0;
      background-size: 138%;
      background-position: center top;
      cursor: zoom-in;
      pointer-events: auto;
    }
    .room-avatar-pfp.you {
      border-color: rgba(139, 183, 255, 0.9);
    }
    .room-avatar-pfp.evolved {
      border-color: rgba(239, 201, 107, 0.95);
    }
    .room-avatar-more {
      display: grid;
      place-items: center;
      color: var(--amber);
      font-size: 12px;
      font-weight: 900;
      pointer-events: none;
    }
    .room-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }
    .room-tag {
      flex: 0 0 auto;
      border: 1px solid rgba(129, 255, 167, 0.16);
      background: rgba(101, 230, 138, 0.06);
      color: var(--dim);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 12px;
    }
    .room-copy.expanded {
      align-items: flex-start;
      white-space: normal;
    }
    .room-full {
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .updates {
      grid-row: 2;
      min-height: 0;
      border-bottom: 1px solid rgba(129, 255, 167, 0.14);
      padding: 6px 16px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 6px;
      align-items: center;
      background: rgba(5, 8, 6, 0.54);
    }
    .updates[hidden] {
      display: none;
    }
    .updates.expanded {
      align-items: start;
      max-height: min(28vh, 220px);
      overflow: auto;
    }
    .updates-guide {
      min-width: 86px;
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .updates-toggle {
      min-width: 86px;
      border: 1px solid rgba(239, 201, 107, 0.24);
      border-radius: 4px;
      background: rgba(239, 201, 107, 0.055);
      color: var(--amber);
      padding: 4px 7px;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .updates-toggle::after {
      content: "+";
      color: var(--green);
      font-size: 12px;
    }
    .updates.expanded .updates-toggle::after {
      content: "-";
    }
    .updates-list {
      min-width: 0;
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      overflow: hidden;
    }
    .updates.expanded .updates-list {
      flex-wrap: wrap;
      overflow: visible;
    }
    .update-pill {
      min-width: 0;
      max-width: 100%;
      border: 1px solid rgba(239, 201, 107, 0.2);
      border-radius: 4px;
      background: rgba(239, 201, 107, 0.045);
      padding: 4px 7px;
      display: inline-grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 6px;
      align-items: baseline;
      line-height: 1.22;
      font-size: 12px;
      white-space: nowrap;
    }
    .update-label {
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .update-text {
      min-width: 0;
      color: var(--dim);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .update-pill.growth .update-text,
    .update-pill.skill .update-text,
    .update-pill.trade .update-text {
      color: var(--text);
    }
    .update-pill.first-thread {
      width: 100%;
      border-color: rgba(139, 183, 255, 0.28);
      background: rgba(139, 183, 255, 0.055);
      align-items: start;
      white-space: normal;
    }
    .update-pill.first-thread .update-label {
      color: var(--blue);
    }
    .update-pill.first-thread .update-text {
      color: var(--text);
      overflow: visible;
      text-overflow: clip;
      white-space: normal;
    }
    .update-pill.first-thread.complete {
      border-color: rgba(101, 230, 138, 0.42);
      background: rgba(101, 230, 138, 0.08);
    }
    .update-pill.first-thread.complete .update-label {
      color: var(--green);
    }
    .log {
      grid-row: 3;
      min-height: 0;
      max-height: min(28vh, 220px);
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(239, 201, 107, 0.46) rgba(5, 12, 7, 0.3);
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      border-top: 1px solid rgba(129, 255, 167, 0.18);
      background: rgba(5, 12, 7, 0.52);
    }
    .log::-webkit-scrollbar {
      width: 7px;
    }
    .log::-webkit-scrollbar-track {
      background: rgba(5, 12, 7, 0.3);
    }
    .log::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(239, 201, 107, 0.46);
    }
    .log:not(.account-mode):not(.library-mode):not(.chat-mode):not(.room-mode):not(.arrival-mode) {
      display: none;
    }
    .log.account-mode,
    .log.library-mode,
    .log.chat-mode,
    .log.room-mode,
    .log.arrival-mode {
      display: flex;
      max-height: none;
    }
    .log.chat-mode::before {
      content: "";
      margin-top: auto;
    }
    .log.chat-mode.quiet-mode::before {
      display: none;
    }
    .log > .line,
    .log > .roll-line {
      flex-shrink: 0;
    }
    .log.quiet-mode .line.event.room {
      margin-bottom: auto;
    }
    .log.room-mode,
    .log.arrival-mode {
      justify-content: center;
      align-items: center;
      padding: clamp(24px, 6vh, 72px) clamp(20px, 7vw, 96px);
      background:
        radial-gradient(circle at 50% 46%, rgba(239, 201, 107, 0.055), transparent 36%),
        linear-gradient(180deg, rgba(5, 12, 7, 0.32), rgba(5, 12, 7, 0.62));
    }
    .room-scene {
      position: relative;
      width: min(760px, 100%);
      min-height: 172px;
      display: grid;
      place-content: center;
      justify-items: center;
      gap: 12px;
      padding: clamp(24px, 5vw, 48px);
      border: 1px solid rgba(239, 201, 107, 0.16);
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(239, 201, 107, 0.04), rgba(101, 230, 138, 0.025)),
        rgba(8, 14, 10, 0.48);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.22), inset 0 0 38px rgba(239, 201, 107, 0.018);
      text-align: center;
    }
    .room-scene::before {
      content: "✦";
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0 10px;
      background: var(--terminal);
      color: var(--amber);
      font-size: 13px;
    }
    .arrival-scene::before {
      animation: arrival-glow 1.6s ease-in-out infinite;
    }
    .defeat-scene {
      border-color: rgba(255, 125, 125, 0.24);
      background:
        linear-gradient(180deg, rgba(255, 125, 125, 0.055), rgba(239, 201, 107, 0.025)),
        rgba(8, 14, 10, 0.54);
    }
    .defeat-scene::before {
      content: "◇";
      color: var(--red);
    }
    .defeat-scene .room-scene-cue { color: var(--amber); }
    @keyframes arrival-glow {
      0%, 100% { opacity: 0.45; transform: translateX(-50%) scale(0.88); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.08); }
    }
    .room-scene-kicker {
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .room-scene-text {
      max-width: 660px;
      color: var(--text);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", serif;
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.42;
      text-wrap: balance;
    }
    .room-scene-cue {
      color: var(--green);
      font-size: 11px;
      line-height: 1.35;
    }
    .line {
      display: grid;
      grid-template-columns: minmax(12ch, 20ch) minmax(0, 1fr);
      gap: 12px;
      align-items: baseline;
    }
    .line.chat {
      grid-template-columns: 36px minmax(10ch, 22ch) minmax(0, 1fr);
      border-left: 2px solid rgba(139, 183, 255, 0.34);
      padding: 5px 0 5px 9px;
      align-items: start;
      background: linear-gradient(90deg, rgba(139, 183, 255, 0.05), transparent 58%);
    }
    .line.chat.npc {
      border-left-color: rgba(239, 201, 107, 0.4);
      background: linear-gradient(90deg, rgba(239, 201, 107, 0.05), transparent 58%);
    }
    .line.chat.pending {
      opacity: 0.78;
    }
    .line.chat.pending .text {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      color: var(--dim);
      font-style: italic;
    }
    .chat-thinking-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      margin-right: 8px;
    }
    .chat-thinking-dots > i {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0.35;
      animation: chat-thinking 1.1s ease-in-out infinite;
    }

<body>
  <div class="shell">
    <header class="topbar">
      <button class="brand" id="brand" type="button" aria-label="Open Menu" aria-expanded="false" aria-controls="log">menu</button>
      <span class="economy" id="economy" aria-label="Carried deck and Orb status"></span>
      <button class="location-pill" type="button" aria-label="Focus current location">
        <img id="location-image" alt="" />
        <span id="subtitle">booting</span>
      </button>
    </header>
    <main class="terminal">
      <section class="room">
        <div class="room-hero" id="room-hero">
          <button class="room-hero-card" id="room-hero-card" type="button" aria-label="Open current location keepsake" data-player-concept="keepsake" data-analytics-event="keepsake.open">
            <img id="room-hero-image" alt="" />
          </button>
          <div class="room-avatar-rail" id="room-avatar-rail" aria-label="Avatars in this location"></div>
        </div>
        <div class="room-title">
          <span class="room-title-main"><h1 id="location-name">The Cosy Cottage</h1></span>
          <button class="room-log-toggle" id="room-log-toggle" type="button" aria-expanded="false" aria-controls="room-memory" hidden><span class="room-log-kicker">log</span><span class="room-log-latest" id="room-log-latest"></span></button>
          <span id="avatar"></span>
        </div>
        <div class="room-memory" id="room-memory" hidden></div>
        <div class="room-copy" id="location-copy"></div>
      </section>
      <section class="updates" id="updates" aria-live="polite" aria-label="Status updates" hidden></section>
      <section class="log" id="log" role="log" aria-live="polite" aria-relevant="additions text" aria-label="Shared room chat"></section>
    </main>
    <div class="status" id="error" role="status" aria-live="polite" aria-atomic="true"></div>
    <footer class="prompt">
      <div class="turn-ping-pill" id="turn-ping-pill" aria-live="assertive" hidden></div>
      <div class="caret">&gt;</div>
      <button class="cmd primary" id="primary" data-player-concept="action" data-analytics-event="action.select"></button>
      <button class="cmd secondary" id="secondary" data-player-concept="action" data-analytics-event="action.select"></button>
      <button class="cmd secondary" id="tertiary" data-player-concept="action" data-analytics-event="action.select"></button>
      <button class="cmd shuffle" id="shuffle" type="button" data-player-concept="action" data-analytics-event="action.redeal"></button>

  <script>
    const avatarGateVersion = "2";
    const walletRequestTimeoutMs = 20000;
    const presenceHeartbeatMs = 60000;
    const authoredCallingChoices = [
      {
        label: "odd jobs",
        detail: "the stranger the better",
        statement: "I listen for odd jobs nobody else wants.",
      },
      {
        label: "lost property",
        detail: "find where it belongs",
        statement: "I listen for clues and stick my nose into lost-property trouble.",
      },
      {
        label: "stuck doors",
        detail: "and awkward questions",
        statement: "I listen at stuck doors before I shoulder them open.",
      },
      {
        label: "uncharted paths",
        detail: "explore them into being",
        statement: "I explore the paths nobody has named yet.",
      },
    ];
    const authoredAbilityChoices = [
      { id: "lifting", label: "Strength", detail: "physical force" },
      { id: "nimble_hands", label: "Dexterity", detail: "agility and fine control" },
      { id: "steadiness", label: "Constitution", detail: "endurance and resilience" },
      { id: "lorecraft", label: "Intelligence", detail: "reason and remember" },
      { id: "listening", label: "Wisdom", detail: "notice the world and behavior" },
      { id: "kindness", label: "Charisma", detail: "influence and connect" },
    ];

    function authoredAbilityChoice(value) {
      const normalized = String(value || "").trim().toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "");
      return authoredAbilityChoices.find((choice) => (
        choice.id === normalized
        || choice.label.toLowerCase().replace(/[^a-z0-9]+/g, "_") === normalized
      )) || null;
    }

    function abilityLabel(value, fallback = "an ability") {
      return authoredAbilityChoice(value)?.label || String(value || fallback);
    }
    const actionCardTypes = [
      "travel",
      "notice",
      "inspect",
      "scout",
      "chat",
      "bond",
      "listen",
      "train",
      "evolve",
      "trade",
      "bank",
      "craft",
      "project",
      "item",
      "combat",
      "danger",
      "shuffle",
      "utility",
    ];
    const actionCardTypeClasses = actionCardTypes.map((type) => `type-${type}`);
    const actionCardRarities = [
      "free",
      "seed",
      "common",
      "uncommon",
      "generated",
      "mystery",
      "pack",
      "rare",
      "super-rare",
      "ultra-rare",
      "mythic",
      "legendary",
    ];
    const actionCardRarityClasses = actionCardRarities.map((rarity) => `rarity-${rarity}`);
    const actionCardAccentClasses = [...actionCardTypeClasses, ...actionCardRarityClasses];
    const bootParams = new URLSearchParams(window.location.search);
    const wantsReset = ["1", "true", "yes"].includes(String(bootParams.get("reset") || "").toLowerCase());
    if (wantsReset) clearLocalSession();
    const hasExplicitAvatar = localStorage.getItem("cosyworld.avatarGateVersion") === avatarGateVersion;
    let actorId = hasExplicitAvatar ? Number(localStorage.getItem("cosyworld.actorId") || 0) : 0;
    let actorSession = hasExplicitAvatar ? (localStorage.getItem("cosyworld.actorSession") || "") : "";
    if (!hasExplicitAvatar) {
      localStorage.removeItem("cosyworld.actorId");
      localStorage.removeItem("cosyworld.actorSession");
    }
    let state = null;
    let actions = [];
    let focusIndex = 0;
    let focusedKey = "";
    let handKeys = [];
    let discardedHandKeys = [];
    let handCompositionSignature = "";
    let handDealNonce = 1;
    let authoritativeHandIdentity = "";
    let playerPromotedHandKey = "";
    let recoveryPromptPending = false;
    let logEvents = [];
    const seenSeq = new Set();
    const worldBeatPresentationContractVersion = 1;
    const worldBeatReceiptState = new Map();
    let worldBeatVisibilityFrame = null;
    let streamReplayFloorSeq = 0;
    let stream = null;
    let refreshInFlight = null;
    let refreshQueued = false;
    let actionBusy = false;
    let actionSlow = false;
    let actionSlowTimer = null;

    function openModal(modalId, preferredFocus) {
      const modal = $(modalId);
      if (!modal) return;
      if (modal.hidden) {
        const active = document.activeElement;
        modalReturnFocus.set(modalId, active instanceof HTMLElement ? active : null);
      }
      modal.hidden = false;
      setModalBackgroundInert(true);
      window.requestAnimationFrame(() => {
        if (modal.hidden) return;
        const target = preferredFocus || modal.querySelector("[autofocus], button, [href], input, select, textarea, [tabindex]:not([tabindex='-1'])") || modal.querySelector("[role='dialog']");
        target?.focus?.();
      });
    }

    function closeModal(modalId) {
      const modal = $(modalId);
      if (!modal || modal.hidden) return;
      modal.hidden = true;
      if (!activeModal()) setModalBackgroundInert(false);
      const returnTarget = modalReturnFocus.get(modalId);
      modalReturnFocus.delete(modalId);
      window.requestAnimationFrame(() => {
        if (returnTarget?.isConnected && !returnTarget.closest("[inert]")) returnTarget.focus();
        if (!activeModal()) scheduleVisibleWorldBeatReceipts();
      });
    }

    function trapModalFocus(event, modal) {
      if (event.key !== "Tab" || !modal) return false;
      const focusable = [...modal.querySelectorAll("button:not([disabled]), [href], input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex='-1'])")]
        .filter((node) => !node.hidden && node.getAttribute("aria-hidden") !== "true" && node.getClientRects().length > 0);
      const dialog = modal.querySelector("[role='dialog']");
      if (!focusable.length) {
        event.preventDefault();
        dialog?.focus();
        return true;
      }
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      const current = document.activeElement;
      if (!modal.contains(current) || (event.shiftKey && current === first) || (!event.shiftKey && current === last)) {
        event.preventDefault();
        (event.shiftKey ? last : first).focus();
      }
      return true;
    }

    async function api(path, options = {}) {
      const response = await fetch(path, options);
      const payload = await response.json().catch(() => null);
      if (!response.ok) {
        throw new Error(payload?.error || `${response.status} ${response.statusText}`);
      }
      return payload;
    }

    async function post(path, payload) {
      return api(path, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload),
      });
    }

    function base64UrlToBytes(value) {
      const normalized = String(value || "").replaceAll("-", "+").replaceAll("_", "/");
      const padded = normalized + "=".repeat((4 - normalized.length % 4) % 4);
      return Uint8Array.from(atob(padded), (character) => character.charCodeAt(0));
    }

    function bytesToBase64Url(value) {
      const bytes = new Uint8Array(value || []);
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary).replaceAll("+", "-").replaceAll("/", "_").replaceAll("=", "");
    }

    function creationOptionsFromJson(value) {
      const options = value?.publicKey || value;
      if (window.PublicKeyCredential?.parseCreationOptionsFromJSON) {
        return PublicKeyCredential.parseCreationOptionsFromJSON(options);
      }
      return {
        ...options,
        challenge: base64UrlToBytes(options.challenge),
        user: { ...options.user, id: base64UrlToBytes(options.user.id) },
        excludeCredentials: (options.excludeCredentials || []).map((entry) => ({
          ...entry,
          id: base64UrlToBytes(entry.id),
        })),
      };
    }

    function requestOptionsFromJson(value) {
      const options = value?.publicKey || value;
      if (window.PublicKeyCredential?.parseRequestOptionsFromJSON) {
        return PublicKeyCredential.parseRequestOptionsFromJSON(options);
      }
      return {
        ...options,
        challenge: base64UrlToBytes(options.challenge),
        allowCredentials: (options.allowCredentials || []).map((entry) => ({
          ...entry,
          id: base64UrlToBytes(entry.id),
        })),
      };
    }

    function credentialToJson(credential) {
      if (typeof credential?.toJSON === "function") return credential.toJSON();
      const response = credential.response || {};
      const registration = "attestationObject" in response;
      return {
        id: credential.id,
        rawId: bytesToBase64Url(credential.rawId),
        type: credential.type,
        authenticatorAttachment: credential.authenticatorAttachment || undefined,
        clientExtensionResults: credential.getClientExtensionResults?.() || {},
        response: registration
          ? {
              attestationObject: bytesToBase64Url(response.attestationObject),
              clientDataJSON: bytesToBase64Url(response.clientDataJSON),
              transports: response.getTransports?.() || [],
            }
          : {
              authenticatorData: bytesToBase64Url(response.authenticatorData),
              clientDataJSON: bytesToBase64Url(response.clientDataJSON),
              signature: bytesToBase64Url(response.signature),
              userHandle: response.userHandle ? bytesToBase64Url(response.userHandle) : null,
            },
      };
    }

    function applyIdentity(nextIdentity) {
      identity = nextIdentity || { authenticated: false, wallets: [], passkeys: [] };
      if (identity.authenticated) {
        walletAddress = identity.active_wallet || "";
        walletSession = identity.wallet_session || "";
        localStorage.removeItem("cosyworld.walletSession");
        if (walletAddress) localStorage.setItem("cosyworld.wallet", walletAddress);
      }
      equippedCardIds = loadKeepsakeLoadout();
      return identity;
    }

    async function loadIdentity() {
      try {
        const nextIdentity = await api("/auth/account");
        const preferredWallet = localStorage.getItem("cosyworld.wallet") || "";
        const canRestorePreference = nextIdentity?.authenticated
          && preferredWallet
          && preferredWallet !== nextIdentity.active_wallet
          && (nextIdentity.wallets || []).some((entry) => entry.wallet_address === preferredWallet);
        return applyIdentity(canRestorePreference
          ? await post("/auth/wallets/select", { wallet_address: preferredWallet })
          : nextIdentity);
      } catch (error) {
        identity = { authenticated: false, wallets: [], passkeys: [], error: String(error.message || error) };
        return identity;
      }
    }

    async function registerPasskey(additional = false) {
      if (!window.PublicKeyCredential || !navigator.credentials?.create) {
        throw new Error("Passkeys are not supported by this browser.");
      }
      const username = additional ? (identity?.username || "") : "";
      const displayName = additional ? (identity?.display_name || username) : "";
      const started = await post("/auth/passkey/register/start", {
        username,
        display_name: displayName,
        wallet_session: identity?.authenticated ? null : (walletSession || null),
      });
      if (!started.ok) throw new Error(started.error || "Passkey registration could not start.");
      const credential = await navigator.credentials.create({
        publicKey: creationOptionsFromJson(started.public_key),
      });
      if (!credential) throw new Error("Passkey registration was cancelled.");
      const finished = await post("/auth/passkey/register/finish", {
        ceremony_id: started.ceremony_id,
        credential: credentialToJson(credential),
      });
      if (!finished.ok) throw new Error(finished.error || "Passkey registration failed.");
      applyIdentity(finished);
      await refresh();
      connectStream();
    }

    async function loginWithPasskey() {
      if (!window.PublicKeyCredential || !navigator.credentials?.get) {
        throw new Error("Passkeys are not supported by this browser.");
      }
      const started = await post("/auth/passkey/login/start", { username: "" });
      if (!started.ok) throw new Error(started.error || "Passkey sign-in could not start.");
      const credential = await navigator.credentials.get({
        publicKey: requestOptionsFromJson(started.public_key),
      });
      if (!credential) throw new Error("Passkey sign-in was cancelled.");
      const finished = await post("/auth/passkey/login/finish", {
        ceremony_id: started.ceremony_id,
        credential: credentialToJson(credential),
      });
      if (!finished.ok) throw new Error(finished.error || "Passkey sign-in failed.");
      applyIdentity(finished);
      await refresh();
      connectStream();
    }

    async function continueWithPasskey() {
      try {

        if (String(error?.name || "") !== "NotAllowedError") throw error;

    async function requestDevResetIfNeeded() {
      if (!wantsReset) return;
      try {
        await post("/dev/reset", {});
      } catch {
        // The reset endpoint is dev-gated; clearing the local avatar is still useful.
      }
      bootParams.delete("reset");
      const qs = bootParams.toString();
      window.history.replaceState(null, "", `${window.location.pathname}${qs ? `?${qs}` : ""}`);

    async function refresh() {
      const previousLocationId = state?.location?.id || null;
      const wasTired = actorIsTired(state);
      const requestedActorId = actorId;
      const stateRequest = api(statePath());
      const contentPacksRequest = ensureContentPacks().catch(() => null);
      const nextState = await stateRequest;
      if (requestedActorId !== actorId) return;
      await contentPacksRequest;
      const timelineRewound = transcriptTimelineRewound(nextState);
      state = nextState;
      reconcileKeepsakeLoadout();
      const nextHandCompositionSignature = authoritativeHandSignature(state);
      if (nextHandCompositionSignature !== handCompositionSignature) {
        handKeys = [];
        discardedHandKeys = [];
        handCompositionSignature = nextHandCompositionSignature;
        handDealNonce += 1;
        playerPromotedHandKey = "";
        handCompositionSignature = nextHandCompositionSignature;
      }
      if (actorId && state.primary_action?.kind === "create_avatar") {
        actorId = 0;
        clearLocalSession();
        stopPresenceHeartbeat();
      }
      const locationChanged = previousLocationId && previousLocationId !== state.location?.id;
      if (logEvents.length === 0 || locationChanged || timelineRewound) {
        rebuildLog([...(state.recent_events || [])].reverse());
      }
      if (locationChanged) {
        handKeys = [];
        discardedHandKeys = [];
        focusIndex = 0;
        focusedKey = "";
        playerPromotedHandKey = "";
      }
      const isTired = actorIsTired(state);
      if (!isTired) recoveryPromptPending = false;
      else if (!wasTired || locationChanged) recoveryPromptPending = true;
      actions = buildActions(state);
      const firstThread = firstThreadModel(state, actions);
      const storyGrowthComesFirst = firstThread?.stage === 2 && Boolean(firstThread.actionKey);
      if (recoveryPromptPending && !storyGrowthComesFirst) {
        const prompted = promotePendingRecoveryAction();
        if (prompted || actions.some((action) => action.focusKey === "rest")) {
          recoveryPromptPending = false;
        }
      }
      reconcileHand();
      restoreFocusedAction();
      render();
    }

    function queueRefresh() {
      if (refreshInFlight) {
        refreshQueued = true;
        return refreshInFlight;
      }
      refreshInFlight = refresh()
        .catch((error) => setError(String(error.message || error)))
        .finally(() => {
          refreshInFlight = null;
          if (refreshQueued) {
            refreshQueued = false;
            queueRefresh();
          }
        });
      return refreshInFlight;
    }

    function requestParams() {
      const params = new URLSearchParams();
      if (actorId) params.set("actor_id", String(actorId));
      if (actorSession) params.set("actor_session", actorSession);
      if (walletSession) params.set("wallet_session", walletSession);
      if (walletAddress) params.set("wallet_address", walletAddress);
      if (ownedCardIds.length) params.set("owned_card_ids", ownedCardIds.join(","));
      return params;
    }

    function statePath() {
      const params = requestParams();
      const qs = params.toString();
      return `/state${qs ? `?${qs}` : ""}`;
    }

    async function exportJournal() {
      const params = requestParams();
      params.set("limit", "1000");
      const events = await api(`/events?${params.toString()}`);
      const payload = {
        format: "cosyworld.journal/1",
        exported_at: new Date().toISOString(),
        actor_id: actorId || null,
        worldpack_bundle_hash: contentPacks?.bundle_hash || null,
        events: Array.isArray(events) ? events : [],
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `cosyworld-journal-${actorId || "visitor"}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      setStatus("Journal exported.", "ok");
    }

    function contentPacksPath() {
      const params = requestParams();
      params.delete("actor_id");
      params.delete("actor_session");
      const qs = params.toString();
      return `/content-packs${qs ? `?${qs}` : ""}`;
    }

    function worldPath() {
      const params = requestParams();
      const qs = params.toString();
      return `/world${qs ? `?${qs}` : ""}`;
    }

    async function ensureContentPacks() {
      const path = contentPacksPath();
      if (contentPacks && contentPacksAccessKey === path) return contentPacks;
      const nextContentPacks = await api(path);
      if (path !== contentPacksPath()) return contentPacks;
      contentPacks = nextContentPacks;
      contentPacksAccessKey = path;
      return contentPacks;
    }

    async function ensureWorldView(force = false) {
      const path = worldPath();
      if (!force && worldView && worldViewAccessKey === path) return worldView;
      const nextWorldView = await api(path);
      if (path !== worldPath()) return worldView;
      worldView = nextWorldView;
      worldViewAccessKey = path;
      return worldView;
    }

    function latestSeenSeq() {
      let latest = streamReplayFloorSeq;
      for (const seq of seenSeq) {
        latest = Math.max(latest, Number(seq) || 0);
      }
      return latest;
    }

    function transcriptTimelineRewound(view, localLatest = latestSeenSeq()) {
      if (!localLatest) return false;
      const serverLatest = (view?.recent_events || []).reduce(
        (latest, event) => Math.max(latest, Number(event?.seq) || 0),
        0,
      );
      return serverLatest < localLatest;
    }

    function streamPath() {
      const params = requestParams();
      const after = latestSeenSeq();
      if (after) params.set("after", String(after));
      const qs = params.toString();
      return `/stream${qs ? `?${qs}` : ""}`;
    }

    function withAccess(payload) {
      return {
        ...payload,
        ...(actorSession ? { actor_session: actorSession } : {}),
        ...(walletSession ? { wallet_session: walletSession } : {}),
        ...(walletAddress ? { wallet_address: walletAddress } : {}),
        ...(ownedCardIds.length ? { owned_card_ids: ownedCardIds.join(",") } : {}),
      };
    }

    function leavePresence() {
      if (!actorId || !actorSession) return;
      stopPresenceHeartbeat();
      const payload = JSON.stringify({ actor_id: actorId, actor_session: actorSession });
      if (navigator.sendBeacon) {
        const body = new Blob([payload], { type: "application/json" });
        navigator.sendBeacon("/presence/leave", body);
        return;
      }
      fetch("/presence/leave", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: payload,
        keepalive: true,
      }).catch(() => {});
    }

    function stopPresenceHeartbeat() {
      if (presenceHeartbeatTimer) window.clearInterval(presenceHeartbeatTimer);
      presenceHeartbeatTimer = null;
    }

    async function pingPresence() {
      if (!actorId || !actorSession) return;
      try {
        const result = await post("/presence/ping", { actor_id: actorId, actor_session: actorSession });
        pushEvents(result.events || []);
        if (!result.ok && result.status === 403) stopPresenceHeartbeat();
      } catch {
        // EventSource retries cover live updates; presence heartbeat can wait for the next tick.
      }
    }

    function startPresenceHeartbeat() {
      stopPresenceHeartbeat();
      if (!actorId || !actorSession) return;
      pingPresence();
      presenceHeartbeatTimer = window.setInterval(pingPresence, presenceHeartbeatMs);
    }

    function turnPingRemainingMs(turn = state?.turn) {
      const expiresAt = Number(turn?.ping_expires_at_ms || 0);
      if (!Number.isFinite(expiresAt) || expiresAt <= 0) return 0;
      return Math.max(0, expiresAt - Date.now());
    }

    function turnPingRemainingLabel(turn = state?.turn) {
      const remainingMs = turnPingRemainingMs(turn);
      if (remainingMs <= 0) return "resolving";
      return `${Math.ceil(remainingMs / 1000)}s`;
    }

    function syncTurnCountdownTimer() {
      if (turnCountdownTimer) {
        window.clearInterval(turnCountdownTimer);
        turnCountdownTimer = null;
      }
      if (!state?.turn?.ping_active || turnPingRemainingMs() <= 0) return;
      turnCountdownTimer = window.setInterval(() => {
        actions = buildActions(state);
        reconcileHand();
        renderCommands();
        if (!state?.turn?.ping_active || turnPingRemainingMs() <= 0) {
          window.clearInterval(turnCountdownTimer);
          turnCountdownTimer = null;
        }
      }, 500);
    }

    function parseCardIds(value) {
      return String(value || "")
        .split(/[\s,;]+/)
        .map((part) => part.trim())
        .filter(Boolean);
    }

    function keepsakeStorageKey() {
      const owner = String(walletAddress || "guest").trim().toLowerCase() || "guest";
      return `cosyworld.keepsakes:${owner}`;
    }

    function loadKeepsakeLoadout() {
      try {
        const value = JSON.parse(localStorage.getItem(keepsakeStorageKey()) || "[]");
        return Array.isArray(value)
          ? [...new Set(value.map((cardId) => String(cardId || "").trim()).filter(Boolean))].slice(0, keepsakeCapacity)
          : [];
      } catch {
        return [];
      }
    }

    function saveKeepsakeLoadout() {
      localStorage.setItem(keepsakeStorageKey(), JSON.stringify(equippedCardIds.slice(0, keepsakeCapacity)));
    }

    function ownedCollectionCards() {
      return Array.isArray(state?.account?.owned_cards) ? state.account.owned_cards : [];
    }

    function reconcileKeepsakeLoadout() {
      const owned = new Set(ownedCollectionCards().map((card) => card.card_id).filter(Boolean));
      const next = equippedCardIds.filter((cardId) => owned.has(cardId)).slice(0, keepsakeCapacity);
      if (JSON.stringify(next) === JSON.stringify(equippedCardIds)) return false;
      equippedCardIds = next;
      saveKeepsakeLoadout();
      return true;
    }

    function toggleKeepsakeCard(cardId) {
      const normalized = String(cardId || "").trim();
      if (!normalized || !ownedCollectionCards().some((card) => card.card_id === normalized)) return false;
      if (equippedCardIds.includes(normalized)) {
        equippedCardIds = equippedCardIds.filter((entry) => entry !== normalized);
      } else {
        if (equippedCardIds.length >= keepsakeCapacity) return false;
        equippedCardIds = [...equippedCardIds, normalized];
      }
      saveKeepsakeLoadout();
      render();
      return true;
    }

    function solanaProvider() {
      return window.solana || window.phantom?.solana || window.solflare?.solana || window.solflare || null;
    }

    function withTimeout(promise, ms, message) {
      return new Promise((resolve, reject) => {
        const timer = window.setTimeout(() => reject(new Error(message)), ms);
        Promise.resolve(promise)
          .then((value) => {
            window.clearTimeout(timer);
            resolve(value);
          })
          .catch((error) => {
            window.clearTimeout(timer);
            reject(error);
          });
      });
    }

    function walletRequestError(error, fallback) {
      const message = String(error?.message || error || "").trim();
      if (/reject|denied|cancel/i.test(message)) return "Wallet request cancelled.";
      if (/timed out/i.test(message)) return message;
      if (/prompt\(\)|prompt|not supported/i.test(message)) {
        return "Wallet signing prompt is not available in this browser. Open the QR page inside Phantom or Solflare and try again.";
      }
      return message ? `${fallback}: ${message}` : fallback;
    }

    function buildActions(view) {

      const characterIdentity = view.character_identity || null;

        const creationProfile = (view.character_creation || [])

            label: "choose class",

            card: cardForActor(actorId),

      }

      const turn = view.turn || {};
      const options = new Set((view.primary_action?.options || []).map((option) => option.kind));
      const economy = view.economy || {};
      const ledger = view.ledger || {};
      const skills = Array.isArray(view.skills) ? view.skills : [];
      const offerFor = (kind) => (view.action_offers || []).find((offer) => offer.kind === kind) || null;
      const offerHand = (...candidateOffers) => {
        const offers = candidateOffers.flat().filter(Boolean);
        const offerKinds = [...new Set(offers.map((offer) => String(offer.kind || "")).filter(Boolean))];
        const projectedKinds = (view.action_hand?.entries || []).map((entry) => String(entry.kind || ""));
        const selected = offers.find((offer) => projectedKinds.includes(String(offer.kind || "")))
          || offers.slice().sort((left, right) => (
            Number(left?.provider?.priority ?? 255) - Number(right?.provider?.priority ?? 255)
            || Number(left?.rank ?? 500) - Number(right?.rank ?? 500)
            || String(left?.id || "").localeCompare(String(right?.id || ""))
          ))[0]
          || null;
        return {
          offerKinds,
          handProvider: selected?.provider || null,
        };
      };
      const inferredOfferKinds = (action) => {
        const kinds = [...(Array.isArray(action?.offerKinds) ? action.offerKinds : [])];
        const intention = String(action?.intention || "").toLowerCase();
        const label = String(action?.label || "").toLowerCase();
        const focusKey = String(action?.focusKey || "").toLowerCase();
        const add = (...values) => values.forEach((value) => {
          if (value && !kinds.includes(value)) kinds.push(value);
        });
        if (intention === "notice") add("check");
        if (intention === "inspect") add("search");
        if (intention === "scout") add("explore_path");
        if (intention === "travel") add("move");
        if (intention === "flee") add("flee");
        if (intention === "contribute") add("work", "help");
        if (action?.evolveModes?.includes("grow") || focusKey === "bank-ledger") add("bank_ledger");
        if (action?.evolveModes?.includes("practice") || focusKey.startsWith("train")) add("train_skill");
        if (action?.kind === "orb-chat") add("chat");
        if (action?.kind === "advancement-chat" || label === "chat") add("create_bond");
        if (label === "give") add("give_item");
        if (label === "trade") add("trade_item");
        if (["take", "swap"].includes(label)) add("pick_up");
        if (label === "use") {
          if (action?.useChoiceKind !== "feature") add("use_item");
          if (action?.useChoiceKind !== "care") add("use_feature");
        }
        if (label === "attack") add("attack");
        if (label === "defend") add("defend");
        if (label === "prepare") add("prepare");
        if (label === "rest") add("rest");
        if (["grow closer", "bond"].includes(label)) add("create_bond");
        if (label === "remember") add("resolve_bond");
        return kinds;
      };
      const decorateActionHand = (action) => {
        if (!action) return action;
        const kinds = inferredOfferKinds(action);
        const providerProjection = offerHand(kinds.map(offerFor));
        action.offerKinds = [...new Set([...kinds, ...providerProjection.offerKinds])];
        action.handProvider = action.handProvider || providerProjection.handProvider || {
          kind: "location",
          id: `location:${view.location?.id || "current"}`,
          label: String(view.location?.name || "This room"),
          reason: `From ${view.location?.name || "this room"}`,

        };
        return action;
      };
      const offerVerb = (offer, fallback) => String(offer?.verb || fallback || "Act").trim();
      const targetBearingLabel = (intention, verb, target) => {
        const cleanVerb = String(verb || "Act").trim();
        const cleanTarget = String(target || "").trim();
        if (!cleanTarget) return cleanVerb;
        const preposition = intention === "scout" ? "toward" : (intention === "travel" ? "to" : "");
        if (!preposition || cleanVerb.toLowerCase().endsWith(` ${preposition}`)) return `${cleanVerb} ${cleanTarget}`;
        return `${cleanVerb} ${preposition} ${cleanTarget}`;
      };
      const semanticAction = (offer, fallbackIntention, accessibleLabel = "") => ({
        ...offerHand(offer),
        intention: String(offer?.intention || fallbackIntention || "").trim(),
        target: offer?.target || null,
        project: offer?.project || null,
        accessibleLabel: String(accessibleLabel || offer?.accessible_label || "").trim(),
      });
      const buildGrowAction = () => {
        if (!options.has("bank_ledger") || Number(ledger.unbanked_count || 0) <= 0) return null;

      const buildUnlockCharmSlotAction = () => {
        if (!options.has("unlock_charm_slot") || Number(ledger.advancement_points || 0) <= 0) return null;
        const slots = Number(view.deck?.bracelet_slots || 0);

      const buildEvolveAction = () => {

        const evolutionChoices = [];

          memoryCount: growAction?.memoryCount,

          evolveModes: [growAction ? "grow" : "", practiceAction ? "practice" : ""].filter(Boolean),

        if (!chatCandidates.length) return null;
        const firstChat = chatCandidates[0];

        const waitingAction = {
          handProvider: {
            kind: "rules",
            id: "rules:shared-turn",
            label: "Shared turn",
            reason: "From the shared turn rules",

          },

      const built = [];

        ));
        if (!nextStretchRevealed) {

            card: cardForLocation(view.location?.id),

            effect: nextIsDestination
              ? `the way to ${journey.destination_name} is revealed`
              : `the hidden next stretch toward ${journey.destination_name} is revealed`,
            busyLabel: "scouting",
            busyDetail: "the next stretch is taking shape…",
            run: () => action("/actions/explore-path", { actor_id: actorId }),
          });
        }
      }

      const heldUsableItems = (view.items || []).filter((item) => item.holder_actor_id === actorId && item.kind === "potion" && item.charges > 0);
      const heldItems = (view.items || []).filter((item) => item.holder_actor_id === actorId);
      const carriedWeightTenths = Number(view.economy?.carried_weight_tenths || 0);
      const carryingCapacityTenths = Number(
        view.economy?.carrying_capacity_tenths || Number.MAX_SAFE_INTEGER,
      );
      const itemWeightTenths = (item) => item ? Math.max(1, Number(item.weight_tenths || 10)) : 0;
      const itemContainerCapacityTenths = (item) => (
        item?.role === "container" ? Math.max(0, Number(item?.container_capacity_tenths || 0)) : 0
      );
      const carriedDeckFitsAfter = (incoming, outgoing = null) => (
        carriedWeightTenths - itemWeightTenths(outgoing) + itemWeightTenths(incoming)
          <= carryingCapacityTenths
            - itemContainerCapacityTenths(outgoing)
            + itemContainerCapacityTenths(incoming)
      );
      const equippedCharmIds = new Set((view.deck?.equipped_charms || []).map((item) => Number(item.id)));
      const exchangeCardFor = (incoming) => {
        if (carriedDeckFitsAfter(incoming)) return null;
        return heldItems
          .slice()
          .sort((left, right) => (
            Number(left.role === "container") - Number(right.role === "container")
              || Number(equippedCharmIds.has(Number(left.id))) - Number(equippedCharmIds.has(Number(right.id)))
              || itemWeightTenths(right) - itemWeightTenths(left)
              || Number(left.id) - Number(right.id)
          ))
          .find((outgoing) => carriedDeckFitsAfter(incoming, outgoing)) || null;
      };
      const bonds = Array.isArray(view.bonds) ? view.bonds : [];
      const activeBondTargetIds = new Set(bonds.map((bond) => Number(bond.target_actor_id || 0)));
      const offeredAttackTargetId = Number(offerFor("attack")?.target?.id || 0);
      const encounterTargetIds = new Set((view.combat?.participants || [])
        .filter((participant) => Number(participant.side) === 2 && participant.status === "active" && !participant.escaped)
        .map((participant) => Number(participant.actor_id)));
      const attackTargetIds = new Set(options.has("attack") ? (view.actors || [])
        .filter((actor) => actor.id !== actorId
          && actor.kind === "npc"
          && actor.status === "active"
          && (offeredAttackTargetId > 0
            ? actor.id === offeredAttackTargetId
            : encounterTargetIds.size === 0 || encounterTargetIds.has(actor.id)))
        .map((actor) => actor.id) : []);
      const usableTargets = (view.actors || []).filter((actor) => (
        actorNeedsHealing(actor)
        && !(actor.kind === "npc" && attackTargetIds.has(actor.id))
      ));
      const residentTargets = (view.actors || []).filter((actor) => actor.id !== actorId && actor.kind === "npc" && actor.status === "active");
      const progressAmountFromOffer = (offer, fallback) => {
        const structured = Number(offer?.progress || 0);
        if (Number.isFinite(structured) && structured > 0) return structured;
        const text = `${offer?.effect || ""} ${offer?.risk || ""}`;
        const match = text.match(/(?:advances \+|sets up \+|setup \+|by )([1-9]\d*)/i);
        return match ? Number(match[1]) : fallback;

    function mergeDuplicateUseCards(builtActions) {
      const uses = builtActions.filter((action) => String(action?.label || "").toLowerCase() === "use");
      if (uses.length <= 1) return;

      const modes = [];
      uses.forEach((source, sourceIndex) => {
        const sourceChoices = Array.isArray(source.choices) && source.choices.length
          ? source.choices
          : [null];
        sourceChoices.forEach((choice, choiceIndex) => {
          const rawDetail = String(choice?.detail || source.detail || "").trim();
          const itemName = String(source.itemName || rawDetail.split("·")[0].split(/\s+(?:with|on)\s+/i)[0] || "keepsake").trim();
          const feature = source.useChoiceKind === "feature";
          const targetLabel = String(choice?.label || source.targetName || "you").trim();
          const label = feature
            ? `with ${source.featureName || String(source.detail || "the room").split(/\s+with\s+/i).at(-1)}`
            : `help ${targetLabel.toLowerCase() === "you" ? "you" : targetLabel}`;
          const detail = feature
            ? [itemName, friendlyActionText(source.effect)].filter(Boolean).join(" · ")
            : (rawDetail || [itemName, friendlyActionText(source.effect)].filter(Boolean).join(" · "));
          modes.push({
            key: `mode:${sourceIndex}:${choiceIndex}:${choice?.value || source.focusKey || source.command || "use"}`,
            label,
            detail,
            itemName,
            card: choice?.card || source.card,
            source,
            choiceValue: choice?.value,
            focusKeys: [source.focusKey, ...(source.focusKeys || [])].filter(Boolean),
            priority: Number.isFinite(Number(source.priority)) ? Number(source.priority) : actionRank(source),
          });
        });
      });
      modes.sort((left, right) => left.priority - right.priority || left.label.localeCompare(right.label));
      const first = modes[0];
      const itemNames = [...new Set(modes.map((mode) => mode.itemName).filter(Boolean))];
      const sameItem = itemNames.length === 1;
      const selectMode = (mode) => {
        if (mode?.choiceValue !== undefined && mode?.choiceValue !== null) {
          mode.source.selectedChoice = mode.choiceValue;
        }
        return mode;
      };
      const merged = {
        label: "use",
        detail: sameItem ? `${itemNames[0]} · choose how` : "choose what to use",
        command: "use",
        focusKey: `use:${modes.map((mode) => mode.key).join("|")}`,
        focusKeys: [...new Set(modes.flatMap((mode) => mode.focusKeys))],
        card: first.card,
        shape: "item",
        useChoiceKind: "mixed",
        itemName: sameItem ? itemNames[0] : "",
        priority: Math.min(...modes.map((mode) => mode.priority)),
        modalTitle: sameItem ? `choose how to use ${itemNames[0]}` : "choose what to use",
        modalSummary: sameItem
          ? `Choose what ${itemNames[0]} should do here.`
          : "Choose a keepsake and how to use it.",
        effect: "the use you choose changes the scene",
        choices: modes.map((mode) => ({
          label: mode.label,
          detail: mode.detail,
          value: mode.key,
          card: mode.card,
        })),
        selectedChoice: first.key,
      };
      merged.selectedMode = () => selectMode(
        modes.find((mode) => mode.key === merged.selectedChoice) || first,
      );
      merged.selectedPayload = () => {
        const mode = merged.selectedMode();
        return mode.source.selectedPayload?.() || { command: mode.source.command };
      };
      merged.run = () => {
        const mode = merged.selectedMode();
        return mode.source.run();
      };

      for (let index = builtActions.length - 1; index >= 0; index -= 1) {
        if (uses.includes(builtActions[index])) builtActions.splice(index, 1);
      }
      builtActions.push(merged);
    }

    function turnPingPillHtml(turn = state?.turn) {
      if (!turn?.ping_active) return "";
      const countdown = turnPingRemainingLabel(turn);
      const currentName = turn.current_actor_name || "the current player";
      const responders = (turn.ping_responder_ids || []).length;
      const alreadyPonged = (turn.ping_responder_ids || []).map(Number).includes(Number(actorId));
      const copy = turn.is_current_actor
        ? "the room is waiting for your choice"
        : alreadyPonged
          ? `waiting on ${currentName} — the room knows you're here`
          : `waiting on ${currentName} — say you're here for the next choice`;
      const suffix = !turn.is_current_actor && responders > 1 ? ` · ${responders} are here` : "";
      return `<span class="turn-ping-copy">${escapeHtml(copy + suffix)}</span><span class="turn-ping-time">${escapeHtml(countdown)}</span>`;
    }

    function renderTurnPingPill() {
      const pill = $("turn-ping-pill");
      if (!pill) return;
      const html = turnPingPillHtml();
      pill.hidden = !html;
      pill.classList.toggle("urgent", Boolean(state?.turn?.ping_active && state?.turn?.is_current_actor));
      pill.innerHTML = html;
    }

    function compareActions(left, right) {
      const rank = actionRank(left) - actionRank(right);
      if (rank) return rank;
      return String(left.detail || left.label || "").localeCompare(String(right.detail || right.label || ""));
    }

    function actionRank(action) {
      if (Number.isFinite(Number(action.priority))) return Number(action.priority);
      const label = String(action.label || "").toLowerCase();
      const ranks = {
        "give": 10,
        "give item": 10,
        "use": 20,
        "rest": 25,
        "take": 30,
        "swap": 30,
        "prepare": 32,
        "attack": 40,
        "defend": 45,
        "work": 48,
        "help": 49,
        "flee": 50,
        "search": 55,
        "listen": 60,
        "listen again": 60,
        "chat": 70,
        "trade": 74,
        "bank": 75,
        "train": 76,
        "evolve": 76,
        "bond": 77,
        "remember": 79,
        "travel": 80,
      };
      return ranks[label] || 100;
    }

    function normalizeActionCardType(type) {
      const normalized = String(type || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      return actionCardTypes.includes(normalized) ? normalized : "";
    }

    function normalizeActionCardRarity(rarity) {
      const normalized = String(rarity || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      return actionCardRarities.includes(normalized) ? normalized : "generated";
    }

    function friendlyCardRarity(rarity) {
      const normalized = normalizeActionCardRarity(rarity);
      if (["ultra-rare", "mythic", "legendary"].includes(normalized)) return "storybook";
      if (["rare", "super-rare"].includes(normalized)) return "rare";
      if (normalized === "uncommon") return "curious";
      return "everyday";
    }

    function actionCardType(action) {
      const semanticTypes = {
        notice: "notice",
        inspect: "inspect",
        scout: "scout",
        travel: "travel",
        contribute: "project",
      };
      const semantic = semanticTypes[String(action?.intention || "").toLowerCase()];
      if (semantic) return semantic;
      const explicit = normalizeActionCardType(action?.cardType || action?.type);
      if (explicit) return explicit;
      const label = String(action?.label || "").toLowerCase();
      const command = String(action?.command || "").toLowerCase();
      const focusKey = String(action?.focusKey || "").toLowerCase();
      const detail = String(action?.detail || "").toLowerCase();
      const risk = String(action?.risk || "").toLowerCase();

      if (label.includes("shuffle") || command === "shuffle" || focusKey === "shuffle-hand") return "shuffle";
      if (label === "attack" || label === "defend" || command.startsWith("attack ") || command === "defend") return "combat";
      if (label === "flee" || command.startsWith("flee") || risk.includes("danger")) return "danger";
      if (label === "travel" || command.startsWith("go ")) return "travel";
      if (label === "chat" || command.startsWith("chat ")) return "chat";
      if (label === "grow closer" || label === "bond" || label === "remember" || focusKey.includes("bond")) return "bond";
      if (label === "listen" || label === "listen again" || label === "search" || label === "look" || command === "search" || command.startsWith("search ")) return "listen";
      if (label === "evolve" || command === "evolve") return "evolve";
      if (label === "practice" || label === "train" || command.startsWith("skill ")) return "train";
      if (label === "grow" || label === "bank") return "bank";
      if (label === "trade" || label === "give") return "trade";
      if (label === "take" || label === "swap") return "item";
      if (label === "use") return detail.includes("progress") ? "craft" : "item";
      if (label === "prepare" || label === "work" || label === "help" || label === "finish") return "project";
      if (label === "rest") return "utility";
      return "utility";
    }

    function actionCardAccentClass(action) {
      const cardType = actionCardType(action);
      if (["combat", "notice", "inspect", "scout", "travel", "project"].includes(cardType)
          && String(action?.intention || "")) {
        return { cardType, rarity: "", className: `type-${cardType}` };

      if (cardType === "combat") return { cardType, rarity: "", className: "type-combat" };
      const rarity = normalizeActionCardRarity(action?.card?.rarity || action?.rarity || action?.target?.rarity);
      return { cardType, rarity, className: `rarity-${rarity}` };
    }

    async function connectWallet() {
      const provider = solanaProvider();
      if (!provider?.connect || !provider?.signMessage) {
        return openQrWalletLogin();
      }
      try {
        setStatus("Confirm wallet access in your Solana wallet.", "ok");
        const connected = await withTimeout(
          provider.connect(),
          walletRequestTimeoutMs,
          "Wallet connection timed out."
        );
        const publicKey = connected?.publicKey || provider.publicKey;
        const nextWallet = publicKey?.toString?.() || "";
        if (!nextWallet) {
          setError("Wallet connection failed.");
          return false;
        }
        const challenge = await api(`/wallet/challenge?wallet_address=${encodeURIComponent(nextWallet)}`);
        if (!challenge.ok) {
          setError("Wallet challenge failed.");
          return false;
        }
        setStatus("Sign the CosyWorld wallet challenge.", "ok");
        const encoded = new TextEncoder().encode(challenge.message);
        const signed = await withTimeout(
          provider.signMessage(encoded, "utf8"),
          walletRequestTimeoutMs,
          "Wallet signature timed out."
        );
        const signature = Array.from(signed?.signature || signed || []);
        const session = await post("/wallet/session", {
          wallet_address: nextWallet,
          nonce: challenge.nonce,
          signature,
        });
        if (!session.ok || !session.wallet_session) {
          setError(session.error || "Wallet signature rejected.");
          return false;
        }
        walletAddress = session.wallet_address || nextWallet;
        walletSession = session.wallet_session;
        equippedCardIds = loadKeepsakeLoadout();
        localStorage.setItem("cosyworld.wallet", walletAddress);
        localStorage.setItem("cosyworld.walletSession", walletSession);
        setStatus("Wallet connected.", "ok");
        focusIndex = 0;
        focusedKey = "";
        playerPromotedHandKey = "";
        await refresh();
        connectStream();
        return true;
      } catch (error) {
        setError(walletRequestError(error, "Wallet connection failed"));
        return false;
      }
    }

    async function openBox(boxAssetAddress) {
      if (!walletSession) {
        const connected = await connectWallet();
        if (!connected) {
          setError("Connect a wallet to open this Box.");
          return;
        }
      }
      setError("");
      setStatus("Opening Box...", "ok");
      openingBoxId = boxAssetAddress;
      accountPanelPinned = true;
      render();
      try {
        const prepared = await post("/nft/boxes/burn-prepare", {
          wallet_session: walletSession,
          box_asset_address: boxAssetAddress,
        });
        if (!prepared.ok) {
          throw new Error(prepared.error || "Box cannot be opened.");
        }
        let packId = prepared.pack_id || "";
        if (!String(prepared.burn_message || "").startsWith("Box already")) {
          const burnSignature = prepared.burn_transaction
            ? await signAndSendBoxBurnTransaction(prepared.burn_transaction)
            : await signWalletMessage(prepared.burn_message || `Burn Wooden Box ${boxAssetAddress}`);
          const confirmed = await post("/nft/boxes/burn-confirm", {
            wallet_session: walletSession,
            box_asset_address: boxAssetAddress,
            burn_signature: burnSignature,
          });
          if (!confirmed.ok) {
            throw new Error(confirmed.error || "The Box could not be opened.");
          }
          packId = confirmed.receipt?.pack_id || packId;
        }
        if (!packId) throw new Error("Box did not create an avatar bundle.");
        await openPack(packId);

        openingBoxId = "";
        render();
