      return copy[id] || "";
    }

    function copyForLocation(id, view = state) {
      if (id === 1) return "A warm room of firelight, knitting needles, quiet symbols, and watchful silence.";
      if (id === 2) return gardenCopy(view);
      if (id === 3) return "The path shines under cold moonlight. The air permits sharper choices.";
      if (id === 10) return "Science Class hums with shared observations, bright benches, and questions waiting to be tested.";
      if (id === 11) return "Homeroom waits with front-door morning light and the sense that every question gets a seat.";
      if (id === 12) return "Library quiet gathers around the shelves; if it matters, someone wrote it down.";
      if (id === 13) return "Cafeteria tables hold the soft thunder of commons diplomacy.";
      if (id === 14) return "Greenhouse glass glows with patient leaves and experiments that grow slowly.";
      if (id === 15) return "Courtyard paths cross under open sky; every hallway seems to lead back here.";
      if (freeLocationCopy(id)) return freeLocationCopy(id);
      const generatedDescription = Number(id || 0) >= 100000
        ? String(view?.location?.description || "").trim()
        : "";
      if (generatedDescription) return generatedDescription;
      return "The world hums softly.";
    }

    function channelName(name) {
      return String(name).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    function setError(message) {
      setStatus(message, "error");
    }

    function setStatus(message, kind = "error") {
      const node = $("error");
      node.textContent = message;
      node.classList.toggle("ok", Boolean(message) && kind === "ok");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }

    function escapeSvg(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    document.addEventListener("click", (event) => {
      const target = event.target.closest("[data-card-key]");
      if (!target) return;
      const card = cardByKey(target.getAttribute("data-card-key") || "");
      if (!card) return;
      event.preventDefault();
      event.stopPropagation();
      openCardModal(card);
    }, true);

    $("log").addEventListener("click", (event) => {
      const menuTarget = event.target.closest("[data-menu-section]");
      if (menuTarget) {
        event.preventDefault();
        const section = menuTarget.getAttribute("data-menu-section") || "deck";
        menuSection = section;
        if (section === "world") {
          toggleLibraryPanel(true);
        } else {
          libraryPanelPinned = false;
          accountPanelPinned = true;
          if (section === "collection" || section === "identity") void loadIdentity();
          render();
        }
        return;
      }
      const charmTarget = event.target.closest("[data-set-charm]");
      if (charmTarget) {
        event.preventDefault();
        const itemId = Number(charmTarget.getAttribute("data-set-charm") || 0);
        const equipped = charmTarget.getAttribute("data-equipped") === "true";
        action("/actions/set-charm-equipped", { actor_id: actorId, item_id: itemId, equipped })
          .then(() => refresh());
        return;
      }
      const spellTarget = event.target.closest("[data-set-spell]");
      if (spellTarget) {
        event.preventDefault();
        const itemId = Number(spellTarget.getAttribute("data-set-spell") || 0);
        const prepared = spellTarget.getAttribute("data-prepared") === "true";
        action("/actions/set-spell-prepared", { actor_id: actorId, item_id: itemId, equipped: prepared })
          .then(() => refresh());
        return;
      }
      const equipmentTarget = event.target.closest("[data-set-item-equipped]");
      if (equipmentTarget) {
        event.preventDefault();
        const itemId = Number(equipmentTarget.getAttribute("data-set-item-equipped") || 0);
        const equipped = equipmentTarget.getAttribute("data-equipped") === "true";
        action("/actions/set-item-equipped", { actor_id: actorId, item_id: itemId, equipped })
          .then(() => refresh());
        return;
      }
      const containedTarget = event.target.closest("[data-set-contained]");
      if (containedTarget) {
        event.preventDefault();
        const itemId = Number(containedTarget.getAttribute("data-set-contained") || 0);
        const containerRaw = containedTarget.getAttribute("data-container") || "";
        action("/actions/set-item-contained", {
          actor_id: actorId,
          item_id: itemId,
          container_item_id: containerRaw ? Number(containerRaw) : null,
        }).then(() => refresh());
        return;
      }
      const materializeTarget = event.target.closest("[data-materialize-card]");
      if (materializeTarget) {
        event.preventDefault();
        const cardId = materializeTarget.getAttribute("data-materialize-card") || "";
        if (!cardId) return;
        action("/collection/materialize", {
          actor_id: actorId,
          card_id: cardId,
          receipt_id: materializationReceiptId(cardId),
        }).then(() => refresh());
        return;
      }
      const unmaterializeTarget = event.target.closest("[data-unmaterialize-receipt]");
      if (unmaterializeTarget) {
        event.preventDefault();
        const receiptId = unmaterializeTarget.getAttribute("data-unmaterialize-receipt") || "";
        if (!receiptId) return;
        action("/collection/unmaterialize", {
          actor_id: actorId,
          receipt_id: receiptId,
        }).then(() => refresh());
        return;
      }
      if (event.target.closest("[data-unlock-charm-slot]")) {
        event.preventDefault();
        action("/actions/unlock-charm-slot", { actor_id: actorId }).then(() => refresh());
        return;
      }
      if (event.target.closest("[data-export-journal]")) {
        event.preventDefault();
        exportJournal().catch((error) => setError(String(error.message || error)));
        return;
      }
      const passkeyContinue = event.target.closest("[data-passkey-continue]");
      if (passkeyContinue) {
        event.preventDefault();
        runIdentityTask("Continue with your passkey.", continueWithPasskey);
        return;
      }
      const passkeyAdd = event.target.closest("[data-passkey-add]");
      if (passkeyAdd) {
        event.preventDefault();
        runIdentityTask("Add another passkey.", () => registerPasskey(true));
        return;
      }
      const accountLogout = event.target.closest("[data-account-logout]");
      if (accountLogout) {
        event.preventDefault();
        runIdentityTask("Signing out.", logoutAccount);
        return;
      }
      const walletLink = event.target.closest("[data-wallet-link]");
      if (walletLink) {
        event.preventDefault();
        runIdentityTask("Open this claim in your Solana wallet.", claimNftWallet);
        return;
      }
      const walletSelect = event.target.closest("[data-wallet-select]");
      if (walletSelect) {
        event.preventDefault();
        const wallet = walletSelect.getAttribute("data-wallet-select") || "";
        runIdentityTask("Switching linked wallet.", () => selectLinkedWallet(wallet));
        return;
      }
      const walletUnlink = event.target.closest("[data-wallet-unlink]");
      if (walletUnlink) {
        event.preventDefault();
        const wallet = walletUnlink.getAttribute("data-wallet-unlink") || "";
        runIdentityTask("Unlinking wallet.", () => unlinkWallet(wallet));
        return;
      }
      const keepsake = event.target.closest("[data-account-toggle-keepsake]");
      if (keepsake) {
        event.preventDefault();
        const cardId = keepsake.getAttribute("data-account-toggle-keepsake") || "";
        if (!toggleKeepsakeCard(cardId)) {
          setError(`Keep at most ${keepsakeCapacity} keepsakes close.`);
        } else {
          setError("");
        }
        return;
      }
      const connect = event.target.closest("[data-account-connect]");
      if (connect) {
        event.preventDefault();
        accountPanelPinned = true;
        runAction({
          label: "link account",
          detail: "account",
          card: cardForActor(actorId) || cardForLocation(state?.location?.id),
          shape: "avatar",
          run: () => connectWallet(),
        });
        return;
      }
      const box = event.target.closest("[data-account-open-box]");
      if (box) {
        event.preventDefault();
        let boxId = box.getAttribute("data-account-open-box") || "";
        if (boxId === "first") boxId = (state?.account?.active_box_ids || [])[0] || "";
        if (!boxId) return;
        accountPanelPinned = true;
        runAction({
          label: "open box",
          detail: compactAssetId(boxId),
          card: cardByKey(`box:${boxId}`),
          shape: "item",
          modalTitle: "burn this Box?",
          modalSummary: "This permanently destroys the on-chain Box. After confirmation, it becomes one avatar keepsake bundle.",
          effect: "one unopened avatar keepsake bundle joins this account",
          risk: "the Box burn is irreversible",
          run: () => openBox(boxId),
        });
        return;
      }
      const pack = event.target.closest("[data-account-open-pack]");
      if (pack) {
        event.preventDefault();
        let packId = pack.getAttribute("data-account-open-pack") || "";
        if (packId === "first") packId = (state?.account?.unopened_pack_ids || [])[0] || "";
        if (!packId) return;
        accountPanelPinned = true;
        runAction({
          label: "open bundle",
          detail: compactAssetId(packId),
          card: cardByKey(`pack:${packId}`),
          shape: "item",
          run: () => openPack(packId),
        });
      }
    });

    $("room-log-toggle").addEventListener("click", () => {
      roomMemoryExpanded = !roomMemoryExpanded;
      renderRoomMemory();
    });

    $("card-modal").addEventListener("click", (event) => {
      const fundImage = event.target.closest("[data-fund-community-image]");
      if (fundImage) {
        event.preventDefault();
        event.stopPropagation();
        const [subjectKind, subjectId] = String(fundImage.getAttribute("data-fund-community-image") || "").split(":");
        if (!subjectKind || !Number(subjectId)) return;
        fundImage.disabled = true;
        action("/actions/fund-image", {
          actor_id: actorId,
          subject_kind: subjectKind,
          subject_id: Number(subjectId),
          intent_id: `web-image:${globalThis.crypto?.randomUUID?.() || `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`}`,
        }).then(async (result) => {
          await refresh();
          if (result?.ok) {
            const updated = subjectKind === "actor"
              ? cardForActor(Number(subjectId))
              : (subjectKind === "item" ? cardForItem(Number(subjectId)) : cardForLocation(Number(subjectId)));
            if (updated) openCardModal(updated);
          }
        });
        return;
      }
      if (event.target.closest("[data-card-close]") || event.target.id === "card-modal") {
        event.preventDefault();
        closeCardModal();
      }
    });

    $("action-modal").addEventListener("click", (event) => {
      if (event.target.closest("[data-action-close]")) {
        event.preventDefault();
        if (actionConfirmAction?.creationStage === "origin") {
          setCreationModalStage(actionConfirmAction, "species");
          openActionModal(actionConfirmAction);
          return;
        }
        closeActionModal();
        return;
      }
      if (event.target.id === "action-modal") {
        event.preventDefault();
        closeActionModal();
      }
    });

    $("action-modal").addEventListener("change", (event) => {
      const input = event.target.closest("input[name='action-choice']");
      if (!input) return;
      const choice = input.closest("[data-action-choice-index]");
      if (!choice) return;
      chooseActionModalChoice(Number(choice.dataset.actionChoiceIndex || 0));
    });

    $("action-modal-confirm").addEventListener("click", (event) => {
      event.preventDefault();
      confirmActionModal();
    });

    $("wallet-modal").addEventListener("click", (event) => {
      const copyLink = event.target.closest("#wallet-copy-link");
      if (copyLink) {
        event.preventDefault();
        const portableUrl = copyLink.dataset.portableUrl || "";
        if (!portableUrl) return;
        navigator.clipboard.writeText(portableUrl)
          .then(() => setWalletQrStatus("Portable wallet claim link copied."))
          .catch(() => setWalletQrStatus("Copy the visible link above.", "error"));
        return;
      }
      if (event.target.closest("[data-wallet-close]") || event.target.id === "wallet-modal") {
        event.preventDefault();
        closeWalletQrModal(false);
      }
    });

    const libraryPill = $("brand");
    libraryPill.addEventListener("click", () => {
      if (libraryPanelPinned || accountPanelPinned) {
        libraryPanelPinned = false;
        accountPanelPinned = false;
        render();
      } else {
        menuSection = "deck";
        toggleAccountPanel(true);
      }
    });

    const locationPill = document.querySelector(".location-pill");
    locationPill.addEventListener("click", () => {
      focusActionByKey("check");
    });

    function toggleAccountPanel(forceOpen = null) {
      accountPanelPinned = forceOpen === null ? !accountPanelPinned : Boolean(forceOpen);
      if (accountPanelPinned) libraryPanelPinned = false;
      render();
      return accountPanelPinned;
    }

    function toggleLibraryPanel(forceOpen = null) {
      libraryPanelPinned = forceOpen === null ? !libraryPanelPinned : Boolean(forceOpen);
      if (libraryPanelPinned) {
        menuSection = "world";
        accountPanelPinned = false;
        Promise.all([ensureContentPacks(), ensureWorldView(true)]).then(render).catch(() => render());
      } else {
        render();
      }
      return libraryPanelPinned;
    }

    $("primary").addEventListener("click", () => {
      const action = actionForButton("primary") || (state?.branch ? actions[0] : focusedAction());
      if (action) openActionModal(action);
    });

    $("secondary").addEventListener("click", () => {
      const action = actionForButton("secondary") || (state?.branch ? actions[1] : null);
      if (action) openActionModal(action);
    });

    $("tertiary").addEventListener("click", () => {
      const action = actionForButton("tertiary") || (state?.branch ? actions[2] : null);
      if (action) openActionModal(action);
    });

    $("shuffle").addEventListener("click", () => {
      shuffleHand();
    });

    $("command-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const value = $("command-input").value;
      rememberCommand(value);
      closeCommandPalette();
      actionBusy = true;
      pendingAction = { label: "...", detail: value, command: value };
      renderCommands();
      try {
        await runCommandText(value);
      } catch (error) {
        setError(String(error.message || error));
      } finally {
        actionBusy = false;
        pendingAction = null;
        render();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.defaultPrevented) return;
      if (!$("command-palette").hidden) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeCommandPalette();
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          stepCommandHistory(-1);
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          stepCommandHistory(1);
        }
        return;
      }
      if (!$("wallet-modal").hidden) {
        if (trapModalFocus(event, $("wallet-modal"))) return;
        if (event.key === "Escape") {
          event.preventDefault();
          closeWalletQrModal(false);
        }
        return;
      }
      if (!$("action-modal").hidden) {
        if (trapModalFocus(event, $("action-modal"))) return;
        if (event.key === "Escape") {
          event.preventDefault();
          closeActionModal();
        } else if (event.key === "Enter" && !event.target?.matches?.("button, input, select, textarea, a, label")) {
          event.preventDefault();
          confirmActionModal();
        }
        return;
      }
      if (!$("card-modal").hidden) {
        if (trapModalFocus(event, $("card-modal"))) return;
        if (event.key === "Escape") {
          event.preventDefault();
          closeCardModal();
        }
        return;
      }
      if (libraryPanelPinned && event.key === "Escape") {
        event.preventDefault();
        toggleLibraryPanel(false);
        libraryPill.focus();
        return;
      }
      if (libraryPanelPinned) return;
      if (accountPanelPinned && event.key === "Escape") {
        event.preventDefault();
        toggleAccountPanel(false);
        libraryPill.focus();
        return;
      }
      if (accountPanelPinned) return;
      if (event.target?.matches?.("button, a, input, select, textarea, [role='button'], [contenteditable='true']")) return;
      const plainKey = !event.metaKey && !event.ctrlKey && !event.altKey;
      if ((event.key === "/" || event.code === "Slash") && plainKey) {
        event.preventDefault();
        openCommandPalette();
        return;
      }
      if ((event.key.toLowerCase() === "t" || event.code === "KeyT") && plainKey) {
        event.preventDefault();
        openCommandPalette("say ");
        return;
      }
      if (event.key === "Enter") {
        event.preventDefault();
        const action = state?.branch ? actions[0] : focusedAction();
        if (action) openActionModal(action);
      } else if (event.key === " ") {
        event.preventDefault();
        if (state?.branch && actions[1]) openActionModal(actions[1]);
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        focusAction(focusIndex + 1);
      } else if (event.key === "ArrowLeft") {
        event.preventDefault();
        focusAction(focusIndex - 1);
      }
    });

    $("log").addEventListener("scroll", scheduleVisibleWorldBeatReceipts, { passive: true });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") scheduleVisibleWorldBeatReceipts();
    });

    window.addEventListener("pagehide", leavePresence);
    window.addEventListener("beforeunload", leavePresence);
    window.addEventListener("resize", () => {
      if (state) {
        renderEconomy();
        reconcileHand();
        renderCommands();
      }
    });

    (async function boot() {
      try {
        await requestDevResetIfNeeded();
        await loadIdentity();
        await Promise.all([pingPresence(), refresh()]);
        connectStream();
      } catch (error) {
        setError(String(error.message || error));
      }
    })();
  </script>
</body>
</html>
