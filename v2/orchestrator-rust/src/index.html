      node.innerHTML = "";
    }

    function roomSummaryHtml(view) {
      const activeJob = (view?.jobs || []).find((job) => job.status === "active");
      const sheet = view?.room_sheet || null;
      const aspects = Array.isArray(sheet?.aspects) ? sheet.aspects.filter(Boolean) : [];
      const tags = (view?.tags || []).filter((tag) => tag.scope === "room").map((tag) => tag.label).filter(Boolean);
      if (activeJob) {
        const clockHtml = roomClockSummaryHtml(view, activeJob);
        const meta = summaryText([projectPhaseText(view, activeJob), tags[0]]);
        return summaryStripHtml("Project", meta, projectOutcomeText(activeJob), clockHtml);
      }
      if ((view?.clocks || []).length) {
        return summaryStripHtml("Clocks", "Room", "", roomClockSummaryHtml(view));
      }
      const zone = String(sheet?.zone || sheet?.safety || "").trim();
      const mechanicalRoom = tags.length || ["frontier", "dangerous", "risky"].includes(zone.toLowerCase());
      if (sheet && aspects.length && mechanicalRoom) {
        return summaryStripHtml("Room", "", atmosphericRoomSheetText(view, aspects, tags, zone));
      }
      return "";
    }

    function atmosphericRoomSheetText(view, aspects = [], tags = [], zone = "") {
      const location = view?.location || {};
      const seed = String(location.description || location.title || location.name || "").trim();
      const base = firstSentence(seed) || `${location.name || "The room"} holds its breath`;
      const details = [...aspects, ...tags].map(softRoomFragment).filter(Boolean);
      const detail = details.slice(0, 2).join(" while ");
      const frontier = /frontier|dangerous|risky/i.test(String(zone || ""))
        ? " and the path beyond it feels awake"
        : "";
      return finishSentence(detail ? `${base}, with ${detail}${frontier}` : `${base}${frontier}`);
    }

    function softRoomFragment(value) {
      const text = String(value || "").trim().replace(/[_-]+/g, " ").replace(/\s+/g, " ");
      if (!text) return "";
      if (/warning|danger|risk/i.test(text)) return `${text.toLowerCase()} moving under the hush`;
      if (/track|footprint|path|trail/i.test(text)) return `${text.toLowerCase()} softening the ground`;
      if (/rain|snow|wind|mist|fog|moss|leaf|branch|creak/i.test(text)) return `${text.toLowerCase()} in the air`;
      return `${text.toLowerCase()} close at hand`;
    }

    function firstSentence(value) {
      const text = String(value || "").trim();
      const match = text.match(/^(.+?[.!?])(?:\s|$)/);
      return (match ? match[1] : text).replace(/[.!?]+$/g, "");
    }

    function projectPhaseText(view, job) {
      const optionKinds = new Set((view?.primary_action?.options || []).map((option) => option.kind));
      const offerFor = (kind) => (view?.action_offers || []).find((offer) => offer.kind === kind) || null;
      const progressAmountFromOffer = (offer) => {
        const text = `${offer?.effect || ""} ${offer?.risk || ""}`;
        const match = text.match(/(?:advances \+|by )([1-9]\d*)/i);
        return match ? Number(match[1]) : 0;
      };
      const locationId = Number(view?.location?.id || 0);
      const currentActorId = Number(actorId || 0);
      const tags = view?.tags || [];
      const tired = tags.some((tag) => (
        tag.label === "tired"
        && (!tag.scope_id || Number(tag.scope_id) === currentActorId)
      ));
      const prepared = locationId > 0 && tags.some((tag) => (
        tag.scope === "actor"
        && tag.label === "prepared"
        && String(tag.id || "") === `actor:${currentActorId}:prepared:${locationId}`
      ));
      const progressClock = (view?.clocks || []).find((clock) => clock.id === job?.progress_clock_id);
      const progressRemaining = progressClock
        ? Math.max(0, Number(progressClock.segments || 0) - Number(progressClock.filled || 0))
        : 1;
      const workProgress = progressAmountFromOffer(offerFor("work"));
      const helpProgress = progressAmountFromOffer(offerFor("help"));
      const workFinishes = optionKinds.has("work") && workProgress > 0 && workProgress >= progressRemaining;
      const helpFinishes = optionKinds.has("help") && helpProgress > 0 && helpProgress >= progressRemaining;
      if (progressRemaining <= 0) return "ready";
      if (optionKinds.has("rest") && tired) return "recover";

      const heldItemIds = new Set((view?.items || [])
        .filter((item) => Number(item.holder_actor_id || 0) === currentActorId)
        .map((item) => Number(item.id || 0)));
      const roomFeatures = Array.isArray(view?.room_features) ? view.room_features : [];
      const progressFeatureReady = roomFeatures.some((feature) => (feature.uses || []).some((useCase) => (
        !useCase.used
        && heldItemIds.has(Number(useCase.item_id || 0))
        && /\+\d+\s+progress/i.test(String(useCase.effect || ""))
      )));
      if (progressFeatureReady) return "use clue";
      if (optionKinds.has("prepare") && !prepared && roomFeatures.some((feature) => !feature.searched)) return "scout clue";
      if (workFinishes && prepared) return "prepared finish";
      if (prepared) return "prepared push";
      if (optionKinds.has("prepare")) return "prepare";
      if (optionKinds.has("work") && optionKinds.has("help")) {
        const workHard = /tired/i.test(String(offerFor("work")?.risk || ""));
        const helpRisk = String(offerFor("help")?.risk || "");
        const helpEffect = String(offerFor("help")?.effect || "");
        const helpKind = helpFinishes ? "finish" : "help";
        const helpMode = /tired/i.test(helpRisk)
          ? `tired ${helpKind}`
          : (/deepens Bond/i.test(helpEffect) ? `bond ${helpKind}` : `safe ${helpKind}`);
        return `${workFinishes ? (workHard ? "hard finish" : "finish") : (workHard ? "hard push" : "push")} or ${helpMode}`;
      }
      if (optionKinds.has("work")) return workFinishes ? "finish" : "push";
      if (optionKinds.has("help")) return helpFinishes ? "finish" : "help";
      return "active";
    }

    function projectOutcomeText(job) {
      const reward = String(job?.reward || "").trim();
      const consequence = String(job?.consequence || "").trim();
      if (reward && consequence) return `Reward: ${reward}; Risk: ${consequence}`;
      if (reward) return `Reward: ${reward}`;
      if (consequence) return `Risk: ${consequence}`;
      return String(job?.id || "").trim();
    }

    function summaryText(parts) {
      return (parts || [])
        .map((part) => String(part || "").trim())
        .filter(Boolean)
        .join(" · ");
    }

    function roomClockSummaryHtml(view, job = null) {
      const clocks = (view?.clocks || []).filter((clock) => {
        if (!job) return true;
        return clock.id === job.progress_clock_id || clock.id === job.danger_clock_id;
      });
      if (!clocks.length) return "";
      return `<div class="summary-clocks">${clocks.map(clockSummaryHtml).join("")}</div>`;
    }

    function clockSummaryHtml(clock) {
      const filled = Math.max(0, Number(clock.filled) || 0);
      const segments = Math.max(1, Number(clock.segments) || 1);
      const percent = Math.max(0, Math.min(100, Math.round((filled / segments) * 100)));
      const kind = String(clock.kind || "").toLowerCase();
      return `<div class="summary-clock ${escapeAttr(kind)}"><span class="summary-clock-label">${escapeHtml(clock.label || "Room clock")}</span><span class="summary-clock-count">${filled}/${segments}</span><span class="clock-track" aria-hidden="true"><span class="clock-fill" style="--fill:${percent}%"></span></span></div>`;
    }

    function summaryStripHtml(label, meta, body, extraHtml = "") {
      const aside = String(meta || "").trim();
      const asideHtml = aside ? `<span>${escapeHtml(aside)}</span>` : "";
      const bodyHtml = body ? `<div class="summary-body">${escapeHtml(body)}</div>` : "";
      const extra = extraHtml ? `<div class="summary-meta">${extraHtml}</div>` : "";
      return `<div class="summary-strip"><div class="summary-head"><span>${escapeHtml(label)}</span>${asideHtml}</div>${bodyHtml}${extra}</div>`;
    }

    function roomTagsForLocation(id, view = state) {
      if (id === 1) return ["firelight", "scarves", "symbols", "silence"];
      if (id === 2) return gardenHasDewbright(view)
        ? ["rain", "leaves", "pearled button"]
        : ["rain", "leaves", "found mark"];
      if (id === 3) return ["moonlight", "trail", "combat"];
      if (id === 10) return ["science", "benches", "questions"];
      if (id === 11) return ["homeroom", "morning", "seats"];
      if (id === 12) return ["library", "shelves", "quiet"];
      if (id === 13) return ["cafeteria", "tables", "commons"];
      if (id === 14) return ["greenhouse", "glass", "leaves"];
      if (id === 15) return ["courtyard", "paths", "sky"];
      if (id >= 30 && id < 40) return ["mountain", "wind", "stone"];
      if (id >= 40 && id < 50) return ["forest", "roots", "paths"];
      if (id === 50) return ["world", "shelves", "ladders"];
      if (id >= 60 && id < 70) return ["mists", "threshold", "far"];
      return ["shard", "hum", "unknown"];
    }

    function freeLocationCopy(id) {
      const copy = {
        30: "Cloud paths gather over The Heavens above the forbidden mountain.",
        31: "Thin air rings around Lofty Peak while summit wind listens back.",
        32: "Summit Trail switches between cold scree and stubborn lantern light.",
        33: "Alpine Forest leans over snowmelt tracks and old mountain signs.",
        34: "Goblin Cave keeps low echoes, loose coins, and sharper choices.",
        35: "Circle of the Moon marks silver stones where night keeps perfect time.",
        36: "Solar Temple holds noon-bright terraces, missing bells, and vows with shadows.",
        40: "Old Oak Tree spreads roots like roads and leaves that remember names.",
        41: "Lost Woods repeats soft moss, dim paths, and birdsong that refuses north.",
        42: "Haunted Mansion leans under lit windows, patient dust, and sighing doors.",
        43: "Quiet Abbey holds stone arches and a hush deep enough for small vows.",
        44: "Flower Meadow opens into small flowers, warm bees, and open sky.",
        50: "Great Library stacks brass ladders and marginalia from earlier travelers.",
        60: "Turgid Swamp shifts under black water and bubbles unfinished warnings.",
        61: "Wilting Jungle droops over hot paths where every vine seems tired.",
        62: "Endless Ocean stretches blue horizon with songs moving under the waves.",
        63: "Digital Realm blinks green cursors across doors, echoes, and code.",
        64: "Darkest Ocean waits below the final tide with pearls, pressure, and drowned bells.",
      };
      return copy[id] || "";
    }

    function copyForLocation(id, view = state) {
      if (id === 1) return "A warm room of firelight, knitting needles, quiet symbols, and watchful silence.";
      if (id === 2) return gardenCopy(view);
      if (id === 3) return "The path shines under cold moonlight. The air permits sharper choices.";
      if (id === 10) return "Science Class hums with shared observations, bright benches, and questions waiting to be tested.";
      if (id === 11) return "Homeroom waits with front-door morning light and the sense that every question gets a seat.";
      if (id === 12) return "Library quiet gathers around the shelves; if it matters, someone wrote it down.";
      if (id === 13) return "Cafeteria tables hold the soft thunder of commons diplomacy.";
      if (id === 14) return "Greenhouse glass glows with patient leaves and experiments that grow slowly.";
      if (id === 15) return "Courtyard paths cross under open sky; every hallway seems to lead back here.";
      if (freeLocationCopy(id)) return freeLocationCopy(id);
      return "The shard hums softly.";
    }

    function channelName(name) {
      return String(name).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    function setError(message) {
      setStatus(message, "error");
    }

    function setStatus(message, kind = "error") {
      const node = $("error");
      node.textContent = message;
      node.classList.toggle("ok", Boolean(message) && kind === "ok");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }

    function escapeSvg(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    document.addEventListener("click", (event) => {
      const target = event.target.closest("[data-card-key]");
      if (!target) return;
      const card = cardByKey(target.getAttribute("data-card-key") || "");
      if (!card) return;
      event.preventDefault();
      event.stopPropagation();
      openCardModal(card);
    }, true);

    $("log").addEventListener("click", (event) => {
      const connect = event.target.closest("[data-account-connect]");
      if (connect) {
        event.preventDefault();
        accountPanelPinned = true;
        runAction({
          label: "link account",
          detail: "account",
          card: cardForActor(actorId) || cardForLocation(state?.location?.id),
          shape: "avatar",
          run: () => connectWallet(),
        });
        return;
      }
      const box = event.target.closest("[data-account-open-box]");
      if (box) {
        event.preventDefault();
        let boxId = box.getAttribute("data-account-open-box") || "";
        if (boxId === "first") boxId = (state?.account?.active_box_ids || [])[0] || "";
        if (!boxId) return;
        accountPanelPinned = true;
        runAction({
          label: "open box",
          detail: compactAssetId(boxId),
          card: cardByKey(`box:${boxId}`),
          shape: "item",
          run: () => openBox(boxId),
        });
        return;
      }
      const pack = event.target.closest("[data-account-open-pack]");
      if (pack) {
        event.preventDefault();
        let packId = pack.getAttribute("data-account-open-pack") || "";
        if (packId === "first") packId = (state?.account?.unopened_pack_ids || [])[0] || "";
        if (!packId) return;
        accountPanelPinned = true;
        runAction({
          label: "open pack",
          detail: compactAssetId(packId),
          card: cardByKey(`pack:${packId}`),
          shape: "item",
          run: () => openPack(packId),
        });
      }
    });

    $("log").addEventListener("click", (event) => {
      const row = event.target.closest("[data-event-row]");
      if (!row) return;
      row.classList.toggle("expanded");
    });

    $("room-log-toggle").addEventListener("click", () => {
      roomMemoryExpanded = !roomMemoryExpanded;
      renderRoomMemory();
    });

    $("card-modal").addEventListener("click", (event) => {
      if (event.target.closest("[data-card-close]") || event.target.id === "card-modal") {
        event.preventDefault();
        closeCardModal();
      }
    });

    $("action-modal").addEventListener("click", (event) => {
      if (event.target.closest("[data-action-close]") || event.target.id === "action-modal") {
        event.preventDefault();
        closeActionModal();
      }
    });

    $("action-modal-confirm").addEventListener("click", (event) => {
      event.preventDefault();
      confirmActionModal();
    });

    $("wallet-modal").addEventListener("click", (event) => {
      if (event.target.closest("[data-wallet-close]") || event.target.id === "wallet-modal") {
        event.preventDefault();
        closeWalletQrModal(false);
      }
    });

    const locationPill = document.querySelector(".location-pill");
    locationPill.addEventListener("click", () => {
      focusActionByKey("check");
    });
    locationPill.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      event.stopPropagation();
      focusActionByKey("check");
    });

    const economyPill = $("economy");
    economyPill.addEventListener("click", () => {
      focusFirstAccountAction();
    });
    economyPill.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      event.stopPropagation();
      focusFirstAccountAction();
    });

    function focusFirstAccountAction() {
      accountPanelPinned = true;
      render();
      return true;
    }

    $("primary").addEventListener("click", () => {
      const action = actionForButton("primary") || (state?.branch ? actions[0] : focusedAction());
      if (action) openActionModal(action);
    });

    $("secondary").addEventListener("click", () => {
      const action = actionForButton("secondary") || (state?.branch ? actions[1] : null);
      if (action) openActionModal(action);
    });

    $("tertiary").addEventListener("click", () => {
      const action = actionForButton("tertiary") || (state?.branch ? actions[2] : null);
      if (action) openActionModal(action);
    });

    $("shuffle").addEventListener("click", () => {
      shuffleHand();
    });

    $("command-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const value = $("command-input").value;
      rememberCommand(value);
      closeCommandPalette();
      actionBusy = true;
      pendingAction = { label: "...", detail: value, command: value };
      renderCommands();
      try {
        await runCommandText(value);
      } catch (error) {
        setError(String(error.message || error));
      } finally {
        actionBusy = false;
        pendingAction = null;
        render();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.defaultPrevented) return;
      if (!$("command-palette").hidden) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeCommandPalette();
        } else if (event.key === "ArrowUp") {
          event.preventDefault();
          stepCommandHistory(-1);
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          stepCommandHistory(1);
        }
        return;
      }
      if (!$("wallet-modal").hidden) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeWalletQrModal(false);
        }
        return;
      }
      if (!$("action-modal").hidden) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeActionModal();
        } else if (event.key === "Enter" && event.target?.id !== "action-modal-confirm") {
          event.preventDefault();
          confirmActionModal();
        }
        return;
      }
      if (!$("card-modal").hidden) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeCardModal();
        }
        return;
      }
      if (event.target?.matches?.("input, textarea, [contenteditable='true']")) return;
      const plainKey = !event.metaKey && !event.ctrlKey && !event.altKey;
      if ((event.key === "/" || event.code === "Slash") && plainKey) {
        event.preventDefault();
        openCommandPalette();
        return;
      }
      if ((event.key.toLowerCase() === "t" || event.code === "KeyT") && plainKey) {
        event.preventDefault();
        openCommandPalette("say ");
        return;
      }
      if (event.key === "Enter") {
        event.preventDefault();
        const action = state?.branch ? actions[0] : focusedAction();
        if (action) openActionModal(action);
      } else if (event.key === " ") {
        event.preventDefault();
        if (state?.branch && actions[1]) openActionModal(actions[1]);
      } else if (event.key === "Tab" || event.key === "ArrowRight") {
        event.preventDefault();
        focusAction(focusIndex + 1);
      } else if (event.key === "ArrowLeft") {
        event.preventDefault();
        focusAction(focusIndex - 1);
      }
    });

    window.addEventListener("pagehide", leavePresence);
    window.addEventListener("beforeunload", leavePresence);
    window.addEventListener("resize", () => {
      if (state) renderEconomy();
    });

    (async function boot() {
      try {
        await requestDevResetIfNeeded();
        await pingPresence();
        await refresh();
        connectStream();
      } catch (error) {
        setError(String(error.message || error));
      }
    })();
  </script>
</body>
</html>
