    function renderEconomy() {
      const economy = state?.economy || {};
      const orbs = Number.isFinite(Number(economy.orbs)) ? Number(economy.orbs) : 0;
      const boxes = state?.access?.owned_box_ids?.length || 0;
      const packs = state?.access?.unopened_pack_ids?.length || 0;
      const signed = state?.access?.mode === "signed_ruby_high_wallet" && Boolean(walletSession);
      const parts = [`<strong>${orbs}</strong> orbs`];
      const compact = window.matchMedia("(max-width: 900px)").matches;
      if (economyFlash) {
        parts.push(`<span class="economy-flash ${escapeAttr(economyFlash.kind)}">${escapeHtml(economyFlash.text)}</span>`);
      }
      if (!compact) {
        if (boxes) parts.push(`${boxes} ${boxes === 1 ? "box" : "boxes"}`);
        if (packs) parts.push(`${packs} ${packs === 1 ? "pack" : "packs"}`);
        parts.push("account");
      }
      const economyNode = $("economy");
      economyNode.innerHTML = parts.join(" · ");
      economyNode.setAttribute("aria-label", `Focus account inventory with ${orbs} Orbs, ${boxes} Boxes, and ${packs} unopened packs`);
      economyNode.classList.toggle("focused", Boolean(accountPanelPinned));
    }

    function exitUnavailable(exit, view = state) {
      if (!exit) return true;
      if (truthyFlag(exit.locked) || falseyFlag(exit.accessible)) return true;
      if (exitLockText(exit)) return true;
      const destinationCard = cardForLocationInView(view, exit.destination_location_id);
      if (falseyFlag(destinationCard?.accessible)) return true;
      const requiredCardId = String(exit.required_card_id || "").trim();
      if (!requiredCardId) return false;
      const access = view?.access || {};
      const lockedCardIds = Array.isArray(access.locked_card_ids) ? access.locked_card_ids.map(String) : [];
      if (lockedCardIds.includes(requiredCardId)) return true;
      const accessibleCardIds = Array.isArray(access.accessible_card_ids) ? access.accessible_card_ids.map(String) : null;
      return Boolean(accessibleCardIds && !accessibleCardIds.includes(requiredCardId));
    }

    function truthyFlag(value) {
      if (value === true || value === 1) return true;
      const text = String(value || "").trim().toLowerCase();
      return text === "true" || text === "1" || text === "yes" || text === "locked";
    }

    function falseyFlag(value) {
      if (value === false || value === 0) return true;
      const text = String(value || "").trim().toLowerCase();
      return text === "false" || text === "0" || text === "no" || text === "locked";
    }

    function exitLockText(exit) {
      const text = [
        exit.status,
        exit.state,
        exit.reason,
        exit.access_reason,
        exit.kicker,
      ].map((value) => String(value || "").trim().toLowerCase()).filter(Boolean).join(" ");
      return text.includes("card locked") || text.includes("wallet needed") || text.includes("card required");
    }

    function cardForLocationInView(view, id) {
      return view?.cards?.locations?.[String(id)] || null;
    }

    function roomAvatarRailHtml(view) {
      const actors = [...(view.actors || [])].sort((a, b) => {
        if (a.id === actorId) return -1;
        if (b.id === actorId) return 1;
        return String(a.name || "").localeCompare(String(b.name || ""));
      });
      const visible = actors.slice(0, 7);
      const portraits = visible.map((actor) => {
        const card = cardForActor(actor.id);
        const fallback = card || {
          display_name: actor.name || "Avatar",
          role: "avatar",
          aspect: "tall",
        };
        const image = cardImage(card) || fallbackCardImage(fallback);
        const you = actor.id === actorId;
        const evolved = Number(actor.stats?.level || 1) > 1;
        const label = you ? `${actorLabel(actor)} (you)` : actorLabel(actor);
        return `<span class="room-avatar-pfp${you ? " you" : ""}${evolved ? " evolved" : ""}"${cardDataAttr(card)} title="${escapeAttr(label)}" aria-label="${escapeAttr(label)}" style="background-image:url('${escapeAttr(image)}')"></span>`;
      });
      const remaining = actors.length - visible.length;
      if (remaining > 0) {
        portraits.push(`<span class="room-avatar-more" title="${escapeAttr(`${remaining} more`)}">+${remaining}</span>`);
      }
      return portraits.join("");
    }

    function renderTimelines() {
      renderStatusUpdates();
      renderRoomMemory();
      renderLog();
    }

    function renderStatusUpdates() {
      const updates = $("updates");
      updates.hidden = true;
      updates.innerHTML = "";
    }

    function renderRoomMemory() {
      const toggle = $("room-log-toggle");
      const latest = $("room-log-latest");
      const panel = $("room-memory");
      const memory = roomMemoryModel();
      toggle.hidden = false;
      toggle.setAttribute("aria-expanded", roomMemoryExpanded ? "true" : "false");
      latest.textContent = atmosphericMemoryBeat(memory.latest) || memory.latest.text;
      panel.hidden = !roomMemoryExpanded;
      if (!roomMemoryExpanded) {
        panel.innerHTML = "";
        return;
      }
      const recent = memory.recent.length
        ? memory.recent.map(roomMemoryEntryHtml).join("")
        : roomMemoryEntryHtml(memory.latest);
      panel.innerHTML = `<div class="memory-summary">${escapeHtml(memory.summary)}</div><div class="memory-recent">${recent}</div>`;
    }

    function roomMemoryModel() {
      const serverMemory = state?.room_memory;
      const serverRecent = Array.isArray(serverMemory?.recent)
        ? serverMemory.recent.map(normalizeRoomMemoryEntry).filter(Boolean)
        : [];
      const serverLatest = normalizeRoomMemoryEntry(serverMemory?.latest) || serverRecent[serverRecent.length - 1];
      const localEntries = logEvents.map(roomMemoryEntryForEvent).filter(Boolean);
      const serverLatestSeq = Number(serverMemory?.latest_seq || serverLatest?.seq || 0);
      const newerLocalEntries = serverLatestSeq
        ? localEntries.filter((entry) => {
            const seq = Number(entry.seq || 0);
            return !Number.isFinite(seq) || seq > serverLatestSeq;
          })
        : [];
      if (serverMemory && (serverLatest || serverRecent.length || serverMemory.summary)) {
        const recent = [...serverRecent, ...newerLocalEntries].slice(-8);
        const latest = recent[recent.length - 1] || serverLatest || {
          kind: "room",
          label: "room",
          text: openingBeat(state),
        };
        return {
          latest,
          recent: recent.length ? recent : [latest],
          summary: String(serverMemory.summary || openingBeat(state)).trim(),
        };
      }
      const entries = localEntries;
      const latest = entries[entries.length - 1] || {
        kind: "room",
        label: "room",
        text: openingBeat(state),
      };
      return {
        latest,
        recent: entries.slice(-5),
        summary: roomMemorySummary(entries),
      };
    }

    function normalizeRoomMemoryEntry(entry) {
      if (!entry) return null;
      const text = cleanStatusText(entry.text || "");
      if (!text) return null;
      return {
        seq: entry.seq,
        kind: entry.kind || "event",
        label: entry.label || entry.kind || "event",
        text,
      };
    }

    function roomMemoryEntryForEvent(event) {
      if (!event) return null;
      if (event.type === "message.created") {
        const speaker = event.actor_name || "CosyWorld";
        return {
          seq: event.seq,
          kind: "chat",
          label: speaker,
          text: cleanStatusText(eventText(event)),
        };
      }
      if (isRollEvent(event)) {
        const meta = rollMeta(event);
        return {
          seq: event.seq,
          kind: "roll",
          label: "roll",
          text: cleanStatusText(`${meta.title}: ${meta.ariaMath}`),
        };
      }
      const meta = statusUpdateMeta(event);
      if (!meta.text) return null;
      return {
        seq: event.seq,
        kind: meta.kind || "event",
        label: meta.label || "event",
        text: cleanStatusText(meta.text),
      };
    }

    function roomMemorySummary(entries) {
      const recent = entries.slice(-9);
      if (!recent.length) return openingBeat(state);
      const beats = recent
        .slice()
        .reverse()
        .map(atmosphericMemoryBeat)
        .filter(Boolean)
        .slice(0, 2)
        .reverse();
      if (!beats.length) return openingBeat(state);
      return finishSentence(`${withoutFinalPeriod(openingBeat(state))} ${beats.join(" ")}`);
    }

    function memoryPhrase(value) {
      return String(value || "").trim().replace(/[.!?]+$/g, "");
    }

    function atmosphericMemoryBeat(entry) {
      if (!entry) return "";
      const label = cleanStatusText(entry.label || "");
      const rawText = cleanStatusText(entry.text || "");
      const text = memoryPhrase(entry.text);
      const kind = String(entry.kind || "").toLowerCase();
      if (!text) return "";
      if (kind === "status" && /^Report submitted for .+\.$/i.test(rawText)) return rawText;
      if (/^Calling (set|revised):/i.test(rawText)) return "a small purpose settles softly into the room";
      if (/^(Visit Ledger|Memory mark|Growth claimed|Growth spent|Advancement spent|Skill stepped up|Bond (deepened|written|revised|settled))/i.test(rawText)) return "the day's learning settles into memory";
      if (kind === "chat") return `${possessive(label || "someone")} voice lingers in the room`;
      if (kind === "move") {
        const match = text.match(/^(.*?):\s*(.*?)\s*->\s*(.*)$/) || text.match(/^(.*?)\s+moved from\s+(.*?)\s+to\s+(.*)$/i);
        if (match) return `${(match[1] || "someone").trim()}'s footsteps carry the hush toward ${(match[3] || "somewhere").trim()}`;
        return "footsteps shift the room's attention";
      }
      if (kind === "hand") return "the cards turn, and time loosens its hold";
      if (kind === "search") return "something hidden stirs close to the light";
      if (kind === "roll") return "the room answers a careful listen with a half-kept secret";
      if (kind === "item" || kind === "trade") return "small things change hands and the room notices";
      if (kind === "bond") return "a bond warms quietly in the room";
      if (kind === "calling") return "a small purpose settles softly into the room";
      if (kind === "ledger" || kind === "bank" || kind === "growth" || kind === "skill") return "the day's learning settles into memory";
      return text;
    }

    function possessive(name) {
      const text = cleanStatusText(name || "someone");
      return text.endsWith("s") ? `${text}'` : `${text}'s`;
    }

    function roomMemoryEntryHtml(entry) {
      return `<div class="memory-entry ${escapeAttr(entry.kind)}"><span class="memory-entry-label">${escapeHtml(entry.label)}</span><span class="memory-entry-text">${escapeHtml(entry.text)}</span></div>`;
    }

    function eventIsLowSignalStatus(event) {
      return event?.type === "world.reset";
    }

    function statusUpdateHtml(event) {
      const meta = statusUpdateMeta(event);
      const attrs = ` aria-label="${escapeAttr(`${meta.label}: ${meta.text}`)}"`;
      return `<div class="update-pill ${escapeAttr(meta.kind)}"${attrs}><span class="update-label">${escapeHtml(meta.label)}</span><span class="update-text">${escapeHtml(meta.text)}</span></div>`;
    }

    function statusUpdateMeta(event) {
      const repeat = Number(event.repeat_count || 0);
      const repeatSuffix = repeat > 1 ? ` x${repeat}` : "";
      if (event.type === "ledger.marked") {
        return { kind: "ledger", label: "memory", text: cleanStatusText(ledgerEventLabel(event)) };
      }
      if (event.type === "ledger.banked") {
        return { kind: "ledger", label: "growth", text: cleanStatusText(ledgerBankedEventLabel(event)) };
      }
      if (event.type === "advancement.spent") {
        return { kind: "growth", label: "growth", text: cleanStatusText(advancementEventLabel(event)) };
      }
      if (event.type === "skill.stepped") {
        return { kind: "skill", label: "skill", text: cleanStatusText(skillEventLabel(event)) };
      }
      if (event.type === "calling.set") {
        if (event.actor_id === actorId) {
          return { kind: "calling", label: "calling", text: `Your Calling: ${cleanStatusText(callingEventLabel(event))}` };
        }
        return { kind: "calling", label: "calling", text: cleanStatusText(callingEventLabel(event)) };
      }
      if (event.type === "calling.revised") {
        if (event.actor_id === actorId) {
          return { kind: "calling", label: "calling", text: `Your Calling: ${cleanStatusText(callingEventLabel(event))}` };
        }
        return { kind: "calling", label: "calling", text: cleanStatusText(callingEventLabel(event)) };
      }
      if (event.type === "bond.deepened") {
        return { kind: "bond", label: "bond", text: `${event.target_actor_name || "someone"} deepened` };
      }
      if (event.type === "bond.created") {
        return { kind: "bond", label: "bond", text: `${event.target_actor_name || "someone"} written` };
      }
      if (event.type === "bond.revised") {
        return { kind: "bond", label: "bond", text: `${event.target_actor_name || "someone"} revised` };
      }
      if (event.type === "bond.resolved") {
        return { kind: "bond", label: "bond", text: `${event.target_actor_name || "someone"} settled` };
      }
      if (event.type === "actor.moved") {
        const actor = event.actor_name || "someone";
        return { kind: "move", label: "move", text: `${actor}: ${event.location_name || "somewhere"} -> ${event.destination_location_name || "somewhere"}` };
      }
      if (event.type === "actor.created") {
        const actor = actorNameForEvent(event);
        if (event.actor_id === actorId) {
          const title = actorTitleForEvent(event);
          return {
            kind: "move",
            label: "you",
            text: `arrive as ${actor}${title ? `, ${title}` : ""}`,
          };
        }
        return { kind: "move", label: "join", text: `${actor} entered ${event.location_name || "the room"}` };
      }
      if (event.type === "actor.entered_location") {
        return { kind: "move", label: "join", text: `arrived ${event.location_name || "here"}` };
      }
      if (event.type === "move.blocked") {
        return { kind: "move", label: "locked", text: event.destination_location_name || "path blocked" };
      }
      if (event.type === "hand.shuffled") {
        return { kind: "hand", label: "hand", text: "new cards" };
      }
      if (event.type === "turn.ping_started") {
        const actor = event.actor_name || "someone";
        const target = event.target_actor_name || "the current player";
        return { kind: "hand", label: "ping", text: `${actor} pinged ${target}${repeatSuffix}` };
      }
      if (event.type === "turn.pong") {
        const actor = event.actor_name || "someone";
        return { kind: "hand", label: "pong", text: `${actor} answered the ping${repeatSuffix}` };
      }
      if (event.type === "turn.ping_skipped") {
        const target = event.target_actor_name || "the current player";
        return { kind: "hand", label: "skipped", text: `${target} was skipped${repeatSuffix}` };
      }
      if (event.type === "turn.timeout_requested") {
        const actor = event.actor_name || "someone";
        const target = event.target_actor_name || "the current player";
        return { kind: "hand", label: "timeout", text: `${actor} asked ${target} to play or pass${repeatSuffix}` };
      }
      if (event.type === "turn.timeout_passed") {
        const target = event.target_actor_name || "the current player";
        return { kind: "hand", label: "passed", text: `${target} passed${repeatSuffix}` };
      }
      if (event.type === "feature.searched") {
        return { kind: "search", label: "search", text: cleanStatusText(featureSearchEventText(event)) };
      }
      if (event.type === "ability_check.rolled") {
        return { kind: "roll", label: "roll", text: cleanStatusText(listenEventText(event)) };
      }
      if (event.type === "combat.attack.attempt") {
        return { kind: "roll", label: "roll", text: cleanStatusText(eventText(event)) };
      }
      if (event.type === "item.traded") {
        return { kind: "trade", label: "trade", text: cleanStatusText(eventText(event)) };
      }
      if (event.type === "command.output") {
        return {
          kind: "status",
          label: "status",
          text: cleanStatusText(String(event.content || "").split(/\n+/).map((line) => line.trim()).filter(Boolean).join(" ")),
        };
      }
      return { kind: statusKindForEvent(event), label: statusLabelForEvent(event), text: cleanStatusText(eventText(event)) };
    }

    function statusKindForEvent(event) {
      const type = String(event?.type || "");
      if (type.startsWith("item.")) return "item";
      if (type.startsWith("combat.")) return "combat";
      if (type === "encounter.reset") return "combat";
      if (type === "hand.shuffled") return "hand";
      if (type.startsWith("turn.")) return "hand";
      if (type === "clock.updated" || type === "tag.applied" || type === "tag.cleared" || type === "job.updated") return "world";
      return "status";
    }

    function statusLabelForEvent(event) {
      const type = String(event?.type || "");
      if (type.startsWith("item.")) return "item";
      if (type.startsWith("combat.")) return "combat";
      if (type === "encounter.reset") return "frontier";
      if (type === "hand.shuffled") return "hand";
      if (type.startsWith("turn.")) return "turn";
      if (type === "clock.updated") return "clock";
      if (type.startsWith("tag.")) return "tag";
      if (type === "job.updated") return "job";
      return "event";
    }

    function cleanStatusText(value) {
      const text = String(value || "").trim();
      return text
        .replace(/^you:\s*/i, "")
        .replace(/^You\s+/, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function renderLog() {
      const log = $("log");
      const accountPanel = accountPanelHtml();
      const visibleEvents = logEvents.filter((event) => !eventIsLowSignalStatus(event));
      log.classList.toggle("account-mode", Boolean(accountPanel));
      log.classList.toggle("chat-mode", !accountPanel && visibleEvents.length > 0);
      if (accountPanel) {
        log.innerHTML = `${accountPanel}${visibleEvents.map(timelineEventHtml).join("")}`;
        log.scrollTop = 0;
        return;
      }
      if (!visibleEvents.length) {
        const beat = openingBeat(state);
        log.innerHTML = `<div class="line event room" data-event-row aria-label="${escapeAttr(beat)}"><span class="event-label">room</span><span class="text">${escapeHtml(beat)}</span></div>`;
        log.scrollTop = 0;
        return;
      }
      log.innerHTML = visibleEvents.map(timelineEventHtml).join("");
      log.scrollTop = log.scrollHeight;
    }

    function accountPanelHtml() {
      if (!accountPanelPinned) return "";
      const account = state?.account || {};
      const wallet = account.wallet_address || state?.access?.owner_wallet_address || "";
      const boxes = Array.isArray(account.active_box_ids) ? account.active_box_ids : [];
      const packs = Array.isArray(account.unopened_pack_ids) ? account.unopened_pack_ids : [];
      const receipts = Array.isArray(account.recent_box_receipts) ? account.recent_box_receipts : [];
      const openings = Array.isArray(account.recent_pack_openings) ? account.recent_pack_openings : [];
      const signed = state?.access?.mode === "signed_ruby_high_wallet" && Boolean(walletSession);
      const assets = [];
      for (const boxId of boxes.slice(0, 6)) {
        assets.push(accountBoxCard(boxId, openingBoxId === boxId ? "opening" : "closed"));
      }
      for (const packId of packs.slice(0, 6)) {
        assets.push(accountPackCard(packId));
      }
      const inventoryRows = [
        accountRow("boxes", boxes.length ? boxes.map(compactAssetId).join(", ") : "none"),
        accountRow("packs", packs.length ? packs.map(compactAssetId).join(", ") : "none"),
      ];
      for (const receipt of receipts.slice(0, 3)) {
        inventoryRows.push(accountRow("burn", `${compactAssetId(receipt.box_asset_address)} -> ${compactAssetId(receipt.pack_id)}, ${receipt.verification_status || "receipt"}`));
      }
      for (const opening of openings.slice(0, 3)) {
        const cards = (opening.card_ids || []).map(cardDisplayName).join(", ");
        inventoryRows.push(accountRow("reveal", `${compactAssetId(opening.pack_id)} -> ${cards || "cards"}`));
      }
      const actions = [];
      if (signed) {
        if (boxes.length) {
          actions.push(`<button class="account-button secondary" type="button" data-account-open-box="first">open box</button>`);
        }
        if (packs.length) {
          actions.push(`<button class="account-button secondary" type="button" data-account-open-pack="first">open pack</button>`);
        }
        if (!actions.length) {
          actions.push(`<button class="account-button secondary" type="button" disabled>nothing waiting</button>`);
        }
      } else {
        actions.push(`<button class="account-button" type="button" data-account-connect>link account</button>`);
      }
      const inventory = assets.length
        ? `<div class="account-assets">${assets.join("")}</div>`
        : `<div class="account-empty">no Boxes or unopened packs</div>`;
      return `<div class="account-panel" aria-label="Avatar sheet and account inventory"><div class="account-title"><span>avatar sheet</span><span class="account-wallet">${escapeHtml(compactAssetId(wallet) || "guest")}</span></div><div class="account-actions">${actions.join("")}</div>${characterSheetHtml()}<div class="account-section"><div class="account-section-title">account inventory</div>${inventory}${inventoryRows.join("")}</div></div>`;
    }

    function characterSheetHtml() {
      const ledger = state?.ledger || {};
      const calling = String(state?.calling?.statement || "").trim() || "I listen for small truths and help where I can.";
      const rows = [
        accountRow("calling", calling),
        accountRow("memory", `${Number(ledger.unbanked_count || 0)} mark${Number(ledger.unbanked_count || 0) === 1 ? "" : "s"}, ${Number(ledger.advancement_points || 0)} growth`),
      ];
      const skills = Array.isArray(state?.skills) ? state.skills : [];
      rows.push(accountRow("skills", skills.length ? skills.map((skill) => `${skill.label} ${skill.tier}`).join(", ") : "none"));
      const bonds = Array.isArray(state?.bonds) ? state.bonds : [];
      rows.push(accountRow("bonds", bonds.length ? bonds.map((bond) => `${bond.target_actor_name} ${bond.strength}`).join(", ") : "none"));
      const marks = Array.isArray(ledger.unbanked_marks) ? ledger.unbanked_marks : [];
      const markList = marks.length
        ? `<div class="account-list">${marks.slice(0, 4).map((mark) => `<div class="account-list-item">${escapeHtml(mark.label || mark.category || "Visit mark")}</div>`).join("")}</div>`
        : "";
      return `<div class="account-section">${rows.join("")}${markList}</div>`;
    }

    function accountBoxCard(boxId, stateName) {
      const title = "Intricately Carved Wooden Box";
      const subtitle = stateName === "opening" ? "opening" : "open box";
      return `<div class="account-asset"><img src="${escapeAttr(boxImageUrl(boxId, stateName))}" alt="${escapeAttr(`${title} ${stateName}`)}" data-card-key="box:${escapeAttr(boxId)}" /><div class="account-asset-title">${escapeHtml(title)}</div><div class="account-asset-subtitle">${escapeHtml(compactAssetId(boxId))}</div><button class="account-button secondary" type="button" data-account-open-box="${escapeAttr(boxId)}"${stateName === "opening" ? " disabled" : ""}>${escapeHtml(subtitle)}</button></div>`;
    }

    function accountPackCard(packId) {
      const image = fallbackCardImage(accountCard("Avatar Pack"));
      return `<div class="account-asset"><img src="${escapeAttr(image)}" alt="Avatar Pack" data-card-key="pack:${escapeAttr(packId)}" /><div class="account-asset-title">Avatar Pack</div><div class="account-asset-subtitle">${escapeHtml(compactAssetId(packId))}</div><button class="account-button secondary" type="button" data-account-open-pack="${escapeAttr(packId)}">open pack</button></div>`;
    }

    function boxImageUrl(boxId, stateName = "closed") {
      return `/assets/generated/boxes/${encodeURIComponent(stateName)}/${encodeURIComponent(boxId)}.svg`;
    }

    function accountRow(key, value) {
      const empty = value === "none" || value === "nothing waiting";
      return `<div class="account-row"><span class="account-key">${escapeHtml(key)}</span><span class="account-value${empty ? " account-empty" : ""}">${escapeHtml(value)}</span></div>`;
    }

    function cardDisplayName(cardId) {
      for (const group of [state?.cards?.actors, state?.cards?.items, state?.cards?.locations]) {
        if (!group) continue;
        for (const card of Object.values(group)) {
          if (card?.card_id === cardId) return card.display_name || cardId;
        }
      }
      return cardId;
    }

    function hasAccountPanelContent() {
      const account = state?.account || {};
      const ledger = state?.ledger || {};
      return Boolean(
        account.wallet_address
          || (account.active_box_ids || []).length
          || (account.unopened_pack_ids || []).length
          || (account.recent_box_receipts || []).length
          || (account.recent_pack_openings || []).length
          || state?.calling
          || (state?.skills || []).length
          || (state?.bonds || []).length
          || Number(ledger.unbanked_count || 0) > 0
          || Number(ledger.banked_count || 0) > 0
      );
    }

    const DEWBRIGHT_BUTTON_ITEM_ID = 2002;
    const RAIN_SOFT_GARDEN_LOCATION_ID = 2;

    function looseItemAtLocation(view, itemId, locationId) {
      return (view?.items || []).some((item) => (
        Number(item?.id || 0) === Number(itemId || 0)
        && Number(item?.location_id || 0) === Number(locationId || 0)
        && Number(item?.holder_actor_id || 0) === 0
      ));
    }

    function gardenHasDewbright(view = state) {
      return looseItemAtLocation(view, DEWBRIGHT_BUTTON_ITEM_ID, RAIN_SOFT_GARDEN_LOCATION_ID);
    }

    function gardenOpeningBeat(view = state) {
      if (gardenHasDewbright(view)) {
        return "Rain beads on the garden leaves. A small pearled button catches the light.";
      }
      return "Rain beads on the garden leaves. The grass shows where something pearled was lifted away.";
    }

    function gardenCopy(view = state) {
      if (gardenHasDewbright(view)) {
        return "Rain beads on broad leaves. Something small and pearled waits in the grass.";
      }
      return "Rain beads on broad leaves. A round mark in the grass remembers the pearled thing someone found.";
    }

    function openingBeat(view) {
      const locationId = view?.location?.id;
      if (locationId === 1) {
        const names = new Set((view.actors || []).map((actor) => actor.name));
        const pieces = ["Firelight warms The Cosy Cottage; rain taps the windows and the low doorway waits."];
        if (names.has("Rati")) pieces.push("Rati knits a blue scarf near the hearth.");
        else pieces.push("Rati's blue scarf basket marks the chair where she often sits.");
        if (names.has("Whiskerwind")) pieces.push("Whiskerwind gathers weather into bright little symbols.");
        if (names.has("Skull")) pieces.push("Skull keeps silent watch by the door.");
        return pieces.join(" ");
      }
      if (locationId === 2) return gardenOpeningBeat(view);
      if (locationId === 3) return "Moonlight silvers the trail. The air here is sharper, and choices carry farther.";
      if (locationId === 10) return "Science Class hums with shared observations, bright benches, and questions waiting to be tested.";
      if (locationId === 11) return "Homeroom waits with front-door morning light and the sense that every question gets a seat.";
      if (locationId === 12) return "Library quiet gathers around the shelves; if it matters, someone wrote it down.";
      if (locationId === 13) return "Cafeteria tables hold the soft thunder of commons diplomacy.";
      if (locationId === 14) return "Greenhouse glass glows with patient leaves and experiments that grow slowly.";
      if (locationId === 15) return "Courtyard paths cross under open sky; every hallway seems to lead back here.";
      return copyForLocation(locationId, view);
    }

    function timelineEventHtml(event) {
      if (event.type === "message.created") return messageHtml(event);
      if (isRollEvent(event)) return rollHtml(event);
      return statusEventHtml(event);
    }

    function messageHtml(event) {
      const speaker = event.actor_name || "CosyWorld";
      const body = eventText(event);
      const kind = event.actor_id === actorId ? "you" : event.actor_id ? "npc" : "world";
      const label = eventAriaLabel(event, speaker, body);
      const attrs = label ? ` aria-label="${escapeAttr(label)}"` : "";
      return `<div class="line chat ${kind}"${attrs}>${chatPfpHtml(event, speaker)}<span class="speaker">${escapeHtml(speaker)}</span><span class="text">${escapeHtml(body)}</span></div>`;
    }

    function chatPfpHtml(event, speaker) {
      const card = event.actor_id ? cardForActor(event.actor_id) : null;
      const image = cardImage(card);
      const label = initials(speaker || card?.display_name || "CosyWorld");
      const dataAttr = card ? cardDataAttr(card) : "";
      const style = image ? ` style="background-image:url('${escapeAttr(image)}')"` : "";
      return `<span class="chat-pfp"${dataAttr}${style} aria-hidden="true">${image ? "" : escapeHtml(label)}</span>`;
    }

    function statusEventHtml(event) {
      const meta = statusUpdateMeta(event);
      if (!meta.text) return "";
      const label = String(meta.label || "event").trim() || "event";
      const text = cleanStatusText(meta.text);
      const aria = `${label}: ${text}`;
      return `<div class="line event ${escapeAttr(meta.kind)}" data-event-row title="${escapeAttr(text)}" aria-label="${escapeAttr(aria)}"><span class="event-label">${escapeHtml(label)}</span><span class="text">${escapeHtml(text)}</span></div>`;
    }

    function isRollEvent(event) {
      return event.type === "ability_check.rolled" || event.type === "combat.attack.attempt";
    }

    function rollHtml(event) {
      const meta = rollMeta(event);
      const outcome = event.success ? "success" : "failure";
      const detail = meta.detail ? `<span class="roll-detail">${escapeHtml(meta.detail)}</span>` : "";
      const aria = `${meta.title}: ${meta.ariaMath}. ${outcome}.`;
      return `<div class="roll-line" aria-label="${escapeAttr(aria)}"><span class="roll-label">roll</span><div class="roll-card ${outcome}"><span class="roll-die">d20</span><span class="roll-copy"><span class="roll-title">${escapeHtml(meta.title)}</span>${detail}</span><span class="roll-math">${meta.tokens.join("")}<span class="roll-token roll-outcome"><small>result</small><b>${escapeHtml(outcome)}</b></span></span></div></div>`;
    }

    function rollMeta(event) {
      const raw = finiteNumber(event.raw_roll);
      const modifier = finiteNumber(event.modifier);
      const total = finiteNumber(event.total);
      const dc = finiteNumber(event.dc);
      const title = event.type === "combat.attack.attempt"
        ? `Attack roll${event.target_actor_name ? ` vs ${event.target_actor_name}` : ""}`
        : "Listen check";
      const detailParts = [];
      if (event.actor_name) detailParts.push(event.actor_name);
      if (event.location_name) detailParts.push(event.location_name);
      const tokens = [];
      const ariaParts = [];
      if (raw !== null) {
        tokens.push(rollTokenHtml("d20", raw));
        ariaParts.push(`d20 ${raw}`);
      }
      if (modifier !== null && modifier !== 0) {
        tokens.push(rollTokenHtml("mod", signedNumber(modifier)));
        ariaParts.push(`modifier ${signedNumber(modifier)}`);
      }
      if (total !== null) {
        tokens.push(rollTokenHtml("total", total, "total"));
        ariaParts.push(`total ${total}`);
      }
      if (dc !== null) {
        const label = event.type === "combat.attack.attempt" ? "ac" : "dc";
        tokens.push(rollTokenHtml(label, dc));
        ariaParts.push(`${label.toUpperCase()} ${dc}`);
      }
      if (!tokens.length) {
        tokens.push(rollTokenHtml("roll", "?"));
        ariaParts.push("roll unknown");
      }
      return {
        title,
        detail: detailParts.join(", "),
        tokens,
        ariaMath: ariaParts.join(", "),
      };
    }

    function rollTokenHtml(label, value, className = "") {
      const extra = className ? ` ${className}` : "";
      return `<span class="roll-token${extra}"><small>${escapeHtml(label)}</small><b>${escapeHtml(String(value))}</b></span>`;
    }

    function finiteNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function signedNumber(value) {
      return value > 0 ? `+${value}` : String(value);
    }

    function eventAriaLabel(event, speaker, body) {
      if (event.type === "message.created" && event.actor_id === 1002) {
        return `${speaker} speaks in emoji-only weather symbols: ${emojiWords(body)}`;
      }
      return "";
    }

    function emojiWords(value) {
      const names = {
        "🌧️": "rain cloud",
        "🌧": "rain cloud",
        "🫖": "teapot",
        "✨": "sparkles",
        "🧶": "yarn",
        "☁️": "cloud",
        "☁": "cloud",
        "🫧": "bubbles",
        "🌙": "moon",
        "🪡": "needle",
        "🧵": "thread",
        "❄️": "snowflake",
        "❄": "snowflake",
        "🌿": "leaf",
      };
      const parts = [];
      for (const [emoji, label] of Object.entries(names)) {
        if (value.includes(emoji)) parts.push(label);
      }
      return parts.length ? parts.join(", ") : "symbols";
    }

    function eventText(event) {
      if (event.type === "command.output") return event.content || "";
      if (event.type === "message.created") return event.content || "";
      if (event.type === "feature.searched") return featureSearchEventText(event);
      if (event.type === "world.reset") return "the world returns to its first page.";
      if (event.type === "actor.created") return `${event.actor_name || "Someone"} enters ${event.location_name}.`;
      if (event.type === "actor.entered_location") return `arrives in ${event.location_name}.`;
      if (event.type === "actor.moved") {
        const reason = String(event.content || "").trim();
        const base = `moves from ${event.location_name} to ${event.destination_location_name}.`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "move.blocked") return `cannot reach ${event.destination_location_name}.`;
      if (event.type === "item.picked_up") {
        const reason = String(event.content || "").trim();
        const base = `takes ${event.item_name}.`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "item.dropped") {
        const reason = String(event.content || "").trim();
        const base = `drops ${event.item_name}.`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "item.used") {
        const target = event.target_actor_name ? ` on ${event.target_actor_name}` : "";
        const healed = event.damage < 0 ? ` restores ${Math.abs(event.damage)} hp.` : ".";
        const reason = String(event.content || "").trim();
        const base = `uses ${event.item_name}${target}.${healed}`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "item.given") return `gives ${event.item_name} to ${event.target_actor_name}.`;
      if (event.type === "item.traded") {
        const reason = String(event.content || "").trim();
        const base = `trades ${event.item_name} with ${event.target_actor_name} for ${event.target_item_name}.`;
        return reason ? `${base} ${reason}` : base;
      }
      if (event.type === "avatar.evolved") return `${event.target_actor_name} evolves to level ${event.total || 2}.`;
      if (event.type === "branch.opened") return `opens a choice with ${event.target_actor_name}.`;
      if (event.type === "branch.resolved") return `settles a choice with ${event.target_actor_name}.`;
      if (event.type === "branch.expired") return `lets a choice with ${event.target_actor_name} fade.`;
      if (event.type === "hand.shuffled") return "draws a new hand.";
      if (event.type === "ability_check.rolled") return listenEventText(event);
      if (event.type === "clock.updated") {
        const label = event.clock_label || "a room clock";
        const filled = Number.isFinite(Number(event.clock_filled)) ? Number(event.clock_filled) : 0;
        const segments = Number.isFinite(Number(event.clock_segments)) ? Number(event.clock_segments) : 0;
        const delta = Number(event.clock_delta || 0);
        if (delta < 0) return `${label} resets to ${filled}/${segments}.`;
        return `${label} advances to ${filled}/${segments}.`;
      }
      if (event.type === "tag.applied") return `gains ${event.tag_label || "a condition"}.`;
      if (event.type === "tag.cleared") return `clears ${event.tag_label || "a condition"}.`;
      if (event.type === "calling.set") return `sets a Calling: ${callingEventLabel(event)}.`;
      if (event.type === "calling.revised") return `revises their Calling: ${callingEventLabel(event)}.`;
      if (event.type === "ledger.marked") return `adds a memory mark: ${ledgerEventLabel(event)}.`;
      if (event.type === "ledger.banked") return `claims growth: ${ledgerBankedEventLabel(event)}.`;
      if (event.type === "advancement.spent") return `spends growth: ${advancementEventLabel(event)}.`;
      if (event.type === "skill.stepped") return `steps up ${skillEventLabel(event)}.`;
      if (event.type === "bond.deepened") return `deepens a Bond with ${event.target_actor_name || "someone"}.`;
      if (event.type === "bond.created") return `writes a Bond with ${event.target_actor_name || "someone"}.`;
      if (event.type === "bond.revised") return `revises a Bond with ${event.target_actor_name || "someone"}.`;
      if (event.type === "bond.resolved") return `settles a Bond with ${event.target_actor_name || "someone"}.`;
      if (event.type === "job.updated") return `updates ${jobEventLabel(event)}.`;
      if (event.type === "combat.defend") return `raises a careful guard.`;
      if (event.type === "combat.attack.attempt") return `tests ${event.target_actor_name}'s guard: roll ${event.total} vs ac ${event.dc}.`;
      if (event.type === "combat.attack.hit") {
        const hp = Number.isFinite(Number(event.current_hp)) ? `${event.current_hp} hp remains.` : "";
        return `breaks through ${event.target_actor_name}'s guard for ${event.damage} damage. ${hp}`.trim();
      }
      if (event.type === "combat.attack.miss") return `${event.target_actor_name} turns the strike aside.`;
      if (event.type === "combat.knockout") return `${event.target_actor_name}'s light falls quiet at 0 hp.`;
      if (event.type === "combat.flee.success") return `flees to ${event.destination_location_name}, carrying the trail's silver hush.`;
      if (event.type === "encounter.reset") return `${event.target_actor_name || "The frontier"} stirs again in ${event.location_name || "the frontier"}.`;
      if (event.type === "rule.rejected") return `hesitates.`;
      return event.type;
    }

    function featureSearchEventText(event) {
      const parts = String(event.content || "").split(":");
      const feature = parts.shift() || "a room feature";
      const reason = parts.length > 1 ? parts.pop() : "";
      const clue = parts.join(":").trim();
      const actor = event.actor_name || "Someone";
      if (clue) return `${actor} searches ${feature}: ${clue}`;
      return `${actor} searches ${feature}${reason ? `: ${reason}` : ""}`;
    }

    function callingEventLabel(event) {
      const content = String(event.content || "").trim();
      const reasonIndex = content.lastIndexOf(":");
      return reasonIndex > 0 ? content.slice(0, reasonIndex) : content || "a small truth";
    }

    function ledgerEventLabel(event) {
      const parts = String(event.content || "").split(":");
      return parts[1] || parts[0] || "a visit mark";
    }

    function ledgerBankedEventLabel(event) {
      const parts = String(event.content || "").split(":");
      const count = Math.max(0, Number(parts[0]) || 0);
      return `${count} growth point${count === 1 ? "" : "s"}`;
    }

    function advancementEventLabel(event) {
      const parts = String(event.content || "").split(":");
      const cost = Math.max(0, Number(parts[1]) || 0);
      const label = parts[2] || "growth";
      return `${label} (${cost} point${cost === 1 ? "" : "s"})`;
    }

    function skillEventLabel(event) {
      const parts = String(event.content || "").split(":");
      const skill = parts[0] || "a skill";
      const rank = Math.max(0, Number(parts[1]) || 0);
      const tier = rank >= 3 ? "master" : rank === 2 ? "expert" : "trained";
      return `${skill} to ${tier}`;
    }

    function jobEventLabel(event) {
      const parts = String(event.content || "").split(":");
      const status = parts[1] || "a room job";
      return `the room job to ${status}`;
    }

    function listenEventText(event) {
      const hint = listenHintForLocation(event.location_id, event.success);
      const roll = Number.isFinite(Number(event.total)) && Number.isFinite(Number(event.dc))
        ? ` (${event.total}/${event.dc})`
        : "";
      return `listens: ${hint}${roll}`;
    }

    function listenHintForLocation(id, success) {
      if (!success) {
        if (id === 3) return "the trail goes quiet, but something out there heard you first.";
        return "the room keeps its secret for now.";
      }
      if (id === 1) return "the hearth points toward Story Button, Hearth Tonic, and a missing thread for Rati.";
      if (id === 2) {
        if (gardenHasDewbright(state)) return "rain gathers around Dewbright Button; a small bell answers from the leaves.";
        return "rain gathers around the round place where Dewbright Button was found; a small bell answers from the leaves.";
      }
      if (id === 3) return "moonlight catches Wolfprint Charm and Hearthstone Tag before the Echo circles back.";
      if (id === 10) return "Science Class smells of Moonwool Thread, chalk dust, and questions that want testing.";
      if (id === 11) return "Homeroom murmurs that every new day hides a useful routine.";
      if (id === 12) return "Library shelves whisper that names, needs, and old paths are written somewhere.";
      if (id === 13) return "Cafeteria trays clatter with commons gossip and trade routes.";
      if (id === 14) return "Greenhouse glass ticks softly around experiments that grow when revisited.";
      if (id === 15) return "Courtyard paths cross; footsteps remember where they came from.";
      if (freeLocationCopy(id)) return `${freeLocationCopy(id)} A route back to the cottage stays warm.`;
      return "the shard hums back with a useful direction.";
    }

    function cardForActor(id) {
      return state?.cards?.actors?.[String(id)] || null;
    }

    function cardForItem(id) {
      return state?.cards?.items?.[String(id)] || null;
    }

    function cardForLocation(id) {
      return state?.cards?.locations?.[String(id)] || null;
    }

    function itemForId(id) {
      return (state?.items || []).find((item) => Number(item.id || 0) === Number(id || 0)) || null;
    }

    function itemNameForId(id) {
      return itemForId(id)?.name || `Item ${id}`;
    }

    function actorForId(id) {
      return (state?.actors || []).find((actor) => Number(actor.id || 0) === Number(id || 0)) || null;
    }

    function actorNameForId(id) {
      const actor = actorForId(id);
      return actor ? actorLabel(actor) : `Resident ${id}`;
    }

    function accountCard(displayName) {
      return {
        display_name: displayName,
        role: "item",
        aspect: "square",
        image_url: "",
      };
    }

    function cardImage(card) {
      return card?.image_url || "";
    }

    function cardKey(card) {
      const id = card?.card_id || card?.display_name || card?.title || "";
      if (!id) return "";
      return `${card?.role || "card"}:${id}`;
    }

    function cardDataAttr(card) {
      const key = cardKey(card);
      return key ? ` data-card-key="${escapeAttr(key)}"` : "";
    }

    function setCardTarget(node, card) {
      const key = cardKey(card);
      if (!key) {
        node.removeAttribute("data-card-key");
        return;
      }
      node.setAttribute("data-card-key", key);
    }

    function cardByKey(key) {
      if (key.startsWith("box:")) {
        const boxId = key.slice(4);
        return {
          card_id: boxId,
          display_name: "Intricately Carved Wooden Box",
          title: "sealed world seed",
          blurb: "A burnable NFT Box. Opening it creates an avatar card pack, then the revealed cards can be minted through the Ruby High-style pack flow.",
          rarity: "mystery",
          role: "item",
          aspect: "square",
          source: "cosyworld_box",
          owned: true,
          image_url: boxImageUrl(boxId, openingBoxId === boxId ? "opening" : "closed"),
        };
      }
      if (key.startsWith("pack:")) {
        const packId = key.slice(5);
        return {
          card_id: packId,
          display_name: "Avatar Pack",
          title: "unopened card pack",
          blurb: "A Box-born pack waiting to reveal avatar cards from the shared world.",
          rarity: "pack",
          role: "item",
          aspect: "square",
          source: "cosyworld_pack",
          owned: true,
          image_url: fallbackCardImage(accountCard("Avatar Pack")),
        };
      }
      for (const group of [state?.cards?.actors, state?.cards?.items, state?.cards?.locations]) {
        if (!group) continue;
        for (const card of Object.values(group)) {
          if (cardKey(card) === key) return card;
        }
      }
      return null;
    }

    function actorForCard(card) {
      const key = cardKey(card);
      if (!key) return null;
      const actorCards = state?.cards?.actors || {};
      for (const [id, actorCard] of Object.entries(actorCards)) {
        if (cardKey(actorCard) !== key) continue;
        return (state?.actors || []).find((actor) => Number(actor.id || 0) === Number(id || 0)) || null;
      }
      return null;
    }

    function residentEconomyTitle(actor) {
      const economy = actor?.resident_economy || null;
      if (!economy) return actorLabel(actor);
      const parts = [];
      const motive = String(economy.motive || "").trim();
      if (motive) parts.push(motive);
      const sought = Array.isArray(economy.sought_items) ? economy.sought_items : [];
      if (sought.length) {
        const labels = sought.slice(0, 3).map((soughtItem) => {
          const itemName = itemNameForId(soughtItem.item_id);
          const source = String(soughtItem.source || "seeking").replace(/_/g, " ");
          return `${itemName}: ${source}`;
        });
        if (sought.length > labels.length) labels.push(`+${sought.length - labels.length} more`);
        parts.push(`Seeking: ${labels.join("; ")}`);
      }
      const held = Array.isArray(economy.held_items) ? economy.held_items : [];
      if (held.length) {
        const labels = held.slice(0, 3).map((heldItem) => {
          const itemName = itemNameForId(heldItem.item_id);
          const disposition = String(heldItem.disposition || "held").trim();
          return `${itemName}: ${disposition}`;
        });
        if (held.length > labels.length) labels.push(`+${held.length - labels.length} more`);
        parts.push(`Inventory: ${labels.join("; ")}`);
      }
      return parts.join(" ");
    }

    function economyRowHtml(key, value) {
      return `<div class="card-economy-row"><span class="card-economy-key">${escapeHtml(key)}</span><span class="card-economy-value">${value}</span></div>`;
    }

    function cleanEconomyText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function withoutFinalPeriod(value) {
      return cleanEconomyText(value).replace(/[.!?]+$/g, "");
    }

    function sentenceCase(value) {
      const text = cleanEconomyText(value);
      return text ? `${text.charAt(0).toUpperCase()}${text.slice(1)}` : "";
    }

    function finishSentence(value) {
      const text = sentenceCase(value);
      return text && !/[.!?]$/.test(text) ? `${text}.` : text;
    }

    function economyReasonSummary(actor, itemId, reason) {
      const text = withoutFinalPeriod(reason);
      if (!text || !itemId) return sentenceCase(text);
      const actorName = cleanEconomyText(actor?.name || actorLabel(actor));
      const itemName = itemNameForId(itemId);
      const colonPrefixes = [
        `${actorName} wants ${itemName}:`,
        `${actorName} wants ${itemName} back:`,
        `${actorName} needs ${itemName}:`,
        `${actorName} could use ${itemName}:`,
        `${actorName} values ${itemName}:`,
      ];
      for (const prefix of colonPrefixes) {
        if (text.startsWith(prefix)) return sentenceCase(text.slice(prefix.length));
      }
      const forPrefix = `${actorName} wants ${itemName} for `;
      if (text.startsWith(forPrefix)) return sentenceCase(`for ${text.slice(forPrefix.length)}`);
      const exactPrefixes = [
        `${actorName} wants ${itemName}`,
        `${actorName} needs ${itemName}`,
        `${actorName} could use ${itemName}`,
        `${actorName} values ${itemName}`,
      ];
      return exactPrefixes.includes(text) ? "" : sentenceCase(text);
    }

    function economyMotiveSummary(actor, economy) {
      const request = economy?.request || null;
      if (request?.item_id) {
        const requestReason = economyReasonSummary(actor, request.item_id, request.reason);
        if (requestReason) return finishSentence(requestReason);
      }
      const motive = cleanEconomyText(economy?.motive);
      const sought = Array.isArray(economy?.sought_items) ? economy.sought_items : [];
      for (const soughtItem of sought) {
        const summary = economyReasonSummary(actor, soughtItem.item_id, motive);
        if (summary && summary !== motive) return finishSentence(summary);
      }
      return finishSentence(motive);
    }

    function economyTagHtml(value) {
      const text = cleanEconomyText(value);
      return text ? `<span class="economy-tag">${escapeHtml(text)}</span>` : "";
    }

    function economyTagsHtml(tags) {
      const html = tags.map(economyTagHtml).filter(Boolean).join("");
      return html ? `<span class="economy-tags">${html}</span>` : "";
    }

    function soughtItemTags(soughtItem) {
      const tags = [];
      const source = cleanEconomyText(String(soughtItem?.source || "seeking").replace(/_/g, " "));
      if (source && source !== "seeking") tags.push(source);
      const memoryLocation = cleanEconomyText(soughtItem?.memory_location_name);
      const holderName = cleanEconomyText(soughtItem?.holder_actor_name);
      if (memoryLocation) {
        tags.push(holderName ? `with ${holderName} near ${memoryLocation}` : `near ${memoryLocation}`);
      }
      return tags;
    }

    function economyItemSummaryHtml(itemName, tags = []) {
      return `<span class="card-economy-main">${escapeHtml(itemName)}</span>${economyTagsHtml(tags)}`;
    }

    function residentEconomyPanelHtml(actor) {
      const economy = actor?.resident_economy || null;
      if (!economy) return "";
      const rows = [];
      const motive = economyMotiveSummary(actor, economy);
      if (motive) rows.push(economyRowHtml("why", escapeHtml(motive)));
      const inventoryCount = Number(economy.inventory_count);
      const inventoryCapacity = Number(economy.inventory_capacity);
      if (Number.isFinite(inventoryCount) && Number.isFinite(inventoryCapacity) && inventoryCapacity > 0) {
        rows.push(economyRowHtml("inventory", escapeHtml(`${inventoryCount}/${inventoryCapacity} slots used`)));
      }
      const sought = Array.isArray(economy.sought_items) ? economy.sought_items : [];
      const listedSoughtIds = new Set();
      const request = economy.request || null;
      if (request?.item_id) {
        const matchingSought = sought.find((soughtItem) => Number(soughtItem.item_id) === Number(request.item_id));
        const holderName = request.holder_actor_id ? actorNameForId(request.holder_actor_id) : "";
        const holderTag = request.holder_actor_id
          ? Number(request.holder_actor_id) === Number(actorId)
            ? "you have it"
            : `with ${holderName}`
          : "";
        const tags = [holderTag, ...soughtItemTags(matchingSought || {})].filter(Boolean);
        rows.push(economyRowHtml("wants", economyItemSummaryHtml(itemNameForId(request.item_id), tags)));
        listedSoughtIds.add(Number(request.item_id));
      }
      const trade = economy.trade_stance || economy.trade_offer || null;
      if (trade?.offered_item_id && trade?.requested_item_id) {
        const tradeText = `${itemNameForId(trade.offered_item_id)} for ${itemNameForId(trade.requested_item_id)}; ${trade.willingness || "willing"}`;
        rows.push(economyRowHtml("trade", escapeHtml(trade.reason ? `${tradeText}. ${trade.reason}` : tradeText)));
      }
      for (const soughtItem of sought) {
        if (listedSoughtIds.has(Number(soughtItem.item_id))) continue;
        const itemName = itemNameForId(soughtItem.item_id);
        rows.push(economyRowHtml("seeks", economyItemSummaryHtml(itemName, soughtItemTags(soughtItem))));
      }
      for (const heldItem of Array.isArray(economy.held_items) ? economy.held_items : []) {
        const itemName = itemNameForId(heldItem.item_id);
        const disposition = String(heldItem.disposition || "held").trim();
        rows.push(economyRowHtml("carries", economyItemSummaryHtml(itemName, [disposition])));
      }
      return rows.join("");
    }

    function openCardModal(card) {
      if (!card) return;
      const image = cardImage(card) || fallbackCardImage(card);
      const actor = actorForCard(card);
      $("card-modal-image").src = image;
      $("card-modal-image").alt = card.display_name || "CosyWorld card";
      $("card-modal-name").textContent = card.display_name || "CosyWorld Card";
      $("card-modal-title").textContent = card.title || card.role || "";
      $("card-modal-blurb").textContent = card.blurb || "";
      const meta = [
        card.rarity,
        card.role,
        card.level ? `lv ${card.level}` : "",
        card.source,
        card.owned ? "owned" : "",
        card.accessible === false ? "locked" : "",
      ].filter(Boolean);
      $("card-modal-meta").innerHTML = meta.map((value) => `<span>${escapeHtml(value)}</span>`).join("");
      $("card-modal-economy").innerHTML = residentEconomyPanelHtml(actor);
      $("card-modal").hidden = false;
      $("card-modal").querySelector(".card-close")?.focus();
    }

    function closeCardModal() {
      $("card-modal").hidden = true;
      $("card-modal-image").removeAttribute("src");
      $("card-modal-economy").innerHTML = "";
    }

    function shapeForCard(card, fallback = "item") {
      if (card?.aspect === "wide" || card?.role === "location") return "location";
      if (card?.aspect === "tall" || card?.role === "avatar" || card?.role === "resident" || card?.role === "teacher") return "avatar";
      if (card?.aspect === "square" || card?.role === "item") return "item";
      return fallback;
    }

    function thumbnailHtml(action, interactive = true, extraClass = "") {
      const card = action.card || null;
      const shape = action.shape || shapeForCard(card);
      const fallback = card || {
        display_name: action.detail || action.label || "Action",
        role: shape === "location" ? "location" : (shape === "avatar" ? "avatar" : "item"),
        aspect: shape === "location" ? "wide" : (shape === "avatar" ? "tall" : "square"),
      };
      const image = cardImage(card) || fallbackCardImage(fallback);
      const dataAttr = interactive && card ? cardDataAttr(card) : "";
      const className = ["thumb", extraClass, shape].filter(Boolean).join(" ");
      return `<span class="${escapeAttr(className)}"${dataAttr} aria-hidden="true" style="background-image:url('${escapeAttr(image)}')"></span>`;
    }

    function actionImage(action) {
      const card = action?.card || cardForActor(actorId) || cardForLocation(state?.location?.id);
      if (!card) return fallbackCardImage({ display_name: action?.label || "Action", role: "card", aspect: "wide" });
      return cardImage(card) || fallbackCardImage(card);
    }

    function bankLedgerPlan(action) {
      const text = `${action?.detail || ""} ${action?.effect || ""}`;
      const detailMatch = text.match(/([1-9]\d*)\s+(?:memory\s+)?marks?.*?\+([1-9]\d*)\s+(?:growth\s+)?points?/i);
      const effectMatch = text.match(/banks\s+([1-9]\d*)\s+Visit Ledger marks?\s+into\s+([1-9]\d*)\s+advancement points?/i);

      const count = Number(detailMatch?.[1] || growthMatch?.[1] || effectMatch?.[1] || 0);
      const points = Number(detailMatch?.[2] || growthMatch?.[2] || effectMatch?.[2] || count || 0);
      if (!count && !points) return null;

    function actionTitle(action) {

          : "<circle cx='160' cy='74' r='36' fill='#d8f7dc' opacity='.72'/><path d='M88 150 C102 108 128 95 160 95 C192 95 218 108 232 150 Z' fill='#65e68a' opacity='.38'/><path d='M112 78 C130 45 190 45 208 78' fill='none' stroke='#efc96b' stroke-width='8' stroke-linecap='round' opacity='.82'/>";

    function initials(value) {

    function compactAssetId(value) {

    function defaultBondStatement(targetName) {

    function compactActionDetail(value) {
      return String(value || "")
        .replace(/^advances progress clock\s+/i, "advance ")
        .replace(/^finishes progress clock\s+/i, "finish ")
        .replace(/^sets up \+([1-9]\d*) progress/i, "setup +$1")
        .replace(/;\s*advances progress clock\s+/gi, "; advance ")
        .replace(/;\s*finishes progress clock\s+/gi, "; finish ")
        .replace(/;\s*sets up \+([1-9]\d*) progress/gi, "; setup +$1")
        .replace(/\sand advances progress clock\s+/gi, " and advance ")
        .replace(/\sand finishes progress clock\s+/gi, " and finish ")
        .replace(/\sand sets up \+([1-9]\d*) progress/gi, " and setup +$1")
        .replace(/^marks you\s+/i, "")
        .replace(/^helps a resident and\s+/i, "")
        .trim();
    }

    function actorNeedsHealing(actor) {
      const hp = Number(actor?.hp ?? 0);
      const maxHp = Number(actor?.stats?.hp_base ?? 0);
      return actor?.status === "knocked_out" || (actor?.status === "active" && maxHp > 0 && hp < maxHp);
    }

    function focusedAction() {
      if (!actions.length) return null;
      if (focusIndex < 0 || focusIndex >= actions.length) focusIndex = 0;
      return actions[focusIndex] || actions[0] || null;
    }

    function actionMatchesFocusKey(action, key) {
      if (!key) return false;
      if (action?.focusKey === key) return true;
      return Array.isArray(action?.focusKeys) && action.focusKeys.includes(key);
    }

    function actionHandKey(action) {
      return String(action?.focusKey || action?.command || `${action?.label || ""}:${action?.detail || ""}`).trim();
    }

    function handHash(value, nonce) {
      let hash = 2166136261 ^ (Number(nonce) || 0);
      const text = String(value || "");
      for (let index = 0; index < text.length; index += 1) {
        hash ^= text.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function actionIndexForHandKey(key) {
      if (!key) return -1;
      let index = actions.findIndex((action) => actionHandKey(action) === key);
      if (index >= 0) return index;
      index = actionIndexForKey(key);
      return index;
    }

    function orderedActionIndexesForHand() {
      const indexes = actions.map((_, index) => index);
      if (state?.branch) return indexes;
      return indexes.sort((left, right) => {
        const leftHash = handHash(actionHandKey(actions[left]), handDealNonce);
        const rightHash = handHash(actionHandKey(actions[right]), handDealNonce);
        return leftHash - rightHash || left - right;
      });
    }

    function handCapacity() {
      if (state?.branch) return 3;
      return 3;
    }

    function validActionHandKeySet() {
      const keys = new Set();
      for (const action of actions) {
        const key = actionHandKey(action);
        if (key) keys.add(key);
      }
      return keys;
    }

    function pruneDiscardedHandKeys(validKeys = validActionHandKeySet()) {
      const seen = new Set();
      discardedHandKeys = discardedHandKeys.filter((key) => {
        if (!validKeys.has(key) || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function pushDiscardedHandKey(key) {
      if (!key || actionIndexForHandKey(key) < 0) return;
      if (!discardedHandKeys.includes(key)) discardedHandKeys.push(key);
    }

    function dealHandKeys(kept, seen, capacity) {
      const discarded = new Set(discardedHandKeys);
      for (const index of orderedActionIndexesForHand()) {
        if (kept.length >= capacity) break;
        const key = actionHandKey(actions[index]);
        if (!key || seen.has(key) || discarded.has(key)) continue;
        kept.push(key);
        seen.add(key);
      }
    }

    function reconcileHand() {
      if (state?.branch) {
        handKeys = actions.slice(0, 3).map(actionHandKey).filter(Boolean);
        discardedHandKeys = [];
        return;
      }
      const capacity = handCapacity();
      const validKeys = validActionHandKeySet();
      pruneDiscardedHandKeys(validKeys);
      const kept = [];
      const seen = new Set();
      const pushHandKey = (key) => {
        if (!key || seen.has(key)) return;
        if (!validKeys.has(key) || discardedHandKeys.includes(key)) return;
        kept.push(key);
        seen.add(key);
      };
      for (const key of handKeys) {
        if (kept.length >= capacity) break;
        pushHandKey(key);
      }
      dealHandKeys(kept, seen, capacity);
      if (kept.length < capacity && discardedHandKeys.length) {
        discardedHandKeys = [];
        handDealNonce += 1;
        dealHandKeys(kept, seen, capacity);
      }
      handKeys = kept.slice(0, capacity);
    }

    function promoteActionToHand(index, key = "") {
      if (state?.branch || index < 0 || index >= actions.length) return;
      const handKey = actionHandKey(actions[index]) || key;
      if (!handKey) return;
      discardedHandKeys = discardedHandKeys.filter((entry) => entry !== handKey);
      handKeys = [handKey, ...handKeys.filter((entry) => entry !== handKey)].slice(0, handCapacity());
      reconcileHand();
    }

    function discardHandKey(key, shouldReconcile = true) {
      if (!key) return;
      pushDiscardedHandKey(key);
      handKeys = handKeys.filter((entry) => entry !== key);
      if (focusedKey === key) {
        focusedKey = "";
        focusIndex = 0;
      }
      if (shouldReconcile) reconcileHand();
    }

    function discardVisibleHand(shouldReconcile = true) {
      const visibleKeys = handKeys.slice(0, handCapacity());
      for (const key of visibleKeys) discardHandKey(key, false);
      if (shouldReconcile) reconcileHand();
    }

    function actionIndexForKey(key) {
      if (!key) return -1;
      return actions.findIndex((action) => actionMatchesFocusKey(action, key));
    }

    function restoreFocusedAction() {
      if (!actions.length) {
        focusIndex = 0;
        focusedKey = "";
        return;
      }
      if (focusedKey) {
        const index = actionIndexForKey(focusedKey);
        if (index >= 0) {
          focusIndex = index;
          return;
        }
      }
      const firstHandIndex = handKeys.length ? actionIndexForHandKey(handKeys[0]) : -1;
      if (focusIndex >= actions.length || focusIndex < 0) focusIndex = firstHandIndex >= 0 ? firstHandIndex : 0;
      focusedKey = actions[focusIndex]?.focusKey || "";
    }

    function focusAction(index, key = "") {
      if (!actions.length) return;
      accountPanelPinned = false;
      focusIndex = ((index % actions.length) + actions.length) % actions.length;
      focusedKey = key || actions[focusIndex]?.focusKey || "";
      promoteActionToHand(focusIndex, focusedKey);
      render();
    }

    function focusActionByKey(key) {
      const index = actionIndexForKey(key);
      if (index < 0) return false;
      focusAction(index, key);
      return true;
    }

    function renderButton(id, action) {
      const button = $(id);
      if (!action) {
        button.disabled = true;
        button.removeAttribute("aria-busy");
        button.removeAttribute("data-command");
        button.removeAttribute("data-action-index");
        button.removeAttribute("data-hand-key");
        button.removeAttribute("data-card-type");
        button.classList.remove(...actionCardTypeClasses);
        button.classList.remove("dealt");
        button.setAttribute("aria-label", "wait");
        button.classList.remove("has-copy");
        button.innerHTML = `<span class="thumb placeholder" aria-hidden="true"></span>`;
        return;
      }
      button.disabled = Boolean(action.busy);
      if (action.busy) button.setAttribute("aria-busy", "true");
      else button.removeAttribute("aria-busy");
      if (action.command) button.dataset.command = action.command;
      else button.removeAttribute("data-command");
      button.classList.remove(...actionCardTypeClasses);
      const cardType = actionCardType(action);
      button.dataset.cardType = cardType;
      button.classList.add(`type-${cardType}`);
      if (Number.isInteger(action.actionIndex)) button.dataset.actionIndex = String(action.actionIndex);
      else button.removeAttribute("data-action-index");
      const handKey = action.handKey || actionHandKey(action);
      if (handKey) {
        const previousHandKey = button.dataset.handKey || "";
        button.dataset.handKey = handKey;
        if (previousHandKey && previousHandKey !== handKey) {
          button.classList.remove("dealt");
          void button.offsetWidth;
          button.classList.add("dealt");
        }
      } else {
        button.removeAttribute("data-hand-key");
        button.classList.remove("dealt");
      }
      const title = [
        action.command,
        compactActionDetail(action.effect),
        compactActionDetail(action.risk),
      ].filter(Boolean).join("; ");
      if (title) button.title = title;
      else button.removeAttribute("title");
      const actionIndex = Number.isInteger(action.actionIndex) ? action.actionIndex : actions.indexOf(action);
      const count = !state?.branch && actionIndex >= 0 && actions.length > 1
        ? `${actionIndex + 1} of ${actions.length}`
        : "";
      const detail = String(action.detail || "").trim();
      button.setAttribute(
        "aria-label",
        [action.label, detail, count ? `action ${count}` : ""].filter(Boolean).join(", ")
      );
      const thumb = thumbnailHtml(action, false, "action-mini-card");
      const showLabel = cardType !== "shuffle";
      button.classList.toggle("has-copy", showLabel);
      if (showLabel) {
        const labelText = compactActionLabel(action) || String(action.command || "action").toLowerCase();
        const detailHtml = detail ? `<span class="detail">${escapeHtml(detail)}</span>` : "";
        button.innerHTML = `${thumb}<span class="cmd-copy"><span class="cmd-label">${escapeHtml(labelText)}</span>${detailHtml}</span>`;
      } else {
        button.innerHTML = thumb;
      }
    }

    function actionBarActions() {
      if (state?.branch) {
        return actions.slice(0, 3).map((action, actionIndex) => ({ ...action, actionIndex }));
      }
      if (!actions.length) return [];
      reconcileHand();
      const entries = [];
      for (const key of handKeys) {
        const index = actionIndexForHandKey(key);
        if (index < 0) continue;
        entries.push({ ...actions[index], actionIndex: index, handKey: key });
      }
      return entries;
    }

    function shuffleAction() {
      return {
        label: "more",
        detail: actorId ? "new cards" : "after avatar",
        focusKey: "shuffle-hand",
        cardType: "shuffle",
        card: cardForLocation(state?.location?.id),

    function canShowShuffleAction() {
      if (state?.turn?.enabled && !state.turn.is_current_actor) return false;
      return Boolean(actorId && actorSession && state?.primary_action?.kind !== "create_avatar" && !state?.branch);
    }

    async function shuffleHand() {
      if (!actorId || !actorSession || state?.primary_action?.kind === "create_avatar") {
        return null;
      }
      discardVisibleHand(false);
      handDealNonce += 1;
      reconcileHand();
      renderCommands();
      return null;
    }

    function renderCommands() {
      const prompt = document.querySelector(".prompt");
      const buttonIds = ["primary", "secondary", "tertiary"];
      renderTurnPingPill();
      if (actionBusy) {
        prompt.classList.remove("choice-mode");

        for (const id of buttonIds.slice(1)) {

          $(id).style.display = "none";

        } else {
          renderButton("shuffle", null);
          $("shuffle").style.display = "none";
        }
        return;
      }
      const choiceMode = Boolean(state?.branch && actions.length > 1);
      prompt.classList.toggle("choice-mode", choiceMode);
      const showShuffle = canShowShuffleAction();
      const visibleActions = actionBarActions().slice(0, 3);
      for (let index = 0; index < buttonIds.length; index += 1) {
        const id = buttonIds[index];
        const visibleAction = visibleActions[index] || null;
        renderButton(id, visibleAction);
        $(id).style.display = visibleAction ? "flex" : "none";
      }

        renderButton("shuffle", shuffleAction());

        $("shuffle").style.display = "none";

    function actionForButton(id) {
      const button = $(id);
      const actionIndex = Number(button?.dataset?.actionIndex);
      if (!Number.isInteger(actionIndex) || actionIndex < 0 || actionIndex >= actions.length) {
        return null;
      }
      return actions[actionIndex] || null;
    }

    function openCommandPalette(seed = "", force = false) {
      if (actionBusy && !force) return;
      const palette = $("command-palette");
      const input = $("command-input");
      palette.hidden = false;
      input.value = seed;
      commandHistoryIndex = commandHistory.length;
      commandDraft = seed;
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    }

    function closeCommandPalette() {
      const input = $("command-input");
      $("command-palette").hidden = true;
      input.value = "";
      input.blur();
      commandHistoryIndex = commandHistory.length;
      commandDraft = "";
    }

    function rememberCommand(value) {
      const command = String(value || "").trim();
      if (!command) return;
      if (commandHistory[commandHistory.length - 1] !== command) commandHistory.push(command);
      commandHistory = commandHistory.slice(-24);
      commandHistoryIndex = commandHistory.length;
      commandDraft = "";
    }

    function stepCommandHistory(delta) {
      const input = $("command-input");
      if (!commandHistory.length || !input) return;
      if (commandHistoryIndex === commandHistory.length) commandDraft = input.value;
      commandHistoryIndex = Math.max(0, Math.min(commandHistory.length, commandHistoryIndex + delta));
      input.value = commandHistoryIndex === commandHistory.length ? commandDraft : commandHistory[commandHistoryIndex];
      input.setSelectionRange(input.value.length, input.value.length);
    }

    async function runAction(action) {
      if (actionBusy) return;
      actionBusy = true;
      pendingAction = action;
      renderCommands();
      try {
        const result = await action.run();
        const handKey = action.handKey || actionHandKey(action);
        if (!state?.branch && handKey && result?.ok !== false) {
          discardHandKey(handKey);
        }
      } catch (error) {
        setError(String(error.message || error));
      } finally {
        actionBusy = false;
        pendingAction = null;
        render();
      }
    }

    function renderRoomCopy(id) {
      const node = $("location-copy");
      roomCopyExpanded = false;
