          narrated.push({ ...search, narrative_outcome: discovery });
          index += 1;
          continue;
        }
        narrated.push(event);
      }
      return narrated;
    }

    function eventIsSearchBeat(event) {
      return event?.type === "feature.searched" || event?.type === "location.searched";
    }

    function eventIsJourneyNarration(event) {
      return String(event?.type || "").startsWith("journey.")
        || event?.type === "pathway.discovered"
        || event?.type === "pathway.familiarized";
    }

    function eventsShareAJourneyBeat(left, right) {
      if (!left || !right) return false;
      if (!(left.type === "actor.moved" && eventIsJourneyNarration(right))
        && !(right.type === "actor.moved" && eventIsJourneyNarration(left))) return false;
      return Number(left.actor_id || 0) === Number(right.actor_id || 0);
    }

    function eventIsDiscoveryBeat(event) {
      return event?.type === "item.found"
        || event?.type === "exit.discovered"
        || event?.type === "avatar.discovered";
    }

    function eventsShareAStoryBeat(left, right) {
      if (!left || !right) return false;
      if (!(eventIsSearchBeat(left) && eventIsDiscoveryBeat(right))
        && !(eventIsDiscoveryBeat(left) && eventIsSearchBeat(right))) return false;
      const leftId = Number(left.actor_id || 0);
      const rightId = Number(right.actor_id || 0);
      if (leftId && rightId) return leftId === rightId;
      return String(left.actor_name || "").trim() === String(right.actor_name || "").trim();
    }

    function resetTranscriptAtWorldBoundary(event) {
      logEvents = [];
      pendingChats = [];
      seenSeq.clear();
      if (event?.seq !== undefined && event?.seq !== null) seenSeq.add(event.seq);
    }

    function appendLogEvent(event) {
      const messageKey = residentMessageCollapseKey(event);
      if (messageKey) {
        let residentMessagesSeen = 0;
        for (let index = logEvents.length - 1; index >= 0; index -= 1) {
          const prior = logEvents[index];
          if (prior?.type !== "message.created") continue;
          if (!residentMessageCollapseKey(prior)) break;
          residentMessagesSeen += 1;
          if (residentMessageCollapseKey(prior) === messageKey) {
            const collapsed = {
              ...event,
              first_seq: prior.first_seq ?? prior.seq,
              repeat_count: Math.max(1, Number(prior.repeat_count || 1)) + 1,
            };
            logEvents.splice(index, 1);
            logEvents.push(collapsed);
            return;
          }
          if (residentMessagesSeen >= 4) break;
        }
      }
      const key = logEventCollapseKey(event);
      if (key) {
        for (let index = logEvents.length - 1; index >= 0; index -= 1) {
          const prior = logEvents[index];
          if (logEventCollapseKey(prior) === key) {
            logEvents[index] = {
              ...event,
              first_seq: prior.first_seq ?? prior.seq,
              repeat_count: Math.max(1, Number(prior.repeat_count || 1)) + 1,
            };
            return;
          }
          if (!collapsibleTurnStatusTypes.has(prior?.type)) break;
        }
      }
      logEvents.push(event);
    }

    function applyActionReceipt(event) {
      if (event?.type !== "action.receipt" || !event.content) return false;
      try {
        const receipt = JSON.parse(event.content);
        if (!receipt?.state) return false;
        const previousAccess = state?.access || null;
        const previousAccount = state?.account || null;
        state = receipt.state;
        state.world_tick = Number(receipt.world_tick || 0);
        state.state_revision = Number(receipt.state_revision || 0);
        if (previousAccess && !(state.access?.owned_card_ids || []).length) {
          state.access = previousAccess;
        }
        if (previousAccount && !state.account?.authenticated) {
          state.account = previousAccount;
        }
        actions = buildActions(state);
        return true;
      } catch {
        return false;
      }
    }

    function pushEvents(events) {
      let changed = false;
      for (const event of events) {
        if (applyActionReceipt(event)) {
          changed = true;
          continue;
        }
        if (event?.type === "world.reset") {
          resetTranscriptAtWorldBoundary(event);
          changed = true;
          continue;
        }
        if (!event || seenSeq.has(event.seq)) continue;
        seenSeq.add(event.seq);
        resolvePendingChat(event);
        if (eventIsHiddenContext(event)) continue;
        if (!eventIsLowSignalStatus(event)) appendLogEvent(event);
        changed = true;
      }
      logEvents = logEvents.slice(-90);
      return changed;
    }

    function reactionTargetForAction(action) {
      let selectedTargetId = 0;
      if (typeof action?.selectedPayload === "function") {
        try {
          selectedTargetId = Number(action.selectedPayload()?.target_actor_id || 0);
        } catch {
          selectedTargetId = 0;
        }
      }
      const residents = (state?.actors || []).filter((actor) => (
        actor.kind === "npc"
        && actor.status === "active"
        && Number(actor.location_id || state?.location?.id || 0) === Number(state?.location?.id || 0)
      ));
      const selected = residents.find((actor) => Number(actor.id) === selectedTargetId);
      if (selected) return selected;
      if (!residents.length) return actorForId(actorId);
      const latestResidentId = [...logEvents].reverse().find((event) => (
        event?.type === "message.created"
        && residents.some((actor) => Number(actor.id) === Number(event.actor_id))
      ))?.actor_id;
      if (!latestResidentId) return residents[0];
      const latestIndex = residents.findIndex((actor) => Number(actor.id) === Number(latestResidentId));
      return residents[(latestIndex + 1) % residents.length];
    }

    function beginPendingChat(action) {
      if (!actorId || action?.kind !== "orb-chat") return 0;
      const target = reactionTargetForAction(action);
      if (!target) return 0;
      const id = nextPendingChatId++;
      pendingChats.push({
        id,
        targetActorId: Number(target.id || 0),
        targetName: actorLabel(target),
        afterSeq: latestSeenSeq(),
      });
      window.setTimeout(() => {
        if (!pendingChats.some((chat) => chat.id === id)) return;
        cancelPendingChat(id);
        renderLog();
      }, 60000);
      return id;
    }

    function cancelPendingChat(id) {
      if (!id) return;
      pendingChats = pendingChats.filter((chat) => chat.id !== id);
    }

    function resolvePendingChat(event) {
      if (!event || !pendingChats.length) return;
      const eventSeq = Number(event.seq || 0);
      if (event.type === "chat.failed" || event.type === "chat.completed") {
        const statusIndex = pendingChats.findIndex((chat) => (
          eventSeq > Number(chat.afterSeq || 0)
          && Number(event.actor_id || 0) === Number(actorId || 0)
          && Number(event.target_actor_id || 0) === Number(chat.targetActorId || 0)
        ));
        if (statusIndex >= 0) pendingChats.splice(statusIndex, 1);
        return;
      }
      if (event.type !== "message.created") return;
      const index = pendingChats.findIndex((chat) => (
        eventSeq > Number(chat.afterSeq || 0)
        && Number(event.actor_id || 0) === Number(chat.targetActorId || 0)
      ));
      if (index >= 0) pendingChats.splice(index, 1);
    }

    function rebuildLog(events) {
      logEvents = [];
      seenSeq.clear();
      for (const event of events) {
        if (event?.type === "world.reset") {
          resetTranscriptAtWorldBoundary(event);
          continue;
        }
        if (!event) continue;
        resolvePendingChat(event);
        if (eventIsHiddenContext(event)) continue;
        if (event.seq !== undefined && event.seq !== null) {
          if (seenSeq.has(event.seq)) continue;
          seenSeq.add(event.seq);
        }
        if (!eventIsLowSignalStatus(event)) appendLogEvent(event);
      }
      logEvents = logEvents.slice(-90);
    }

    const chatEventTypes = new Set(["message.created"]);
    const sceneCardEventTypes = new Set([
      "actor.created",
      "actor.moved",
      "journey.started",
      "journey.progressed",
      "journey.narrated",
      "journey.completed",
      "journey.backtracked",
      "journey.paused",
      "pathway.discovered",
      "pathway.familiarized",
      "chat.failed",
      "ability_check.rolled",
      "feature.searched",
      "location.searched",
      "exit.discovered",
      "avatar.discovered",
      "item.found",
      "item.picked_up",
      "item.dropped",
      "item.used",
      "item.given",
      "item.traded",
      "clock.updated",
      "job.updated",
      "ledger.banked",
      "calling.revised",
      "skill.stepped",
      "bond.created",
      "bond.revised",
      "bond.resolved",
      "combat.attack.attempt",
      "combat.defend",
      "combat.knockout",
      "combat.flee.success",
    ]);

    const mechanicalCommandOutputPrefixes = [
      "Visit Ledger marked:",
      "Visit Ledger banked:",
      "Memory mark added:",
      "A moment stays with you:",
      "You grow:",
      "You grow from",
      "Growth claimed:",
      "Growth spent:",
      "Your growth becomes",
      "Advancement spent:",
      "Skill stepped up:",
      "You learn more about",
      "Calling set:",
      "Calling revised:",
      "Bond deepened",
      "Bond written",
      "Bond revised",
      "Bond settled",
    ];

    function eventIsStatusUpdate(event) {
      if (!event) return false;
      return !chatEventTypes.has(event.type);
    }

    function commandOutputLooksMechanical(output) {
      const lines = String(output || "")
        .split(/\n+/)
        .map((line) => line.trim())
        .filter(Boolean);
      if (!lines.length) return false;
      return lines.every((line) => mechanicalCommandOutputPrefixes.some((prefix) => line.startsWith(prefix)));
    }

    function commandOutputDuplicatesChat(output, events = []) {
      const text = cleanStatusText(output);
      if (!text) return false;
      return events.some((event) => event?.type === "message.created" && cleanStatusText(event.content) === text);
    }

    function eventIsHiddenContext(event) {
      return event.type === "world.bootstrapped"
        || event.type === "actor.presence"
        || event.type === "chat.queued"
        || event.type === "chat.completed"
        || event.type === "avatar.refined"
        || event.type === "pathway.refined";
    }

    function eventMatchesCurrentLocation(event) {
      const locationId = state?.location?.id;
      if (!locationId || !event) return true;
      return event.location_id === locationId || event.destination_location_id === locationId;
    }

    function eventShouldRefreshState(event) {
      if (!event) return false;
      return event.type === "world.reset"
        || event.type === "actor.presence"
        || event.type === "actor.created"
        || event.type === "actor.entered_location"
        || event.type === "actor.moved"
        || event.type === "hand.shuffled"
        || event.type === "turn.ping_started"
        || event.type === "turn.pong"
        || event.type === "turn.ping_skipped"
        || event.type === "turn.timeout_requested"
        || event.type === "turn.timeout_passed"
        || event.type === "message.created"
        || event.type === "chat.failed"
        || event.type === "avatar.refined"
        || event.type === "pathway.refined"
        || event.type === "move.blocked"
        || event.type === "feature.searched"
        || event.type === "location.searched"
        || event.type === "exit.discovered"
        || event.type === "item.picked_up"
        || event.type === "item.dropped"
        || event.type === "item.used"
        || event.type === "item.given"
        || event.type === "item.traded"
        || event.type === "avatar.evolved"
        || event.type === "rule.rejected"
        || event.type === "clock.updated"
        || event.type === "tag.applied"
        || event.type === "tag.cleared"
        || event.type === "calling.set"
        || event.type === "calling.revised"
        || event.type === "ledger.marked"
        || event.type === "ledger.banked"
        || event.type === "advancement.spent"
        || event.type === "skill.stepped"
        || event.type === "bond.deepened"
        || event.type === "bond.created"
        || event.type === "bond.revised"
        || event.type === "bond.resolved"
        || event.type === "job.updated"
        || event.type === "combat.defend"
        || event.type === "combat.attack.attempt"
        || event.type === "combat.attack.hit"
        || event.type === "combat.attack.miss"
        || event.type === "combat.knockout"
        || event.type === "combat.flee.success"
        || event.type === "encounter.reset";
    }

    function connectStream() {
      if (stream) stream.close();
      stream = new EventSource(streamPath());
      stream.addEventListener("world", (message) => {
        let event = null;
        try {
          event = JSON.parse(message.data);
        } catch {
          return;
        }
        if (event.type === "world.reset") {
          seenSeq.clear();
          rebuildLog([event]);
          renderTimelines();
          queueRefresh();
          return;
        }
        if (eventMatchesCurrentLocation(event)) {
          const changed = pushEvents([event]);
          if (changed) renderTimelines();
        }
        if (String(event.type || "").startsWith("world.") && event.type !== "world.bootstrapped") {
          worldView = null;
          worldViewAccessKey = "";
          if (libraryPanelPinned) ensureWorldView(true).then(render).catch(() => render());
        }
        const coveredByReceipt = Number(event.seq || 0) > 0
          && Number(event.seq || 0) <= Number(state?.state_revision || 0);
        if (eventShouldRefreshState(event) && !actionBusy && !coveredByReceipt) queueRefresh();
      });
      stream.onerror = () => setError("The live room is reconnecting.");
      startPresenceHeartbeat();
    }

    function render() {
      const location = state.location || {};
      const me = (state.actors || []).find((actor) => actor.id === actorId);
      const locationCard = cardForLocation(location.id);
      const locationArt = cardImage(locationCard) || fallbackCardImage(locationCard || { display_name: location.name || "Location", aspect: "wide", role: "location" });
      const locationImage = $("location-image");
      locationImage.src = locationArt;
      locationImage.alt = locationCard?.display_name || location.name || "";
      const roomHeroCard = $("room-hero-card");
      const roomHeroImage = $("room-hero-image");
      roomHeroImage.src = locationArt;
      roomHeroImage.alt = locationCard?.display_name || location.name || "";
      roomHeroCard.setAttribute("aria-label", `Open ${locationCard?.display_name || location.name || "current location"} card`);
      setCardTarget(roomHeroCard, locationCard);
      $("room-avatar-rail").innerHTML = roomAvatarRailHtml(state);
      $("subtitle").textContent = location.name || "Unknown";
      const brand = $("brand");
      brand.textContent = libraryPanelPinned ? "close library" : "world library";
      brand.setAttribute("aria-label", libraryPanelPinned ? "Close World Library" : "Open World Library");
      brand.setAttribute("aria-expanded", libraryPanelPinned ? "true" : "false");
      renderEconomy();
      $("avatar").textContent = me ? `${actorLabel(me)}, ${me.title || "traveler"}` : "";
      $("location-name").textContent = location.name || "Unknown";
      document.querySelector(".room")?.classList.toggle("collapsed", !roomCopyExpanded);
      if (lastRoomCopyLocationId !== location.id) {
        roomCopyExpanded = false;
        lastRoomCopyLocationId = location.id || null;
        document.querySelector(".room")?.classList.add("collapsed");
      }
      renderRoomCopy(location.id);
      renderTimelines();
      renderCommands();
      syncTurnCountdownTimer();
    }

    function renderEconomy() {
      const economy = state?.economy || {};
      const orbs = Number.isFinite(Number(economy.orbs)) ? Number(economy.orbs) : 0;
      const boxes = state?.access?.owned_box_ids?.length || 0;
      const packs = state?.access?.unopened_pack_ids?.length || 0;
      const signed = state?.access?.mode === "signed_ruby_high_wallet" && Boolean(walletSession);
      const parts = [`<strong>${orbs}</strong> orbs`];
      const compact = window.matchMedia("(max-width: 900px)").matches;
      if (economyFlash) {
        parts.push(`<span class="economy-flash ${escapeAttr(economyFlash.kind)}">${escapeHtml(economyFlash.text)}</span>`);
      }
      if (!compact) {
        if (boxes) parts.push(`${boxes} ${boxes === 1 ? "box" : "boxes"}`);
        if (packs) parts.push(`${packs} ${packs === 1 ? "pack" : "packs"}`);
      }
      parts.push(accountPanelPinned ? "close" : "account");
      const economyNode = $("economy");
      economyNode.innerHTML = parts.join(" · ");
      economyNode.setAttribute(
        "aria-label",
        accountPanelPinned
          ? "Close your collection and return to room chat"
          : `Open your collection: ${orbs} Orbs, ${boxes} Boxes, and ${packs} unopened packs`
      );
      economyNode.setAttribute("aria-expanded", accountPanelPinned ? "true" : "false");
      economyNode.classList.toggle("focused", Boolean(accountPanelPinned));
    }

    function exitUnavailable(exit, view = state) {
      if (!exit) return true;
      if (truthyFlag(exit.locked) || falseyFlag(exit.accessible)) return true;
      if (exitLockText(exit)) return true;
      const destinationCard = cardForLocationInView(view, exit.destination_location_id);
      if (falseyFlag(destinationCard?.accessible)) return true;
      const requiredCardId = String(exit.required_card_id || "").trim();
      if (!requiredCardId) return false;
      const access = view?.access || {};
      const lockedCardIds = Array.isArray(access.locked_card_ids) ? access.locked_card_ids.map(String) : [];
      if (lockedCardIds.includes(requiredCardId)) return true;
      const accessibleCardIds = Array.isArray(access.accessible_card_ids) ? access.accessible_card_ids.map(String) : null;
      return Boolean(accessibleCardIds && !accessibleCardIds.includes(requiredCardId));
    }

    function truthyFlag(value) {
      if (value === true || value === 1) return true;
      const text = String(value || "").trim().toLowerCase();
      return text === "true" || text === "1" || text === "yes" || text === "locked";
    }

    function falseyFlag(value) {
      if (value === false || value === 0) return true;
      const text = String(value || "").trim().toLowerCase();
      return text === "false" || text === "0" || text === "no" || text === "locked";
    }

    function exitLockText(exit) {
      const text = [
        exit.status,
        exit.state,
        exit.reason,
        exit.access_reason,
        exit.kicker,
      ].map((value) => String(value || "").trim().toLowerCase()).filter(Boolean).join(" ");
      return text.includes("card locked") || text.includes("wallet needed") || text.includes("card required");
    }

    function cardForLocationInView(view, id) {
      return view?.cards?.locations?.[String(id)] || null;
    }

    function roomAvatarRailHtml(view) {
      const actors = [...(view.actors || [])].sort((a, b) => {
        if (a.id === actorId) return -1;
        if (b.id === actorId) return 1;
        return String(a.name || "").localeCompare(String(b.name || ""));
      });
      const visible = actors.slice(0, 7);
      const portraits = visible.map((actor) => {
        const card = cardForActor(actor.id);
        const fallback = card || {
          display_name: actor.name || "Avatar",
          role: "avatar",
          aspect: "tall",
        };
        const image = cardImage(card) || fallbackCardImage(fallback);
        const you = actor.id === actorId;
        const evolved = Number(actor.stats?.level || 1) > 1;
        const label = you ? `${actorLabel(actor)} (you)` : actorLabel(actor);
        return `<button class="room-avatar-pfp${you ? " you" : ""}${evolved ? " evolved" : ""}" type="button"${cardDataAttr(card)} title="${escapeAttr(label)}" aria-label="Open ${escapeAttr(label)} card"${backgroundImageStyle(image)}></button>`;
      });
      const remaining = actors.length - visible.length;
      if (remaining > 0) {
        portraits.push(`<span class="room-avatar-more" title="${escapeAttr(`${remaining} more`)}">+${remaining}</span>`);
      }
      return portraits.join("");
    }

    function renderTimelines() {
      renderStatusUpdates();
      renderRoomMemory();
      renderLog();
    }

    function renderStatusUpdates() {
      const updates = $("updates");
      const currentActorId = Number(actorId || 0);
      if (currentActorId !== firstTaleActorIdSeen) {
        firstTaleActorIdSeen = currentActorId;
        firstTaleStageSeen = 0;
        firstTaleCelebration = false;
        firstTaleCompletionSeen = false;
      }
      const firstThread = firstThreadModel();
      if (firstThread) {
        firstTaleStageSeen = Math.max(firstTaleStageSeen, Number(firstThread.stage || 0));
      } else if (
        currentActorId
        && firstTaleStageSeen >= 3
        && !firstTaleCompletionSeen
        && Number(state?.ledger?.banked_count || 0) > 0
        && Number(state?.ledger?.spent_count || 0) > 0
      ) {
        firstTaleCelebration = true;
        firstTaleCompletionSeen = true;
      }
      updates.hidden = !firstThread && !firstTaleCelebration;
      const firstTaleEnding = firstTaleCompletionText(state);
      updates.innerHTML = firstThread
        ? `<span class="updates-guide">your first tale</span><div class="updates-list"><div class="update-pill first-thread" aria-label="Your first tale. Next: ${escapeAttr(firstThread.text)}"><span class="update-label" aria-hidden="true">next</span><span class="update-text">${escapeHtml(firstThread.text)}</span></div></div>`
        : firstTaleCelebration
          ? `<span class="updates-guide">your first tale</span><div class="updates-list"><div class="update-pill first-thread complete" aria-label="Your first tale is yours. ${escapeAttr(firstTaleEnding.charAt(0).toUpperCase() + firstTaleEnding.slice(1))}"><span class="update-label" aria-hidden="true">✦</span><span class="update-text">your first tale is yours — ${escapeHtml(firstTaleEnding)}</span></div></div>`
          : "";
    }

    function firstTaleCompletionText(view = state) {
      if (Array.isArray(view?.bonds) && view.bonds.length) {
        return "you listened, grew from a clue, and made a new friend.";
      }
      if (Array.isArray(view?.skills) && view.skills.length) {
        return "you listened, grew from a clue, and trained an ability.";
      }
      return "you listened, grew from a clue, and chose what to care about.";
    }

    function firstTaleIsComplete(view = state) {
      const ledger = view?.ledger || {};
      const shapedIdentity = (Array.isArray(view?.bonds) && view.bonds.length)
        || (Array.isArray(view?.skills) && view.skills.length);
      return Boolean(
        actorId
          && Number(ledger.learned_truth_count || 0) > 0
          && Number(ledger.banked_count || 0) > 0
          && Number(ledger.spent_count || 0) > 0
          && shapedIdentity
      );
    }

    function nextStoryThreadModel(view = state, availableActions = actions) {
      const findAction = (...labels) => availableActions.find((action) => (
        labels.includes(String(action?.label || "").toLowerCase())
      )) || null;
      const makeThread = (action, text, kind) => ({
        actionKey: action ? actionHandKey(action) : "",
        actionLabel: action?.label || "",
        kind,
        text: finishSentence(text),
      });

      const give = availableActions.find((action) => (
        ["give", "give item"].includes(String(action?.label || "").toLowerCase())
          && action.requestedGift === true
      )) || null;
      if (give) {
        const gift = String(give.detail || "").match(/^(.+?)\s+to\s+(.+)$/i);
        return makeThread(
          give,
          gift ? `${gift[2]} is waiting for ${gift[1]}` : "A nearby resident is hoping for one of your keepsakes",
          "gift",
        );
      }
      const urgentUse = availableActions.find((action) => (
        String(action?.label || "").toLowerCase() === "use"
          && Number(actionRank(action)) <= 10
      ));
      if (urgentUse) {
        return makeThread(urgentUse, "One of your keepsakes could help someone right now", "care");
      }
      const sharedWork = findAction("work", "help", "prepare");
      if (sharedWork) {
        return makeThread(sharedWork, `There is shared work waiting in ${view?.location?.name || "this room"}`, "work");
      }
      const danger = findAction("attack", "defend", "flee");
      if (danger) {
        return makeThread(danger, "Something dangerous here needs a careful answer", "danger");
      }
      const search = findAction("search");
      if (search) {
        const roomName = String(view?.location?.name || "this room");
        const target = String(search.detail || "").trim();
        if (target && target !== roomName) {
          return makeThread(search, `${target} is still hiding something`, "search");
        }
      }
      const travel = findAction("travel");
      if (travel) {
        const choices = Array.isArray(travel.choices) ? travel.choices : [];
        const destination = String(travel.detail || "").trim();
        return makeThread(
          travel,
          choices.length > 1 || !destination || destination === "choose a path"
            ? "A few paths are open when you're ready"
            : `A path to ${destination} is waiting`,
          "travel",
        );
      }
      if (search) {
        const roomName = String(view?.location?.name || "this room");
        return makeThread(search, `Something in ${roomName} is still waiting to be found`, "search");
      }
      const chat = findAction("chat");
      if (chat) {
        const target = String(chat.targetName || "").trim();
        return makeThread(chat, target ? `${target} has more to say` : "Someone nearby has more to say", "chat");
      }
      const hook = (view?.room_sheet?.hooks || []).map((value) => String(value || "").trim()).find(Boolean);
      if (hook) {
        return makeThread(null, `${hook.charAt(0).toUpperCase()}${hook.slice(1)}`, "room");
      }
      const evolve = availableActions.find((action) => (
        String(action?.label || "").toLowerCase() === "evolve"
          && Array.isArray(action?.evolveModes)
          && action.evolveModes.includes("practice")
      )) || findAction("practice");
      if (evolve) {
        return makeThread(evolve, "Something you learned is ready to become part of you", "evolve");
      }
      return null;
    }

    function renderRoomMemory() {
      const toggle = $("room-log-toggle");
      const latest = $("room-log-latest");
      const panel = $("room-memory");
      const memory = roomMemoryModel();
      toggle.hidden = false;
      toggle.setAttribute("aria-expanded", roomMemoryExpanded ? "true" : "false");
      latest.textContent = atmosphericMemoryBeat(memory.latest) || memory.latest.text;
      panel.hidden = !roomMemoryExpanded;
      if (!roomMemoryExpanded) {
        panel.innerHTML = "";
        return;
      }
      const recent = memory.recent.length
        ? memory.recent.map(roomMemoryEntryHtml).join("")
        : roomMemoryEntryHtml(memory.latest);
      panel.innerHTML = `<div class="memory-summary">${escapeHtml(memory.summary)}</div><div class="memory-recent">${recent}</div>`;
    }

    function roomMemoryModel() {
      const serverMemory = state?.room_memory;
      const serverRecent = Array.isArray(serverMemory?.recent)
        ? dedupeRoomMemoryEntries(
            serverMemory.recent
              .map(normalizeRoomMemoryEntry)
              .filter((entry) => entry && entry.kind !== "chat")
          )
        : [];
      const normalizedServerLatest = normalizeRoomMemoryEntry(serverMemory?.latest);
      const serverLatest = serverRecent[serverRecent.length - 1] || (normalizedServerLatest?.kind === "chat" ? null : normalizedServerLatest);
      const localEntries = logEvents.map(roomMemoryEntryForEvent).filter((entry) => entry && entry.kind !== "chat");
      const serverLatestSeq = Number(serverMemory?.latest_seq || serverLatest?.seq || 0);
      const newerLocalEntries = serverLatestSeq
        ? localEntries.filter((entry) => {
            const seq = Number(entry.seq || 0);
            return !Number.isFinite(seq) || seq > serverLatestSeq;
          })
        : [];
      if (serverMemory && (serverLatest || serverRecent.length || serverMemory.summary)) {
        const recent = dedupeRoomMemoryEntries([...serverRecent, ...newerLocalEntries]).slice(-8);
        const latest = preferredRoomLogEntry(recent, serverLatest) || {
          kind: "room",
          label: "room",
          text: openingBeat(state),
        };
        return {
          latest,
          recent: recent.length ? recent : [latest],
          summary: String(serverMemory.summary || openingBeat(state)).trim(),
        };
      }
      const entries = dedupeRoomMemoryEntries(localEntries);
      const latest = preferredRoomLogEntry(entries) || {
        kind: "room",
        label: "room",
        text: openingBeat(state),
      };
      return {
        latest,
        recent: entries.slice(-5),
        summary: roomMemorySummary(entries),
      };
    }

    function preferredRoomLogEntry(entries, fallback = null) {
      const recent = Array.isArray(entries) ? entries : [];
      const latestHumanCardBeat = recent.slice().reverse().find((entry) => {
        const entryActorId = Number(entry?.actorId || entry?.actor_id || 0);
        if (!entryActorId) return false;
        const entryActor = actorForId(entryActorId);
        const human = entryActorId === Number(actorId || 0)
          || String(entryActor?.kind || "").toLowerCase() === "human";
        const derivedMemory = String(entry?.label || "").toLowerCase() === "memory";
        return human && !derivedMemory;
      });
      return latestHumanCardBeat || recent[recent.length - 1] || fallback;
    }

    function normalizeRoomMemoryEntry(entry) {
      if (!entry) return null;
      const kind = String(entry.kind || "event");
      const rawLabel = String(entry.label || kind || "event");
      const label = kind === "ledger" && rawLabel.toLowerCase() === "ledger"
        ? "memory"
        : kind === "bond" && rawLabel.toLowerCase() === "bond"
          ? "friendship"
          : rawLabel.toLowerCase() === "calling"
            ? "purpose"
            : rawLabel;
      let text = cleanStatusText(entry.text || "")
        .replace(/^A moment stays with you:\s*/i, "")
        .replace(/([.!?])\1+$/g, "$1");
      if (kind === "item") {
        const usefulItem = text.match(/^takes (.+?)\.\s+(.+?) could use (.+?) with (.+?)\.$/i);
        if (usefulItem && usefulItem[1].toLowerCase() === usefulItem[3].toLowerCase()) {
          text = `${usefulItem[2]} carries ${usefulItem[1]} toward ${usefulItem[4]}.`;
        } else {
          text = text.replace(/^take (.+)\.$/i, "$1 changes hands.");
        }
      }
      if (label.toLowerCase() === "join") {
        text = text.replace(/^(.+) entered (.+)$/i, "$1 arrived in $2");
      }
      if (kind === "calling" || rawLabel.toLowerCase() === "calling") {
        text = text.replace(/^choose what calls you:\s*/i, "");
      }
      if (!text) return null;
      return {
        seq: entry.seq,
        actorId: entry.actorId || entry.actor_id || null,
        kind,
        label,
        text,
        actorName: entry.actorName || entry.actor_name || "",
        targetActorName: entry.targetActorName || entry.target_actor_name || "",
        sourceLocationId: entry.sourceLocationId || entry.location_id || null,
        sourceLocationName: entry.sourceLocationName || entry.location_name || "",
        destinationLocationId: entry.destinationLocationId || entry.destination_location_id || null,
        destinationName: entry.destinationName || entry.destination_location_name || "",
        itemName: entry.itemName || entry.item_name || "",
        targetItemName: entry.targetItemName || entry.target_item_name || "",
      };
    }

    function dedupeRoomMemoryEntries(entries) {
      const seen = new Set();
      const unique = [];
      for (let index = entries.length - 1; index >= 0; index -= 1) {
        const entry = entries[index];
        if (!entry?.text) continue;
        const key = memoryPhrase(entry.text).toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);
        unique.unshift(entry);
      }
      return unique;
    }

    function roomMemoryEntryForEvent(event) {
      if (!event) return null;
      if (event.type === "message.created") {
        return null;
      }
      if (
        event.type === "tag.applied"
        && ["search_location", "search_feature"].includes(String(event.content || ""))
      ) {
        return null;
      }
      if (isRollEvent(event)) {
        const meta = rollMeta(event);
      return {
        seq: event.seq,
        actorId: event.actor_id || null,
        kind: "roll",
        label: meta.label,
        text: cleanStatusText(meta.story),
        actorName: event.actor_name || "",
        targetActorName: event.target_actor_name || "",
        sourceLocationId: event.location_id || null,
        sourceLocationName: event.location_name || "",
        destinationLocationId: event.destination_location_id || null,
        destinationName: event.destination_location_name || "",
        itemName: event.item_name || "",
        targetItemName: event.target_item_name || "",
      };
      }
      const meta = statusUpdateMeta(event);
      if (!meta.text) return null;
      return {
        seq: event.seq,
        actorId: event.actor_id || null,
        kind: meta.kind || "event",
        label: meta.label || "event",
        text: cleanStatusText(meta.text),
        actorName: event.actor_name || "",
        targetActorName: event.target_actor_name || "",
        sourceLocationId: event.location_id || null,
        sourceLocationName: event.location_name || "",
        destinationLocationId: event.destination_location_id || null,
        destinationName: event.destination_location_name || "",
        itemName: event.item_name || "",
        targetItemName: event.target_item_name || "",
      };
    }

    function roomMemorySummary(entries) {
      const recent = entries.slice(-9);
      if (!recent.length) return openingBeat(state);
      const beats = recent
        .slice()
        .reverse()
        .map(atmosphericMemoryBeat)
        .filter(Boolean)
        .slice(0, 2)
        .reverse();
      if (!beats.length) return openingBeat(state);
      return finishSentence(`${withoutFinalPeriod(openingBeat(state))} ${beats.join(" ")}`);
    }

    function memoryPhrase(value) {
      return String(value || "").trim().replace(/[.!?]+$/g, "");
    }

    function atmosphericMemoryBeat(entry) {
      if (!entry) return "";
      const label = cleanStatusText(entry.label || "");
      const rawText = cleanStatusText(entry.text || "");
      const text = memoryPhrase(entry.text);
      const kind = String(entry.kind || "").toLowerCase();
      const actor = cleanStatusText(entry.actorName || entry.actor_name || "");
      const sourceLocationId = Number(entry.sourceLocationId || entry.location_id || 0);
      const destinationLocationId = Number(entry.destinationLocationId || entry.destination_location_id || 0);
      const destination = cleanStatusText(entry.destinationName || entry.destination_location_name || "");
      if (!text) return "";
      if (kind === "status" && /^Report submitted for .+\.$/i.test(rawText)) return rawText;
      if (kind === "chat") return finishSentence(`${possessive(label || actor || "someone")} voice stayed in the room`);
      if (kind === "move") {
        const currentLocationId = Number(state?.location?.id || 0);
        if (
          actor
          && destination
          && currentLocationId > 0
          && sourceLocationId === currentLocationId
          && destinationLocationId !== currentLocationId
        ) {
          return `${actor} left for ${destination}.`;
        }
        if (actor && destination) return `${actor} arrived at ${destination}.`;
        const match = text.match(/^(.*?):\s*(.*?)\s*->\s*(.*)$/) || text.match(/^(.*?)\s+moved from\s+(.*?)\s+to\s+(.*)$/i);
        if (match) return `${(match[1] || "Someone").trim()} arrived at ${(match[3] || "somewhere").trim()}.`;
        const entered = text.match(/^(.*?)\s+(?:entered|arrived in)\s+(.+)$/i);
        if (entered) return `${entered[1].trim()} arrived in ${entered[2].trim()}.`;
        return finishSentence(actor ? `${actor}: ${text}` : text);
      }
      if (kind === "hand") {
        if (/^new cards$/i.test(text)) return "A fresh hand of cards is ready.";
        return finishSentence(text);
      }
      if (kind === "search") {
        const path = text.match(/(?:a\s+)?way\s+to\s+(.+?)(?:\s+becomes\s+clear)?$/i);
        if (path?.[1]) return `A path to ${path[1].trim()} opened.`;
        return finishSentence(text);
      }
      if (kind === "roll") {
        if (actor && /^listens?:/i.test(text)) {
          return finishSentence(`${actor} ${text}`);
        }
        return finishSentence(text);
      }
      if (kind === "item") {
        return finishSentence(actor && !text.toLowerCase().startsWith(actor.toLowerCase()) ? `${actor} ${text}` : text);
      }
      if (kind === "trade") return finishSentence(actor ? `${actor} ${text}` : text);
      if (kind === "bond") {
        if (actor && /^closer to /i.test(text)) return finishSentence(`${actor} grew ${text}`);
        return finishSentence(actor && !text.toLowerCase().startsWith(actor.toLowerCase()) ? `${actor} ${text}` : text);
      }
      if (kind === "calling") {
        const purpose = text.replace(/^what draws you in:\s*/i, "");
        return finishSentence(actor ? `${actor} chose a purpose: ${purpose}` : purpose);
      }
      if (kind === "bank") return finishSentence(actor ? `${actor} grew from what happened` : text);
      if (kind === "growth") return finishSentence(actor ? `${actor} put what they learned into practice` : text);
      if (kind === "skill") return finishSentence(actor ? `${actor}: ${text}` : text);
      if (kind === "ledger") return finishSentence(actor && !text.toLowerCase().startsWith(actor.toLowerCase()) ? `${actor} ${text}` : text);
      return finishSentence(actor && !text.toLowerCase().startsWith(actor.toLowerCase()) ? `${actor} ${text}` : text);
    }

    function possessive(name) {
      const text = cleanStatusText(name || "someone");
      return text.endsWith("s") ? `${text}'` : `${text}'s`;
    }

    function roomMemoryEntryHtml(entry) {
      return `<div class="memory-entry ${escapeAttr(entry.kind)}"><span class="memory-entry-label">${escapeHtml(entry.label)}</span><span class="memory-entry-text">${escapeHtml(entry.text)}</span></div>`;
    }

    function eventIsLowSignalStatus(event) {
      return event?.type === "world.reset" || event?.type === "advancement.spent";
    }

    function statusUpdateHtml(event) {
      const meta = statusUpdateMeta(event);
      const attrs = ` aria-label="${escapeAttr(`${meta.label}: ${meta.text}`)}"`;
      return `<div class="update-pill ${escapeAttr(meta.kind)}"${attrs}><span class="update-label">${escapeHtml(meta.label)}</span><span class="update-text">${escapeHtml(meta.text)}</span></div>`;
    }

    function statusUpdateMeta(event) {
      const repeat = Number(event.repeat_count || 0);
      const repeatSuffix = repeat > 1 ? ` x${repeat}` : "";
      if (event.type === "ledger.marked") {
        return { kind: "ledger", label: "memory", text: cleanStatusText(ledgerEventLabel(event)) };
      }
      if (event.type === "ledger.banked") {
        return { kind: "ledger", label: "growth", text: cleanStatusText(ledgerBankedEventLabel(event)) };
      }
      if (event.type === "advancement.spent") {
        return { kind: "growth", label: "change", text: cleanStatusText(advancementEventLabel(event)) };
      }
      if (event.type === "skill.stepped") {
        return { kind: "skill", label: "ability", text: cleanStatusText(skillEventLabel(event)) };
      }
      if (event.type === "calling.set") {
        if (event.actor_id === actorId) {
          return { kind: "calling", label: "purpose", text: `What draws you in: ${cleanStatusText(callingEventLabel(event))}` };
        }
        return { kind: "calling", label: "purpose", text: cleanStatusText(callingEventLabel(event)) };
      }
      if (event.type === "calling.revised") {
        if (event.actor_id === actorId) {
          return { kind: "calling", label: "purpose", text: `What draws you in: ${cleanStatusText(callingEventLabel(event))}` };
        }
        return { kind: "calling", label: "purpose", text: cleanStatusText(callingEventLabel(event)) };
      }
      if (event.type === "bond.deepened") {
        return { kind: "bond", label: "friendship", text: `closer to ${event.target_actor_name || "someone"}` };
      }
      if (event.type === "bond.created") {
        return { kind: "bond", label: "friendship", text: `${event.target_actor_name || "someone"} now matters to you` };
      }
      if (event.type === "bond.revised") {
        return { kind: "bond", label: "friendship", text: `what ${event.target_actor_name || "someone"} means to you changed` };
      }
      if (event.type === "bond.resolved") {
        return { kind: "bond", label: "friendship", text: `what mattered with ${event.target_actor_name || "someone"} stays with you` };
      }
      if (event.type === "actor.moved") {
        const actor = event.actor_name || "someone";
        return { kind: "move", label: "move", text: `${actor}: ${event.location_name || "somewhere"} -> ${event.destination_location_name || "somewhere"}` };
      }
      if (event.type === "actor.created") {
        const actor = actorNameForEvent(event);
        if (event.actor_id === actorId) {
          const title = actorTitleForEvent(event);
          return {
            kind: "move",
            label: "you",
            text: `arrive as ${actor}${title ? `, ${title}` : ""}`,
          };
        }
        return { kind: "move", label: "join", text: `${actor} entered ${event.location_name || "the room"}` };
      }
      if (event.type === "actor.entered_location") {
        return { kind: "move", label: "join", text: `arrived ${event.location_name || "here"}` };
      }
      if (event.type === "move.blocked") {
        return { kind: "move", label: "locked", text: event.destination_location_name || "path blocked" };
      }
      if (event.type === "hand.shuffled") {
        return { kind: "hand", label: "hand", text: "new cards" };
      }
      if (event.type === "turn.ping_started") {
        const actor = event.actor_name || "someone";
        const target = event.target_actor_name || "the current player";
        return { kind: "hand", label: "nudge", text: `${actor} gently nudged ${target}${repeatSuffix}` };
      }
      if (event.type === "turn.pong") {
        const actor = event.actor_name || "someone";
        return { kind: "hand", label: "ready", text: `${actor} is here for the next choice${repeatSuffix}` };
      }
      if (event.type === "turn.ping_skipped") {
        const target = event.target_actor_name || "the current player";
        return { kind: "hand", label: "next", text: `${target} was away, so the choice passed on${repeatSuffix}` };
      }
      if (event.type === "turn.timeout_requested") {
        const actor = event.actor_name || "someone";
        const target = event.target_actor_name || "the current player";
        return { kind: "hand", label: "timeout", text: `${actor} asked ${target} to play or pass${repeatSuffix}` };
      }
      if (event.type === "turn.timeout_passed") {
        const target = event.target_actor_name || "the current player";
        return { kind: "hand", label: "passed", text: `${target} passed${repeatSuffix}` };
      }
      if (event.type === "feature.searched" || event.type === "location.searched") {
        return { kind: "search", label: "search", text: cleanStatusText(searchEventText(event)) };
      }
      if (event.type === "exit.discovered") {
        return { kind: "search", label: "entrance", text: cleanStatusText(eventText(event)) };
      }
      if (event.type === "ability_check.rolled") {
        return { kind: "roll", label: "roll", text: cleanStatusText(listenEventText(event)) };
      }
      if (event.type === "combat.attack.attempt") {
        return { kind: "roll", label: "roll", text: cleanStatusText(eventText(event)) };
      }
      if (event.type === "item.traded") {
        return { kind: "trade", label: "trade", text: cleanStatusText(eventText(event)) };
      }
      if (event.type === "command.output") {
        return {
          kind: "status",
          label: "status",
          text: cleanStatusText(String(event.content || "").split(/\n+/).map((line) => line.trim()).filter(Boolean).join(" ")),
        };
      }
      return { kind: statusKindForEvent(event), label: statusLabelForEvent(event), text: cleanStatusText(eventText(event)) };
    }

    function statusKindForEvent(event) {
      const type = String(event?.type || "");
      if (type.startsWith("item.")) return "item";
      if (type.startsWith("combat.")) return "combat";
      if (type === "exit.discovered") return "search";
      if (type === "encounter.reset") return "combat";
      if (type === "hand.shuffled") return "hand";
      if (type.startsWith("turn.")) return "hand";
      if (type === "clock.updated" || type === "tag.applied" || type === "tag.cleared" || type === "job.updated") return "world";
      return "status";
    }

    function statusLabelForEvent(event) {
      const type = String(event?.type || "");
      if (type.startsWith("item.")) return "item";
      if (type.startsWith("combat.")) return "combat";
      if (type === "exit.discovered") return "entrance";
      if (type === "encounter.reset") return "frontier";
      if (type === "hand.shuffled") return "hand";
      if (type.startsWith("turn.")) return "turn";
      if (type === "clock.updated") return "clock";
      if (type.startsWith("tag.")) return "tag";
      if (type === "job.updated") return "job";
      return "event";
    }

    function cleanStatusText(value) {
      const text = String(value || "").trim();
      return text
        .replace(/:{1,2}(resident_feature_use|resident_autonomy_intent)\b/g, "")
        .replace(/^you:\s*/i, "")
        .replace(/^You\s+/, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function renderLog() {
      const log = $("log");
      const previousScrollTop = log.scrollTop;
      const wasAtBottom = log.scrollHeight <= log.clientHeight + 1
        || log.scrollHeight - log.scrollTop - log.clientHeight < 28;
      const libraryPanel = libraryPanelHtml();
      const accountPanel = accountPanelHtml();
      const visibleEvents = pacedChatTranscriptEvents(logEvents.filter(eventIsChatTranscriptEvent));
      const pendingConversation = pendingConversationHtml();
      const pendingChatReplies = pendingChatsHtml();
      const pendingArrival = pendingAvatarArrivalHtml();
      const hasChat = visibleEvents.length > 0 || Boolean(pendingConversation) || Boolean(pendingChatReplies);
      const residentOnly = visibleEvents.length > 0 && visibleEvents.every(messageActorIsResident);
      log.classList.toggle("library-mode", Boolean(libraryPanel));
      log.classList.toggle("account-mode", !libraryPanel && Boolean(accountPanel));
      log.classList.toggle("chat-mode", !libraryPanel && !accountPanel && hasChat);
      log.classList.toggle("room-mode", !libraryPanel && !accountPanel && !hasChat && !pendingArrival);
      log.classList.toggle("arrival-mode", !libraryPanel && !accountPanel && Boolean(pendingArrival));
      log.classList.toggle("quiet-mode", !libraryPanel && !accountPanel && residentOnly);
      const panelMode = libraryPanel ? "library" : (accountPanel ? "account" : "");
      document.querySelector(".terminal")?.classList.toggle("panel-open", Boolean(panelMode));
      document.querySelector(".prompt").hidden = Boolean(panelMode);
      if (panelMode) {
        log.setAttribute("role", "region");
        log.setAttribute("aria-label", panelMode === "library" ? "World Library" : "Your avatar and collection");
        log.removeAttribute("aria-live");
        log.removeAttribute("aria-relevant");
      } else {
        log.setAttribute("role", "log");
        log.setAttribute("aria-label", "Shared room chat");
        log.setAttribute("aria-live", "polite");
        log.setAttribute("aria-relevant", "additions text");
      }
      if (libraryPanel) {
        log.innerHTML = libraryPanel;
        log.scrollTop = 0;
        return;
      }
      if (accountPanel) {
        log.innerHTML = accountPanel;
        log.scrollTop = 0;
        return;
      }
      if (pendingArrival) {
        log.innerHTML = pendingArrival;
        log.scrollTop = 0;
        return;
      }
      if (!hasChat) {
        renderedChatTailKey = "";
        log.innerHTML = quietRoomSceneHtml();
        log.scrollTop = 0;
        return;
      }
      const tailEvent = visibleEvents[visibleEvents.length - 1] || null;
      const chatTailKey = [
        tailEvent?.seq ?? "",
        tailEvent?.repeat_count ?? 1,
        pendingConversation ? "conversation" : "",
        pendingChats.map((chat) => chat.id).join(","),
      ].join(":");
      const tailChanged = chatTailKey !== renderedChatTailKey;
      renderedChatTailKey = chatTailKey;
      log.innerHTML = `${visibleEvents.map(transcriptEventHtml).join("")}${pendingConversation}${pendingChatReplies}`;
      log.scrollTop = tailChanged || wasAtBottom ? log.scrollHeight : previousScrollTop;
    }

    function libraryPanelHtml() {
      if (!libraryPanelPinned) return "";
      const packs = Array.isArray(contentPacks?.packs) ? contentPacks.packs.filter((pack) => pack.visible !== false) : [];
      if (!packs.length) {
        return `<section class="account-panel library-panel" aria-labelledby="world-library-title"><div class="library-heading"><h2 id="world-library-title">world library</h2></div><div class="library-intro">The worlds are still gathering. Try again in a moment.</div></section>`;
      }
      const bundle = compactAssetId(contentPacks?.bundle_hash || "");
      const cards = packs.map(libraryPackHtml).join("");
      const bundleDetails = bundle
        ? `<details class="library-technical"><summary>bundle details</summary><code>${escapeHtml(bundle)}</code></details>`
        : "";
      return `<section class="account-panel library-panel" aria-labelledby="world-library-title"><div class="library-heading"><h2 id="world-library-title">world library</h2><small>${escapeHtml(`${packs.length} worlds and packs`)}</small></div><div class="library-intro">See where your story can travel. Open worlds are ready now; locked places show the card or collection that will let you enter.</div>${worldChronicleHtml()}<div class="library-grid">${cards}</div>${bundleDetails}</section>`;
    }

    function worldChronicleHtml() {
      const simulation = worldView?.simulation;
      if (!simulation) {
        return `<section class="world-chronicle" aria-label="World chronicle"><div class="world-chronicle-head"><strong>the world beyond</strong><small>listening for distant news…</small></div></section>`;
      }
      const history = Array.isArray(simulation.recent_history) ? simulation.recent_history.slice(0, 8) : [];
      const entries = history.length
        ? history.map((event) => {
            const route = event.destination_location_name
              ? `${event.location_name || "somewhere"} → ${event.destination_location_name}`
              : (event.location_name || "somewhere beyond this room");
            return `<div class="world-chronicle-entry"><span class="world-chronicle-place">${escapeHtml(route)}</span><span class="world-chronicle-copy">${escapeHtml(cleanStatusText(event.content || eventText(event)))}</span></div>`;
          }).join("")
        : `<div class="world-chronicle-entry"><span class="world-chronicle-copy">The wider world is settled. Six committed turns will carry the first distant change.</span></div>`;
      const movingFactions = (simulation.factions || [])
        .filter((faction) => Number(faction.momentum || 0) !== 0)
        .sort((left, right) => Math.abs(Number(right.momentum || 0)) - Math.abs(Number(left.momentum || 0)))
        .slice(0, 4)
        .map((faction) => `${faction.faction_name || faction.faction_id} ${Number(faction.momentum) > 0 ? "+" : ""}${Number(faction.momentum || 0)}`)
        .join(" · ");
      const pulseLabel = Number(simulation.pulse_index || 0)
        ? `history pulse ${simulation.pulse_index} · played tick ${simulation.last_advanced_tick}`
        : `moves every ${simulation.pulse_interval_ticks || 6} committed turns`;
      const factionLine = movingFactions
        ? `<div class="world-faction-current">faction momentum · ${escapeHtml(movingFactions)}</div>`
        : "";
      return `<section class="world-chronicle" aria-label="World chronicle"><div class="world-chronicle-head"><strong>the world beyond</strong><small>${escapeHtml(pulseLabel)}</small></div><div class="world-chronicle-list">${entries}</div>${factionLine}</section>`;
    }

    function libraryPackHtml(pack) {
      const stateName = String(pack.access_state || "included");
      const locations = Array.isArray(pack.locations) ? pack.locations : [];
      const shownLocations = locations.slice(0, 6).map((location) => {
        const open = location.accessible !== false;
        const stateLabel = open ? "open" : (location.required_card_id ? "card required" : "access required");
        return `<div class="library-location${open ? " accessible" : ""}"><span>${escapeHtml(location.name || `Location ${location.id}`)}</span><span class="library-location-state">${escapeHtml(stateLabel)}</span></div>`;
      }).join("");
      const remaining = Math.max(0, locations.length - 6);
      const locationList = shownLocations
        ? `<div class="library-locations">${shownLocations}${remaining ? `<div class="library-location"><span>and ${remaining} more</span></div>` : ""}</div>`
        : "";
      const dependencies = Array.isArray(pack.dependencies) && pack.dependencies.length
        ? ` · depends on ${pack.dependencies.map(shortPackName).join(", ")}`
        : "";
      const authority = libraryPackAuthoritySummary(pack);
      const badgeLabel = stateName === "partial" ? "some open" : (stateName === "included" ? "included" : stateName);
      const technical = [
        `${pack.kind || "pack"} · v${pack.version || "?"} · ${pack.license || "unlicensed"}${dependencies}`,
        authority,
      ].filter(Boolean).join(" · ");
      const technicalDetails = technical
        ? `<details class="library-technical"><summary>technical details</summary><div>${escapeHtml(technical)}</div></details>`
        : "";
      return `<article class="library-pack"><div class="library-pack-top"><div><div class="library-pack-name">${escapeHtml(pack.name || pack.id)}</div><div class="library-pack-meta">${escapeHtml(pack.kind || "pack")}</div></div><span class="library-access-badge ${escapeAttr(stateName)}">${escapeHtml(badgeLabel)}</span></div><div class="library-pack-copy">${escapeHtml(pack.description || "No description yet.")}</div><div class="library-pack-counts">${escapeHtml(libraryPackCountSummary(pack.resource_counts || {}))}</div><div class="library-pack-access">${escapeHtml(pack.access_summary || "Included with this world.")}</div>${locationList}${technicalDetails}</article>`;
    }

    function libraryPackAuthoritySummary(pack) {
      const authorities = Array.isArray(pack.entitlement_authorities) ? pack.entitlement_authorities : [];
      const labels = authorities.map((authority) => {
        if (authority.type === "solana_collection") return `Solana collection ${compactAssetId(authority.collection_address || "")}`;
        if (authority.type === "signed_set") return `private set signed by ${compactAssetId(authority.public_key || "")}`;
        if (authority.type === "asset_feed") return `${authority.issuer || "trusted"} verified asset feed`;
        return authority.type || "entitlement authority";
      });
      const permanence = pack.distribution?.permanent_uri
        ? `permanent ${compactAssetId(pack.distribution.permanent_uri)}`
        : pack.distribution?.permanence === "content-addressed"
          ? "content-addressed release"
          : "";
      return [...labels, permanence].filter(Boolean).join(" · ");
    }

    function shortPackName(value) {
      return String(value || "")
        .replace(/^cosyworld\./, "")
        .replace(/^campaign\./, "");
    }

    function libraryPackCountSummary(counts) {
      const entries = [
        ["locations", "places"],
        ["actors", "residents"],
        ["items", "items"],
        ["cards", "cards"],
        ["external_cards", "catalog cards"],
        ["character_creation", "character paths"],
        ["rules", "rules references"],
        ["assets", "asset collections"],
      ];
      const visible = entries
        .map(([key, label]) => [Number(counts[key] || 0), label])
        .filter(([count]) => count > 0)
        .map(([count, label]) => `${count} ${label}`);
      return visible.length ? visible.join(" · ") : "metadata-only pack";
    }

    function pendingConversationHtml() {
      if (!actionBusy || pendingAction?.kind !== "orb-chat") return "";
      const targetId = Number(
        typeof pendingAction.pendingTargetActorId === "function"
          ? pendingAction.pendingTargetActorId()
          : pendingAction.targetActorId
      );
      const target = actorForId(targetId);
      const speaker = target ? actorLabel(target) : (pendingAction.targetName || "A neighbour");
      const aria = `${speaker} is finding the thread. Your conversation is unfolding.`;
      return `<div class="line chat npc pending" role="status" aria-label="${escapeAttr(aria)}">${chatPfpHtml({ actor_id: targetId }, speaker)}<span class="speaker">${escapeHtml(speaker)}</span><span class="text" aria-hidden="true"><span class="chat-thinking-dots"><i></i><i></i><i></i></span>finding the thread…</span></div>`;
    }

    function pendingChatsHtml() {
      if (actionBusy && pendingAction?.kind === "orb-chat") return "";
      return pendingChats.map((chat) => {
        const speaker = chat.targetName || "Someone nearby";
        const aria = `${speaker} is finding the thread. Your next cards are ready while the conversation unfolds.`;
        return `<div class="line chat npc pending" role="status" aria-label="${escapeAttr(aria)}">${chatPfpHtml({ actor_id: chat.targetActorId }, speaker)}<span class="speaker">${escapeHtml(speaker)}</span><span class="text" aria-hidden="true"><span class="chat-thinking-dots"><i></i><i></i><i></i></span>finding the thread…</span></div>`;
      }).join("");
    }

    function pendingAvatarArrivalHtml() {
      if (!actionBusy || pendingAction?.kind !== "avatar-arrival") return "";
      const choice = selectedActionChoice(pendingAction);
      const calling = choice?.label || "a little trouble";
      const kicker = "the cottage is making room";
      const text = "A name, a face, and a little trouble are finding their way to the door.";
      const cue = `Drawn in by ${calling}. Someone here is getting ready to say hello.`;
      const aria = `${kicker}. ${text} ${cue}`;
      return `<div class="room-scene arrival-scene" role="status" aria-label="${escapeAttr(aria)}"><span class="room-scene-kicker">${escapeHtml(kicker)}</span><span class="room-scene-text">${escapeHtml(text)}</span><span class="room-scene-cue">${escapeHtml(cue)}</span></div>`;
    }

    function quietRoomSceneHtml() {
      const beat = openingBeat(state);
      const hasAvatar = Boolean(actorId && state?.primary_action?.kind !== "create_avatar");
      const kicker = hasAvatar ? "the room is listening" : "a new tale is waiting";
      const cue = hasAvatar
        ? "Choose a card below. Someone here will answer."
        : "Begin with the trouble you can't resist.";
      const aria = `${kicker}. ${beat} ${cue}`;
      return `<div class="room-scene" role="note" aria-label="${escapeAttr(aria)}"><span class="room-scene-kicker">${escapeHtml(kicker)}</span><span class="room-scene-text">${escapeHtml(beat)}</span><span class="room-scene-cue">${escapeHtml(cue)}</span></div>`;
    }

    function eventIsChatTranscriptEvent(event) {
      return event?.type === "message.created" || event?.type === "chat.failed";
    }

    function transcriptEventHtml(event) {
      return event?.type === "message.created" ? messageHtml(event) : sceneCardEventHtml(event);
    }

    function accountPanelHtml() {
      if (!accountPanelPinned) return "";
      const account = state?.account || {};
      const wallet = account.wallet_address || state?.access?.owner_wallet_address || "";
      const ownedCards = Array.isArray(account.owned_cards) ? account.owned_cards : [];
      const boxes = Array.isArray(account.active_box_ids) ? account.active_box_ids : [];
      const packs = Array.isArray(account.unopened_pack_ids) ? account.unopened_pack_ids : [];
      const receipts = Array.isArray(account.recent_box_receipts) ? account.recent_box_receipts : [];
      const openings = Array.isArray(account.recent_pack_openings) ? account.recent_pack_openings : [];
      const signed = state?.access?.mode === "signed_ruby_high_wallet" && Boolean(walletSession);
      const assets = [];
      const displayedCards = ownedCards
        .slice()
        .sort((left, right) => (
          Number(equippedCardIds.includes(right.card_id)) - Number(equippedCardIds.includes(left.card_id))
          || String(left.display_name || left.card_id).localeCompare(String(right.display_name || right.card_id))
        ));
      for (const card of displayedCards.slice(0, 24)) {
        assets.push(accountOwnedCard(card));
      }
      for (const boxId of boxes.slice(0, 6)) {
        assets.push(accountBoxCard(boxId, openingBoxId === boxId ? "opening" : "closed"));
      }
      for (const packId of packs.slice(0, 6)) {
        assets.push(accountPackCard(packId));
      }
      const inventoryRows = [
        accountRow("keepsakes", equippedCardIds.length
          ? `${equippedCardIds.map(cardDisplayName).join(", ")} · ${equippedCardIds.length >= keepsakeCapacity
            ? "all three kept close"
            : `room for ${smallNumberWord(keepsakeCapacity - equippedCardIds.length)} more`}`
          : "choose a few to keep close"),
        accountRow("cards", ownedCards.length ? `${smallNumberWord(ownedCards.length)} in your collection` : "waiting to be found"),
        accountRow("boxes", boxes.length ? `${smallNumberWord(boxes.length)} waiting to open` : "a wooden box may turn up"),
        accountRow("packs", packs.length ? `${smallNumberWord(packs.length)} waiting to open` : "an avatar pack may turn up"),
      ];
      for (const receipt of receipts.slice(0, 3)) {
        inventoryRows.push(accountRow("opened box", "a wooden box became an avatar pack"));
      }
      for (const opening of openings.slice(0, 3)) {
        const cards = (opening.card_ids || []).map(cardDisplayName).join(", ");
        inventoryRows.push(accountRow("opened pack", cards || "a few new cards"));
      }
      const actions = [];
      if (signed) {
        if (boxes.length) {
          actions.push(`<button class="account-button secondary" type="button" data-account-open-box="first">open box</button>`);
        }
        if (packs.length) {
          actions.push(`<button class="account-button secondary" type="button" data-account-open-pack="first">open pack</button>`);
        }
      }
      const inventory = assets.length
        ? `<div class="account-assets">${assets.join("")}</div>`
        : `<div class="account-empty">your collection is waiting for its first card</div>`;
      const accountActions = actions.length ? `<div class="account-actions">${actions.join("")}</div>` : "";
      const keepsakeNote = ownedCards.length
        ? `<div class="keepsake-note">Keep a few cards close—up to three. They help the choices they care about turn up sooner in your hand.</div>`
        : "";
      const accountName = identity?.authenticated
        ? "CosyWorld account"
        : (signed ? (compactAssetId(wallet) || "linked account") : "local tale");
      return `<section class="account-panel" aria-labelledby="account-panel-title"><div class="account-title"><h2 id="account-panel-title">your avatar</h2><span class="account-wallet">${escapeHtml(accountName)}</span></div>${identitySectionHtml()}${characterSheetHtml()}${accountActions}<div class="account-section"><div class="account-section-title">your keepsakes</div>${keepsakeNote}${inventory}${inventoryRows.join("")}</div></section>`;
    }

    function identitySectionHtml() {
      if (!identity?.authenticated) {
        return `<section class="account-section" aria-label="CosyWorld sign in"><div class="account-actions"><button class="account-button" type="button" data-passkey-continue>continue with passkey</button></div></section>`;
      }
      const passkeys = Array.isArray(identity.passkeys) ? identity.passkeys : [];
      const wallets = Array.isArray(identity.wallets) ? identity.wallets : [];
      const walletRows = wallets.length
        ? wallets.map((entry) => {
            const wallet = String(entry.wallet_address || "");
            const active = wallet === identity.active_wallet;
            return `<div class="account-wallet-entry${active ? " active" : ""}"><code>${escapeHtml(compactAssetId(wallet))}</code><div class="account-wallet-controls">${active ? `<span class="account-auth-copy">NFT access active</span>` : `<button class="account-button secondary" type="button" data-wallet-select="${escapeAttr(wallet)}">use</button>`}<button class="account-button secondary" type="button" data-wallet-unlink="${escapeAttr(wallet)}">release</button></div></div>`;
          }).join("")
        : `<div class="account-empty">No NFT wallet claimed. Public play still works.</div>`;
      const passkeyCopy = passkeys.length === 1
        ? "1 passkey — add a second for recovery"
        : `${passkeys.length} passkeys`;
      return `<section class="account-section" aria-label="CosyWorld account"><div class="account-section-title">CosyWorld account</div>${accountRow("passkeys", passkeyCopy)}<div class="account-actions"><button class="account-button secondary" type="button" data-passkey-add>add passkey</button><button class="account-button secondary" type="button" data-wallet-link>claim NFT wallet</button><button class="account-button secondary" type="button" data-account-logout>sign out</button></div><div class="account-wallet-list">${walletRows}</div></section>`;
    }

    function characterSheetHtml() {
      const ledger = state?.ledger || {};
      const avatar = actorForId(actorId);
      const avatarCard = cardForActor(actorId);
      const avatarName = String(avatar?.name || avatarCard?.display_name || "your avatar").trim();
      const avatarTitle = String(avatar?.title || avatarCard?.title || "").trim();
      const avatarBlurb = String(avatarCard?.blurb || avatar?.description || "").trim();
      const avatarImage = cardImage(avatarCard);
      const portrait = avatarImage
        ? `<button class="account-portrait" type="button"${cardDataAttr(avatarCard)} aria-label="Open ${escapeAttr(avatarName)} card"><img src="${escapeAttr(avatarImage)}" alt="" /></button>`
        : "";
      const identity = `<div class="account-identity${portrait ? "" : " no-portrait"}">${portrait}<div class="account-identity-copy"><span class="account-identity-name">${escapeHtml(avatarName)}</span>${avatarTitle ? `<span class="account-identity-title">${escapeHtml(avatarTitle)}</span>` : ""}${avatarBlurb ? `<span class="account-identity-blurb">${escapeHtml(avatarBlurb)}</span>` : ""}</div></div>`;
      const purpose = String(state?.calling?.statement || "").trim() || "still choosing what trouble to get into";
      const memoriesReady = Number(ledger.unbanked_count || 0);
      const growthReady = Number(ledger.advancement_points || 0);
      const growthSummary = [
        memoriesReady ? "something you noticed is ready to keep" : "",
        growthReady ? "you can strengthen a friendship or train an ability" : "",
      ].filter(Boolean).join(" · ") || "your first little moment is waiting";
      const rows = [
        accountRow("purpose", purpose),
        accountRow("journal", growthSummary),
      ];
      const skills = Array.isArray(state?.skills) ? state.skills : [];
      rows.push(accountRow("ability training", skills.length ? skills.map((skill) => {
        const rank = Number(skill.rank || 0);
        const confidence = rank >= 3 ? "second nature" : (rank === 2 ? "strong" : "growing");
        const label = abilityLabel(skill.skill_id || skill.label, skill.label);
        const bonus = Math.max(0, Number(skill.bonus ?? rank) || 0);
        return `${label} checks +${bonus} — ${confidence}`;
      }).join(", ") : "ability training will grow here"));
      const bonds = Array.isArray(state?.bonds) ? state.bonds : [];
      rows.push(accountRow("friends", bonds.length ? bonds.map((bond) => {
        const name = String(bond.target_actor_name || "someone").trim();
        const statement = String(bond.statement || "").trim();
        const closeness = Number(bond.strength || 0) >= 3 ? "close friend" : (Number(bond.strength || 0) >= 2 ? "getting closer" : "new friend");
        return `${name} — ${statement || closeness}${statement ? ` (${closeness})` : ""}`;
      }).join(" · ") : "someone new is waiting to meet you"));
      const marks = Array.isArray(ledger.unbanked_marks) ? ledger.unbanked_marks : [];
      const markList = marks.length
        ? `<div class="account-list">${marks.slice(0, 4).map((mark) => `<div class="account-list-item">${escapeHtml(mark.label || mark.category || "A remembered moment")}</div>`).join("")}</div>`
        : "";
      return `${identity}<div class="account-section">${rows.join("")}${markList}</div>`;
    }

    function accountBoxCard(boxId, stateName) {
      const title = "Intricately Carved Wooden Box";
      const subtitle = stateName === "opening" ? "opening" : "open box";
      return `<div class="account-asset"><img src="${escapeAttr(boxImageUrl(boxId, stateName))}" alt="${escapeAttr(`${title} ${stateName}`)}" data-card-key="box:${escapeAttr(boxId)}" /><div class="account-asset-title">${emojiHtml("🧰")}${escapeHtml(title)}</div><div class="account-asset-subtitle">${escapeHtml(compactAssetId(boxId))}</div><button class="account-button secondary" type="button" data-account-open-box="${escapeAttr(boxId)}"${stateName === "opening" ? " disabled" : ""}>${escapeHtml(subtitle)}</button></div>`;
    }

    function accountPackCard(packId) {
      const image = fallbackCardImage(accountCard("Avatar Pack"));
      return `<div class="account-asset"><img src="${escapeAttr(image)}" alt="Avatar Pack" data-card-key="pack:${escapeAttr(packId)}" /><div class="account-asset-title">${emojiHtml("🎴")}Avatar Pack</div><div class="account-asset-subtitle">${escapeHtml(compactAssetId(packId))}</div><button class="account-button secondary" type="button" data-account-open-pack="${escapeAttr(packId)}">open pack</button></div>`;
    }

    function accountOwnedCard(card) {
      const image = cardImage(card) || fallbackCardImage(card);
      const shape = shapeForCard(card);
      const equipped = equippedCardIds.includes(card.card_id);
      const full = equippedCardIds.length >= keepsakeCapacity;
      const rarity = friendlyCardRarity(card.rarity);
      const buttonLabel = equipped ? "put away" : "keep close";
      const cardName = card.display_name || card.card_id || "Owned card";
      const cardNameHtml = `${emojiHtml(cardEmoji(card, shape))}${escapeHtml(cardName)}`;
      return `<div class="account-asset owned-card ${escapeAttr(shape)}${equipped ? " kept-close" : ""}"><button class="account-card-open" type="button"${cardDataAttr(card)} aria-label="Open ${escapeAttr(cardName)} card details"><img src="${escapeAttr(image)}" alt="" /></button><div class="account-asset-title">${cardNameHtml}</div><div class="account-asset-subtitle">${escapeHtml(rarity)} · ${escapeHtml(card.title || card.role || "card")}</div><div class="account-asset-effect"><span>when kept close</span>${escapeHtml(keepsakePromise(card))}</div><button class="account-button secondary" type="button" data-account-toggle-keepsake="${escapeAttr(card.card_id || "")}"${!equipped && full ? " disabled" : ""}>${buttonLabel}</button></div>`;
    }

    function boxImageUrl(boxId, stateName = "closed") {
      return `/assets/generated/boxes/${encodeURIComponent(stateName)}/${encodeURIComponent(boxId)}.svg`;
    }

    function accountRow(key, value) {
      const empty = [
        "waiting to be found",
        "a wooden box may turn up",
        "an avatar pack may turn up",
        "your first little moment is waiting",
        "ability training will grow here",
        "someone new is waiting to meet you",
      ].includes(value);
      return `<div class="account-row"><span class="account-key">${escapeHtml(key)}</span><span class="account-value${empty ? " account-empty" : ""}">${escapeHtml(value)}</span></div>`;
    }

    function cardDisplayName(cardId) {
      for (const group of [state?.cards?.actors, state?.cards?.items, state?.cards?.locations, state?.account?.owned_cards]) {
        if (!group) continue;
        for (const card of Array.isArray(group) ? group : Object.values(group)) {
          if (card?.card_id === cardId) return card.display_name || cardId;
        }
      }
      return cardId;
    }

    function hasAccountPanelContent() {
      const account = state?.account || {};
      const ledger = state?.ledger || {};
      return Boolean(
        account.wallet_address
          || (account.owned_cards || []).length
          || (account.active_box_ids || []).length
          || (account.unopened_pack_ids || []).length
          || (account.recent_box_receipts || []).length
          || (account.recent_pack_openings || []).length
          || state?.calling
          || (state?.skills || []).length
          || (state?.bonds || []).length
          || Number(ledger.unbanked_count || 0) > 0
          || Number(ledger.banked_count || 0) > 0
      );
    }

    const DEWBRIGHT_BUTTON_ITEM_ID = 2002;
    const RAIN_SOFT_GARDEN_LOCATION_ID = 2;

    function looseItemAtLocation(view, itemId, locationId) {
      return (view?.items || []).some((item) => (
        Number(item?.id || 0) === Number(itemId || 0)
        && Number(item?.location_id || 0) === Number(locationId || 0)
        && Number(item?.holder_actor_id || 0) === 0
      ));
    }

    function gardenHasDewbright(view = state) {
      return looseItemAtLocation(view, DEWBRIGHT_BUTTON_ITEM_ID, RAIN_SOFT_GARDEN_LOCATION_ID);
    }

    function gardenOpeningBeat(view = state) {
      if (gardenHasDewbright(view)) {
        return "Rain beads on the garden leaves. A small pearled button catches the light.";
      }
      return "Rain beads on the garden leaves. The grass shows where something pearled was lifted away.";
    }

    function gardenCopy(view = state) {
      if (gardenHasDewbright(view)) {
        return "Rain beads on broad leaves. Something small and pearled waits in the grass.";
      }
      return "Rain beads on broad leaves. A round patch in the grass shows where the pearled button was found.";
    }

    function localWorldConditionBeat(view) {
      const simulation = view?.location?.simulation;
      if (!simulation || Number(simulation.last_pulse_tick || 0) <= 0) return "";
      const pieces = [];
      const weather = String(simulation.weather || "").trim();
      if (weather && weather !== "settled") {
        pieces.push(`Beyond the nearest shelter, ${weather} holds.`);
      }
      const conflict = Number(simulation.conflict_pressure || 0);
      const tradePressure = Number(simulation.trade_pressure || 0);
      if (conflict >= 3) pieces.push("Old arguments here are close to becoming open trouble.");
      else if (conflict > 0) pieces.push("A little unease travels between the usual voices.");
      if (tradePressure >= 4) pieces.push("Shelves and supply baskets are running thin.");
      else if (tradePressure >= 2) pieces.push("The routes that supply this place feel strained.");
      else {
        const imports = Object.entries(simulation.imports || {})
          .filter(([, amount]) => Number(amount || 0) > 0)
          .sort((left, right) => Number(right[1] || 0) - Number(left[1] || 0));
        if (imports.length) pieces.push(`${imports[0][0]} from elsewhere has begun to appear here.`);
      }
      const faction = (simulation.faction_influence || [])
        .filter((entry) => Number(entry.influence || 0) > 0)
        .sort((left, right) => Number(right.influence || 0) - Number(left.influence || 0))[0];
      if (faction) pieces.push(`Signs of ${faction.faction_name || faction.faction_id} have appeared nearby.`);
      return pieces.slice(0, 2).join(" ");
    }

    function openingBeat(view) {
      const locationId = view?.location?.id;
      let beat = "";
      if (locationId === 1) {
        const names = new Set((view.actors || []).map((actor) => actor.name));
        const pieces = ["Firelight warms The Cosy Cottage; rain taps the windows and the low doorway waits."];
        if (names.has("Rati")) pieces.push("Rati knits a blue scarf near the hearth.");
        else pieces.push("Rati's blue scarf basket marks the chair where she often sits.");
        if (names.has("Gust")) pieces.push("Gust heckles the weather in bright little symbols.");
        if (names.has("Skull")) pieces.push("Skull watches the door like it owes him money.");
        beat = pieces.join(" ");
      } else if (locationId === 2) beat = gardenOpeningBeat(view);
      else if (locationId === 3) beat = "Moonlight silvers the trail. The air here is sharper, and choices carry farther.";
      else if (locationId === 10) beat = "Science Class hums with shared observations, bright benches, and questions waiting to be tested.";
      else if (locationId === 11) beat = "Homeroom waits with front-door morning light and the sense that every question gets a seat.";
      else if (locationId === 12) beat = "Library quiet gathers around the shelves; if it matters, someone wrote it down.";
      else if (locationId === 13) beat = "Cafeteria tables hold the soft thunder of commons diplomacy.";
      else if (locationId === 14) beat = "Greenhouse glass glows with patient leaves and experiments that grow slowly.";
      else if (locationId === 15) beat = "Courtyard paths cross under open sky; every hallway seems to lead back here.";
      else beat = copyForLocation(locationId, view);
      return [beat, localWorldConditionBeat(view)].filter(Boolean).join(" ");
    }

    function timelineEventHtml(event) {
      if (event.type === "message.created") return messageHtml(event);
      if (isRollEvent(event)) return rollHtml(event);
