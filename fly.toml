app = "cosyworld"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  COSYWORLD_DEPLOY_PROFILE = "production"
  COSYWORLD_V2_ADDR = "0.0.0.0:3000"
  COSYWORLD_V2_SNAPSHOT_PATH = "/data/cosyworld-v2-snapshot.json"
  COSYWORLD_V2_EVENT_DB_PATH = "/data/cosyworld-v2-events.sqlite"
  COSYWORLD_WEBAUTHN_RP_ID = "cosyworld.fly.dev"
  COSYWORLD_WEBAUTHN_ORIGIN = "https://cosyworld.fly.dev"
  COSYWORLD_RUBY_HIGH_WALLET_CARDS_URL = "https://ruby-high.ai/api/apps/ruby-high/nft/internal/cosyworld/wallet-cards"
  RUST_LOG = "cosyworld_orchestrator=info,tower_http=warn"

# Required production secrets:
# fly secrets set COSYWORLD_RUBY_HIGH_WALLET_CARDS_BEARER=...
# fly secrets set COSYWORLD_MODERATION_TOKEN=...

# Required before enabling production Box burns:
# fly secrets set COSYWORLD_BOX_BURN_SOLANA_RPC_URL=...
# fly secrets set COSYWORLD_BOX_CORE_COLLECTION_ADDRESS=...

[[mounts]]
  source = "cosyworld_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/health"
