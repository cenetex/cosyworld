app = "cosyworld"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  COSYWORLD_DEPLOY_PROFILE = "production"
  COSYWORLD_V2_ADDR = "0.0.0.0:3000"
  COSYWORLD_V2_SNAPSHOT_PATH = "/data/cosyworld-v2-snapshot.json"
  COSYWORLD_V2_EVENT_DB_PATH = "/data/cosyworld-v2-events.sqlite"
  COSYWORLD_GENERATED_ASSET_DIR = "/data/generated"
  COSYWORLD_WEBAUTHN_RP_ID = "cosyworld.fly.dev"
  COSYWORLD_WEBAUTHN_ORIGIN = "https://cosyworld.fly.dev"
  COSYWORLD_RUBY_HIGH_WALLET_CARDS_URL = "https://ruby-high.ai/api/apps/ruby-high/nft/internal/cosyworld/wallet-cards"
  COSYWORLD_HOSTED_PARTY_MAX_GUESTS = "4"
  COSYWORLD_HOSTED_PARTY_MAX_ACTIVE_PER_GUEST = "4"
  COSYWORLD_HOSTED_ACCESS_TTL_SECS = "7200"
  COSYWORLD_HOSTED_ACCESS_GRACE_SECS = "60"
  COSYWORLD_STORY_METRICS_RETENTION_DAYS = "400"
  COSYWORLD_REPLICATE_AVATAR_MODEL = "black-forest-labs/flux-dev-lora"
  COSYWORLD_REPLICATE_AVATAR_LORA = "immanencer/mirquo"
  COSYWORLD_REPLICATE_AVATAR_LORA_INPUT = "lora_weights"
  COSYWORLD_REPLICATE_AVATAR_LORA_SCALE_INPUT = "lora_scale"
  COSYWORLD_REPLICATE_AVATAR_PROMPT_PREFIX = "MRQ, cozy storybook trading-card portrait"
  RUST_LOG = "cosyworld_orchestrator=info,tower_http=warn"

# Required production secrets:
# fly secrets set COSYWORLD_RUBY_HIGH_WALLET_CARDS_BEARER=...
# fly secrets set COSYWORLD_MODERATION_TOKEN=...

# Required before enabling production Box burns:
# fly secrets set COSYWORLD_BOX_BURN_SOLANA_RPC_URL=...
# fly secrets set COSYWORLD_BOX_CORE_COLLECTION_ADDRESS=...

[[mounts]]
  source = "cosyworld_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/health"
